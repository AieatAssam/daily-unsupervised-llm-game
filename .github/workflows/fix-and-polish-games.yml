name: Fix and Polish Games

on:
  workflow_dispatch:
    inputs:
      issue_description:
        description: 'Describe the issue to fix (e.g. broken previews, unplayable games)'
        required: false
        default: 'General fix and polish pass'
        type: string
      test_scope:
        description: 'Regression test scope'
        required: false
        default: 'changed'
        type: choice
        options:
          - changed
          - full

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "fix-and-polish"
  cancel-in-progress: false

jobs:
  fix-and-polish:
    runs-on: ubuntu-latest
    outputs:
      fixes-applied: ${{ steps.check-changes.outputs.fixes-applied }}
      branch-name: ${{ steps.create-branch.outputs.branch-name }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Game Fix Bot"

      - name: Create fix branch off main
        id: create-branch
        run: |
          BRANCH_NAME="fix/games-$(date +'%Y-%m-%d-%H%M')"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache agent-browser Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: agent-browser-chromium-${{ runner.os }}

      - name: Install agent-browser
        run: |
          npm install -g agent-browser http-server
          agent-browser install --with-deps

      - name: Install Claude Code skills (agent-browser + caveman)
        run: |
          npx skills add vercel-labs/agent-browser --skill agent-browser -a claude-code -y
          # caveman: ultra-terse output — pipeline chat is never read by humans
          npx skills add JuliusBrussee/caveman --skill caveman -a claude-code -y || echo "caveman skill unavailable, prompt fallback applies"

      - name: Start local HTTP server
        run: |
          http-server . -p 8080 --cors -c-1 &
          echo "HTTP_SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2
          curl -sf http://localhost:8080/ > /dev/null && echo "HTTP server up"

      - name: Run Fix and Polish pass with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --dangerously-skip-permissions
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            OUTPUT STYLE: caveman ultra mode. Nobody reads this pipeline's chat
            output — keep every text response to the absolute minimum tokens
            (terse fragments, no pleasantries, no narration, no summaries).
            Spend tokens on files and tool calls, not prose. Code and committed
            files must remain normal, high-quality, and complete.

            TASK: Fix and polish pass on this games codebase.
            ISSUE REPORTED: ${{ github.event.inputs.issue_description }}

            Environment: full codebase in cwd, HTTP server at
            http://localhost:8080, agent-browser CLI via bash
            (open <url> | snapshot | screenshot <path> | wait <ms>).
            Read CLAUDE.md first. Relative paths only.

            Steps:
            1. TRIAGE FAST: run `node scripts/validate-registry.mjs` for schema
               and missing-file problems. Then audit games with agent-browser —
               prioritize any games named in the issue; sample others only as
               time allows. A game is broken if it fails to render (blank
               screenshot), throws JS errors, or ignores input.
            2. FIX broken games only — do NOT rewrite working games. Re-verify
               each fix with agent-browser before moving on.
            3. Generate missing previews via agent-browser screenshot into the
               game's folder; update registry paths.
            4. Remove placeholder/example/template entries from
               games-registry.json (registry only, keep files on disk).
            5. Verify gallery renders: open http://localhost:8080/, screenshot.
            6. Commit fixes with descriptive messages (one commit per logical
               fix). Mark unfixable games with "broken": true in the registry.
               NEVER commit runtime artifacts (playwright-report/, test-results/,
               screenshots outside game folders, logs, .claude/skills).

      - name: Stop HTTP server
        if: always()
        run: kill $HTTP_SERVER_PID 2>/dev/null || true

      - name: Check for changes
        id: check-changes
        run: |
          # Never let runtime artifacts sneak into the commit
          rm -rf playwright-report test-results .claude/skills .agents skills-lock.json output.txt
          git add -A

          STAGED_COUNT=$(git diff --staged --name-only | wc -l | tr -d ' ')
          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo "0")

          if [ "$STAGED_COUNT" -gt 0 ]; then
            git commit -m "🔧 Fix and polish pass - $(date +'%Y-%m-%d %H:%M')"
            echo "fixes-applied=true" >> $GITHUB_OUTPUT
          elif [ "$COMMITS_AHEAD" -gt 0 ]; then
            echo "fixes-applied=true" >> $GITHUB_OUTPUT
          else
            echo "No changes — all games healthy"
            echo "fixes-applied=false" >> $GITHUB_OUTPUT
          fi

      - name: Push fix branch
        if: steps.check-changes.outputs.fixes-applied == 'true'
        run: git push origin "${{ steps.create-branch.outputs.branch-name }}"

      - name: Delete branch if no changes
        if: steps.check-changes.outputs.fixes-applied == 'false'
        run: git push origin --delete "${{ steps.create-branch.outputs.branch-name }}" || true

  regression-tests:
    needs: fix-and-polish
    if: needs.fix-and-polish.outputs.fixes-applied == 'true'
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.run-tests.outputs.tests-passed }}

    steps:
      - name: Checkout fix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.fix-and-polish.outputs.branch-name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install test dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Validate registry
        run: node scripts/validate-registry.mjs

      - name: Run regression tests
        id: run-tests
        run: |
          git fetch origin main
          if [ "${{ github.event.inputs.test_scope }}" = "full" ]; then
            TEST_FILES=$(find games -name "game.test.js" | sort)
          else
            # Default: test only games touched by the fix branch — full suite
            # is slow and flaky under CDN load, and unchanged games already
            # passed on their own merge day.
            TEST_FILES=$(git diff --name-only origin/main...HEAD -- 'games/**' \
              | cut -d/ -f1-2 | sort -u \
              | while read -r d; do [ -f "$d/game.test.js" ] && echo "$d/game.test.js"; done)
          fi

          if [ -z "$TEST_FILES" ]; then
            echo "No game files changed — registry/gallery-only fix, validator already passed"
            echo "tests-passed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Testing: $(echo "$TEST_FILES" | wc -l) suite(s)"
          if npx playwright test $TEST_FILES; then
            echo "tests-passed=true" >> $GITHUB_OUTPUT
          else
            echo "tests-passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fix-test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  merge-to-main:
    needs: [fix-and-polish, regression-tests]
    if: needs.regression-tests.outputs.tests-passed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Game Fix Bot"

      - name: Merge fix branch to main
        run: |
          git fetch origin
          git checkout main
          git merge --no-ff origin/${{ needs.fix-and-polish.outputs.branch-name }} \
            -m "🔧 Merge fix/polish pass from ${{ needs.fix-and-polish.outputs.branch-name }}"
          git push origin main

      - name: Delete fix branch
        run: git push origin --delete ${{ needs.fix-and-polish.outputs.branch-name }}

  deploy:
    needs: merge-to-main
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
