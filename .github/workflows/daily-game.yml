name: Daily Game Generator

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  pull-requests: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-game:
    runs-on: ubuntu-latest
    outputs:
      game-generated: ${{ steps.check-changes.outputs.game-generated }}
      branch-name: ${{ steps.create-branch.outputs.branch-name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create branch for new game
        id: create-branch
        run: |
          TODAY=$(date +'%Y-%m-%d')
          BRANCH_NAME="game/$TODAY"
          echo "branch-name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH_NAME"

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Daily Game Bot"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache agent-browser Chromium
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: agent-browser-chromium-${{ runner.os }}

      - name: Install agent-browser
        run: |
          npm install -g agent-browser http-server
          agent-browser install --with-deps

      - name: Install Claude Code skills (agent-browser + caveman)
        run: |
          npx skills add vercel-labs/agent-browser --skill agent-browser -a claude-code -y
          # caveman: ultra-terse output mode — pipeline output is never read by
          # humans, so minimize tokens spent on prose
          npx skills add JuliusBrussee/caveman --skill caveman -a claude-code -y || echo "caveman skill unavailable, prompt fallback applies"

      - name: Start local HTTP server
        run: |
          http-server . -p 8080 --cors -c-1 &
          echo "HTTP_SERVER_PID=$!" >> $GITHUB_ENV
          sleep 2
          curl -sf http://localhost:8080/ > /dev/null && echo "HTTP server up"

      - name: Generate Daily Game with Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --dangerously-skip-permissions
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            OUTPUT STYLE: caveman ultra mode. Nobody reads this pipeline's chat
            output — keep every text response to the absolute minimum tokens
            (terse fragments, no pleasantries, no narration, no summaries).
            Spend tokens on files and tool calls, not prose. Code and committed
            files must remain normal, high-quality, and complete.

            TASK: Generate today's daily game following all instructions in CLAUDE.md.

            Work in the current directory, relative paths only. HTTP server is
            live at http://localhost:8080. agent-browser skill installed —
            commands: open <url> | snapshot | screenshot <path> | wait <ms>.

            Required steps (all in one run):
            1. Read games-registry.json; new game must be mechanically unique vs last 7.
            2. Create games/YYYY-MM-DD/index.html (single standalone HTML,
               React 18 + Babel from unpkg CDN, <script type="text/babel">).
            3. Create games/YYYY-MM-DD/game.test.js with all 6 required tests
               loading /games/YYYY-MM-DD/index.html.
            4. Verify with agent-browser: open the game, wait 3000, screenshot,
               snapshot, interact, confirm response. Fix and re-verify if broken.
            5. Screenshot mid-action gameplay to games/YYYY-MM-DD/preview.png.
            6. Add registry entry (include a "rating" number 3.5-5.0 — honest
               self-assessment of polish and fun).
            7. Commit everything. NEVER commit test artifacts (playwright-report/,
               test-results/, *.png outside the game folder, logs).

            Game not done until agent-browser confirms it renders and responds.

      - name: Stop HTTP server
        if: always()
        run: kill $HTTP_SERVER_PID 2>/dev/null || true

      - name: Check for changes
        id: check-changes
        run: |
          # Never let runtime artifacts sneak into the commit
          rm -rf playwright-report test-results .claude/skills .agents skills-lock.json output.txt
          git add -A

          STAGED_COUNT=$(git diff --staged --name-only | wc -l | tr -d ' ')
          COMMITS_AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo "0")

          if [ "$STAGED_COUNT" -gt 0 ]; then
            git commit -m "🎮 Daily Game Generated - $(date +'%Y-%m-%d')"
            echo "game-generated=true" >> $GITHUB_OUTPUT
          elif [ "$COMMITS_AHEAD" -gt 0 ]; then
            echo "game-generated=true" >> $GITHUB_OUTPUT
          else
            echo "game-generated=false" >> $GITHUB_OUTPUT
          fi
          git diff origin/main...HEAD --stat || true

      - name: Push branch
        if: steps.check-changes.outputs.game-generated == 'true'
        run: git push origin "${{ steps.create-branch.outputs.branch-name }}"

  test-games:
    needs: generate-game
    if: needs.generate-game.outputs.game-generated == 'true'
    runs-on: ubuntu-latest
    outputs:
      tests-passed: ${{ steps.run-tests.outputs.tests-passed }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.generate-game.outputs.branch-name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Validate registry
        run: node scripts/validate-registry.mjs

      - name: Run tests for changed games only
        id: run-tests
        run: |
          git fetch origin main
          # Only test games touched by this branch — the full 100+ game suite
          # is slow and flaky (CDN load); unchanged games were already gated
          # on their own merge day.
          TEST_FILES=$(git diff --name-only origin/main...HEAD -- 'games/**' \
            | cut -d/ -f1-2 | sort -u \
            | while read -r d; do [ -f "$d/game.test.js" ] && echo "$d/game.test.js"; done)

          if [ -z "$TEST_FILES" ]; then
            echo "No changed games with tests — failing: daily run must produce a tested game"
            echo "tests-passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "Testing: $TEST_FILES"
          if npx playwright test $TEST_FILES; then
            echo "tests-passed=true" >> $GITHUB_OUTPUT
          else
            echo "tests-passed=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  merge-to-main:
    needs: [generate-game, test-games]
    if: needs.test-games.outputs.tests-passed == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Daily Game Bot"

      - name: Merge to main
        run: |
          git fetch origin
          git checkout main
          git merge --no-ff origin/${{ needs.generate-game.outputs.branch-name }} -m "Merge daily game from ${{ needs.generate-game.outputs.branch-name }}"
          git push origin main

      - name: Delete branch
        run: git push origin --delete ${{ needs.generate-game.outputs.branch-name }}

  deploy:
    needs: merge-to-main
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
