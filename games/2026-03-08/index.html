<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neon Maze</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #04000e; }
    #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef } = React;

    // ── Constants ─────────────────────────────────────────────────────────────
    const GW = 400, GH = 600;
    const HS_KEY = 'neonMaze_highScore';

    const COLS = 10, ROWS = 12, CELL = 36;
    const MX = (GW - COLS * CELL) / 2; // 20
    const MY = 88;

    const N = 1, S = 2, E = 4, W = 8;

    const MENU = 'menu', PLAYING = 'playing', OVER = 'over';

    // ── Power-up types ────────────────────────────────────────────────────────
    const PWR_SPEED  = 'speed';   // lime  – player moves faster for 5 s
    const PWR_FREEZE = 'freeze';  // cyan  – freeze all hunters for 3 s
    const PWR_SHIELD = 'shield';  // blue  – absorb one hit
    const PWR_DOUBLE = 'double';  // orange – 2× score for 8 s

    const PWR_CONFIG = {
      [PWR_SPEED]:  { color: '#88ff00', glow: '#66dd00', label: '⚡SPD' },
      [PWR_FREEZE]: { color: '#00eeff', glow: '#00aacc', label: '❄FRZ' },
      [PWR_SHIELD]: { color: '#4488ff', glow: '#2255dd', label: '🛡SHD' },
      [PWR_DOUBLE]: { color: '#ff8800', glow: '#dd5500', label: '✕2 DBL' },
    };
    const PWR_TYPES = [PWR_SPEED, PWR_FREEZE, PWR_SHIELD, PWR_DOUBLE];

    // ── Audio ─────────────────────────────────────────────────────────────────
    let _ac = null;
    function getAC() {
      if (!_ac) try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      return _ac;
    }
    function beep(freq, type = 'sine', dur = 0.12, vol = 0.22, delay = 0) {
      const ac = getAC(); if (!ac) return;
      const o = ac.createOscillator(), gn = ac.createGain();
      o.type = type; o.frequency.value = freq;
      gn.gain.setValueAtTime(vol, ac.currentTime + delay);
      gn.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + dur);
      o.connect(gn); gn.connect(ac.destination);
      o.start(ac.currentTime + delay);
      o.stop(ac.currentTime + delay + dur);
    }

    // ── Maze generation (recursive backtracking) ──────────────────────────────
    function generateMaze(cols, rows) {
      const walls = Array.from({ length: rows }, () =>
        new Array(cols).fill(N | S | E | W)
      );
      const vis = Array.from({ length: rows }, () => new Array(cols).fill(false));

      function carve(c, r) {
        vis[r][c] = true;
        const dirs = [
          [0, -1, N, S], [0,  1, S, N],
          [1,  0, E, W], [-1, 0, W, E],
        ];
        for (let i = dirs.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [dirs[i], dirs[j]] = [dirs[j], dirs[i]];
        }
        for (const [dc, dr, mw, tw] of dirs) {
          const nc = c + dc, nr = r + dr;
          if (nc >= 0 && nc < cols && nr >= 0 && nr < rows && !vis[nr][nc]) {
            walls[r][c]   &= ~mw;
            walls[nr][nc] &= ~tw;
            carve(nc, nr);
          }
        }
      }
      carve(0, 0);
      return walls;
    }

    // ── BFS pathfinding (used by escape mechanism) ────────────────────────────
    function bfsDistance(maze, fromC, fromR, toC, toR) {
      const visited = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));
      const queue = [[fromC, fromR, 0]];
      visited[fromR][fromC] = true;
      const DIRS = [[0,-1,N],[0,1,S],[1,0,E],[-1,0,W]];
      while (queue.length) {
        const [c, r, d] = queue.shift();
        if (c === toC && r === toR) return d;
        for (const [dc, dr, wall] of DIRS) {
          if (maze[r][c] & wall) continue;
          const nc = c + dc, nr = r + dr;
          if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) continue;
          if (visited[nr][nc]) continue;
          visited[nr][nc] = true;
          queue.push([nc, nr, d + 1]);
        }
      }
      return Infinity;
    }

    // Find a safe spawn cell: farthest from all enemies
    function findSafeSpawn(maze, enemies) {
      let bestCell = { col: 0, row: 0 };
      let bestMin = -1;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const minDist = Math.min(...enemies.map(e => bfsDistance(maze, c, r, e.col, e.row)));
          if (minDist > bestMin) { bestMin = minDist; bestCell = { col: c, row: r }; }
        }
      }
      return bestCell;
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const canvasRef = useRef(null);
      const rafRef    = useRef(null);
      const lastRef   = useRef(0);

      const g = useRef({
        phase: MENU,
        maze: null,
        player: { col: 0, row: 0, x: 0, y: 0, tx: 0, ty: 0, moving: false },
        enemies: [],
        orbs: [],
        powerUps: [],            // pickups on the map
        activePowers: {          // active effect durations (ms remaining)
          [PWR_SPEED]: 0,
          [PWR_FREEZE]: 0,
          [PWR_SHIELD]: 0,
          [PWR_DOUBLE]: 0,
        },
        hunterStunT: 0,          // all hunters stunned (ms remaining)
        particles: [],
        score: 0, hs: 0,
        combo: 0, lastOrbTime: 0,
        lives: 3, level: 1,
        msg: '', msgT: 0,
        enemyT: 0, enemyInt: 600,
        invT: 0,
        touchX: 0, touchY: 0,
      }).current;

      // ── Helpers ───────────────────────────────────────────────────────────
      const xy = (col, row) => ({
        x: MX + col * CELL + CELL / 2,
        y: MY + row * CELL + CELL / 2,
      });

      const spark = (px, py, color, n = 6) => {
        for (let i = 0; i < n; i++) {
          const a = (i / n) * Math.PI * 2 + Math.random() * 0.4;
          const spd = 1.5 + Math.random() * 2;
          g.particles.push({ x: px, y: py, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
            life: 350 + Math.random() * 200, max: 550, color });
        }
      };

      // ── Level init ────────────────────────────────────────────────────────
      const initLevel = () => {
        g.maze = generateMaze(COLS, ROWS);

        const s = xy(0, 0);
        g.player = { col: 0, row: 0, x: s.x, y: s.y, tx: s.x, ty: s.y, moving: false };

        const cnt = Math.min(1 + Math.floor((g.level - 1) / 2), 4);
        const starts = [
          [COLS-1, ROWS-1], [COLS-1, 0],
          [0, ROWS-1], [Math.floor(COLS/2), Math.floor(ROWS/2)],
        ];
        g.enemies = starts.slice(0, cnt).map(([ec, er]) => {
          const { x, y } = xy(ec, er);
          return { col: ec, row: er, x, y, tx: x, ty: y, moving: false };
        });

        const blocked = new Set(
          starts.slice(0, cnt).map(([c, r]) => `${c},${r}`).concat(['0,0'])
        );

        // Golden orbs
        g.orbs = [];
        for (let r = 0; r < ROWS; r++)
          for (let c = 0; c < COLS; c++)
            if (!blocked.has(`${c},${r}`) && Math.random() < 0.38)
              g.orbs.push({ col: c, row: r, done: false });

        while (g.orbs.length < 22) {
          const c = Math.floor(Math.random() * COLS);
          const r = Math.floor(Math.random() * ROWS);
          if (!blocked.has(`${c},${r}`) && !g.orbs.find(o => o.col === c && o.row === r))
            g.orbs.push({ col: c, row: r, done: false });
        }

        // Power-ups: spawn 4–6, evenly spread among types
        g.powerUps = [];
        const pwrCount = 4 + Math.floor(g.level / 3);
        const orbSet = new Set(g.orbs.map(o => `${o.col},${o.row}`));
        let attempts = 0;
        while (g.powerUps.length < Math.min(pwrCount, 6) && attempts < 200) {
          attempts++;
          const c = Math.floor(Math.random() * COLS);
          const r = Math.floor(Math.random() * ROWS);
          const key = `${c},${r}`;
          if (blocked.has(key) || orbSet.has(key) ||
              g.powerUps.find(p => p.col === c && p.row === r)) continue;
          const type = PWR_TYPES[g.powerUps.length % PWR_TYPES.length];
          g.powerUps.push({ col: c, row: r, type, done: false });
        }

        // Reset active powers
        for (const k of PWR_TYPES) g.activePowers[k] = 0;
        g.hunterStunT = 0;

        g.enemyInt = Math.max(200, 580 - (g.level - 1) * 40);
        g.enemyT = 0;
        g.invT = 0;
        g.combo = 0;
        g.lastOrbTime = 0;
        g.particles = [];
      };

      // ── Start / restart ───────────────────────────────────────────────────
      const startGame = () => {
        g.phase = PLAYING;
        g.score = 0;
        g.lives = 3;
        g.level = 1;
        initLevel();
        beep(440, 'sine', 0.18, 0.3);
      };

      // ── Player move ───────────────────────────────────────────────────────
      const movePlayer = (dc, dr) => {
        if (g.phase !== PLAYING || g.player.moving) return;
        const { col, row } = g.player;
        const w = g.maze[row][col];
        if (dc === 0  && dr === -1 && (w & N)) return;
        if (dc === 0  && dr ===  1 && (w & S)) return;
        if (dc ===  1 && dr ===  0 && (w & E)) return;
        if (dc === -1 && dr ===  0 && (w & W)) return;
        const nc = col + dc, nr = row + dr;
        if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) return;

        g.player.col = nc; g.player.row = nr;
        const { x, y } = xy(nc, nr);
        g.player.tx = x; g.player.ty = y;
        g.player.moving = true;

        const now = performance.now();

        // Orb collection
        const orbIdx = g.orbs.findIndex(o => o.col === nc && o.row === nr && !o.done);
        if (orbIdx >= 0) {
          g.orbs[orbIdx].done = true;
          g.combo = (now - g.lastOrbTime < 1800) ? Math.min(g.combo + 1, 8) : 1;
          g.lastOrbTime = now;
          const multi = g.activePowers[PWR_DOUBLE] > 0 ? 2 : 1;
          const pts = 10 * g.combo * multi;
          g.score += pts;
          if (g.score > g.hs) { g.hs = g.score; localStorage.setItem(HS_KEY, g.hs); }
          spark(x, y, '#ffee00', 6);
          const comboLabel = g.combo > 1 ? `×${g.combo}` : '';
          const multiLabel = multi > 1 ? ' ×2!' : '';
          g.msg  = `+${pts}${comboLabel}${multiLabel}`;
          g.msgT = 700;
          beep(480 + g.combo * 55, 'triangle', 0.08, 0.18);
        }

        // Power-up collection
        const pwrIdx = g.powerUps.findIndex(p => p.col === nc && p.row === nr && !p.done);
        if (pwrIdx >= 0) {
          const pwr = g.powerUps[pwrIdx];
          pwr.done = true;
          applyPowerUp(pwr.type, x, y);
        }

        // Level clear
        if (g.orbs.every(o => o.done)) {
          const bonus = 120 * g.level;
          g.score += bonus;
          if (g.score > g.hs) { g.hs = g.score; localStorage.setItem(HS_KEY, g.hs); }
          g.msg = `LEVEL ${g.level} CLEAR!  +${bonus}`;
          g.msgT = 1600;
          g.phase = 'complete';
          beep(880,  'sine', 0.1, 0.3, 0);
          beep(1100, 'sine', 0.1, 0.3, 0.12);
          beep(1320, 'sine', 0.18, 0.3, 0.24);
          setTimeout(() => { g.level++; initLevel(); g.phase = PLAYING; }, 1600);
        }
      };

      // ── Apply power-up ─────────────────────────────────────────────────────
      const applyPowerUp = (type, px, py) => {
        const cfg = PWR_CONFIG[type];
        spark(px, py, cfg.color, 10);
        beep(660, 'sine', 0.18, 0.3);
        beep(880, 'sine', 0.12, 0.25, 0.1);

        if (type === PWR_SPEED) {
          g.activePowers[PWR_SPEED] = 5000;
          g.msg = '⚡ SPEED BOOST!'; g.msgT = 1000;
        } else if (type === PWR_FREEZE) {
          g.activePowers[PWR_FREEZE] = 3000;
          g.hunterStunT = 3000;
          g.msg = '❄ HUNTERS FROZEN!'; g.msgT = 1000;
          for (const e of g.enemies) { e.moving = false; }
        } else if (type === PWR_SHIELD) {
          g.activePowers[PWR_SHIELD] = 1; // count-based, not time-based
          g.msg = '🛡 SHIELD ACTIVE!'; g.msgT = 1000;
        } else if (type === PWR_DOUBLE) {
          g.activePowers[PWR_DOUBLE] = 8000;
          g.msg = '✕2 DOUBLE SCORE!'; g.msgT = 1000;
        }
      };

      // ── Enemy AI ──────────────────────────────────────────────────────────
      const tickEnemies = () => {
        if (g.hunterStunT > 0) return; // frozen by power-up
        const DIRS = [[0,-1,N],[0,1,S],[1,0,E],[-1,0,W]];
        for (const e of g.enemies) {
          if (e.moving) continue;
          const w = g.maze[e.row][e.col];
          const avail = DIRS.filter(([dc, dr, wall]) => {
            if (w & wall) return false;
            const nc = e.col + dc, nr = e.row + dr;
            return nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS;
          });
          if (!avail.length) continue;

          let chosen;
          if (Math.random() < 0.62) {
            const { col: pc, row: pr } = g.player;
            let best = Infinity, bi = 0;
            avail.forEach((d, i) => {
              const dist = Math.abs(e.col + d[0] - pc) + Math.abs(e.row + d[1] - pr);
              if (dist < best) { best = dist; bi = i; }
            });
            chosen = avail[bi];
          } else {
            chosen = avail[Math.floor(Math.random() * avail.length)];
          }
          e.col += chosen[0]; e.row += chosen[1];
          const { x, y } = xy(e.col, e.row);
          e.tx = x; e.ty = y; e.moving = true;
        }
      };

      // ── Collision ─────────────────────────────────────────────────────────
      const checkHit = () => {
        if (g.invT > 0) return;
        const { x: px, y: py } = g.player;
        for (const e of g.enemies) {
          const dx = px - e.x, dy = py - e.y;
          if (dx*dx + dy*dy < (CELL * 0.52) ** 2) {
            // Shield absorbs the hit
            if (g.activePowers[PWR_SHIELD] > 0) {
              g.activePowers[PWR_SHIELD] = 0;
              g.msg = '🛡 SHIELD ABSORBED HIT!'; g.msgT = 900;
              g.invT = 1500;
              spark(px, py, '#4488ff', 12);
              beep(300, 'sine', 0.2, 0.3);
              beep(500, 'sine', 0.12, 0.2, 0.1);
              return;
            }

            g.lives--;
            g.combo = 0;
            spark(px, py, '#ff3333', 10);
            beep(160, 'sawtooth', 0.3, 0.4);

            if (g.lives <= 0) {
              g.phase = OVER;
              beep(100, 'sawtooth', 0.5, 0.5, 0.08);
            } else {
              // Smart respawn: find cell farthest from all enemies
              const safeCell = findSafeSpawn(g.maze, g.enemies);
              const { x: sx, y: sy } = xy(safeCell.col, safeCell.row);
              g.player = { col: safeCell.col, row: safeCell.row, x: sx, y: sy, tx: sx, ty: sy, moving: false };

              // Stun all hunters briefly so player can escape
              g.hunterStunT = 2000;
              g.invT = 2500;
              g.msg = 'CAUGHT! Hunters stunned!'; g.msgT = 1200;

              // Clear active powers on death (except shield already used)
              for (const k of PWR_TYPES) g.activePowers[k] = 0;
            }
            break;
          }
        }
      };

      // ── Update ────────────────────────────────────────────────────────────
      const update = (dt) => {
        // Speed multiplier
        const speedMul = g.activePowers[PWR_SPEED] > 0 ? 2.2 : 1;

        // Player lerp
        if (g.player.moving) {
          const dx = g.player.tx - g.player.x, dy = g.player.ty - g.player.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          const step = CELL * 20 * speedMul * dt / 1000;
          if (dist <= step) { g.player.x = g.player.tx; g.player.y = g.player.ty; g.player.moving = false; }
          else { g.player.x += (dx/dist)*step; g.player.y += (dy/dist)*step; }
        }

        // Enemy lerp (also slowed during stun for visual effect)
        const enemySpeedMul = g.hunterStunT > 0 ? 0.0 : 1;
        for (const e of g.enemies) {
          if (e.moving) {
            const dx = e.tx - e.x, dy = e.ty - e.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const step = CELL * 10 * enemySpeedMul * dt / 1000;
            if (dist <= step) { e.x = e.tx; e.y = e.ty; e.moving = false; }
            else { e.x += (dx/dist)*step; e.y += (dy/dist)*step; }
          }
        }

        // Particles
        for (const p of g.particles) { p.x += p.vx * dt/16; p.y += p.vy * dt/16; p.life -= dt; }
        g.particles = g.particles.filter(p => p.life > 0);

        if (g.msgT > 0) g.msgT -= dt;
        if (g.invT > 0) g.invT -= dt;
        if (g.hunterStunT > 0) g.hunterStunT -= dt;

        // Tick active power durations
        for (const k of [PWR_SPEED, PWR_FREEZE, PWR_DOUBLE]) {
          if (g.activePowers[k] > 0) g.activePowers[k] -= dt;
        }
        // Sync freeze stun
        if (g.activePowers[PWR_FREEZE] > 0) g.hunterStunT = g.activePowers[PWR_FREEZE];

        if (g.phase !== PLAYING) return;

        g.enemyT += dt;
        if (g.enemyT >= g.enemyInt) { g.enemyT = 0; tickEnemies(); }
        checkHit();
      };

      // ── Draw ──────────────────────────────────────────────────────────────
      const draw = (ctx, t) => {
        ctx.clearRect(0, 0, GW, GH);
        ctx.fillStyle = '#04000e';
        ctx.fillRect(0, 0, GW, GH);

        if (g.phase === MENU) { drawMenu(ctx, t); return; }
        if (g.phase === OVER)  { drawOver(ctx, t);  return; }

        drawHUD(ctx, t);
        drawMaze(ctx);
        drawOrbs(ctx, t);
        drawPowerUps(ctx, t);
        drawParticles(ctx);
        drawPlayer(ctx, t);
        drawEnemies(ctx, t);

        if (g.msgT > 0) {
          const a = Math.min(1, g.msgT / 280);
          ctx.save();
          ctx.globalAlpha = a;
          ctx.font = 'bold 21px monospace';
          ctx.fillStyle = '#ffff44';
          ctx.shadowColor = '#ffee00';
          ctx.shadowBlur = 10;
          ctx.textAlign = 'center';
          ctx.fillText(g.msg, GW/2, MY - 12);
          ctx.restore();
        }
      };

      const drawHUD = (ctx, t) => {
        ctx.font = 'bold 15px monospace';
        ctx.textAlign = 'left';
        ctx.fillStyle = '#00ffff';
        ctx.fillText(`SCORE ${g.score}`, 10, 24);

        ctx.textAlign = 'right';
        ctx.fillStyle = '#ff00ff';
        ctx.fillText(`BEST ${g.hs}`, GW-10, 24);

        ctx.textAlign = 'center';
        ctx.fillStyle = '#00ff88';
        ctx.fillText(`LVL ${g.level}`, GW/2, 24);

        // Lives
        for (let i = 0; i < 3; i++) {
          ctx.beginPath();
          ctx.arc(14 + i*22, 50, 7, 0, Math.PI*2);
          ctx.fillStyle = i < g.lives ? '#ff3344' : '#200010';
          ctx.shadowColor = i < g.lives ? '#ff3344' : 'transparent';
          ctx.shadowBlur  = i < g.lives ? 8 : 0;
          ctx.fill();
        }
        ctx.shadowBlur = 0;

        const rem = g.orbs.filter(o => !o.done).length;
        ctx.fillStyle = '#aaaa00';
        ctx.font = '11px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`${rem} orbs left`, GW/2, 52);

        if (g.combo > 1) {
          ctx.fillStyle = '#ff8800';
          ctx.font = 'bold 12px monospace';
          ctx.textAlign = 'right';
          ctx.fillText(`${g.combo}× COMBO`, GW-10, 52);
        }

        // Active power-up indicators
        let barX = 10;
        const barY = 68;
        for (const type of PWR_TYPES) {
          const remaining = type === PWR_SHIELD
            ? g.activePowers[type]
            : g.activePowers[type];
          if (!remaining) continue;
          const cfg = PWR_CONFIG[type];
          const pulse = 0.7 + 0.3 * Math.sin(t * 0.008);
          ctx.font = 'bold 9px monospace';
          ctx.fillStyle = cfg.color;
          ctx.shadowColor = cfg.glow;
          ctx.shadowBlur = 6 * pulse;
          ctx.textAlign = 'left';
          ctx.fillText(cfg.label, barX, barY);
          ctx.shadowBlur = 0;
          barX += ctx.measureText(cfg.label).width + 10;
        }

        // Hunter stun bar
        if (g.hunterStunT > 0 && g.activePowers[PWR_FREEZE] <= 0) {
          const frac = g.hunterStunT / 2000;
          ctx.fillStyle = '#00eeff';
          ctx.globalAlpha = 0.6;
          ctx.fillRect(GW/2 - 40, 62, 80 * frac, 4);
          ctx.globalAlpha = 1;
        }
      };

      const drawMaze = (ctx) => {
        if (!g.maze) return;
        ctx.beginPath();
        ctx.strokeStyle = '#0077bb';
        ctx.lineWidth = 1.5;
        ctx.shadowColor = '#00aadd';
        ctx.shadowBlur = 5;
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const wx = MX + c * CELL, wy = MY + r * CELL;
            const w = g.maze[r][c];
            if (w & N) { ctx.moveTo(wx, wy);       ctx.lineTo(wx+CELL, wy); }
            if (w & W) { ctx.moveTo(wx, wy);       ctx.lineTo(wx, wy+CELL); }
            if (r === ROWS-1 && (w & S)) { ctx.moveTo(wx, wy+CELL); ctx.lineTo(wx+CELL, wy+CELL); }
            if (c === COLS-1 && (w & E)) { ctx.moveTo(wx+CELL, wy); ctx.lineTo(wx+CELL, wy+CELL); }
          }
        }
        ctx.stroke();
        ctx.shadowBlur = 0;
      };

      const drawOrbs = (ctx, t) => {
        const pulse = 0.5 + 0.5 * Math.sin(t * 0.0033);
        for (const o of g.orbs) {
          if (o.done) continue;
          const { x, y } = xy(o.col, o.row);
          ctx.beginPath();
          ctx.arc(x, y, 3.5 + pulse * 1.5, 0, Math.PI*2);
          ctx.fillStyle = `rgba(255, 230, 0, ${0.65 + pulse * 0.35})`;
          ctx.shadowColor = '#ffee00';
          ctx.shadowBlur = 6 + pulse * 5;
          ctx.fill();
        }
        ctx.shadowBlur = 0;
      };

      const drawPowerUps = (ctx, t) => {
        const spin = t * 0.002;
        for (const p of g.powerUps) {
          if (p.done) continue;
          const { x, y } = xy(p.col, p.row);
          const cfg = PWR_CONFIG[p.type];
          const pulse = 0.55 + 0.45 * Math.sin(t * 0.0045 + p.col * 0.7);

          // Draw rotating diamond
          ctx.save();
          ctx.translate(x, y);
          ctx.rotate(spin + p.col * 1.2);
          ctx.beginPath();
          const r = 6 + pulse * 2;
          ctx.moveTo(0, -r);
          ctx.lineTo(r * 0.7, 0);
          ctx.lineTo(0, r);
          ctx.lineTo(-r * 0.7, 0);
          ctx.closePath();
          ctx.fillStyle = cfg.color;
          ctx.shadowColor = cfg.glow;
          ctx.shadowBlur = 10 + pulse * 8;
          ctx.fill();
          ctx.restore();

          ctx.shadowBlur = 0;
        }
      };

      const drawParticles = (ctx) => {
        for (const p of g.particles) {
          const a = p.life / p.max;
          ctx.globalAlpha = a;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 3 * a, 0, Math.PI*2);
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 6;
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      };

      const drawPlayer = (ctx, t) => {
        if (g.invT > 0 && Math.floor(g.invT / 110) % 2 === 1) return;
        const pulse = 0.88 + 0.12 * Math.sin(t * 0.006);
        // Shield glow ring
        if (g.activePowers[PWR_SHIELD] > 0) {
          ctx.beginPath();
          ctx.arc(g.player.x, g.player.y, 14 * pulse, 0, Math.PI*2);
          ctx.strokeStyle = '#4488ff';
          ctx.shadowColor = '#4488ff';
          ctx.shadowBlur = 20;
          ctx.lineWidth = 2.5;
          ctx.stroke();
          ctx.shadowBlur = 0;
        }
        // Speed trail
        if (g.activePowers[PWR_SPEED] > 0) {
          ctx.beginPath();
          ctx.arc(g.player.x, g.player.y, 12 * pulse, 0, Math.PI*2);
          ctx.fillStyle = 'rgba(136, 255, 0, 0.18)';
          ctx.fill();
        }
        ctx.beginPath();
        ctx.arc(g.player.x, g.player.y, 9 * pulse, 0, Math.PI*2);
        ctx.fillStyle = '#00ffff';
        ctx.shadowColor = '#00ffff';
        ctx.shadowBlur = 18;
        ctx.fill();
        ctx.shadowBlur = 0;
      };

      const drawEnemies = (ctx, t) => {
        const frozen = g.hunterStunT > 0;
        for (const e of g.enemies) {
          const pulse = 0.88 + 0.12 * Math.sin(t * 0.007 + e.col * 0.7);
          ctx.beginPath();
          ctx.arc(e.x, e.y, 9 * pulse, 0, Math.PI*2);
          // Show frozen state
          ctx.fillStyle = frozen ? '#226688' : '#ff2222';
          ctx.shadowColor = frozen ? '#00aacc' : '#ff4444';
          ctx.shadowBlur = 18;
          ctx.fill();
          ctx.shadowBlur = 0;
          // Eyes
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.arc(e.x - 2.8, e.y - 1.5, 1.8, 0, Math.PI*2);
          ctx.arc(e.x + 2.8, e.y - 1.5, 1.8, 0, Math.PI*2);
          ctx.fill();
          // Ice crystal overlay when frozen
          if (frozen) {
            ctx.globalAlpha = 0.5;
            ctx.font = '10px monospace';
            ctx.fillStyle = '#00ffff';
            ctx.textAlign = 'center';
            ctx.fillText('❄', e.x, e.y + 4);
            ctx.globalAlpha = 1;
          }
        }
      };

      const drawMenu = (ctx, t) => {
        const glo = 14 + 6 * Math.sin(t * 0.002);
        ctx.font = 'bold 44px monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#00ffff';
        ctx.shadowColor = '#00ffff';
        ctx.shadowBlur = glo;
        ctx.fillText('NEON MAZE', GW/2, 155);
        ctx.shadowBlur = 0;

        ctx.font = '14px monospace';
        ctx.fillStyle = '#888';
        ctx.fillText('Navigate the maze', GW/2, 205);
        ctx.fillText('Collect all glowing orbs', GW/2, 228);
        ctx.fillText('Avoid the red hunters!', GW/2, 251);

        ctx.font = '12px monospace';
        ctx.fillStyle = '#555';
        ctx.fillText('Arrow keys / WASD to move', GW/2, 283);
        ctx.fillText('Swipe on mobile', GW/2, 302);

        // Icons row
        const iconY = 335;
        const items = [
          { color: '#ffee00', glow: '#ffff00', label: '= orb', x: GW/2 - 80 },
          { color: '#ff2222', glow: '#ff4444', label: '= hunter', x: GW/2 + 20 },
        ];
        for (const item of items) {
          ctx.beginPath();
          ctx.arc(item.x, iconY, 7, 0, Math.PI*2);
          ctx.fillStyle = item.color;
          ctx.shadowColor = item.glow; ctx.shadowBlur = 10;
          ctx.fill(); ctx.shadowBlur = 0;
          ctx.font = '11px monospace'; ctx.fillStyle = '#888';
          ctx.textAlign = 'left';
          ctx.fillText(item.label, item.x + 12, iconY + 4);
        }

        // Power-up legend
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#666';
        ctx.fillText('POWER-UPS:', GW/2, 365);
        const pwrLegend = [
          { color: '#88ff00', label: '⚡ Speed' },
          { color: '#00eeff', label: '❄ Freeze' },
          { color: '#4488ff', label: '🛡 Shield' },
          { color: '#ff8800', label: '✕2 Double' },
        ];
        let lx = 30;
        ctx.font = '10px monospace';
        for (const pl of pwrLegend) {
          ctx.fillStyle = pl.color;
          ctx.shadowColor = pl.color;
          ctx.shadowBlur = 4;
          ctx.textAlign = 'left';
          ctx.fillText(pl.label, lx, 382);
          lx += 90;
          if (lx > GW - 20) { lx = 30; }
        }
        ctx.shadowBlur = 0;

        const p = 0.65 + 0.35 * Math.abs(Math.sin(t * 0.0025));
        ctx.font = 'bold 28px monospace';
        ctx.fillStyle = `rgba(0, 255, 136, ${p})`;
        ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 12 * p;
        ctx.textAlign = 'center';
        ctx.fillText('[ PLAY ]', GW/2, 430);
        ctx.shadowBlur = 0;

        const hs = parseInt(localStorage.getItem(HS_KEY) || '0');
        if (hs > 0) {
          ctx.font = '14px monospace';
          ctx.fillStyle = '#ff00ff';
          ctx.fillText(`BEST: ${hs}`, GW/2, 475);
        }
      };

      const drawOver = (ctx, t) => {
        ctx.font = 'bold 40px monospace';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ff3333';
        ctx.shadowColor = '#ff3333'; ctx.shadowBlur = 20;
        ctx.fillText('GAME OVER', GW/2, 195);
        ctx.shadowBlur = 0;

        ctx.font = 'bold 24px monospace';
        ctx.fillStyle = '#fff';
        ctx.fillText(`SCORE: ${g.score}`, GW/2, 258);

        if (g.score > 0 && g.score >= g.hs) {
          ctx.font = 'bold 17px monospace';
          ctx.fillStyle = '#ffff00';
          ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 8;
          ctx.fillText('NEW HIGH SCORE!', GW/2, 295);
          ctx.shadowBlur = 0;
        }

        ctx.font = '15px monospace';
        ctx.fillStyle = '#888';
        ctx.fillText(`BEST: ${g.hs}`, GW/2, 330);
        ctx.font = '13px monospace';
        ctx.fillStyle = '#666';
        ctx.fillText(`Reached level ${g.level}`, GW/2, 358);

        const p = 0.65 + 0.35 * Math.abs(Math.sin(t * 0.0025));
        ctx.font = 'bold 24px monospace';
        ctx.fillStyle = `rgba(0, 255, 136, ${p})`;
        ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 10 * p;
        ctx.fillText('[ PLAY AGAIN ]', GW/2, 430);
        ctx.shadowBlur = 0;
      };

      // ── Effect: setup ─────────────────────────────────────────────────────
      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx    = canvas.getContext('2d');

        if (!localStorage.getItem(HS_KEY)) localStorage.setItem(HS_KEY, '0');
        g.hs = parseInt(localStorage.getItem(HS_KEY));

        let lastMove = 0;
        const MOVE_DELAY = 75;

        const onKey = (e) => {
          const k = e.key.toLowerCase();
          if (['arrowup','arrowdown','arrowleft','arrowright','w','a','s','d',' '].includes(k))
            e.preventDefault();

          if (g.phase === MENU || g.phase === OVER) { startGame(); return; }
          if (g.phase !== PLAYING) return;

          const now = performance.now();
          if (now - lastMove < MOVE_DELAY) return;
          lastMove = now;

          if      (k === 'arrowup'    || k === 'w') movePlayer(0, -1);
          else if (k === 'arrowdown'  || k === 's') movePlayer(0,  1);
          else if (k === 'arrowleft'  || k === 'a') movePlayer(-1, 0);
          else if (k === 'arrowright' || k === 'd') movePlayer(1,  0);
        };

        const onTouchStart = (e) => {
          e.preventDefault();
          g.touchX = e.touches[0].clientX;
          g.touchY = e.touches[0].clientY;
        };

        const onTouchEnd = (e) => {
          e.preventDefault();
          if (g.phase === MENU || g.phase === OVER) { startGame(); return; }
          if (g.phase !== PLAYING) return;
          const dx = e.changedTouches[0].clientX - g.touchX;
          const dy = e.changedTouches[0].clientY - g.touchY;
          if (Math.abs(dx) < 8 && Math.abs(dy) < 8) return;
          if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0);
          else                              movePlayer(0, dy > 0 ? 1 : -1);
        };

        const onClick = () => {
          if (g.phase === MENU || g.phase === OVER) startGame();
        };

        window.addEventListener('keydown', onKey);
        canvas.addEventListener('touchstart', onTouchStart, { passive: false });
        canvas.addEventListener('touchend',   onTouchEnd,   { passive: false });
        canvas.addEventListener('click',      onClick);

        const loop = (t) => {
          const dt = Math.min(t - lastRef.current, 50);
          lastRef.current = t;
          update(dt);
          draw(ctx, t);
          rafRef.current = requestAnimationFrame(loop);
        };
        lastRef.current = performance.now();
        rafRef.current = requestAnimationFrame(loop);

        return () => {
          cancelAnimationFrame(rafRef.current);
          window.removeEventListener('keydown', onKey);
          canvas.removeEventListener('touchstart', onTouchStart);
          canvas.removeEventListener('touchend',   onTouchEnd);
          canvas.removeEventListener('click',      onClick);
        };
      }, []);

      return (
        <canvas
          ref={canvasRef}
          width={GW}
          height={GH}
          style={{ display: 'block', touchAction: 'none', cursor: 'default' }}
        />
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
