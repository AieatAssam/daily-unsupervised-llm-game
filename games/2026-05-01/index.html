<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Barrage</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030008; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
    @keyframes titleGlow {
      0%,100% { text-shadow: 0 0 20px #00f0ff, 0 0 40px #0055ff; }
      50%      { text-shadow: 0 0 35px #00f0ff, 0 0 70px #0080ff, 0 0 100px #00f0ff44; }
    }
    @keyframes overlayIn {
      from { transform: scale(0.82); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { useEffect, useRef, useState, useCallback } = React;

  const CW = 560, CH = 660;
  const EXPL_R   = 70;   // explosion radius
  const EXPL_DUR = 0.55; // seconds explosion lasts
  const MISS_SPD = 390;  // missile pixels/second
  const BASE_Y   = CH - 48;
  const GROUND_Y = CH - 60;

  const rand = (a, b) => a + Math.random() * (b - a);
  const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);

  /* ── Audio ───────────────────────────────────────── */
  let _ac = null;
  const ac = () => {
    if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
    return _ac;
  };
  const beep = (freq, type, dur, vol = 0.14, delay = 0) => {
    try {
      const c = ac(), t = c.currentTime + delay;
      const o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = type; o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.start(t); o.stop(t + dur);
    } catch (_) {}
  };
  const sfxFire  = () => beep(680, 'sine', 0.10, 0.12);
  const sfxKill  = () => { beep(420,'sine',0.14,0.16); beep(660,'sine',0.09,0.10,0.07); };
  const sfxCombo = n  => beep(200 + n * 90, 'triangle', 0.22, 0.18);
  const sfxBase  = () => { beep(110,'sawtooth',0.4,0.22); beep(75,'sawtooth',0.4,0.18,0.22); };
  const sfxOver  = () => { beep(130,'sawtooth',0.5,0.26); beep(85,'sawtooth',0.5,0.22,0.28); };
  const sfxWave  = () => [330,440,550,680].forEach((f,i) => beep(f,'sine',0.28,0.16,i*0.09));

  /* ── Stars (static, generated once) ─────────────── */
  const STARS = Array.from({ length: 80 }, () => ({
    x: rand(0, CW), y: rand(0, GROUND_Y - 20),
    r: rand(0.5, 1.8), a: rand(0.2, 0.7),
  }));

  /* ── Game-state factory ──────────────────────────── */
  const makeState = (wave, prevScore = 0, prevBases = null) => ({
    wave,
    score: prevScore,
    bases: prevBases ?? [
      { x: CW * 0.16, y: BASE_Y, alive: true, shk: 0 },
      { x: CW * 0.38, y: BASE_Y, alive: true, shk: 0 },
      { x: CW * 0.62, y: BASE_Y, alive: true, shk: 0 },
      { x: CW * 0.84, y: BASE_Y, alive: true, shk: 0 },
    ],
    enemies:    [],
    missiles:   [],
    particles:  [],
    floatTexts: [],
    waveMsg:    { text: `WAVE ${wave}`, life: 2.2 },
    spawned:    0,
    total:      5 + wave * 4,
    spawnT:     0,
    spawnIval:  Math.max(0.3, 1.8 - wave * 0.11),
    enmSpeed:   50 + wave * 9,
    over:       false,
  });

  /* ── Main App ────────────────────────────────────── */
  function App() {
    const cvRef  = useRef(null);
    const gsRef  = useRef(null);
    const rafRef = useRef(null);
    const lastT  = useRef(0);
    const mouseP = useRef({ x: CW / 2, y: CH / 2 });

    const [phase, setPhase] = useState('start');
    const [hud,   setHud]   = useState({ score: 0, wave: 1, bases: 4 });
    const [best,  setBest]  = useState(() => +(localStorage.getItem('novaBarrageBest') || 0));

    /* fire counter-missile toward clicked point */
    const fire = useCallback((cx, cy) => {
      if (phase !== 'playing') return;
      const st = gsRef.current;
      if (!st) return;
      const alive = st.bases.filter(b => b.alive);
      if (!alive.length) return;
      let nb = alive[0];
      for (const b of alive) {
        if (dist(b.x, b.y, cx, cy) < dist(nb.x, nb.y, cx, cy)) nb = b;
      }
      const dx = cx - nb.x, dy = cy - nb.y, l = Math.hypot(dx, dy) || 1;
      st.missiles.push({
        x: nb.x, y: nb.y, tx: cx, ty: cy,
        vx: (dx / l) * MISS_SPD, vy: (dy / l) * MISS_SPD,
        trail: [], expl: false, er: 0, done: false,
      });
      sfxFire();
    }, [phase]);

    const onMouseMove = useCallback(e => {
      const cv = cvRef.current; if (!cv) return;
      const r = cv.getBoundingClientRect();
      mouseP.current = {
        x: (e.clientX - r.left) * (CW / r.width),
        y: (e.clientY - r.top)  * (CH / r.height),
      };
    }, []);

    const onClick = useCallback(e => {
      const cv = cvRef.current; if (!cv) return;
      const r = cv.getBoundingClientRect();
      fire(
        (e.clientX - r.left) * (CW / r.width),
        (e.clientY - r.top)  * (CH / r.height),
      );
    }, [fire]);

    const onTouch = useCallback(e => {
      e.preventDefault();
      const t = e.changedTouches[0];
      const cv = cvRef.current; if (!cv) return;
      const r = cv.getBoundingClientRect();
      fire(
        (t.clientX - r.left) * (CW / r.width),
        (t.clientY - r.top)  * (CH / r.height),
      );
    }, [fire]);

    /* ── Game loop ─────────────────────────────────── */
    useEffect(() => {
      if (phase !== 'playing') return;
      const cv  = cvRef.current;
      const ctx = cv.getContext('2d');

      const loop = ts => {
        const dt = Math.min((ts - lastT.current) / 1000, 0.05);
        lastT.current = ts;
        const st = gsRef.current;
        if (!st || st.over) return;

        /* spawn enemies */
        if (st.spawned < st.total) {
          st.spawnT += dt;
          if (st.spawnT >= st.spawnIval) {
            st.spawnT = 0;
            const aliveBases = st.bases.filter(b => b.alive);
            if (aliveBases.length) {
              const tgt = aliveBases[Math.floor(Math.random() * aliveBases.length)];
              const sx = rand(20, CW - 20);
              const dx = tgt.x - sx, dy = tgt.y - 0;
              const l = Math.hypot(dx, dy) || 1;
              const spd = st.enmSpeed + rand(-12, 12);
              st.enemies.push({
                x: sx, y: -8,
                vx: (dx / l) * spd, vy: (dy / l) * spd,
                target: tgt, alive: true, trail: [],
              });
              st.spawned++;
            }
          }
        }

        /* update missiles */
        for (const m of st.missiles) {
          if (m.expl) {
            m.er += (EXPL_R / EXPL_DUR) * dt;
            if (m.er >= EXPL_R) m.done = true;
          } else {
            m.trail.push({ x: m.x, y: m.y });
            if (m.trail.length > 16) m.trail.shift();
            m.x += m.vx * dt;
            m.y += m.vy * dt;
            if (dist(m.x, m.y, m.tx, m.ty) < 10) {
              m.x = m.tx; m.y = m.ty;
              m.expl = true; m.er = 0;
              /* check kills at explosion point */
              let kills = 0;
              for (const e of st.enemies) {
                if (!e.alive) continue;
                if (dist(e.x, e.y, m.x, m.y) <= EXPL_R) {
                  e.alive = false;
                  kills++;
                  st.score += 50 * kills;
                  for (let i = 0; i < 10; i++) {
                    const a = rand(0, Math.PI * 2), spd = rand(80, 210);
                    st.particles.push({ x: e.x, y: e.y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, col: '#ff2d78' });
                  }
                }
              }
              if (kills > 0) { sfxKill(); if (kills > 1) sfxCombo(kills); }
              if (kills > 1) st.floatTexts.push({ x: m.x, y: m.y - 12, life: 1.6, text: `×${kills} COMBO!`, col: '#ffcc00' });
            }
          }
        }
        st.missiles = st.missiles.filter(m => !m.done);

        /* update enemies */
        for (const e of st.enemies) {
          if (!e.alive) continue;
          e.trail.push({ x: e.x, y: e.y });
          if (e.trail.length > 12) e.trail.shift();
          e.x += e.vx * dt;
          e.y += e.vy * dt;
          if (e.target.alive && dist(e.x, e.y, e.target.x, e.target.y) < 22) {
            e.alive = false;
            e.target.alive = false;
            e.target.shk = 0.45;
            sfxBase();
            for (let i = 0; i < 20; i++) {
              const a = rand(0, Math.PI * 2), spd = rand(100, 280);
              st.particles.push({ x: e.target.x, y: e.target.y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1.3, col: '#ff6b35' });
            }
            const remaining = st.bases.filter(b => b.alive).length;
            if (remaining === 0) {
              st.over = true;
              sfxOver();
              const nb = Math.max(Math.round(st.score), best);
              setBest(nb);
              localStorage.setItem('novaBarrageBest', String(nb));
              setHud(h => ({ ...h, score: Math.round(st.score), bases: 0 }));
              setTimeout(() => setPhase('gameover'), 900);
              return;
            }
            setHud(h => ({ ...h, bases: remaining }));
          }
        }
        st.enemies = st.enemies.filter(e => e.alive);

        /* particles */
        for (const p of st.particles) {
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 220 * dt;
          p.life -= dt * 1.5;
        }
        st.particles = st.particles.filter(p => p.life > 0);

        /* float texts */
        for (const f of st.floatTexts) { f.y -= 38 * dt; f.life -= dt * 1.4; }
        st.floatTexts = st.floatTexts.filter(f => f.life > 0);

        /* base shake decay */
        for (const b of st.bases) if (b.shk > 0) b.shk -= dt;

        /* wave message */
        if (st.waveMsg) {
          st.waveMsg.life -= dt;
          if (st.waveMsg.life <= 0) st.waveMsg = null;
        }

        /* wave complete → next wave */
        if (st.spawned >= st.total && st.enemies.length === 0 && !st.over) {
          const nw = st.wave + 1;
          const ns = makeState(nw, st.score, st.bases.map(b => ({ ...b, shk: 0 })));
          gsRef.current = ns;
          sfxWave();
          setHud(h => ({ ...h, wave: nw, score: Math.round(st.score) }));
        } else {
          setHud(h => ({ ...h, score: Math.round(st.score) }));
        }

        /* ── DRAW ──────────────────────────────────── */
        ctx.clearRect(0, 0, CW, CH);

        /* background */
        ctx.fillStyle = '#030008';
        ctx.fillRect(0, 0, CW, CH);

        /* stars */
        for (const s of STARS) {
          ctx.globalAlpha = s.a;
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        /* ground glow */
        const grd = ctx.createLinearGradient(0, GROUND_Y - 6, 0, CH);
        grd.addColorStop(0, 'rgba(0,30,60,0.9)');
        grd.addColorStop(1, 'rgba(0,10,30,1)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, GROUND_Y, CW, CH - GROUND_Y);
        ctx.strokeStyle = '#0a2040';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(CW, GROUND_Y); ctx.stroke();

        /* enemy targeting trails (faint) */
        for (const e of st.enemies) {
          if (!e.alive || !e.target.alive) continue;
          ctx.strokeStyle = 'rgba(255,45,120,0.06)';
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 7]);
          ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(e.target.x, e.target.y); ctx.stroke();
          ctx.setLineDash([]);
        }

        /* enemies */
        for (const e of st.enemies) {
          if (!e.alive) continue;
          for (let i = 0; i < e.trail.length; i++) {
            const a = (i / e.trail.length) * 0.4;
            ctx.fillStyle = `rgba(255,45,120,${a})`;
            ctx.beginPath(); ctx.arc(e.trail[i].x, e.trail[i].y, 2, 0, Math.PI * 2); ctx.fill();
          }
          ctx.save();
          ctx.shadowColor = '#ff2d78'; ctx.shadowBlur = 16;
          ctx.fillStyle = '#ff2d78';
          ctx.beginPath(); ctx.arc(e.x, e.y, 6, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = 'rgba(255,190,210,0.9)';
          ctx.beginPath(); ctx.arc(e.x - 1.5, e.y - 1.5, 2.2, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }

        /* missiles & explosions */
        for (const m of st.missiles) {
          if (m.expl) {
            const alpha = Math.max(0, 1 - m.er / EXPL_R);
            ctx.save();
            ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 35;
            ctx.strokeStyle = `rgba(0,240,255,${alpha})`; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(m.x, m.y, m.er, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = `rgba(255,255,255,${alpha * 0.45})`; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.arc(m.x, m.y, m.er * 0.55, 0, Math.PI * 2); ctx.stroke();
            ctx.restore();
          } else {
            for (let i = 0; i < m.trail.length; i++) {
              const a = (i / m.trail.length) * 0.65;
              ctx.fillStyle = `rgba(0,240,255,${a})`;
              ctx.beginPath(); ctx.arc(m.trail[i].x, m.trail[i].y, 1.5, 0, Math.PI * 2); ctx.fill();
            }
            ctx.save();
            ctx.shadowColor = '#fff'; ctx.shadowBlur = 8;
            ctx.fillStyle = '#fff';
            ctx.beginPath(); ctx.arc(m.x, m.y, 3, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          }
        }

        /* bases */
        for (const b of st.bases) {
          if (!b.alive) continue;
          const ox = b.shk > 0 ? rand(-3, 3) : 0;
          ctx.save();
          ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 22;
          ctx.fillStyle = '#00f0ff';
          ctx.beginPath(); ctx.arc(b.x + ox, b.y, 10, 0, Math.PI * 2); ctx.fill();
          ctx.strokeStyle = 'rgba(0,240,255,0.28)'; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.arc(b.x + ox, b.y, 20, 0, Math.PI * 2); ctx.stroke();
          ctx.restore();
          ctx.fillStyle = 'rgba(0,240,255,0.45)';
          ctx.font = '8px Courier New'; ctx.textAlign = 'center';
          ctx.fillText('BASE', b.x + ox, b.y + 27);
        }

        /* crosshair at mouse */
        const { x: mx, y: my } = mouseP.current;
        if (my < GROUND_Y) {
          ctx.strokeStyle = 'rgba(0,240,255,0.5)'; ctx.lineWidth = 1;
          const cs = 12;
          ctx.beginPath();
          ctx.moveTo(mx - cs, my); ctx.lineTo(mx + cs, my);
          ctx.moveTo(mx, my - cs); ctx.lineTo(mx, my + cs);
          ctx.stroke();
          ctx.strokeStyle = 'rgba(0,240,255,0.2)';
          ctx.beginPath(); ctx.arc(mx, my, 18, 0, Math.PI * 2); ctx.stroke();
        }

        /* particles */
        for (const p of st.particles) {
          ctx.globalAlpha = Math.max(0, p.life * 0.85);
          ctx.fillStyle = p.col;
          ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        /* float texts */
        for (const f of st.floatTexts) {
          ctx.save();
          ctx.globalAlpha = Math.min(1, f.life * 0.9);
          ctx.fillStyle = f.col;
          ctx.shadowColor = f.col; ctx.shadowBlur = 12;
          ctx.font = 'bold 18px Courier New'; ctx.textAlign = 'center';
          ctx.fillText(f.text, f.x, f.y);
          ctx.restore();
        }

        /* wave announcement */
        if (st.waveMsg && st.waveMsg.life > 0) {
          const alpha = Math.min(1, st.waveMsg.life) * Math.min(1, (2.2 - st.waveMsg.life) * 2);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.fillStyle = '#00f0ff';
          ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 30;
          ctx.font = 'bold 36px Courier New'; ctx.textAlign = 'center';
          ctx.fillText(st.waveMsg.text, CW / 2, CH / 2 - 10);
          ctx.font = '14px Courier New';
          ctx.fillStyle = '#ffffff88';
          ctx.shadowBlur = 0;
          ctx.fillText('INCOMING!', CW / 2, CH / 2 + 22);
          ctx.restore();
        }

        rafRef.current = requestAnimationFrame(loop);
      };

      lastT.current = performance.now();
      rafRef.current = requestAnimationFrame(loop);
      return () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); };
    }, [phase]);

    const startGame = () => {
      gsRef.current = makeState(1);
      setHud({ score: 0, wave: 1, bases: 4 });
      setPhase('playing');
    };

    return (
      <div style={{
        minHeight: '100vh', background: '#030008',
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        userSelect: 'none',
      }}>
        {/* Title */}
        <h1 style={{
          fontSize: 'clamp(18px,5vw,26px)', letterSpacing: '6px', color: '#00f0ff',
          marginBottom: '8px', fontWeight: 900, textTransform: 'uppercase',
          animation: 'titleGlow 2.2s ease-in-out infinite',
        }}>
          Nova Barrage
        </h1>

        {/* HUD */}
        {phase === 'playing' && (
          <div style={{ display: 'flex', gap: '24px', marginBottom: '8px', fontSize: '13px', color: '#555' }}>
            <span>SCORE&nbsp;<b style={{ color: '#ffcc00' }}>{hud.score}</b></span>
            <span>WAVE&nbsp;<b style={{ color: '#00f0ff' }}>{hud.wave}</b></span>
            <span>BASES&nbsp;
              {[0,1,2,3].map(i => (
                <span key={i} style={{ color: i < hud.bases ? '#00f0ff' : '#222', marginLeft: 3 }}>■</span>
              ))}
            </span>
          </div>
        )}

        {/* Canvas */}
        <canvas
          ref={cvRef}
          width={CW} height={CH}
          onClick={onClick}
          onMouseMove={onMouseMove}
          onTouchEnd={onTouch}
          style={{
            border: '1px solid #0a1a30', borderRadius: '10px', cursor: 'crosshair',
            width: `min(${CW}px, calc(100vw - 16px))`, height: 'auto',
          }}
        />

        {/* Controls hint */}
        {phase === 'playing' && (
          <div style={{ color: '#333', fontSize: '11px', marginTop: '8px', letterSpacing: '1px' }}>
            CLICK TO FIRE COUNTER-MISSILE · PROTECT ALL BASES
          </div>
        )}

        {/* Start overlay */}
        {phase === 'start' && (
          <div style={{
            position: 'fixed', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: 'rgba(3,0,8,0.92)', backdropFilter: 'blur(5px)',
          }}>
            <div style={{
              textAlign: 'center', padding: '44px 54px',
              border: '2px solid #00f0ff', borderRadius: '22px',
              background: 'linear-gradient(135deg,#060014,#030009)',
              boxShadow: '0 0 80px rgba(0,240,255,0.18)',
              animation: 'overlayIn 0.4s cubic-bezier(0.34,1.56,0.64,1)',
            }}>
              <div style={{ fontSize: '38px', color: '#00f0ff', fontWeight: 900, letterSpacing: '5px', marginBottom: '16px' }}>
                NOVA BARRAGE
              </div>
              <div style={{ color: '#666', lineHeight: '1.9', marginBottom: '26px', maxWidth: '340px' }}>
                Enemy missiles rain on your 4 neon bases!<br />
                <span style={{ color: '#aaa' }}>Click to fire a counter-missile</span> — it flies to that point and detonates.<br />
                <span style={{ color: '#ffcc00' }}>Chain multiple kills in one explosion for COMBO bonuses!</span>
              </div>
              <button onClick={startGame} style={{
                padding: '13px 44px', fontSize: '15px', fontWeight: 'bold', letterSpacing: '3px',
                border: 'none', borderRadius: '30px', cursor: 'pointer', textTransform: 'uppercase',
                background: 'linear-gradient(135deg, #00f0ff, #0060ff)', color: '#000',
                boxShadow: '0 0 28px rgba(0,240,255,0.5)',
              }}>
                Launch!
              </button>
              {best > 0 && (
                <div style={{ color: '#333', fontSize: '12px', marginTop: '14px' }}>
                  Best: <span style={{ color: '#00ff88' }}>{best}</span>
                </div>
              )}
            </div>
          </div>
        )}

        {/* Game Over overlay */}
        {phase === 'gameover' && (
          <div style={{
            position: 'fixed', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: 'rgba(3,0,8,0.92)', backdropFilter: 'blur(5px)',
          }}>
            <div style={{
              textAlign: 'center', padding: '44px 54px',
              border: '2px solid #ff2d78', borderRadius: '22px',
              background: 'linear-gradient(135deg,#060014,#030009)',
              boxShadow: '0 0 80px rgba(255,45,120,0.18)',
              animation: 'overlayIn 0.4s cubic-bezier(0.34,1.56,0.64,1)',
            }}>
              <div style={{ fontSize: '52px', marginBottom: '14px' }}>💥</div>
              <div style={{
                fontSize: '30px', color: '#ff2d78', fontWeight: 900, letterSpacing: '4px',
                textShadow: '0 0 30px #ff2d78', marginBottom: '14px', textTransform: 'uppercase',
              }}>
                Bases Lost!
              </div>
              <div style={{ color: '#ffcc00', fontSize: '24px', fontWeight: 'bold', marginBottom: '8px' }}>
                Score: {hud.score}
                {hud.score >= best && best > 0 && (
                  <span style={{ color: '#ff2d78', fontSize: '14px', marginLeft: '10px' }}>NEW BEST!</span>
                )}
              </div>
              <div style={{ color: '#444', fontSize: '13px', marginBottom: '28px' }}>
                Wave reached: {hud.wave} · Best: {best}
              </div>
              <button onClick={startGame} style={{
                padding: '13px 44px', fontSize: '15px', fontWeight: 'bold', letterSpacing: '3px',
                border: 'none', borderRadius: '30px', cursor: 'pointer', textTransform: 'uppercase',
                background: 'linear-gradient(135deg, #ff2d78, #ff6b35)', color: '#000',
                boxShadow: '0 0 28px rgba(255,45,120,0.5)',
              }}>
                Relaunch!
              </button>
            </div>
          </div>
        )}
      </div>
    );
  }

  ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
