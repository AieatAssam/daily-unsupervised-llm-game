<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Flood</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #050010; font-family: 'Courier New', monospace; }
    @keyframes titlePulse {
      0%,100% { text-shadow: 0 0 20px #bf00ff, 0 0 40px #7b2fff, 0 0 60px #3d00aa; }
      50%      { text-shadow: 0 0 30px #ff00ff, 0 0 60px #bf00ff, 0 0 90px #7b2fff; }
    }
    @keyframes regionPulse {
      0%,100% { filter: brightness(1) saturate(1); }
      50%      { filter: brightness(1.45) saturate(1.4); }
    }
    @keyframes overlayIn {
      0%   { transform: scale(0.75); opacity: 0; }
      60%  { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes gridBump {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.015); }
      100% { transform: scale(1); }
    }
    @keyframes progressShine {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo, useCallback } = React;

    const GRID  = 12;
    const LIMIT = 28;   // max moves
    const PAR   = 22;   // par moves

    const COLORS = [
      { hex: '#ff2d78', glow: '#ff2d7870' },  // hot pink
      { hex: '#00f0ff', glow: '#00f0ff70' },  // cyan
      { hex: '#bf00ff', glow: '#bf00ff70' },  // violet
      { hex: '#ffcc00', glow: '#ffcc0070' },  // yellow
      { hex: '#00ff88', glow: '#00ff8870' },  // green
      { hex: '#ff6b35', glow: '#ff6b3570' },  // orange
    ];

    const DIRS = [[-1,0],[1,0],[0,-1],[0,1]];

    /* ─── Audio ─────────────────────────────────────────────── */
    let _audioCtx = null;
    const getCtx = () => {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return _audioCtx;
    };
    const tone = (freq, type, dur, vol = 0.18, delay = 0) => {
      try {
        const ctx = getCtx();
        const t   = ctx.currentTime + delay;
        const osc = ctx.createOscillator();
        const g   = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        osc.frequency.exponentialRampToValueAtTime(freq * 1.3, t + dur * 0.5);
        g.gain.setValueAtTime(vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        osc.start(t); osc.stop(t + dur);
      } catch(_) {}
    };
    const playFlood = (gained, ci) => {
      const base = 200 + ci * 60 + gained * 8;
      tone(base,         'sine',     0.18);
      if (gained > 4)  tone(base * 1.5, 'sine',     0.14, 0.10, 0.09);
      if (gained > 12) tone(base * 2,   'triangle', 0.10, 0.08, 0.18);
    };
    const playWin = () => {
      [261,330,392,523,659,784].forEach((f,i) => tone(f, 'sine', 0.4, 0.22, i * 0.11));
    };
    const playLose = () => {
      tone(140, 'sawtooth', 0.5, 0.28);
      tone(90,  'sawtooth', 0.5, 0.28, 0.26);
    };

    /* ─── Grid helpers ───────────────────────────────────────── */
    const makeGrid = () =>
      Array.from({ length: GRID }, () =>
        Array.from({ length: GRID }, () => Math.floor(Math.random() * COLORS.length))
      );

    const playerRegion = (grid) => {
      const color   = grid[0][0];
      const inR     = Array.from({ length: GRID }, () => new Uint8Array(GRID));
      const queue   = [[0, 0]];
      inR[0][0] = 1;
      let count = 1;
      let head  = 0;
      while (head < queue.length) {
        const [r, c] = queue[head++];
        for (const [dr, dc] of DIRS) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < GRID && nc >= 0 && nc < GRID && !inR[nr][nc] && grid[nr][nc] === color) {
            inR[nr][nc] = 1; count++; queue.push([nr, nc]);
          }
        }
      }
      return { inR, count };
    };

    const flood = (grid, newColor) => {
      const cur = grid[0][0];
      if (newColor === cur) return { grid, gained: 0 };

      const next = grid.map(r => r.slice());
      // BFS: recolor current player region to newColor
      const visited = Array.from({ length: GRID }, () => new Uint8Array(GRID));
      const q1 = [[0, 0]];
      visited[0][0] = 1;
      let h = 0;
      while (h < q1.length) {
        const [r, c] = q1[h++];
        next[r][c] = newColor;
        for (const [dr, dc] of DIRS) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < GRID && nc >= 0 && nc < GRID && !visited[nr][nc] && grid[nr][nc] === cur) {
            visited[nr][nc] = 1; q1.push([nr, nc]);
          }
        }
      }
      // BFS: absorb adjacent cells already newColor
      const seen = visited; // reuse — player cells already marked
      const q2 = [...q1];
      let gained = 0;
      let h2 = 0;
      while (h2 < q2.length) {
        const [r, c] = q2[h2++];
        for (const [dr, dc] of DIRS) {
          const nr = r + dr, nc = c + dc;
          if (nr >= 0 && nr < GRID && nc >= 0 && nc < GRID && !seen[nr][nc] && next[nr][nc] === newColor) {
            seen[nr][nc] = 1; gained++; q2.push([nr, nc]);
          }
        }
      }
      return { grid: next, gained };
    };

    const allSame = (grid) => {
      const c = grid[0][0];
      for (const row of grid) for (const cell of row) if (cell !== c) return false;
      return true;
    };

    /* ─── App ────────────────────────────────────────────────── */
    const App = () => {
      const [grid,      setGrid]      = useState(makeGrid);
      const [moves,     setMoves]     = useState(0);
      const [phase,     setPhase]     = useState('playing'); // playing | won | lost
      const [score,     setScore]     = useState(0);
      const [highScore, setHighScore] = useState(() => {
        // Ensure key exists in localStorage for tests
        const stored = localStorage.getItem('neonFloodBest');
        if (stored === null) { localStorage.setItem('neonFloodBest', '0'); return 0; }
        return parseInt(stored, 10) || 0;
      });
      const [bumping,   setBumping]   = useState(false);

      const { inR, count } = useMemo(() => playerRegion(grid), [grid]);
      const coverage = Math.round((count / (GRID * GRID)) * 100);
      const playerCI = grid[0][0];

      const handleColor = useCallback((ci) => {
        if (phase !== 'playing' || ci === playerCI) return;
        const { grid: next, gained } = flood(grid, ci);
        const newMoves = moves + 1;

        playFlood(gained, ci);
        setBumping(true);
        setTimeout(() => setBumping(false), 220);

        setGrid(next);
        setMoves(newMoves);

        if (allSame(next)) {
          const pts = Math.max(50, 300 - newMoves * 8);
          setScore(pts);
          const best = Math.max(pts, highScore);
          setHighScore(best);
          localStorage.setItem('neonFloodBest', String(best));
          setPhase('won');
          playWin();
        } else if (newMoves >= LIMIT) {
          setPhase('lost');
          playLose();
        }
      }, [grid, moves, phase, playerCI, highScore]);

      const reset = useCallback(() => {
        const g = makeGrid();
        setGrid(g);
        setMoves(0);
        setPhase('playing');
        setScore(0);
        setBumping(false);
      }, []);

      const cellPx = Math.min(
        Math.floor((Math.min(window.innerWidth, 560) - 28) / GRID),
        Math.floor((window.innerHeight - 230) / GRID),
        40
      );
      const gridPx = cellPx * GRID + (GRID - 1) * 2;

      return (
        <div id="game-container" style={{
          minHeight: '100vh',
          background: 'radial-gradient(ellipse at 30% 25%, #170030 0%, #090016 55%, #020008 100%)',
          display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          padding: '12px', userSelect: 'none', overflow: 'hidden',
        }}>

          {/* Title */}
          <h1 style={{
            fontSize: 'clamp(20px, 5vw, 34px)', color: '#fff',
            letterSpacing: '6px', fontWeight: 900, textTransform: 'uppercase',
            animation: 'titlePulse 2.4s ease-in-out infinite', marginBottom: '10px',
          }}>Neon Flood</h1>

          {/* Stats row */}
          <div style={{
            display: 'flex', gap: '18px', marginBottom: '8px',
            fontSize: '13px', color: '#777', flexWrap: 'wrap', justifyContent: 'center',
          }}>
            <span>Moves:&nbsp;
              <b style={{ color: moves >= PAR ? '#ff2d78' : '#00f0ff', fontSize: '15px' }}>
                {moves}
              </b>/{LIMIT}
            </span>
            <span>Flooded:&nbsp;
              <b style={{ color: '#ffcc00', fontSize: '15px' }}>{coverage}%</b>
            </span>
            <span>Best:&nbsp;
              <b style={{ color: '#00ff88', fontSize: '15px' }}>{highScore}</b>
            </span>
          </div>

          {/* Progress bar */}
          <div style={{
            width: gridPx, height: 7, background: '#110028', borderRadius: 4,
            overflow: 'hidden', marginBottom: '10px',
            boxShadow: '0 0 6px rgba(100,0,200,0.3)',
          }}>
            <div style={{
              height: '100%',
              width: `${coverage}%`,
              background: `linear-gradient(90deg, ${COLORS[playerCI].hex}, ${COLORS[(playerCI + 2) % 6].hex}, ${COLORS[playerCI].hex})`,
              backgroundSize: '200% 100%',
              animation: 'progressShine 1.5s linear infinite',
              boxShadow: `0 0 10px ${COLORS[playerCI].hex}`,
              borderRadius: 4,
              transition: 'width 0.3s ease',
            }} />
          </div>

          {/* Grid */}
          <div style={{
            display: 'grid',
            gridTemplateColumns: `repeat(${GRID}, ${cellPx}px)`,
            gap: '2px',
            padding: '5px',
            background: '#0d0022',
            borderRadius: '10px',
            boxShadow: '0 0 50px rgba(100,0,200,0.25), inset 0 0 25px rgba(0,0,0,0.6)',
            animation: bumping ? 'gridBump 0.22s ease' : 'none',
          }}>
            {grid.map((row, r) => row.map((ci, c) => {
              const inRegion = inR[r][c] === 1;
              const col = COLORS[ci];
              return (
                <div key={`${r}-${c}`} style={{
                  width: cellPx, height: cellPx,
                  background: col.hex,
                  borderRadius: '3px',
                  border: inRegion ? `1px solid ${col.hex}cc` : '1px solid transparent',
                  boxShadow: inRegion
                    ? `0 0 ${cellPx / 2.5}px ${col.hex}, 0 0 ${cellPx}px ${col.glow}`
                    : `0 0 ${cellPx / 8}px ${col.glow}`,
                  transition: 'background 0.22s ease, box-shadow 0.22s ease',
                  animation: inRegion ? 'regionPulse 1.6s ease-in-out infinite' : 'none',
                }} />
              );
            }))}
          </div>

          {/* Color palette */}
          <div style={{
            display: 'flex', gap: '10px', marginTop: '16px',
            padding: '10px 18px', background: '#0d0022', borderRadius: '40px',
            boxShadow: '0 0 24px rgba(100,0,200,0.18)',
          }}>
            {COLORS.map((col, i) => {
              const active = i === playerCI;
              return (
                <button key={i} onClick={() => handleColor(i)}
                  aria-label={`Color ${i}`}
                  disabled={active || phase !== 'playing'}
                  style={{
                    width:  'clamp(38px, 9vw, 50px)',
                    height: 'clamp(38px, 9vw, 50px)',
                    borderRadius: '50%',
                    border: active ? '3px solid rgba(255,255,255,0.9)' : `2px solid ${col.hex}55`,
                    background: col.hex,
                    boxShadow: active
                      ? `0 0 22px ${col.hex}, 0 0 44px ${col.glow}`
                      : `0 0 10px ${col.glow}`,
                    cursor: active ? 'default' : 'pointer',
                    opacity: active ? 0.55 : 1,
                    transform: active ? 'scale(1.18)' : 'scale(1)',
                    transition: 'transform 0.15s, box-shadow 0.15s, opacity 0.15s',
                    animation: active ? 'regionPulse 1s ease-in-out infinite' : 'none',
                  }}
                />
              );
            })}
          </div>

          {/* Hint */}
          {phase === 'playing' && (
            <div style={{ color: '#444', fontSize: '11px', marginTop: '10px', letterSpacing: '1px' }}>
              CLICK A COLOR TO FLOOD YOUR REGION
            </div>
          )}

          {/* Win / Lose overlay */}
          {phase !== 'playing' && (
            <div style={{
              position: 'fixed', inset: 0,
              background: 'rgba(2,0,12,0.88)',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              zIndex: 200, backdropFilter: 'blur(5px)',
            }}>
              <div style={{
                textAlign: 'center', padding: '40px 50px', borderRadius: '22px',
                background: 'linear-gradient(135deg, #110028, #070014)',
                border: `2px solid ${phase === 'won' ? '#00ff88' : '#ff2d78'}`,
                boxShadow: `0 0 90px ${phase === 'won' ? '#00ff8840' : '#ff2d7840'}, inset 0 0 40px rgba(0,0,0,0.5)`,
                animation: 'overlayIn 0.45s cubic-bezier(0.34,1.56,0.64,1)',
              }}>
                <div style={{ fontSize: '52px', marginBottom: '14px' }}>
                  {phase === 'won' ? '🌊' : '💥'}
                </div>
                <div style={{
                  fontSize: '30px', fontWeight: 900, letterSpacing: '5px',
                  color: phase === 'won' ? '#00ff88' : '#ff2d78',
                  textShadow: `0 0 30px ${phase === 'won' ? '#00ff88' : '#ff2d78'}`,
                  marginBottom: '12px', textTransform: 'uppercase',
                }}>
                  {phase === 'won' ? 'FLOODED!' : 'NO MOVES!'}
                </div>
                {phase === 'won' && (
                  <div style={{ color: '#ffcc00', fontSize: '22px', fontWeight: 'bold', marginBottom: '8px' }}>
                    Score: {score}
                    {score >= highScore && score > 0 && (
                      <span style={{ color: '#ff2d78', fontSize: '14px', marginLeft: '8px' }}>NEW BEST!</span>
                    )}
                  </div>
                )}
                <div style={{ color: '#555', fontSize: '13px', marginBottom: '26px' }}>
                  {moves} moves used &bull; {coverage}% flooded
                </div>
                <button onClick={reset} style={{
                  padding: '13px 38px', fontSize: '15px', fontWeight: 'bold',
                  letterSpacing: '3px', border: 'none', borderRadius: '30px', textTransform: 'uppercase',
                  background: phase === 'won'
                    ? 'linear-gradient(135deg, #00ff88, #00ccaa)'
                    : 'linear-gradient(135deg, #ff2d78, #ff6b35)',
                  color: '#000', cursor: 'pointer',
                  boxShadow: `0 0 28px ${phase === 'won' ? '#00ff88' : '#ff2d78'}`,
                }}>
                  Play Again
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
