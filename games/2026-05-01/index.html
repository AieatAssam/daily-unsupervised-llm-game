<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Neon Pairs</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050010;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    @keyframes titlePulse {
      0%, 100% { text-shadow: 0 0 20px #bf00ff, 0 0 40px #7b2fff, 0 0 60px #3d00aa; }
      50%       { text-shadow: 0 0 30px #ff00ff, 0 0 60px #bf00ff, 0 0 90px #7b2fff; }
    }
    @keyframes bgPulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }
    @keyframes matchGlow {
      0%   { box-shadow: 0 0 16px var(--clr), inset 0 0 8px var(--clr-dim); }
      50%  { box-shadow: 0 0 32px var(--clr), 0 0 48px var(--clr), inset 0 0 16px var(--clr-dim); }
      100% { box-shadow: 0 0 16px var(--clr), inset 0 0 8px var(--clr-dim); }
    }
    @keyframes wrongPulse {
      0%, 100% { border-color: #ff2d78; box-shadow: 0 0 12px #ff2d78; }
      50%       { border-color: #ff0044; box-shadow: 0 0 24px #ff0044; }
    }
    @keyframes comboAnim {
      0%   { transform: translate(-50%,-50%) scale(0.6); opacity: 0; }
      30%  { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
      70%  { transform: translate(-50%,-50%) scale(1);    opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(0.8);  opacity: 0; }
    }
    @keyframes particleOut {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
    @keyframes overlayIn {
      0%   { transform: scale(0.75); opacity: 0; }
      60%  { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes cardReveal {
      0%   { transform: rotateY(90deg); opacity: 0; }
      100% { transform: rotateY(0deg);  opacity: 1; }
    }
    @keyframes timerPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .card-wrap { perspective: 700px; }

    .card {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.32s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
      border-radius: 10px;
    }
    .card.face-up { transform: rotateY(180deg); }

    .card-face {
      position: absolute; inset: 0;
      border-radius: 10px;
      backface-visibility: hidden;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid;
    }
    .card-back {
      background: linear-gradient(135deg, #160028 0%, #0b0018 100%);
      border-color: #3d00aa;
      box-shadow: 0 0 6px #3d00aa55;
    }
    .card-back::after {
      content: '?';
      font-size: 1.4em;
      font-weight: 900;
      color: #4d10aa;
      text-shadow: 0 0 8px #7b2fff;
    }
    .card-front {
      transform: rotateY(180deg);
    }
    .card-front.matched {
      animation: matchGlow 1.4s ease-in-out infinite;
    }
    .card-front.wrong {
      animation: wrongPulse 0.35s ease-in-out 2;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    /* ── Symbols & colors ───────────────────────────────────────────── */
    const SYMBOL_LIST = ['◉', '▲', '⬟', '★', '⬡', '✦', '◆', '☾', '❋', '⊕', '◈', '⊛'];
    const COLOR_LIST  = [
      { hex: '#00f0ff', dim: '#00f0ff44' },  // cyan
      { hex: '#ff2d78', dim: '#ff2d7844' },  // pink
      { hex: '#ffcc00', dim: '#ffcc0044' },  // yellow
      { hex: '#00ff88', dim: '#00ff8844' },  // green
      { hex: '#bf00ff', dim: '#bf00ff44' },  // violet
      { hex: '#ff6600', dim: '#ff660044' },  // orange
      { hex: '#44ddff', dim: '#44ddff44' },  // sky
      { hex: '#ff44aa', dim: '#ff44aa44' },  // rose
      { hex: '#aaff00', dim: '#aaff0044' },  // lime
      { hex: '#ff8844', dim: '#ff884444' },  // amber
      { hex: '#00ffcc', dim: '#00ffcc44' },  // teal
      { hex: '#cc44ff', dim: '#cc44ff44' },  // purple
    ];

    /* ── Audio ──────────────────────────────────────────────────────── */
    let _ctx = null;
    function getCtx() {
      if (!_ctx) { try { _ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
      return _ctx;
    }
    function beep(freq, type, dur, vol = 0.25) {
      const ctx = getCtx(); if (!ctx) return;
      try {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        o.start(); o.stop(ctx.currentTime + dur);
      } catch(e) {}
    }
    function playFlip()  { beep(380, 'sine', 0.12, 0.15); }
    function playMatch() { beep(660, 'sine', 0.18, 0.35); setTimeout(() => beep(880, 'sine', 0.15, 0.3), 120); }
    function playWrong() { beep(180, 'sawtooth', 0.25, 0.2); }
    function playWin()   {
      [440,550,660,880].forEach((f,i) => setTimeout(() => beep(f,'sine',0.25,0.4), i*100));
    }
    function playOver()  { beep(200, 'sawtooth', 0.5, 0.3); }

    /* ── Helpers ────────────────────────────────────────────────────── */
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildLevel(level) {
      const pairCount = Math.min(6 + level, 12);          // 7..12 pairs
      const cols      = pairCount <= 8 ? 4 : 4;           // always 4 cols
      const total     = pairCount * 2;
      const rows      = Math.ceil(total / cols);           // rows auto
      const pairs     = SYMBOL_LIST.slice(0, pairCount).map((sym, i) => ({
        sym,
        clr: COLOR_LIST[i % COLOR_LIST.length],
        pairId: i,
      }));
      const cards = shuffle([...pairs, ...pairs].map((p, idx) => ({
        id: idx,
        sym: p.sym,
        clr: p.clr,
        pairId: p.pairId,
      })));
      return { cards, cols, rows, pairCount, timeLimit: Math.max(90 - (level - 1) * 8, 45) };
    }

    /* ── Particle component ─────────────────────────────────────────── */
    function Sparks({ color }) {
      const sparks = useMemo(() => Array.from({length: 10}, (_, i) => {
        const angle = (i / 10) * Math.PI * 2 + Math.random() * 0.5;
        const dist  = 30 + Math.random() * 40;
        return {
          id: i,
          dx: Math.cos(angle) * dist,
          dy: Math.sin(angle) * dist,
        };
      }), []);
      return (
        <div style={{ position:'absolute', inset:0, pointerEvents:'none', overflow:'visible' }}>
          {sparks.map(s => (
            <div key={s.id} style={{
              position: 'absolute',
              left: '50%', top: '50%',
              width: 6, height: 6,
              borderRadius: '50%',
              background: color,
              boxShadow: `0 0 6px ${color}`,
              '--dx': `${s.dx}px`,
              '--dy': `${s.dy}px`,
              animation: 'particleOut 0.55s ease-out forwards',
              transform: 'translate(-50%,-50%)',
            }} />
          ))}
        </div>
      );
    }

    /* ── Card component ─────────────────────────────────────────────── */
    function Card({ card, state, size, onClick }) {
      // state: 'hidden' | 'revealed' | 'matched' | 'wrong'
      const isFaceUp = state !== 'hidden';
      const { hex, dim } = card.clr;
      return (
        <div className="card-wrap" style={{ width: size, height: size }} onClick={onClick}>
          <div className={`card ${isFaceUp ? 'face-up' : ''}`}>
            <div className="card-face card-back" />
            <div
              className={`card-face card-front ${state === 'matched' ? 'matched' : ''} ${state === 'wrong' ? 'wrong' : ''}`}
              style={{
                '--clr': hex, '--clr-dim': dim,
                borderColor: hex,
                background: `${dim}`,
                boxShadow: state === 'matched'
                  ? `0 0 16px ${hex}, inset 0 0 8px ${dim}`
                  : `0 0 8px ${hex}88`,
              }}
            >
              <span style={{
                fontSize: size * 0.38,
                color: hex,
                textShadow: `0 0 10px ${hex}`,
                lineHeight: 1,
              }}>{card.sym}</span>
              {state === 'matched' && <Sparks color={hex} />}
            </div>
          </div>
        </div>
      );
    }

    /* ── Main game ──────────────────────────────────────────────────── */
    function App() {
      const [level,    setLevel]    = useState(1);
      const [lvData,   setLvData]   = useState(() => buildLevel(1));
      const [revealed, setRevealed] = useState([]); // card IDs currently flipped (max 2)
      const [matched,  setMatched]  = useState(new Set()); // matched pairIds
      const [wrong,    setWrong]    = useState([]);  // card IDs currently shaking
      const [checking, setChecking] = useState(false);
      const [score,    setScore]    = useState(0);
      const [combo,    setCombo]    = useState(0);
      const [comboMsg, setComboMsg] = useState(null);
      const [timeLeft, setTimeLeft] = useState(90);
      const [phase,    setPhase]    = useState('playing'); // 'playing'|'levelclear'|'gameover'
      const [highScore,setHighScore]= useState(() => {
        const stored = localStorage.getItem('neonPairs_best');
        if (stored === null) localStorage.setItem('neonPairs_best', '0');
        return +(stored || 0);
      });
      const timerRef   = useRef(null);
      const comboRef   = useRef(null);

      /* window size → card size */
      const [winW, setWinW] = useState(window.innerWidth);
      const [winH, setWinH] = useState(window.innerHeight);
      useEffect(() => {
        const h = () => { setWinW(window.innerWidth); setWinH(window.innerHeight); };
        window.addEventListener('resize', h);
        return () => window.removeEventListener('resize', h);
      }, []);

      /* start / new level */
      function startLevel(lv, addScore = 0) {
        const data = buildLevel(lv);
        setLvData(data);
        setLevel(lv);
        setRevealed([]);
        setMatched(new Set());
        setWrong([]);
        setChecking(false);
        setCombo(0);
        setTimeLeft(data.timeLimit);
        setScore(s => s + addScore);
        setPhase('playing');
      }

      /* timer */
      useEffect(() => {
        if (phase !== 'playing') { clearInterval(timerRef.current); return; }
        timerRef.current = setInterval(() => {
          setTimeLeft(t => {
            if (t <= 1) { clearInterval(timerRef.current); setPhase('gameover'); playOver(); return 0; }
            return t - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [phase, level]);

      /* card click */
      const handleCard = useCallback((card) => {
        if (phase !== 'playing') return;
        if (checking) return;
        if (matched.has(card.pairId)) return;
        if (revealed.includes(card.id)) return;
        if (revealed.length >= 2) return;

        playFlip();
        const next = [...revealed, card.id];
        setRevealed(next);

        if (next.length === 2) {
          setChecking(true);
          const [a, b] = next.map(id => lvData.cards.find(c => c.id === id));

          if (a.pairId === b.pairId) {
            /* match */
            const newCombo   = combo + 1;
            const earned     = 100 * newCombo + (timeLeft > 30 ? 50 : 0);
            const newScore   = score + earned;
            const newMatched = new Set([...matched, a.pairId]);

            setCombo(newCombo);
            setScore(newScore);
            setMatched(newMatched);
            playMatch();

            if (newCombo >= 2) {
              setComboMsg(`${newCombo}× COMBO!`);
              clearTimeout(comboRef.current);
              comboRef.current = setTimeout(() => setComboMsg(null), 1100);
            }

            if (newScore > highScore) {
              setHighScore(newScore);
              localStorage.setItem('neonPairs_best', String(newScore));
            }

            setTimeout(() => {
              setRevealed([]);
              setChecking(false);
              /* all pairs matched → level clear */
              if (newMatched.size === lvData.pairCount) {
                const bonus = timeLeft * 15;
                setPhase('levelclear');
                setScore(s => {
                  const s2 = s + bonus;
                  if (s2 > highScore) { setHighScore(s2); localStorage.setItem('neonPairs_best', String(s2)); }
                  return s2;
                });
                playWin();
              }
            }, 450);
          } else {
            /* no match */
            setWrong(next);
            setCombo(0);
            playWrong();
            setTimeout(() => {
              setRevealed([]);
              setWrong([]);
              setChecking(false);
            }, 800);
          }
        }
      }, [phase, checking, revealed, matched, lvData, combo, score, highScore, timeLeft]);

      /* card state helper */
      function cardState(card) {
        if (matched.has(card.pairId)) return 'matched';
        if (wrong.includes(card.id))  return 'wrong';
        if (revealed.includes(card.id)) return 'revealed';
        return 'hidden';
      }

      /* layout */
      const { cards, cols, rows, pairCount } = lvData;
      const GAP        = 8;
      const headerH    = 100;
      const footerH    = 36;
      const availW     = Math.min(winW - 24, 560);
      const availH     = winH - headerH - footerH - GAP * (rows + 1);
      const sizeByW    = (availW - GAP * (cols + 1)) / cols;
      const sizeByH    = availH / rows;
      const cardSize   = Math.min(sizeByW, sizeByH, 90);
      const gridW      = cols * (cardSize + GAP) - GAP;

      const timePct    = timeLeft / lvData.timeLimit;
      const timerClr   = timePct > 0.5 ? '#00ff88' : timePct > 0.25 ? '#ffcc00' : '#ff2d78';

      return (
        <div style={{
          width: '100vw', height: '100vh',
          background: 'radial-gradient(ellipse 80% 60% at 50% 30%, #1e0040 0%, #050010 70%)',
          display: 'flex', flexDirection: 'column', alignItems: 'center',
          justifyContent: 'flex-start', overflow: 'hidden', position: 'relative',
        }}>
          {/* ── Header ── */}
          <div style={{ width: '100%', maxWidth: 560, padding: '14px 16px 0', flexShrink: 0 }}>
            <div style={{
              textAlign: 'center', fontSize: 26, fontWeight: 900, letterSpacing: 4,
              color: '#fff', textTransform: 'uppercase',
              animation: 'titlePulse 2.2s ease-in-out infinite',
            }}>NEON PAIRS</div>

            <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 8, fontSize: 12, color: '#888' }}>
              <span>SCORE <b style={{ color: '#00f0ff' }}>{score}</b></span>
              <span>LV <b style={{ color: '#ffcc00' }}>{level}</b></span>
              <span>PAIRS <b style={{ color: '#bf00ff' }}>{matched.size}/{pairCount}</b></span>
              <span>BEST <b style={{ color: '#ff2d78' }}>{highScore}</b></span>
            </div>

            {/* timer bar */}
            <div style={{
              marginTop: 8, height: 5, background: '#160028',
              borderRadius: 3, overflow: 'hidden',
            }}>
              <div style={{
                height: '100%', borderRadius: 3,
                width: `${timePct * 100}%`,
                background: timerClr,
                boxShadow: `0 0 8px ${timerClr}`,
                transition: 'width 0.9s linear, background 0.4s',
                animation: timePct < 0.2 ? 'timerPulse 0.6s ease-in-out infinite' : 'none',
              }} />
            </div>
            <div style={{ textAlign: 'right', fontSize: 11, color: timerClr, marginTop: 2,
              fontWeight: timePct < 0.2 ? 900 : 400 }}>{timeLeft}s</div>
          </div>

          {/* ── Grid ── */}
          <div style={{
            display: 'grid',
            gridTemplateColumns: `repeat(${cols}, ${cardSize}px)`,
            gap: GAP,
            padding: GAP,
            marginTop: 8,
            width: gridW + GAP * 2,
          }}>
            {cards.map(card => (
              <Card
                key={card.id}
                card={card}
                state={cardState(card)}
                size={cardSize}
                onClick={() => handleCard(card)}
              />
            ))}
          </div>

          {/* ── Combo message ── */}
          {comboMsg && (
            <div style={{
              position: 'absolute', top: '40%', left: '50%',
              fontSize: 38, fontWeight: 900, color: '#ffcc00',
              textShadow: '0 0 20px #ffcc00, 0 0 40px #ff6600',
              pointerEvents: 'none', zIndex: 50,
              animation: 'comboAnim 1.1s ease-out forwards',
            }}>{comboMsg}</div>
          )}

          {/* ── Level Clear overlay ── */}
          {phase === 'levelclear' && (
            <div style={{
              position: 'absolute', inset: 0, background: '#050010cc',
              display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', zIndex: 100,
            }}>
              <div style={{
                background: 'linear-gradient(135deg, #160030, #0a0018)',
                border: '2px solid #00ff88', borderRadius: 16, padding: '36px 48px',
                textAlign: 'center', animation: 'overlayIn 0.5s ease-out',
                boxShadow: '0 0 40px #00ff8855',
              }}>
                <div style={{ fontSize: 36, fontWeight: 900, color: '#00ff88',
                  textShadow: '0 0 20px #00ff88' }}>LEVEL CLEAR!</div>
                <div style={{ color: '#ffcc00', fontSize: 16, marginTop: 8 }}>
                  +{timeLeft * 15} time bonus
                </div>
                <div style={{ color: '#888', fontSize: 13, marginTop: 4 }}>Score: {score}</div>
                <button
                  onClick={() => startLevel(level + 1)}
                  style={{
                    marginTop: 20, padding: '10px 28px',
                    background: 'transparent', border: '2px solid #00ff88',
                    color: '#00ff88', fontSize: 15, cursor: 'pointer',
                    borderRadius: 6, fontFamily: 'Courier New, monospace',
                    fontWeight: 700, letterSpacing: 2,
                    boxShadow: '0 0 14px #00ff8855',
                  }}>NEXT LEVEL →</button>
              </div>
            </div>
          )}

          {/* ── Game Over overlay ── */}
          {phase === 'gameover' && (
            <div style={{
              position: 'absolute', inset: 0, background: '#050010dd',
              display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', zIndex: 100,
            }}>
              <div style={{
                background: 'linear-gradient(135deg, #160030, #0a0018)',
                border: '2px solid #ff2d78', borderRadius: 16, padding: '36px 48px',
                textAlign: 'center', animation: 'overlayIn 0.5s ease-out',
                boxShadow: '0 0 40px #ff2d7855',
              }}>
                <div style={{ fontSize: 36, fontWeight: 900, color: '#ff2d78',
                  textShadow: '0 0 20px #ff2d78' }}>TIME UP!</div>
                <div style={{ color: '#fff', fontSize: 20, marginTop: 10 }}>Score: {score}</div>
                {score > 0 && score >= highScore && (
                  <div style={{ color: '#ffcc00', fontSize: 14, marginTop: 4,
                    textShadow: '0 0 10px #ffcc00' }}>✦ NEW BEST! ✦</div>
                )}
                <button
                  onClick={() => { setScore(0); setCombo(0); setComboMsg(null); startLevel(1); }}
                  style={{
                    marginTop: 20, padding: '10px 28px',
                    background: 'transparent', border: '2px solid #ff2d78',
                    color: '#ff2d78', fontSize: 15, cursor: 'pointer',
                    borderRadius: 6, fontFamily: 'Courier New, monospace',
                    fontWeight: 700, letterSpacing: 2,
                    boxShadow: '0 0 14px #ff2d7855',
                  }}>PLAY AGAIN</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
