<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring Roll</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #05000f; font-family: 'Courier New', monospace; }
    #root { width: 100vw; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Audio ──────────────────────────────────────────────────────────────
    let _audioCtx = null;
    function audioCtx() {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return _audioCtx;
    }
    function playNote(freq, type = 'sine', dur = 0.18, vol = 0.35) {
      try {
        const ctx = audioCtx();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = type; osc.frequency.value = freq;
        g.gain.setValueAtTime(vol, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(); osc.stop(ctx.currentTime + dur);
      } catch (_) {}
    }
    function playGem(combo) {
      const notes = [523, 659, 784, 988, 1175, 1319, 1568];
      playNote(notes[Math.min(combo - 1, notes.length - 1)], 'sine', 0.22, 0.4);
    }
    function playHazard() { playNote(110, 'sawtooth', 0.35, 0.5); }
    function playReverse() { playNote(320, 'triangle', 0.08, 0.25); }
    function playLevelUp() {
      [523, 659, 784, 1047].forEach((f, i) =>
        setTimeout(() => playNote(f, 'sine', 0.25, 0.4), i * 90)
      );
    }

    // ─── Constants ──────────────────────────────────────────────────────────
    const RING_R   = 195;  // ring radius (ring wall is here)
    const BALL_R   = 11;   // ball radius
    const GEM_R    = 9;    // gem collection radius
    const GRAVITY  = 0.28;
    const FRICTION = 0.28; // how strongly ring drags ball
    const BOUNCE   = 0.45; // restitution
    const BASE_SPD = 0.008;// ring angular speed at level 1

    // ─── Level generator ────────────────────────────────────────────────────
    function makeLevel(lvl) {
      const gemCount  = Math.min(3 + Math.floor(lvl * 1.2), 12);
      const hazCount  = Math.max(0, lvl - 1);
      const gems = [];
      for (let i = 0; i < gemCount; i++) {
        const base = (i / gemCount) * Math.PI * 2;
        gems.push({
          angle: base + (Math.random() - 0.5) * 0.6,
          collected: false,
          pulse: Math.random() * Math.PI * 2
        });
      }
      const hazards = [];
      for (let h = 0; h < hazCount; h++) {
        let angle, ok;
        for (let tries = 0; tries < 30; tries++) {
          angle = Math.random() * Math.PI * 2;
          ok = gems.every(g => {
            let d = Math.abs(g.angle - angle) % (Math.PI * 2);
            if (d > Math.PI) d = Math.PI * 2 - d;
            return d > 0.55;
          });
          if (ok) break;
        }
        hazards.push({ angle, spread: 0.28 + Math.random() * 0.25 });
      }
      return { gems, hazards };
    }

    // ─── Main component ─────────────────────────────────────────────────────
    function RingRoll() {
      const canvasRef = useRef(null);
      const gRef = useRef({
        // game state
        phase: 'start',
        score: 0,
        hiScore: parseInt(localStorage.getItem('ringRoll_highScore') || '0'),
        level: 1,
        lives: 3,
        combo: 0,
        // ring
        ringAngle: 0,
        ringSpeed: BASE_SPD,
        ringDir: 1,
        // ball
        bx: 0, by: RING_R - BALL_R - 1,
        vx: 0, vy: 0,
        // entities
        gems: [], hazards: [],
        // fx
        particles: [],
        flashTexts: [],
        invincible: 0,
        bgHue: 0,
      });
      const frame = useRef(0);
      const raf   = useRef(null);

      const [ui, setUi] = useState({
        phase: 'start',
        score: 0,
        hiScore: parseInt(localStorage.getItem('ringRoll_highScore') || '0'),
        level: 1, lives: 3, combo: 0
      });

      // ── helpers ────────────────────────────────────────────────────────
      function syncUi() {
        const g = gRef.current;
        setUi({ phase: g.phase, score: g.score, hiScore: g.hiScore,
                level: g.level, lives: g.lives, combo: g.combo });
      }

      function spawnParticles(wx, wy, n, color, cx, cy) {
        const g = gRef.current;
        for (let i = 0; i < n; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = 1.5 + Math.random() * 5;
          g.particles.push({
            x: wx + cx, y: wy + cy,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: 1, decay: 0.018 + Math.random() * 0.022,
            size: 2 + Math.random() * 4, color
          });
        }
      }

      function flashText(text, wx, wy) {
        gRef.current.flashTexts.push({ text, x: wx, y: wy, life: 1 });
      }

      function initLevel(lvl) {
        const { gems, hazards } = makeLevel(lvl);
        const g = gRef.current;
        Object.assign(g, {
          gems, hazards,
          ringAngle: 0,
          ringSpeed: Math.min(BASE_SPD + (lvl - 1) * 0.0022, 0.034),
          ringDir: 1,
          bx: 0, by: RING_R - BALL_R - 1,
          vx: 0, vy: 0,
          invincible: 100
        });
      }

      function startGame() {
        const g = gRef.current;
        g.phase = 'playing';
        g.score = 0; g.level = 1; g.lives = 3; g.combo = 0;
        g.particles = []; g.flashTexts = [];
        // Ensure localStorage key exists for test detection
        if (!localStorage.getItem('ringRoll_highScore')) {
          localStorage.setItem('ringRoll_highScore', '0');
        }
        initLevel(1);
        syncUi();
      }

      function doInput() {
        const g = gRef.current;
        if (g.phase !== 'playing') { startGame(); return; }
        g.ringDir *= -1;
        playReverse();
      }

      // ── input listeners ────────────────────────────────────────────────
      useEffect(() => {
        const canvas = canvasRef.current;
        const onClick = () => doInput();
        const onKey   = (e) => {
          if ([' ','ArrowLeft','ArrowRight','ArrowUp'].includes(e.key)) {
            e.preventDefault(); doInput();
          }
        };
        const onTouch = (e) => { e.preventDefault(); doInput(); };
        canvas.addEventListener('click', onClick);
        window.addEventListener('keydown', onKey);
        canvas.addEventListener('touchstart', onTouch, { passive: false });
        return () => {
          canvas.removeEventListener('click', onClick);
          window.removeEventListener('keydown', onKey);
          canvas.removeEventListener('touchstart', onTouch);
        };
      }, []);

      // ── game loop ──────────────────────────────────────────────────────
      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx    = canvas.getContext('2d');
        let W, H, cx, cy;

        function resize() {
          W = canvas.width  = window.innerWidth;
          H = canvas.height = window.innerHeight;
          cx = W / 2; cy = H / 2;
        }
        resize();
        window.addEventListener('resize', resize);

        // ── update ──────────────────────────────────────────────────────
        function update() {
          const g = gRef.current;
          frame.current++;
          g.bgHue = (g.bgHue + 0.18) % 360;
          if (g.invincible > 0) g.invincible--;

          // particles
          g.particles = g.particles.filter(p => {
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.08; p.vx *= 0.97; p.vy *= 0.97;
            p.life -= p.decay;
            return p.life > 0;
          });
          g.flashTexts = g.flashTexts.filter(ft => {
            ft.y -= 0.7; ft.life -= 0.025;
            return ft.life > 0;
          });

          if (g.phase !== 'playing') return;

          // ring rotation
          g.ringAngle += g.ringSpeed * g.ringDir;

          // gravity
          g.vy += GRAVITY;

          // move ball
          g.bx += g.vx;
          g.by += g.vy;

          // collide with ring wall
          const dist = Math.sqrt(g.bx * g.bx + g.by * g.by);
          const maxR = RING_R - BALL_R;
          if (dist > maxR && dist > 0.001) {
            const nx = g.bx / dist, ny = g.by / dist;
            // push back
            g.bx = nx * maxR; g.by = ny * maxR;
            // normal velocity
            const vn = g.vx * nx + g.vy * ny;
            // reflect with damping
            g.vx -= (1 + BOUNCE) * vn * nx;
            g.vy -= (1 + BOUNCE) * vn * ny;
            // tangential friction: ring wall drags ball
            // wall tangential speed = ω * r, direction = (-ny, nx) for CCW
            const omega = g.ringSpeed * g.ringDir;
            const wallTan = omega * dist;          // scalar in CCW direction
            const ballTan = g.vx * (-ny) + g.vy * nx; // ball's CCW component
            const dvt = wallTan - ballTan;
            g.vx += (-ny) * dvt * FRICTION;
            g.vy += (nx)  * dvt * FRICTION;
          }

          // speed cap
          const sp = Math.sqrt(g.vx * g.vx + g.vy * g.vy);
          if (sp > 18) { g.vx = g.vx / sp * 18; g.vy = g.vy / sp * 18; }

          // gem collection
          const ballAngle = Math.atan2(g.by, g.bx);
          const ballDist  = Math.sqrt(g.bx * g.bx + g.by * g.by);
          g.gems.forEach(gem => {
            if (gem.collected) return;
            gem.pulse += 0.055;
            const gAngle = gem.angle + g.ringAngle;
            const gDist  = RING_R - BALL_R - 4;
            const gx = Math.cos(gAngle) * gDist;
            const gy = Math.sin(gAngle) * gDist;
            const dx = g.bx - gx, dy = g.by - gy;
            if (Math.sqrt(dx*dx + dy*dy) < BALL_R + GEM_R) {
              gem.collected = true;
              g.combo++;
              const pts = 100 * g.combo * g.level;
              g.score += pts;
              if (g.score > g.hiScore) {
                g.hiScore = g.score;
                localStorage.setItem('ringRoll_highScore', g.hiScore);
              }
              playGem(g.combo);
              spawnParticles(gx, gy, 18, '#00ffee', cx, cy);
              flashText(g.combo > 1 ? `${g.combo}✕ COMBO! +${pts}` : `+${pts}`, gx, gy);
              syncUi();
            }
          });

          // hazard check (only near wall)
          if (g.invincible <= 0 && ballDist > RING_R - BALL_R * 3.5) {
            g.hazards.forEach(haz => {
              const hazWorld = haz.angle + g.ringAngle;
              let diff = Math.atan2(
                Math.sin(ballAngle - hazWorld),
                Math.cos(ballAngle - hazWorld)
              );
              if (Math.abs(diff) < haz.spread * 0.5) {
                g.lives--;
                g.combo = 0;
                g.invincible = 100;
                playHazard();
                spawnParticles(g.bx, g.by, 25, '#ff3300', cx, cy);
                flashText('OUCH!', g.bx, g.by);
                // bounce inward
                const nx = g.bx / ballDist, ny = g.by / ballDist;
                g.vx = -nx * 10; g.vy = -ny * 10;
                if (g.lives <= 0) {
                  g.phase = 'gameover';
                }
                syncUi();
              }
            });
          }

          // level complete
          if (g.gems.length > 0 && g.gems.every(gem => gem.collected)) {
            const bonus = g.level * 600;
            g.score += bonus;
            g.combo = 0;
            if (g.score > g.hiScore) {
              g.hiScore = g.score;
              localStorage.setItem('ringRoll_highScore', g.hiScore);
            }
            playLevelUp();
            spawnParticles(0, 0, 50, '#ffdd00', cx, cy);
            flashText(`LEVEL ${g.level} CLEAR! +${bonus}`, 0, -60);
            g.level++;
            g.particles = g.particles; // keep particles
            initLevel(g.level);
            syncUi();
          }
        }

        // ── draw ────────────────────────────────────────────────────────
        function draw() {
          const g = gRef.current;
          const t = frame.current;

          // Background
          const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.8);
          bg.addColorStop(0, `hsl(${g.bgHue}, 70%, 7%)`);
          bg.addColorStop(1, `hsl(${(g.bgHue + 50) % 360}, 50%, 3%)`);
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, W, H);

          // Grid
          ctx.save();
          ctx.globalAlpha = 0.04;
          ctx.strokeStyle = '#9900ff';
          ctx.lineWidth = 0.5;
          for (let x = 0; x < W; x += 45) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
          for (let y = 0; y < H; y += 45) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
          ctx.restore();

          if (g.phase === 'start') {
            drawParticles(ctx, g);
            return;
          }

          // ── Ring ──
          // Outer glow ring
          ctx.save();
          ctx.shadowBlur = 30;
          ctx.shadowColor = '#6600cc';
          ctx.beginPath();
          ctx.arc(cx, cy, RING_R, 0, Math.PI * 2);
          ctx.strokeStyle = '#3d0088';
          ctx.lineWidth = 22;
          ctx.stroke();

          ctx.shadowColor = '#aa44ff';
          ctx.beginPath();
          ctx.arc(cx, cy, RING_R, 0, Math.PI * 2);
          ctx.strokeStyle = '#7722cc';
          ctx.lineWidth = 12;
          ctx.stroke();

          ctx.shadowColor = '#cc88ff';
          ctx.beginPath();
          ctx.arc(cx, cy, RING_R, 0, Math.PI * 2);
          ctx.strokeStyle = '#aa55ff';
          ctx.lineWidth = 4;
          ctx.stroke();
          ctx.restore();

          // Hazard arcs
          g.hazards.forEach(haz => {
            const wAngle = haz.angle + g.ringAngle;
            const pulse  = 0.7 + 0.3 * Math.sin(t * 0.12);
            ctx.save();
            ctx.shadowBlur = 35 * pulse;
            ctx.shadowColor = '#ff2200';
            ctx.beginPath();
            ctx.arc(cx, cy, RING_R, wAngle - haz.spread * 0.5, wAngle + haz.spread * 0.5);
            ctx.strokeStyle = `rgba(255, ${Math.floor(50 + 80 * pulse)}, 0, 0.95)`;
            ctx.lineWidth = 16;
            ctx.stroke();
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(cx, cy, RING_R, wAngle - haz.spread * 0.5, wAngle + haz.spread * 0.5);
            ctx.strokeStyle = 'rgba(255,200,200,0.9)';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.restore();
          });

          // Rotation direction indicator (small arrow inside ring)
          ctx.save();
          ctx.translate(cx, cy);
          const indR = 28;
          const arcEnd = g.ringDir > 0 ? Math.PI * 1.5 : Math.PI * 0.5;
          ctx.beginPath();
          ctx.arc(0, 0, indR, 0, arcEnd * g.ringDir, g.ringDir < 0);
          ctx.strokeStyle = 'rgba(180,120,255,0.35)';
          ctx.lineWidth = 2.5;
          ctx.stroke();
          ctx.restore();

          // Gems
          g.gems.forEach(gem => {
            if (gem.collected) return;
            const gAngle = gem.angle + g.ringAngle;
            const gDist  = RING_R - BALL_R - 4;
            const gx = cx + Math.cos(gAngle) * gDist;
            const gy = cy + Math.sin(gAngle) * gDist;
            const pulse = 0.8 + 0.2 * Math.sin(gem.pulse);
            const sz = 9 * pulse;

            ctx.save();
            ctx.shadowBlur = 22 * pulse;
            ctx.shadowColor = '#00ffee';
            ctx.translate(gx, gy);
            ctx.rotate(gAngle + Math.PI * 0.25 + t * 0.02);
            ctx.beginPath();
            ctx.moveTo(0, -sz);
            ctx.lineTo(sz * 0.65, 0);
            ctx.lineTo(0, sz);
            ctx.lineTo(-sz * 0.65, 0);
            ctx.closePath();
            const gg = ctx.createLinearGradient(-sz, -sz, sz, sz);
            gg.addColorStop(0, '#ffffff');
            gg.addColorStop(0.4, '#00ffee');
            gg.addColorStop(1, '#0088ff');
            ctx.fillStyle = gg;
            ctx.fill();
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.restore();
          });

          // Ball
          const bx = cx + g.bx, by = cy + g.by;
          const blinking = g.invincible > 0 && (t % 8 < 4);
          if (!blinking) {
            ctx.save();
            // glow halo
            const halo = ctx.createRadialGradient(bx, by, 0, bx, by, BALL_R * 3);
            halo.addColorStop(0, 'rgba(100,180,255,0.4)');
            halo.addColorStop(1, 'rgba(0,60,200,0)');
            ctx.fillStyle = halo;
            ctx.beginPath();
            ctx.arc(bx, by, BALL_R * 3, 0, Math.PI * 2);
            ctx.fill();
            // ball
            ctx.shadowBlur = 28;
            ctx.shadowColor = '#55aaff';
            const ballGrad = ctx.createRadialGradient(bx - 3, by - 3, 0, bx, by, BALL_R);
            ballGrad.addColorStop(0, '#ffffff');
            ballGrad.addColorStop(0.35, '#88ccff');
            ballGrad.addColorStop(1, '#0044dd');
            ctx.fillStyle = ballGrad;
            ctx.beginPath();
            ctx.arc(bx, by, BALL_R, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          // Particles
          drawParticles(ctx, g);

          // Flash texts
          g.flashTexts.forEach(ft => {
            ctx.save();
            ctx.globalAlpha = ft.life;
            ctx.font = `bold ${ft.text.length > 10 ? 16 : 20}px 'Courier New'`;
            ctx.fillStyle = '#ffff33';
            ctx.shadowBlur = 18;
            ctx.shadowColor = '#ffaa00';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(ft.text, cx + ft.x, cy + ft.y);
            ctx.restore();
          });

          // Gems counter inside ring
          const remaining = g.gems.filter(gem => !gem.collected).length;
          ctx.save();
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = 'bold 14px Courier New';
          ctx.fillStyle = 'rgba(180,140,255,0.7)';
          ctx.fillText(`${remaining} left`, cx, cy + 2);
          ctx.restore();
        }

        function drawParticles(ctx, g) {
          g.particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.life * 0.9;
            ctx.shadowBlur = 8;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          });
        }

        function loop() {
          update();
          draw();
          raf.current = requestAnimationFrame(loop);
        }
        loop();

        return () => {
          cancelAnimationFrame(raf.current);
          window.removeEventListener('resize', resize);
        };
      }, []);

      // ── render UI overlay ────────────────────────────────────────────────
      const handleBtn = useCallback((e) => { e.stopPropagation(); doInput(); }, []);

      return (
        <div style={{ position: 'relative', width: '100vw', height: '100vh' }}>
          <canvas ref={canvasRef} />

          {/* HUD */}
          {ui.phase === 'playing' && (
            <div style={{
              position: 'absolute', top: 0, left: 0, right: 0,
              display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
              padding: '14px 22px', pointerEvents: 'none'
            }}>
              <div>
                <div style={{ color: '#00cccc', fontSize: 11, letterSpacing: 2, opacity: 0.75 }}>SCORE</div>
                <div style={{ color: '#fff', fontSize: 30, fontWeight: 'bold',
                              textShadow: '0 0 14px #00ffff', lineHeight: 1 }}>
                  {ui.score.toLocaleString()}
                </div>
                {ui.combo > 1 && (
                  <div style={{ color: '#ffee00', fontSize: 15, textShadow: '0 0 10px #ffaa00' }}>
                    {ui.combo}✕ COMBO
                  </div>
                )}
              </div>
              <div style={{ textAlign: 'center' }}>
                <div style={{ color: '#bb55ff', fontSize: 11, letterSpacing: 2, opacity: 0.75 }}>LEVEL</div>
                <div style={{ color: '#cc66ff', fontSize: 30, fontWeight: 'bold',
                              textShadow: '0 0 14px #cc44ff', lineHeight: 1 }}>
                  {ui.level}
                </div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ color: '#ff5577', fontSize: 11, letterSpacing: 2, opacity: 0.75 }}>LIVES</div>
                <div style={{ fontSize: 22, lineHeight: 1.2 }}>
                  {Array.from({ length: 3 }, (_, i) => (
                    <span key={i} style={{
                      color: i < ui.lives ? '#ff4466' : '#333',
                      textShadow: i < ui.lives ? '0 0 12px #ff4466' : 'none'
                    }}>♦</span>
                  ))}
                </div>
                <div style={{ color: '#555', fontSize: 11, marginTop: 3 }}>
                  BEST {ui.hiScore.toLocaleString()}
                </div>
              </div>
            </div>
          )}

          {/* Start screen */}
          {ui.phase === 'start' && (
            <div style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', gap: 14,
              background: 'rgba(0,0,12,0.82)', pointerEvents: 'none'
            }}>
              <div style={{
                fontSize: 68, fontWeight: 900, letterSpacing: 8,
                background: 'linear-gradient(120deg,#00ffee,#aa44ff,#ff4488)',
                WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
                filter: 'drop-shadow(0 0 24px #aa44ff)'
              }}>RING ROLL</div>
              <div style={{ color: '#aaa', fontSize: 17, textAlign: 'center',
                            maxWidth: 400, lineHeight: 1.65 }}>
                The neon ring <span style={{ color: '#cc88ff' }}>rotates</span> — a ball rolls inside
                under gravity.<br/>
                <b style={{ color: '#00ffee' }}>Click to reverse</b> the ring direction and guide the ball
                to collect every glowing gem!<br/>
                Avoid the <span style={{ color: '#ff4400' }}>red hazard zones</span> on the ring wall.
              </div>
              {ui.hiScore > 0 && (
                <div style={{ color: '#888', fontSize: 14, marginTop: 4 }}>
                  BEST: <span style={{ color: '#ffee00', textShadow: '0 0 10px #ffaa00' }}>
                    {ui.hiScore.toLocaleString()}
                  </span>
                </div>
              )}
              <button onClick={handleBtn} style={{
                marginTop: 18, padding: '13px 52px', fontSize: 22, fontWeight: 'bold',
                background: 'linear-gradient(135deg,#6600cc,#cc44ff)',
                color: '#fff', border: 'none', borderRadius: 10, cursor: 'pointer',
                letterSpacing: 4, boxShadow: '0 0 32px #aa44ff', pointerEvents: 'auto'
              }}>PLAY</button>
              <div style={{ color: '#444', fontSize: 12, letterSpacing: 1, marginTop: 6 }}>
                CLICK · SPACE · TAP  to reverse ring direction
              </div>
            </div>
          )}

          {/* Game Over */}
          {ui.phase === 'gameover' && (
            <div style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center', gap: 14,
              background: 'rgba(0,0,12,0.88)', pointerEvents: 'none'
            }}>
              <div style={{
                fontSize: 56, fontWeight: 900, letterSpacing: 6,
                color: '#ff4466', textShadow: '0 0 30px #ff2244'
              }}>GAME OVER</div>
              <div style={{ color: '#fff', fontSize: 32,
                            textShadow: '0 0 14px #00ffff' }}>
                {ui.score.toLocaleString()}
              </div>
              {ui.score > 0 && ui.score >= ui.hiScore && (
                <div style={{ color: '#ffee00', fontSize: 20,
                              textShadow: '0 0 15px #ffaa00' }}>🏆 NEW BEST!</div>
              )}
              <div style={{ color: '#666', fontSize: 14 }}>
                Level {ui.level} · Best {ui.hiScore.toLocaleString()}
              </div>
              <button onClick={handleBtn} style={{
                marginTop: 20, padding: '12px 44px', fontSize: 20, fontWeight: 'bold',
                background: 'linear-gradient(135deg,#6600cc,#cc44ff)',
                color: '#fff', border: 'none', borderRadius: 10, cursor: 'pointer',
                letterSpacing: 3, boxShadow: '0 0 28px #aa44ff', pointerEvents: 'auto'
              }}>PLAY AGAIN</button>
            </div>
          )}

          {/* Controls hint */}
          {ui.phase === 'playing' && (
            <div style={{
              position: 'absolute', bottom: 18, left: 0, right: 0, textAlign: 'center',
              color: 'rgba(255,255,255,0.2)', fontSize: 11, letterSpacing: 2,
              pointerEvents: 'none'
            }}>
              CLICK · SPACE · TAP — reverse ring direction
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<RingRoll />, document.getElementById('root'));
  </script>
</body>
</html>
