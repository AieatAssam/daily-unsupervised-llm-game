<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cell Surge</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050010; overflow: hidden; }
    #root { width: 100vw; height: 100vh; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes glow { 0%,100%{text-shadow:0 0 20px #ffcc00} 50%{text-shadow:0 0 40px #ffcc00,0 0 60px #ff8800} }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const HS_KEY = 'cellSurge-highScore';
    const PREY_COLORS = ['#00ffff','#ff00ff','#ffcc00','#00ff88','#ff8800','#aa44ff','#ff4488'];

    // Ensure localStorage key exists from load (for tests)
    try { if (!localStorage.getItem(HS_KEY)) localStorage.setItem(HS_KEY, '0'); } catch(e) {}

    function hexRgb(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return `${r},${g},${b}`;
    }

    function playSound(type) {
      try {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ac.createOscillator();
        const gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        const t = ac.currentTime;
        if (type === 'absorb') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(300 + Math.random()*300, t);
          osc.frequency.exponentialRampToValueAtTime(700 + Math.random()*300, t+0.12);
          gain.gain.setValueAtTime(0.25, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t+0.18);
          osc.start(t); osc.stop(t+0.18);
        } else if (type === 'combo') {
          osc.type = 'square';
          osc.frequency.setValueAtTime(880, t);
          gain.gain.setValueAtTime(0.15, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t+0.1);
          osc.start(t); osc.stop(t+0.1);
        } else if (type === 'hit') {
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(180, t);
          osc.frequency.exponentialRampToValueAtTime(55, t+0.4);
          gain.gain.setValueAtTime(0.4, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t+0.4);
          osc.start(t); osc.stop(t+0.4);
        } else if (type === 'gameover') {
          osc.type = 'sine';
          osc.frequency.setValueAtTime(440, t);
          osc.frequency.exponentialRampToValueAtTime(110, t+0.8);
          gain.gain.setValueAtTime(0.4, t);
          gain.gain.exponentialRampToValueAtTime(0.001, t+0.8);
          osc.start(t); osc.stop(t+0.8);
        }
      } catch(e) {}
    }

    function CellSurge() {
      const canvasRef = useRef(null);
      const gRef = useRef(null);
      const animRef = useRef(null);
      const [ui, setUi] = useState({
        phase: 'start', score: 0, lives: 3, time: 90, combo: 0,
        highScore: parseInt(localStorage.getItem(HS_KEY)||'0'), newBest: false,
      });

      function makePrey(W, H, count) {
        const arr = [];
        for (let i = 0; i < count; i++) {
          const r = 6 + Math.random() * 13;
          arr.push({
            x: r*2 + Math.random()*(W - r*4),
            y: r*2 + Math.random()*(H - r*4),
            r, vx: (Math.random()-0.5)*90, vy: (Math.random()-0.5)*90,
            color: PREY_COLORS[Math.floor(Math.random()*PREY_COLORS.length)],
          });
        }
        return arr;
      }

      function initGame() {
        const canvas = canvasRef.current;
        const W = canvas.width, H = canvas.height;
        const hs = parseInt(localStorage.getItem(HS_KEY)||'0');
        gRef.current = {
          phase: 'playing',
          player: { x: W/2, y: H/2, r: 22, tx: W/2, ty: H/2 },
          prey: makePrey(W, H, 18),
          predators: [],
          particles: [],
          score: 0, combo: 0, comboTimer: 0,
          lives: 3, time: 90,
          spawnTimer: 2.5, predTimer: 14,
          highScore: hs, newBest: false,
          lastUi: 0, dangerFlash: 0, bgOffset: 0,
        };
      }

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');

        function resize() {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        function onMouseMove(e) {
          if (!gRef.current || gRef.current.phase !== 'playing') return;
          const rect = canvas.getBoundingClientRect();
          gRef.current.player.tx = e.clientX - rect.left;
          gRef.current.player.ty = e.clientY - rect.top;
        }
        function onTouchMove(e) {
          e.preventDefault();
          if (!gRef.current || gRef.current.phase !== 'playing') return;
          const rect = canvas.getBoundingClientRect();
          const t = e.touches[0];
          gRef.current.player.tx = t.clientX - rect.left;
          gRef.current.player.ty = t.clientY - rect.top;
        }
        canvas.addEventListener('mousemove', onMouseMove);
        canvas.addEventListener('touchmove', onTouchMove, { passive: false });
        canvas.addEventListener('touchstart', onTouchMove, { passive: false });

        function glow(x, y, r, color, a) {
          const rgb = hexRgb(color);
          const gr = ctx.createRadialGradient(x, y, 0, x, y, r*2.8);
          gr.addColorStop(0, `rgba(${rgb},${a||0.6})`);
          gr.addColorStop(1, `rgba(${rgb},0)`);
          ctx.beginPath(); ctx.arc(x, y, r*2.8, 0, Math.PI*2);
          ctx.fillStyle = gr; ctx.fill();
        }

        let lastTs = 0;
        function loop(ts) {
          const dt = Math.min((ts - lastTs)/1000, 0.05);
          lastTs = ts;
          const W = canvas.width, H = canvas.height;
          const g = gRef.current;

          // Background
          ctx.fillStyle = '#050010';
          ctx.fillRect(0, 0, W, H);

          // Animated grid
          const off = (g ? g.bgOffset : 0) % 60;
          ctx.strokeStyle = 'rgba(30,15,70,0.6)';
          ctx.lineWidth = 1;
          for (let x = -off; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
          for (let y = -off; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

          if (!g) { animRef.current = requestAnimationFrame(loop); return; }
          if (g.phase === 'playing') g.bgOffset += dt * 15;

          if (g.phase === 'playing') {
            g.time -= dt;
            if (g.time <= 0) {
              g.time = 0; g.phase = 'gameover';
              if (g.score > g.highScore) { g.highScore = g.score; g.newBest = true; localStorage.setItem(HS_KEY, g.score); }
              playSound('gameover');
            }

            g.comboTimer = Math.max(0, g.comboTimer - dt);
            if (g.comboTimer <= 0) g.combo = 0;
            g.dangerFlash = Math.max(0, g.dangerFlash - dt*4);

            // Spawn prey
            g.spawnTimer -= dt;
            if (g.spawnTimer <= 0) {
              const n = 2 + Math.floor((90-g.time)/30);
              g.prey.push(...makePrey(W, H, n));
              if (g.prey.length > 60) g.prey.splice(0, g.prey.length - 60);
              g.spawnTimer = 3 - Math.min(2, (90-g.time)/45);
            }

            // Spawn predators
            g.predTimer -= dt;
            if (g.predTimer <= 0) {
              const side = Math.floor(Math.random()*4);
              const r = 38 + Math.random()*22;
              let px, py;
              if (side===0){px=-r;py=Math.random()*H;}
              else if(side===1){px=W+r;py=Math.random()*H;}
              else if(side===2){px=Math.random()*W;py=-r;}
              else{px=Math.random()*W;py=H+r;}
              g.predators.push({ x:px, y:py, r, vx:0, vy:0, pulse:Math.random()*Math.PI*2 });
              g.predTimer = 13 - Math.min(9, (90-g.time)/9);
            }

            const p = g.player;
            // Smooth follow with size-based speed
            const dx = p.tx - p.x, dy = p.ty - p.y;
            const d = Math.sqrt(dx*dx+dy*dy);
            const spd = Math.max(90, 280*(20/p.r));
            if (d > 0.5) { const m = Math.min(d, spd*dt); p.x += (dx/d)*m; p.y += (dy/d)*m; }
            p.x = Math.max(p.r, Math.min(W-p.r, p.x));
            p.y = Math.max(p.r, Math.min(H-p.r, p.y));

            // Update prey
            for (const prey of g.prey) {
              const ex=prey.x-p.x, ey=prey.y-p.y;
              const ed=Math.sqrt(ex*ex+ey*ey);
              if (ed < 150 && p.r > prey.r*0.85) {
                prey.vx += (ex/ed)*280*dt; prey.vy += (ey/ed)*280*dt;
              }
              const spd2=Math.sqrt(prey.vx*prey.vx+prey.vy*prey.vy);
              if(spd2>130){prey.vx=(prey.vx/spd2)*130;prey.vy=(prey.vy/spd2)*130;}
              prey.vx*=0.97; prey.vy*=0.97;
              prey.x+=prey.vx*dt; prey.y+=prey.vy*dt;
              if(prey.x<prey.r){prey.x=prey.r;prey.vx=Math.abs(prey.vx);}
              if(prey.x>W-prey.r){prey.x=W-prey.r;prey.vx=-Math.abs(prey.vx);}
              if(prey.y<prey.r){prey.y=prey.r;prey.vy=Math.abs(prey.vy);}
              if(prey.y>H-prey.r){prey.y=H-prey.r;prey.vy=-Math.abs(prey.vy);}
            }

            // Update predators
            for (const pred of g.predators) {
              pred.pulse += dt*2.5;
              const cspd = 72 + (90-g.time)*0.55;
              const cdx=p.x-pred.x, cdy=p.y-pred.y;
              const cd=Math.sqrt(cdx*cdx+cdy*cdy);
              if(cd>0){pred.vx=(cdx/cd)*cspd;pred.vy=(cdy/cd)*cspd;}
              pred.x+=pred.vx*dt; pred.y+=pred.vy*dt;
            }

            // Absorb prey
            const toAbsorb=[];
            g.prey=g.prey.filter(prey=>{
              const dx=prey.x-p.x, dy=prey.y-p.y;
              const d=Math.sqrt(dx*dx+dy*dy);
              if(d < p.r+prey.r*0.65 && p.r >= prey.r*0.85){ toAbsorb.push(prey); return false; }
              return true;
            });
            for (const prey of toAbsorb) {
              g.combo++; g.comboTimer=2.5;
              const mult=Math.min(g.combo,8);
              const pts=Math.round(prey.r*2*mult);
              g.score+=pts;
              p.r=Math.min(85, p.r+prey.r*0.22);
              const rgb=hexRgb(prey.color);
              for(let i=0;i<10;i++){
                const ang=(i/10)*Math.PI*2+Math.random()*0.4;
                const sp=90+Math.random()*110;
                g.particles.push({x:prey.x,y:prey.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
                  color:prey.color,life:0.7,max:0.7,r:2.5+Math.random()*3});
              }
              g.particles.push({x:prey.x,y:prey.y,vx:0,vy:-65,color:'#ffffff',
                life:1,max:1,r:0,text:`+${pts}`,sz:13+Math.min(mult*3,15)});
              if(g.combo>=3) playSound('combo'); else playSound('absorb');
            }

            // Predator hits
            const hitPreds=[];
            g.predators=g.predators.filter(pred=>{
              if(pred.x<-pred.r*4||pred.x>W+pred.r*4||pred.y<-pred.r*4||pred.y>H+pred.r*4) return false;
              const dx=pred.x-p.x, dy=pred.y-p.y;
              const d=Math.sqrt(dx*dx+dy*dy);
              if(d < pred.r+p.r+90) g.dangerFlash=Math.min(1,g.dangerFlash+dt*2);
              if(d < pred.r+p.r-10){ hitPreds.push(pred); return false; }
              return true;
            });
            for (const pred of hitPreds) {
              g.lives--; g.combo=0; g.comboTimer=0; p.r=22;
              const kbdx=p.x-pred.x, kbdy=p.y-pred.y;
              const kbd=Math.sqrt(kbdx*kbdx+kbdy*kbdy)||1;
              p.tx=Math.max(p.r,Math.min(W-p.r,p.x+(kbdx/kbd)*130));
              p.ty=Math.max(p.r,Math.min(H-p.r,p.y+(kbdy/kbd)*130));
              for(let i=0;i<20;i++){
                const ang=(i/20)*Math.PI*2;
                g.particles.push({x:p.x,y:p.y,
                  vx:Math.cos(ang)*(130+Math.random()*130),vy:Math.sin(ang)*(130+Math.random()*130),
                  color:'#ff3333',life:1.2,max:1.2,r:4+Math.random()*4});
              }
              playSound('hit');
              if(g.lives<=0){
                g.phase='gameover';
                if(g.score>g.highScore){g.highScore=g.score;g.newBest=true;localStorage.setItem(HS_KEY,g.score);}
                playSound('gameover');
              }
            }

            // Update particles
            g.particles=g.particles.filter(part=>{
              part.life-=dt; part.x+=part.vx*dt; part.y+=part.vy*dt;
              part.vx*=0.93; part.vy*=0.93;
              return part.life>0;
            });
          }

          // Danger overlay
          if (g.dangerFlash>0) {
            ctx.fillStyle=`rgba(255,0,0,${g.dangerFlash*0.1})`;
            ctx.fillRect(0,0,W,H);
          }

          // Draw prey
          for (const prey of g.prey) {
            glow(prey.x, prey.y, prey.r, prey.color, 0.45);
            ctx.beginPath(); ctx.arc(prey.x,prey.y,prey.r,0,Math.PI*2);
            ctx.fillStyle=prey.color+'22'; ctx.fill();
            ctx.strokeStyle=prey.color; ctx.lineWidth=2; ctx.stroke();
            // Sheen
            ctx.beginPath(); ctx.arc(prey.x-prey.r*0.3,prey.y-prey.r*0.35,prey.r*0.3,0,Math.PI*2);
            ctx.fillStyle='rgba(255,255,255,0.18)'; ctx.fill();
          }

          // Draw predators
          for (const pred of g.predators) {
            const p2=Math.sin(pred.pulse)*4;
            glow(pred.x,pred.y,pred.r+p2,'#ff0000',0.75);
            ctx.beginPath(); ctx.arc(pred.x,pred.y,pred.r+p2,0,Math.PI*2);
            ctx.fillStyle='#200000'; ctx.fill();
            ctx.strokeStyle='#ff2222'; ctx.lineWidth=3; ctx.stroke();
            // Core
            ctx.beginPath(); ctx.arc(pred.x,pred.y,pred.r*0.28,0,Math.PI*2);
            ctx.fillStyle='#ff0000'; ctx.fill();
            // Spikes
            ctx.strokeStyle='rgba(255,50,50,0.6)'; ctx.lineWidth=1.5;
            for(let s=0;s<8;s++){
              const ang=(s/8)*Math.PI*2+pred.pulse*0.4;
              ctx.beginPath();
              ctx.moveTo(pred.x+Math.cos(ang)*pred.r, pred.y+Math.sin(ang)*pred.r);
              ctx.lineTo(pred.x+Math.cos(ang)*(pred.r+10+p2), pred.y+Math.sin(ang)*(pred.r+10+p2));
              ctx.stroke();
            }
          }

          // Draw player
          if (g.phase!=='start') {
            const p=g.player;
            glow(p.x,p.y,p.r,'#00ffff',0.75);
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle='#001820'; ctx.fill();
            ctx.strokeStyle='#00ffff'; ctx.lineWidth=3; ctx.stroke();
            // Inner gradient highlight
            const ig=ctx.createRadialGradient(p.x-p.r*0.35,p.y-p.r*0.4,0,p.x,p.y,p.r*0.95);
            ig.addColorStop(0,'rgba(0,255,255,0.35)'); ig.addColorStop(1,'rgba(0,0,0,0)');
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=ig; ctx.fill();
            // Sheen
            ctx.beginPath(); ctx.arc(p.x-p.r*0.3,p.y-p.r*0.35,p.r*0.28,0,Math.PI*2);
            ctx.fillStyle='rgba(0,255,255,0.22)'; ctx.fill();
          }

          // Draw particles
          for (const part of g.particles) {
            const a=part.life/part.max;
            ctx.globalAlpha=a;
            if(part.text){
              ctx.fillStyle=part.color;
              ctx.font=`bold ${part.sz||14}px monospace`;
              ctx.textAlign='center';
              ctx.shadowColor=part.color; ctx.shadowBlur=8;
              ctx.fillText(part.text,part.x,part.y);
              ctx.shadowBlur=0;
            } else {
              ctx.beginPath(); ctx.arc(part.x,part.y,Math.max(0.3,part.r*a),0,Math.PI*2);
              ctx.fillStyle=part.color; ctx.fill();
            }
          }
          ctx.globalAlpha=1;

          // HUD
          if (g.phase==='playing') {
            ctx.shadowColor='#00ffff'; ctx.shadowBlur=12;
            ctx.fillStyle='#00ffff'; ctx.font='bold 28px monospace'; ctx.textAlign='left';
            ctx.fillText(g.score.toLocaleString(), 20, 44);
            ctx.shadowBlur=0;
            ctx.fillStyle='#335566'; ctx.font='13px monospace';
            ctx.fillText(`BEST ${g.highScore.toLocaleString()}`, 20, 64);

            // Hearts
            for(let i=0;i<3;i++){
              const has=i<g.lives;
              ctx.fillStyle=has?'#ff4455':'#221122';
              ctx.shadowColor=has?'#ff4455':'transparent'; ctx.shadowBlur=has?10:0;
              ctx.font='22px sans-serif'; ctx.textAlign='right';
              ctx.fillText('♥', W-16-i*30, 42);
            }
            ctx.shadowBlur=0;

            // Timer
            const tc=g.time<15?'#ff4444':g.time<30?'#ffaa00':'#ffdd00';
            ctx.fillStyle=tc; ctx.font='bold 30px monospace'; ctx.textAlign='center';
            ctx.shadowColor=tc; ctx.shadowBlur=14;
            ctx.fillText(Math.ceil(g.time)+'s', W/2, 42);
            ctx.shadowBlur=0;
            ctx.fillStyle='#1a0040'; ctx.fillRect(W/2-65,52,130,6);
            ctx.fillStyle=tc; ctx.fillRect(W/2-65,52,130*(g.time/90),6);

            // Combo
            if(g.combo>=2){
              const ca=Math.min(1,g.comboTimer);
              ctx.globalAlpha=ca;
              const sz=20+Math.min(g.combo*2,18);
              ctx.fillStyle='#ffcc00'; ctx.font=`bold ${sz}px monospace`; ctx.textAlign='center';
              ctx.shadowColor='#ffcc00'; ctx.shadowBlur=18;
              ctx.fillText(`${g.combo}× COMBO!`, W/2, H-28);
              ctx.shadowBlur=0; ctx.globalAlpha=1;
            }
          }

          // Throttled UI state sync
          if (ts - g.lastUi > 100) {
            g.lastUi=ts;
            setUi({ phase:g.phase, score:g.score, lives:g.lives,
              time:Math.ceil(g.time), combo:g.combo, highScore:g.highScore, newBest:g.newBest||false });
          }

          animRef.current = requestAnimationFrame(loop);
        }

        animRef.current = requestAnimationFrame(loop);

        return () => {
          cancelAnimationFrame(animRef.current);
          window.removeEventListener('resize', resize);
          canvas.removeEventListener('mousemove', onMouseMove);
          canvas.removeEventListener('touchmove', onTouchMove);
          canvas.removeEventListener('touchstart', onTouchMove);
        };
      }, []);

      const btnStyle = {
        padding:'14px 52px', fontSize:'1.3em',
        background:'transparent', border:'2px solid #00ffff',
        color:'#00ffff', cursor:'pointer', borderRadius:6,
        fontFamily:'monospace', letterSpacing:3,
        boxShadow:'0 0 22px #00ffff44, inset 0 0 12px #00ffff11',
        marginTop:22, transition:'all 0.2s',
      };

      const overlayStyle = {
        position:'absolute', inset:0,
        display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center',
        background:'rgba(5,0,16,0.88)', fontFamily:'monospace',
        color:'white',
      };

      return (
        <div style={{ width:'100vw', height:'100vh', position:'relative', overflow:'hidden' }}>
          <canvas ref={canvasRef} style={{ position:'absolute', top:0, left:0 }} />

          {ui.phase==='start' && (
            <div style={overlayStyle}>
              <div style={{ fontSize:'3.5em', fontWeight:'bold', color:'#00ffff', letterSpacing:5,
                textShadow:'0 0 30px #00ffff, 0 0 60px #00ffff66', marginBottom:6 }}>
                CELL SURGE
              </div>
              <div style={{ color:'#664499', fontSize:'0.95em', letterSpacing:4, marginBottom:28 }}>
                ABSORB · GROW · DOMINATE
              </div>
              <div style={{ color:'#8888bb', fontSize:'0.9em', textAlign:'center',
                maxWidth:380, lineHeight:1.9, padding:'0 20px' }}>
                Move your mouse to guide your glowing cell.<br/>
                <span style={{color:'#00ffff'}}>Absorb smaller orbs</span> to grow and score.<br/>
                <span style={{color:'#ff4455'}}>Dodge massive red predators</span> — they'll shrink you!<br/>
                <span style={{color:'#ffcc00'}}>Chain absorptions</span> for COMBO multipliers up to 8×!
              </div>
              {ui.highScore > 0 && (
                <div style={{ color:'#ff8800', fontSize:'1.05em', marginTop:18 }}>
                  BEST: {ui.highScore.toLocaleString()}
                </div>
              )}
              <button style={btnStyle} onClick={initGame}>▶ PLAY</button>
            </div>
          )}

          {ui.phase==='gameover' && (
            <div style={overlayStyle}>
              <div style={{ fontSize:'2.5em', fontWeight:'bold', marginBottom:14,
                color:ui.lives<=0?'#ff4444':'#ffcc00',
                textShadow:`0 0 24px ${ui.lives<=0?'#ff4444':'#ffcc00'}` }}>
                {ui.lives<=0 ? 'ABSORBED!' : "TIME'S UP!"}
              </div>
              <div style={{ color:'#00ffff', fontSize:'2.2em', fontWeight:'bold',
                textShadow:'0 0 16px #00ffff' }}>
                {ui.score.toLocaleString()}
              </div>
              <div style={{ color:'#335566', fontSize:'0.9em', marginBottom:10 }}>POINTS</div>
              {ui.newBest ? (
                <div style={{ color:'#ffcc00', fontSize:'1.25em', marginBottom:16,
                  animation:'glow 0.8s infinite' }}>⭐ NEW HIGH SCORE! ⭐</div>
              ) : ui.highScore > 0 ? (
                <div style={{ color:'#446677', fontSize:'0.95em', marginBottom:16 }}>
                  BEST: {ui.highScore.toLocaleString()}
                </div>
              ) : null}
              <button style={btnStyle} onClick={initGame}>▶ PLAY AGAIN</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CellSurge />);
  </script>
</body>
</html>
