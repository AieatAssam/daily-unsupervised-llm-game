<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arc Surge</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; user-select: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const GRAVITY   = 0.28;
    const BALL_SPD  = 15;
    const BALL_R    = 7;
    const TARGET_R  = 30;
    const COLS = ['#00ffff','#ff00ff','#ffff00','#ff6622','#00ff88','#ff44aa'];

    /* ── Audio ─────────────────────────────────────────────────────── */
    function mkAudio() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const tone = (f0, f1, dur, vol, wave='sine') => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = wave;
          o.frequency.setValueAtTime(f0, ctx.currentTime);
          o.frequency.exponentialRampToValueAtTime(Math.max(f1,10), ctx.currentTime + dur);
          g.gain.setValueAtTime(vol, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
          o.start(); o.stop(ctx.currentTime + dur + 0.01);
        };
        return {
          shoot : () => tone(350,140,0.14,0.22,'sawtooth'),
          hit   : () => { tone(700,1300,0.11,0.28); tone(1000,700,0.13,0.18); },
          combo : () => { tone(500,1000,0.09,0.22); tone(750,1500,0.09,0.22); tone(1100,2000,0.13,0.28); },
          miss  : () => tone(220,90,0.28,0.18,'sawtooth'),
          over  : () => tone(300,70,0.85,0.3,'sawtooth'),
        };
      } catch(_) {
        return { shoot:()=>{}, hit:()=>{}, combo:()=>{}, miss:()=>{}, over:()=>{} };
      }
    }

    /* ── Helpers ───────────────────────────────────────────────────── */
    function mkTarget(w, h, speedMult) {
      const fromLeft = Math.random() < 0.5;
      const spd = (1.2 + Math.random() * 1.8) * speedMult;
      return {
        id  : Math.random(),
        x   : fromLeft ? -TARGET_R * 2 : w + TARGET_R * 2,
        y   : h * 0.10 + Math.random() * (h * 0.58),
        vx  : fromLeft ? spd : -spd,
        vy  : (Math.random() - 0.5) * 1.0,
        col : COLS[Math.floor(Math.random() * COLS.length)],
        phase: Math.random() * Math.PI * 2,
      };
    }

    function arcPreview(ox, oy, tx, ty, steps) {
      const dx = tx - ox, dy = ty - oy;
      const d  = Math.hypot(dx, dy);
      if (d < 2) return [];
      let vx = (dx / d) * BALL_SPD;
      let vy = (dy / d) * BALL_SPD;
      const pts = [];
      let px = ox, py = oy;
      for (let i = 0; i < steps; i++) {
        pts.push({ x: px, y: py });
        px += vx; py += vy; vy += GRAVITY;
        if (py > window.innerHeight + 100) break;
      }
      return pts;
    }

    /* ── Main Component ────────────────────────────────────────────── */
    const Game = () => {
      const canvasRef = useRef(null);
      const st        = useRef(null);
      const audio     = useRef(null);
      const rafRef    = useRef(null);
      const intvRef   = useRef(null);
      const [tick, setTick] = useState(0); // triggers React UI redraws

      /* ── initialise persistent HighScore in localStorage ── */
      if (!localStorage.getItem('arcSurge_highScore')) {
        localStorage.setItem('arcSurge_highScore', '0');
      }

      function freshState() {
        return {
          phase   : 'start',
          targets : [],
          balls   : [],
          parts   : [],
          floats  : [],
          score   : 0,
          hs      : parseInt(localStorage.getItem('arcSurge_highScore') || '0'),
          lives   : 3,
          combo   : 0,
          comboT  : 0,
          timeLeft: 90,
          frame   : 0,
          bgHue   : 0,
          mx      : 0,
          my      : 0,
        };
      }

      if (!st.current) st.current = freshState();

      /* ── Boom + float text ── */
      function boom(x, y, col, n) {
        const s = st.current;
        for (let i = 0; i < n; i++) {
          const a  = (Math.PI * 2 * i) / n + (Math.random() - 0.5) * 0.4;
          const sp = 3 + Math.random() * 5;
          s.parts.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
                         col, life: 1, sz: 3 + Math.random()*4 });
        }
      }

      function floatText(x, y, txt, col) {
        st.current.floats.push({ x, y, txt, col, life: 1, vy: -2.8 });
      }

      /* ── endGame ── */
      function endGame() {
        const s = st.current;
        s.phase = 'over';
        if (s.score > s.hs) {
          s.hs = s.score;
          localStorage.setItem('arcSurge_highScore', String(s.score));
        }
        localStorage.setItem('arcSurge_score', String(s.score));
        if (intvRef.current) clearInterval(intvRef.current);
        audio.current?.over();
        setTick(t => t + 1);
      }

      /* ── startGame ── */
      function startGame() {
        if (!audio.current) audio.current = mkAudio();
        const w = canvasRef.current?.width  || window.innerWidth;
        const h = canvasRef.current?.height || window.innerHeight;
        const s = st.current;
        Object.assign(s, {
          phase   : 'playing',
          targets : [mkTarget(w,h,1), mkTarget(w,h,1), mkTarget(w,h,1)],
          balls   : [], parts: [], floats: [],
          score   : 0,
          hs      : parseInt(localStorage.getItem('arcSurge_highScore') || '0'),
          lives   : 3,
          combo   : 0, comboT: 0,
          timeLeft: 90, frame: 0,
        });
        if (intvRef.current) clearInterval(intvRef.current);
        intvRef.current = setInterval(() => {
          const gs = st.current;
          if (gs.phase !== 'playing') return;
          gs.timeLeft--;
          localStorage.setItem('arcSurge_score', String(gs.score));
          if (gs.timeLeft <= 0) endGame();
          setTick(t => t + 1);
        }, 1000);
        setTick(t => t + 1);
      }

      /* ── fire projectile ── */
      function fire(cx, cy) {
        const s = st.current;
        const w = canvasRef.current?.width  || window.innerWidth;
        const h = canvasRef.current?.height || window.innerHeight;
        const ox = w / 2, oy = h - 70;
        const dx = cx - ox, dy = cy - oy;
        const d  = Math.hypot(dx, dy);
        if (d < 5) return;
        s.balls.push({
          x: ox, y: oy,
          vx: (dx/d)*BALL_SPD, vy: (dy/d)*BALL_SPD,
          trail: [],
        });
        audio.current?.shoot();
      }

      /* ── game + render loop ── */
      useEffect(() => {
        const canvas = canvasRef.current;
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.addEventListener('resize', resize);

        function loop() {
          const s   = st.current;
          const ctx = canvas.getContext('2d');
          const w   = canvas.width, h = canvas.height;
          s.frame++;
          s.bgHue = (s.bgHue + 0.14) % 360;

          /* ── UPDATE ── */
          if (s.phase === 'playing') {
            s.comboT = Math.max(0, s.comboT - 1);
            if (s.comboT === 0 && s.combo > 0) s.combo = 0;

            const speedMult = 1 + (90 - s.timeLeft) / 100;

            // Move targets
            s.targets.forEach(t => {
              t.x += t.vx * speedMult;
              t.y += t.vy;
              if (t.y < h * 0.08)  { t.y = h * 0.08;  t.vy =  Math.abs(t.vy); }
              if (t.y > h * 0.72)  { t.y = h * 0.72;  t.vy = -Math.abs(t.vy); }
            });

            // Escaped targets → lose life
            const escaped = s.targets.filter(t =>
              t.x < -(TARGET_R * 5) || t.x > w + TARGET_R * 5
            );
            escaped.forEach(() => {
              s.lives--;
              s.combo = 0;
              audio.current?.miss();
              if (s.lives <= 0) endGame();
            });
            s.targets = s.targets.filter(t =>
              t.x >= -(TARGET_R * 5) && t.x <= w + TARGET_R * 5
            );

            // Spawn to maintain count
            const maxT = Math.min(6, 3 + Math.floor(s.frame / 500));
            while (s.targets.length < maxT) {
              s.targets.push(mkTarget(w, h, speedMult));
            }

            // Move balls
            s.balls.forEach(b => {
              b.trail.push({ x: b.x, y: b.y });
              if (b.trail.length > 20) b.trail.shift();
              b.x  += b.vx;
              b.y  += b.vy;
              b.vy += GRAVITY;
            });
            s.balls = s.balls.filter(b =>
              b.y < h + 100 && b.x > -100 && b.x < w + 100
            );

            // Collisions
            const usedBalls = new Set();
            const usedTgts  = new Set();
            s.balls.forEach((b, bi) => {
              s.targets.forEach((t, ti) => {
                if (usedBalls.has(bi) || usedTgts.has(ti)) return;
                if (Math.hypot(b.x - t.x, b.y - t.y) < BALL_R + TARGET_R) {
                  usedBalls.add(bi);
                  usedTgts.add(ti);
                  boom(t.x, t.y, t.col, 22);
                  s.combo++;
                  s.comboT = 220;
                  const pts = 100 * Math.max(1, s.combo);
                  s.score += pts;
                  localStorage.setItem('arcSurge_score', String(s.score));
                  const label = s.combo > 1 ? `+${pts} x${s.combo}!` : `+${pts}`;
                  floatText(t.x, t.y - 38, label, t.col);
                  if (s.combo >= 3) audio.current?.combo();
                  else audio.current?.hit();
                  setTick(tk => tk + 1);
                }
              });
            });
            s.balls   = s.balls.filter((_,i)   => !usedBalls.has(i));
            s.targets = s.targets.filter((_,i) => !usedTgts.has(i));

            // Particles
            s.parts.forEach(p => {
              p.x += p.vx; p.y += p.vy; p.vy += 0.13; p.vx *= 0.97;
              p.life -= 0.024;
            });
            s.parts = s.parts.filter(p => p.life > 0);

            // Float texts
            s.floats.forEach(f => { f.y += f.vy; f.life -= 0.02; });
            s.floats = s.floats.filter(f => f.life > 0);
          }

          /* ── DRAW ── */
          // Background
          const bg = ctx.createRadialGradient(w/2, h/2, 60, w/2, h/2, Math.max(w,h)*0.85);
          bg.addColorStop(0, `hsl(${(s.bgHue+255)%360},75%,8%)`);
          bg.addColorStop(0.55, `hsl(${(s.bgHue+295)%360},85%,4%)`);
          bg.addColorStop(1, '#000008');
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, w, h);

          // Subtle grid
          ctx.strokeStyle = 'rgba(0,255,255,0.035)';
          ctx.lineWidth = 1;
          for (let x = 0; x < w; x += 55) {
            ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke();
          }
          for (let y = 0; y < h; y += 55) {
            ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke();
          }

          if (s.phase === 'playing') {
            /* trajectory preview */
            const pts = arcPreview(w/2, h-70, s.mx, s.my, 55);
            pts.forEach((p, i) => {
              const a = (1 - i / pts.length) * 0.5;
              const r = 2 + (1 - i / pts.length) * 1.5;
              ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2);
              ctx.fillStyle = `rgba(255,230,80,${a})`;
              ctx.fill();
            });

            /* targets */
            s.targets.forEach(t => {
              const pulse = (Math.sin(s.frame * 0.09 + t.phase) + 1) * 0.5;

              ctx.save();
              // glow aura
              const grd = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, TARGET_R * 2.8);
              grd.addColorStop(0, t.col + '55');
              grd.addColorStop(1, 'transparent');
              ctx.fillStyle = grd;
              ctx.beginPath(); ctx.arc(t.x, t.y, TARGET_R*2.8, 0, Math.PI*2); ctx.fill();

              // outer ring
              ctx.shadowColor = t.col; ctx.shadowBlur = 22;
              ctx.strokeStyle = t.col; ctx.lineWidth = 3;
              ctx.beginPath(); ctx.arc(t.x, t.y, TARGET_R, 0, Math.PI*2); ctx.stroke();

              // fill
              ctx.fillStyle = t.col + '28';
              ctx.beginPath(); ctx.arc(t.x, t.y, TARGET_R, 0, Math.PI*2); ctx.fill();

              // centre dot
              ctx.shadowBlur = 28;
              ctx.fillStyle = t.col;
              ctx.beginPath(); ctx.arc(t.x, t.y, 9, 0, Math.PI*2); ctx.fill();

              // pulse ring
              ctx.globalAlpha = pulse * 0.45;
              ctx.strokeStyle = t.col; ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.arc(t.x, t.y, TARGET_R + 8 + pulse*9, 0, Math.PI*2); ctx.stroke();
              ctx.restore();

              // direction arrow hint (small chevron showing movement)
              ctx.save();
              ctx.strokeStyle = t.col + 'aa';
              ctx.lineWidth = 2;
              ctx.shadowColor = t.col; ctx.shadowBlur = 8;
              const arrowLen = 12;
              const ax = t.x + (t.vx > 0 ? TARGET_R + 8 : -(TARGET_R + 8));
              ctx.beginPath();
              if (t.vx > 0) {
                ctx.moveTo(ax - arrowLen, t.y - 6);
                ctx.lineTo(ax, t.y);
                ctx.lineTo(ax - arrowLen, t.y + 6);
              } else {
                ctx.moveTo(ax + arrowLen, t.y - 6);
                ctx.lineTo(ax, t.y);
                ctx.lineTo(ax + arrowLen, t.y + 6);
              }
              ctx.stroke();
              ctx.restore();
            });

            /* balls */
            s.balls.forEach(b => {
              ctx.save();
              // trail
              b.trail.forEach((pt, i) => {
                const a = (i / b.trail.length) * 0.55;
                const r = (i / b.trail.length) * BALL_R;
                ctx.beginPath(); ctx.arc(pt.x, pt.y, r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,215,50,${a})`; ctx.fill();
              });
              // head
              ctx.shadowColor = '#ffee44'; ctx.shadowBlur = 22;
              ctx.fillStyle = '#ffffff';
              ctx.beginPath(); ctx.arc(b.x, b.y, BALL_R, 0, Math.PI*2); ctx.fill();
              ctx.restore();
            });

            /* launcher */
            const lx = w/2, ly = h-70;
            ctx.save();
            ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 28;
            ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.arc(lx, ly, 22, 0, Math.PI*2); ctx.stroke();
            ctx.fillStyle = '#00ffff30';
            ctx.beginPath(); ctx.arc(lx, ly, 22, 0, Math.PI*2); ctx.fill();

            // aim line
            const adx = s.mx - lx, ady = s.my - ly;
            const ad  = Math.hypot(adx, ady);
            if (ad > 5) {
              ctx.strokeStyle = '#00ffff'; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.75;
              ctx.beginPath();
              ctx.moveTo(lx, ly);
              ctx.lineTo(lx + (adx/ad)*46, ly + (ady/ad)*46);
              ctx.stroke();
            }
            ctx.restore();
          }

          /* particles */
          s.parts.forEach(p => {
            ctx.save();
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.shadowColor = p.col; ctx.shadowBlur = 14;
            ctx.fillStyle = p.col;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * p.life, 0, Math.PI*2); ctx.fill();
            ctx.restore();
          });

          /* float texts */
          s.floats.forEach(f => {
            ctx.save();
            ctx.globalAlpha = Math.max(0, f.life);
            ctx.font = 'bold 20px monospace';
            ctx.fillStyle = f.col; ctx.shadowColor = f.col; ctx.shadowBlur = 14;
            ctx.textAlign = 'center';
            ctx.fillText(f.txt, f.x, f.y);
            ctx.restore();
          });

          rafRef.current = requestAnimationFrame(loop);
        }

        rafRef.current = requestAnimationFrame(loop);
        return () => {
          cancelAnimationFrame(rafRef.current);
          clearInterval(intvRef.current);
          window.removeEventListener('resize', resize);
        };
      }, []);

      /* ── Input handlers ── */
      const onMouseMove = e => {
        st.current.mx = e.clientX;
        st.current.my = e.clientY;
      };

      const onClick = e => {
        const s = st.current;
        if (s.phase === 'start' || s.phase === 'over') { startGame(); return; }
        if (s.phase === 'playing') fire(e.clientX, e.clientY);
      };

      const onTouchStart = e => {
        e.preventDefault();
        const t = e.touches[0] || e.changedTouches[0];
        st.current.mx = t.clientX;
        st.current.my = t.clientY;
        const s = st.current;
        if (s.phase === 'start' || s.phase === 'over') { startGame(); return; }
        if (s.phase === 'playing') fire(t.clientX, t.clientY);
      };

      const onTouchMove = e => {
        e.preventDefault();
        const t = e.touches[0];
        if (t) { st.current.mx = t.clientX; st.current.my = t.clientY; }
      };

      const s = st.current;

      return (
        <div
          style={{ position:'relative', width:'100vw', height:'100vh', overflow:'hidden',
                   fontFamily:'monospace', cursor: s.phase==='playing' ? 'crosshair' : 'pointer' }}
          onMouseMove={onMouseMove}
          onClick={onClick}
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
        >
          <canvas
            ref={canvasRef}
            style={{ display:'block' }}
          />

          {/* HUD */}
          {s.phase === 'playing' && (
            <div style={{ position:'absolute', top:0, left:0, right:0, padding:'14px 20px',
                          display:'flex', justifyContent:'space-between', alignItems:'flex-start',
                          pointerEvents:'none' }}>
              <div>
                <div style={{ color:'#00ffff', fontSize:30, fontWeight:'bold',
                              textShadow:'0 0 20px #00ffff' }}>
                  {s.score.toLocaleString()}
                </div>
                <div style={{ color:'#334466', fontSize:13 }}>
                  BEST {s.hs.toLocaleString()}
                </div>
                {s.combo > 1 && (
                  <div style={{ color:'#ff00ff', fontSize:18,
                                textShadow:'0 0 15px #ff00ff', marginTop:4 }}>
                    x{s.combo} COMBO!
                  </div>
                )}
              </div>
              <div style={{ textAlign:'center' }}>
                <div style={{ color: s.timeLeft <= 10 ? '#ff4444' : '#ffff44',
                              fontSize:38, fontWeight:'bold',
                              textShadow:`0 0 22px ${s.timeLeft<=10?'#ff4444':'#ffff44'}` }}>
                  {s.timeLeft}
                </div>
                <div style={{ color:'#334466', fontSize:12 }}>SEC</div>
              </div>
              <div style={{ textAlign:'right' }}>
                <div style={{ fontSize:22 }}>
                  {Array.from({length:3}, (_,i) => i < s.lives ? '❤️' : '🖤').join('')}
                </div>
                <div style={{ color:'#334466', fontSize:12, marginTop:2 }}>LIVES</div>
              </div>
            </div>
          )}

          {/* Start screen */}
          {s.phase === 'start' && (
            <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
                          alignItems:'center', justifyContent:'center',
                          background:'rgba(0,0,0,0.68)' }}>
              <div style={{ color:'#00ffff', fontSize:'clamp(30px,6vw,54px)', fontWeight:'bold',
                            textShadow:'0 0 40px #00ffff, 0 0 80px #0055ff',
                            marginBottom:8, letterSpacing:'0.12em' }}>
                ARC SURGE
              </div>
              <div style={{ color:'#ff00ff', fontSize:18,
                            textShadow:'0 0 16px #ff00ff', marginBottom:36 }}>
                Blast moving targets with ballistic shots!
              </div>
              <div style={{ color:'#7799bb', fontSize:14, marginBottom:8 }}>
                🎯 Targets drift across — predict where they'll be!
              </div>
              <div style={{ color:'#7799bb', fontSize:14, marginBottom:8 }}>
                ⬆️ Aim UP to curve the ball down onto far targets
              </div>
              <div style={{ color:'#7799bb', fontSize:14, marginBottom:36 }}>
                ⚡ Chain hits for COMBO multipliers — up to x10!
              </div>
              {s.hs > 0 && (
                <div style={{ color:'#ffff44', fontSize:16, marginBottom:16,
                              textShadow:'0 0 12px #ffff44' }}>
                  Best: {s.hs.toLocaleString()}
                </div>
              )}
              <div style={{ color:'#00ffff', fontSize:20, padding:'12px 36px',
                            border:'2px solid #00ffff', borderRadius:8,
                            textShadow:'0 0 16px #00ffff',
                            boxShadow:'0 0 24px #00ffff44' }}>
                CLICK TO PLAY
              </div>
            </div>
          )}

          {/* Game Over */}
          {s.phase === 'over' && (
            <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
                          alignItems:'center', justifyContent:'center',
                          background:'rgba(0,0,0,0.74)' }}>
              <div style={{ color:'#ff4444', fontSize:'clamp(36px,7vw,52px)', fontWeight:'bold',
                            textShadow:'0 0 40px #ff4444', marginBottom:16 }}>
                GAME OVER
              </div>
              <div style={{ color:'#00ffff', fontSize:42, fontWeight:'bold',
                            textShadow:'0 0 28px #00ffff', marginBottom:6 }}>
                {s.score.toLocaleString()}
              </div>
              {s.score > 0 && s.score >= s.hs && (
                <div style={{ color:'#ffff44', fontSize:18,
                              textShadow:'0 0 16px #ffff44', marginBottom:8 }}>
                  🏆 NEW BEST!
                </div>
              )}
              <div style={{ color:'#334466', fontSize:15, marginBottom:34 }}>
                Best: {s.hs.toLocaleString()}
              </div>
              <div style={{ color:'#00ffff', fontSize:20, padding:'12px 36px',
                            border:'2px solid #00ffff', borderRadius:8,
                            textShadow:'0 0 16px #00ffff',
                            boxShadow:'0 0 24px #00ffff44' }}>
                PLAY AGAIN
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<Game />, document.getElementById('root'));
  </script>
</body>
</html>
