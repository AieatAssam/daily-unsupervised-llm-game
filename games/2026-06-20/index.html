<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cut Loose</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; background: #06030c; touch-action: none; }
  #root { width: 100%; height: 100%; }
  body { font-family: 'Segoe UI', Arial, sans-serif; user-select: none; }

  .app {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: linear-gradient(135deg, #1a0533, #06030c, #1a0533);
    background-size: 400% 400%;
    animation: bgShift 14s ease infinite;
  }
  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  canvas { position: absolute; top: 0; left: 0; display: block; }

  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 14px 18px;
    pointer-events: none;
    z-index: 5;
  }
  .hud-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .hud-label {
    font-size: 11px;
    letter-spacing: 2px;
    color: #7be8ff;
    opacity: 0.8;
    text-transform: uppercase;
  }
  .hud-value {
    font-size: 24px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 0 10px #00eaff, 0 0 20px #00eaff;
  }
  .hud-combo {
    font-size: 16px;
    font-weight: 700;
    color: #ffd24a;
    text-shadow: 0 0 10px #ff9d00;
    transition: transform 0.15s ease;
  }
  .lives {
    display: flex;
    gap: 6px;
  }
  .life-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff5fae, #ff1f6d);
    box-shadow: 0 0 8px #ff1f6d, 0 0 16px #ff1f6d;
  }
  .life-dot.lost {
    background: #2a1530;
    box-shadow: none;
    opacity: 0.4;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    z-index: 10;
    background: radial-gradient(circle at 50% 40%, rgba(40,10,60,0.55), rgba(5,2,10,0.92));
    padding: 20px;
  }
  .title {
    font-size: clamp(36px, 9vw, 72px);
    font-weight: 900;
    letter-spacing: 4px;
    margin: 0 0 6px 0;
    background: linear-gradient(90deg, #00eaff, #ff4ad1, #ffd24a, #00eaff);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: hueSlide 6s linear infinite;
    filter: drop-shadow(0 0 18px rgba(0,234,255,0.45));
  }
  @keyframes hueSlide {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  .subtitle {
    color: #cdb9ff;
    font-size: clamp(14px, 3vw, 18px);
    margin-bottom: 26px;
    max-width: 480px;
    line-height: 1.5;
  }
  .btn {
    pointer-events: auto;
    cursor: pointer;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 3px;
    padding: 16px 48px;
    border-radius: 50px;
    border: 2px solid #00eaff;
    background: linear-gradient(135deg, rgba(0,234,255,0.25), rgba(255,74,209,0.25));
    color: #fff;
    text-shadow: 0 0 8px #00eaff;
    box-shadow: 0 0 18px rgba(0,234,255,0.55), inset 0 0 14px rgba(255,255,255,0.08);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  .btn:hover { transform: scale(1.06); box-shadow: 0 0 28px rgba(0,234,255,0.85); }
  .btn:active { transform: scale(0.97); }

  .stat-row {
    display: flex;
    gap: 36px;
    margin: 18px 0 30px 0;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .stat-num {
    font-size: 30px;
    font-weight: 800;
    color: #ffd24a;
    text-shadow: 0 0 12px #ff9d00;
  }
  .stat-name {
    font-size: 12px;
    letter-spacing: 2px;
    color: #9ad9ff;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .how-to {
    position: absolute;
    bottom: 14px;
    left: 0; right: 0;
    text-align: center;
    color: rgba(255,255,255,0.55);
    font-size: 12px;
    letter-spacing: 1px;
    z-index: 6;
    pointer-events: none;
  }

  .flash-banner {
    position: absolute;
    top: 46%;
    left: 0; right: 0;
    text-align: center;
    font-size: clamp(24px, 6vw, 46px);
    font-weight: 900;
    letter-spacing: 2px;
    z-index: 8;
    pointer-events: none;
    text-shadow: 0 0 16px currentColor, 0 0 32px currentColor;
    animation: bannerPop 0.7s ease forwards;
  }
  @keyframes bannerPop {
    0% { transform: scale(0.4) translateY(10px); opacity: 0; }
    25% { transform: scale(1.15) translateY(0); opacity: 1; }
    70% { transform: scale(1) translateY(0); opacity: 1; }
    100% { transform: scale(1) translateY(-20px); opacity: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const STORAGE_KEY = 'cutLooseHighScore';
const GROUND_RATIO = 0.82;
const BASE_OMEGA = 1.7;
const BASE_TIMER = 6200;
const MAX_LIVES = 3;

function loadHighScore() {
  try {
    const v = parseInt(localStorage.getItem(STORAGE_KEY) || '0', 10);
    return Number.isFinite(v) ? v : 0;
  } catch (e) { return 0; }
}
function saveHighScore(v) {
  try { localStorage.setItem(STORAGE_KEY, String(v)); } catch (e) {}
}

// ---- Web Audio synth ----
function useAudio() {
  const ctxRef = useRef(null);
  const ensure = () => {
    if (!ctxRef.current) {
      const AC = window.AudioContext || window.webkitAudioContext;
      ctxRef.current = new AC();
    }
    if (ctxRef.current.state === 'suspended') ctxRef.current.resume();
    return ctxRef.current;
  };
  const tone = useCallback((freq, dur, type, gainStart, glide) => {
    try {
      const ctx = ensure();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.setValueAtTime(freq, ctx.currentTime);
      if (glide) osc.frequency.exponentialRampToValueAtTime(glide, ctx.currentTime + dur);
      gain.gain.setValueAtTime(gainStart != null ? gainStart : 0.18, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + dur);
    } catch (e) {}
  }, []);
  return {
    cut: () => tone(720, 0.12, 'sawtooth', 0.12, 320),
    bullseye: () => { tone(880, 0.18, 'triangle', 0.2, 1320); setTimeout(() => tone(1320, 0.2, 'triangle', 0.16), 70); },
    great: () => tone(660, 0.18, 'triangle', 0.18, 990),
    good: () => tone(520, 0.16, 'triangle', 0.16, 660),
    miss: () => tone(220, 0.3, 'sawtooth', 0.14, 90),
    hazard: () => tone(140, 0.4, 'square', 0.18, 60),
    combo: () => { tone(990, 0.1, 'square', 0.12, 1400); },
    gameover: () => { tone(400, 0.5, 'sawtooth', 0.16, 80); },
    start: () => tone(660, 0.2, 'triangle', 0.16, 990),
  };
}

function CutLoose() {
  const canvasRef = useRef(null);
  const audio = useAudio();
  const [screen, setScreen] = useState('start'); // start | playing | gameover
  const [score, setScore] = useState(0);
  const [highScore, setHighScore] = useState(loadHighScore());
  const [combo, setCombo] = useState(1);
  const [lives, setLives] = useState(MAX_LIVES);
  const [round, setRound] = useState(1);
  const [banner, setBanner] = useState(null); // { text, color, key }
  const bannerKeyRef = useRef(0);

  // Mutable game state lives in a ref so the rAF loop doesn't depend on React re-renders.
  const gRef = useRef(null);
  const dimsRef = useRef({ w: window.innerWidth, h: window.innerHeight });

  // Seed the high score key immediately so it's always present once the game has mounted.
  useEffect(() => {
    try {
      if (localStorage.getItem(STORAGE_KEY) === null) saveHighScore(0);
    } catch (e) {}
  }, []);

  const initRound = useCallback((roundNum, dims) => {
    const w = dims.w, h = dims.h;
    const groundY = h * GROUND_RATIO;
    const difficulty = Math.min(roundNum, 26);
    const omega = BASE_OMEGA + difficulty * 0.045;
    const amplitude = (Math.PI / 180) * (50 + Math.random() * 18);
    const anchorX = w * (0.28 + Math.random() * 0.44);
    const anchorY = h * (0.1 + Math.random() * 0.07);
    const maxLen = groundY - anchorY - 40;
    const ropeLength = Math.max(120, Math.min(maxLen, h * (0.32 + Math.random() * 0.18)));
    const targetRadius = Math.max(34, 78 - difficulty * 1.7);
    const margin = targetRadius + 50;
    const targetX = margin + Math.random() * (w - margin * 2);

    // Hazards: small spike zones on the ground, avoiding target area
    const hazardCount = difficulty > 5 ? Math.min(2, Math.floor((difficulty - 5) / 6) + 1) : 0;
    const hazards = [];
    let tries = 0;
    while (hazards.length < hazardCount && tries < 30) {
      tries++;
      const hx = 40 + Math.random() * (w - 80);
      if (Math.abs(hx - targetX) < targetRadius + 70) continue;
      if (hazards.some(hz => Math.abs(hz.x - hx) < 90)) continue;
      hazards.push({ x: hx, r: 26 });
    }

    return {
      anchorX, anchorY, ropeLength, omega, amplitude,
      phase: (Math.random() < 0.5 ? 0 : Math.PI),
      t: 0,
      groundY,
      targetX, targetRadius,
      hazards,
      cut: false,
      orb: null, // {x,y,vx,vy}
      settled: false,
      timeLeft: Math.max(2600, BASE_TIMER - difficulty * 110),
      maxTime: Math.max(2600, BASE_TIMER - difficulty * 110),
      particles: [],
      trail: [],
      resultAt: 0,
      gravity: 1500,
    };
  }, []);

  const showBanner = useCallback((text, color) => {
    bannerKeyRef.current += 1;
    setBanner({ text, color, key: bannerKeyRef.current });
  }, []);

  const spawnBurst = useCallback((g, x, y, color, count) => {
    for (let i = 0; i < count; i++) {
      const ang = Math.random() * Math.PI * 2;
      const spd = 60 + Math.random() * 260;
      g.particles.push({
        x, y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd - 60,
        life: 0.6 + Math.random() * 0.5,
        age: 0,
        color,
        size: 2 + Math.random() * 3.5,
      });
    }
  }, []);

  const comboRef = useRef(1);
  const scoreRef = useRef(0);
  const livesRef = useRef(MAX_LIVES);

  const applyResult = useCallback((basePoints, isHit) => {
    comboRef.current = isHit ? Math.min(8, comboRef.current + 1) : 1;
    setCombo(comboRef.current);
    if (isHit) {
      scoreRef.current += basePoints * comboRef.current;
      setScore(scoreRef.current);
    }
  }, []);

  const loseLife = useCallback(() => {
    comboRef.current = 1;
    setCombo(1);
    livesRef.current = Math.max(0, livesRef.current - 1);
    setLives(livesRef.current);
  }, []);

  const startGame = useCallback(() => {
    const dims = dimsRef.current;
    gRef.current = initRound(1, dims);
    comboRef.current = 1;
    scoreRef.current = 0;
    livesRef.current = MAX_LIVES;
    setScore(0);
    setCombo(1);
    setLives(MAX_LIVES);
    setRound(1);
    setBanner(null);
    setScreen('playing');
    audio.start();
  }, [initRound, audio]);

  const handleCut = useCallback(() => {
    const g = gRef.current;
    if (!g || screen !== 'playing' || g.cut || g.settled) return;
    g.cut = true;
    audio.cut();
    const theta = g.amplitude * Math.sin(g.omega * g.t + g.phase);
    const thetaDot = g.amplitude * g.omega * Math.cos(g.omega * g.t + g.phase);
    const ox = g.anchorX + g.ropeLength * Math.sin(theta);
    const oy = g.anchorY + g.ropeLength * Math.cos(theta);
    const vx = g.ropeLength * thetaDot * Math.cos(theta);
    const vy = -g.ropeLength * thetaDot * Math.sin(theta);
    g.orb = { x: ox, y: oy, vx, vy };
  }, [screen, audio]);

  // Resize handling
  useEffect(() => {
    const onResize = () => {
      dimsRef.current = { w: window.innerWidth, h: window.innerHeight };
      const canvas = canvasRef.current;
      if (canvas) {
        canvas.width = window.innerWidth * window.devicePixelRatio;
        canvas.height = window.innerHeight * window.devicePixelRatio;
        canvas.style.width = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
      }
    };
    onResize();
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  // Input
  useEffect(() => {
    const onKey = (e) => {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        if (screen === 'playing') handleCut();
        else if (screen === 'start' || screen === 'gameover') startGame();
      }
    };
    const onPointer = (e) => {
      if (screen === 'playing') handleCut();
    };
    window.addEventListener('keydown', onKey);
    const canvas = canvasRef.current;
    if (canvas) {
      canvas.addEventListener('pointerdown', onPointer);
    }
    return () => {
      window.removeEventListener('keydown', onKey);
      if (canvas) canvas.removeEventListener('pointerdown', onPointer);
    };
  }, [screen, handleCut, startGame]);

  // Round lifecycle: when round number changes during play, init new round state
  useEffect(() => {
    if (screen === 'playing' && round > 1) {
      gRef.current = initRound(round, dimsRef.current);
    }
  }, [round, screen, initRound]);

  // Game over check
  useEffect(() => {
    if (screen === 'playing' && lives <= 0) {
      audio.gameover();
      setScreen('gameover');
    }
  }, [lives, screen, audio]);

  // Main render/update loop
  useEffect(() => {
    let raf;
    let lastTs = null;

    const loop = (ts) => {
      raf = requestAnimationFrame(loop);
      const canvas = canvasRef.current;
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;
      const w = dimsRef.current.w, h = dimsRef.current.h;

      if (lastTs == null) lastTs = ts;
      let dt = (ts - lastTs) / 1000;
      if (dt > 0.05) dt = 0.05;
      lastTs = ts;

      ctx.save();
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, w, h);

      // background subtle starfield glow
      ctx.fillStyle = 'rgba(8,4,18,0.0)';
      ctx.fillRect(0, 0, w, h);

      const g = gRef.current;

      if (screen === 'playing' && g) {
        if (!g.cut && !g.settled) {
          g.t += dt;
          g.timeLeft -= dt * 1000;
          if (g.timeLeft <= 0 && !g.cut) {
            g.cut = true;
            g.settled = true;
            g.autoFail = true;
            spawnBurst(g, g.anchorX + g.ropeLength * Math.sin(g.amplitude * Math.sin(g.omega * g.t + g.phase)), g.anchorY + g.ropeLength * Math.cos(g.amplitude * Math.sin(g.omega * g.t + g.phase)), '#ff3366', 28);
            audio.miss();
            showBanner('TOO SLOW!', '#ff3366');
            g.resultAt = performance.now();
            loseLife();
          }
        } else if (g.orb && !g.settled) {
          g.orb.vy += g.gravity * dt;
          g.orb.x += g.orb.vx * dt;
          g.orb.y += g.orb.vy * dt;
          g.trail.push({ x: g.orb.x, y: g.orb.y, age: 0 });
          if (g.trail.length > 18) g.trail.shift();

          if (g.orb.y >= g.groundY) {
            g.settled = true;
            const landX = g.orb.x;
            let hazardHit = false;
            for (const hz of g.hazards) {
              if (Math.abs(landX - hz.x) < hz.r + 10) { hazardHit = true; break; }
            }
            const dist = Math.abs(landX - g.targetX);
            if (hazardHit) {
              spawnBurst(g, landX, g.groundY, '#ff3366', 36);
              audio.hazard();
              showBanner('ZAPPED!', '#ff3366');
              loseLife();
            } else if (dist <= g.targetRadius * 0.32) {
              spawnBurst(g, landX, g.groundY, '#ffd24a', 50);
              audio.bullseye();
              showBanner('BULLSEYE!', '#ffd24a');
              if (comboRef.current >= 3) audio.combo();
              applyResult(500, true);
            } else if (dist <= g.targetRadius * 0.65) {
              spawnBurst(g, landX, g.groundY, '#7CFFB2', 38);
              audio.great();
              showBanner('GREAT!', '#7CFFB2');
              if (comboRef.current >= 3) audio.combo();
              applyResult(300, true);
            } else if (dist <= g.targetRadius) {
              spawnBurst(g, landX, g.groundY, '#7be8ff', 28);
              audio.good();
              showBanner('GOOD', '#7be8ff');
              applyResult(150, true);
            } else {
              spawnBurst(g, landX, g.groundY, '#9aa0c0', 18);
              audio.miss();
              showBanner('MISS', '#cdb9ff');
              applyResult(0, false);
            }
            g.resultAt = performance.now();
            g.lastLandX = landX;
            g.lastHazard = hazardHit;
            g.lastDist = dist;
          }
        }

        // Auto-advance to next round after a short pause once settled
        if (g.settled && g.resultAt && performance.now() - g.resultAt > 900 && !g.advanced) {
          g.advanced = true;
          if (livesRef.current > 0) setRound(r => r + 1);
        }

        // particle update
        for (let i = g.particles.length - 1; i >= 0; i--) {
          const p = g.particles[i];
          p.age += dt;
          if (p.age >= p.life) { g.particles.splice(i, 1); continue; }
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 420 * dt;
        }

        // ---- DRAW ----
        // ground
        ctx.strokeStyle = 'rgba(0,234,255,0.55)';
        ctx.lineWidth = 2;
        ctx.shadowColor = '#00eaff';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.moveTo(0, g.groundY);
        ctx.lineTo(w, g.groundY);
        ctx.stroke();
        ctx.shadowBlur = 0;

        // hazards
        g.hazards.forEach(hz => {
          const pulse = 0.6 + 0.4 * Math.sin(performance.now() / 180 + hz.x);
          ctx.save();
          ctx.translate(hz.x, g.groundY);
          ctx.shadowColor = '#ff3366';
          ctx.shadowBlur = 18 * pulse;
          ctx.fillStyle = `rgba(255,51,102,${0.55 * pulse + 0.2})`;
          ctx.beginPath();
          const spikes = 7;
          for (let i = 0; i < spikes; i++) {
            const a = (i / spikes) * Math.PI * 2;
            const r = i % 2 === 0 ? hz.r : hz.r * 0.5;
            const px = Math.cos(a) * r;
            const py = Math.sin(a) * r * 0.5 - 4;
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
          ctx.closePath();
          ctx.fill();
          ctx.restore();
        });

        // target rings (bullseye)
        const tpulse = 0.85 + 0.15 * Math.sin(performance.now() / 260);
        [1, 0.65, 0.32].forEach((frac, idx) => {
          const colors = ['rgba(123,232,255,0.5)', 'rgba(124,255,178,0.65)', 'rgba(255,210,74,0.85)'];
          ctx.save();
          ctx.translate(g.targetX, g.groundY);
          ctx.scale(1, 0.34);
          ctx.beginPath();
          ctx.arc(0, 0, g.targetRadius * frac * tpulse, 0, Math.PI * 2);
          ctx.strokeStyle = colors[idx];
          ctx.lineWidth = 3;
          ctx.shadowColor = colors[idx];
          ctx.shadowBlur = 12;
          ctx.stroke();
          ctx.restore();
        });

        // anchor
        ctx.save();
        ctx.fillStyle = '#ffd24a';
        ctx.shadowColor = '#ffd24a';
        ctx.shadowBlur = 14;
        ctx.beginPath();
        ctx.arc(g.anchorX, g.anchorY, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // rope + orb (while still attached)
        if (!g.cut) {
          const theta = g.amplitude * Math.sin(g.omega * g.t + g.phase);
          const ox = g.anchorX + g.ropeLength * Math.sin(theta);
          const oy = g.anchorY + g.ropeLength * Math.cos(theta);
          ctx.save();
          ctx.strokeStyle = 'rgba(255,255,255,0.8)';
          ctx.lineWidth = 2.5;
          ctx.shadowColor = '#fff';
          ctx.shadowBlur = 6;
          ctx.beginPath();
          ctx.moveTo(g.anchorX, g.anchorY);
          ctx.lineTo(ox, oy);
          ctx.stroke();
          ctx.restore();

          drawOrb(ctx, ox, oy, '#ff4ad1');
          g.lastOrbPos = { x: ox, y: oy };
        } else if (g.orb && !g.settled) {
          // trail
          g.trail.forEach((tp, i) => {
            const alpha = (i / g.trail.length) * 0.5;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = '#ff4ad1';
            ctx.beginPath();
            ctx.arc(tp.x, tp.y, 6 * (i / g.trail.length), 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          });
          drawOrb(ctx, g.orb.x, g.orb.y, '#ff4ad1');
        } else if (g.settled && g.lastLandX != null) {
          drawOrb(ctx, g.lastLandX, g.groundY, g.lastHazard ? '#ff3366' : '#ff4ad1');
        }

        // particles
        g.particles.forEach(p => {
          ctx.save();
          ctx.globalAlpha = Math.max(0, 1 - p.age / p.life);
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });

        // timer ring around anchor
        if (!g.cut) {
          const frac = Math.max(0, g.timeLeft / g.maxTime);
          ctx.save();
          ctx.strokeStyle = frac < 0.25 ? '#ff3366' : '#00eaff';
          ctx.lineWidth = 4;
          ctx.shadowColor = ctx.strokeStyle;
          ctx.shadowBlur = 10;
          ctx.beginPath();
          ctx.arc(g.anchorX, g.anchorY, 18, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      ctx.restore();
    };

    raf = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(raf);
  }, [screen, spawnBurst, audio, showBanner, applyResult, loseLife]);

  // Banner auto-clear
  useEffect(() => {
    if (!banner) return;
    const id = setTimeout(() => setBanner(null), 750);
    return () => clearTimeout(id);
  }, [banner]);

  // High score tracking
  useEffect(() => {
    if (score > highScore) {
      setHighScore(score);
      saveHighScore(score);
    }
  }, [score, highScore]);

  function drawOrb(ctx, x, y, color) {
    ctx.save();
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 18);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.4, color);
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.shadowColor = color;
    ctx.shadowBlur = 22;
    ctx.beginPath();
    ctx.arc(x, y, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  return (
    <div className="app">
      <canvas ref={canvasRef} />

      {screen === 'playing' && (
        <div className="hud">
          <div className="hud-block">
            <span className="hud-label">Score</span>
            <span className="hud-value">{score}</span>
            <span className="hud-combo">x{combo} combo</span>
          </div>
          <div className="hud-block" style={{ alignItems: 'flex-end' }}>
            <span className="hud-label">Best {highScore}</span>
            <div className="lives">
              {Array.from({ length: MAX_LIVES }).map((_, i) => (
                <div key={i} className={'life-dot' + (i < lives ? '' : ' lost')} />
              ))}
            </div>
            <span className="hud-label">Round {round}</span>
          </div>
        </div>
      )}

      {banner && (
        <div className="flash-banner" style={{ color: banner.color }} key={banner.key}>
          {banner.text}
        </div>
      )}

      {screen === 'playing' && (
        <div className="how-to">Tap / click / space to cut the rope</div>
      )}

      {screen === 'start' && (
        <div className="overlay">
          <h1 className="title">CUT LOOSE</h1>
          <p className="subtitle">Time the cut. Release the orb mid-swing and land it dead center in the glowing ring. Chain perfect drops for massive combo multipliers — but don't let the timer or the spikes get you.</p>
          <button className="btn" onClick={startGame}>START</button>
          <div className="how-to" style={{ position: 'static', marginTop: 22 }}>Click / Tap / Space to cut the rope</div>
        </div>
      )}

      {screen === 'gameover' && (
        <div className="overlay">
          <h1 className="title" style={{ fontSize: 'clamp(28px,7vw,52px)' }}>ROPE SNAPPED</h1>
          <div className="stat-row">
            <div className="stat">
              <span className="stat-num">{score}</span>
              <span className="stat-name">Score</span>
            </div>
            <div className="stat">
              <span className="stat-num">{highScore}</span>
              <span className="stat-name">Best</span>
            </div>
            <div className="stat">
              <span className="stat-num">{round - 1}</span>
              <span className="stat-name">Rounds</span>
            </div>
          </div>
          <button className="btn" onClick={startGame}>RETRY</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<CutLoose />, document.getElementById('root'));
</script>
</body>
</html>
