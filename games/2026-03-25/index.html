<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Smash</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0010;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      user-select: none;
      -webkit-user-select: none;
    }
    #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Audio ───────────────────────────────────────────────────────────────
    function createAudioCtx() {
      try { return new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
    }
    function playHit(ctx, freq = 440) {
      if (!ctx) return;
      try {
        const g = ctx.createGain();
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.setValueAtTime(freq, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(freq * 1.5, ctx.currentTime + 0.08);
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + 0.2);
      } catch(e) {}
    }
    function playMiss(ctx) {
      if (!ctx) return;
      try {
        const g = ctx.createGain();
        const o = ctx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(120, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.2);
        g.gain.setValueAtTime(0.25, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + 0.25);
      } catch(e) {}
    }
    function playCombo(ctx, mult) {
      if (!ctx) return;
      try {
        const freqs = [523, 659, 784, 1047];
        const f = freqs[Math.min(mult - 1, 3)];
        const g = ctx.createGain();
        const o = ctx.createOscillator();
        o.type = 'square';
        o.frequency.setValueAtTime(f, ctx.currentTime);
        g.gain.setValueAtTime(0.15, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        o.connect(g); g.connect(ctx.destination);
        o.start(); o.stop(ctx.currentTime + 0.15);
      } catch(e) {}
    }

    // ─── Particles ───────────────────────────────────────────────────────────
    let particleId = 0;
    function spawnParticles(x, y, color, count = 12) {
      const ps = [];
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
        const speed = 60 + Math.random() * 80;
        ps.push({
          id: particleId++, x, y, color,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1, size: 4 + Math.random() * 5
        });
      }
      return ps;
    }

    // ─── Constants ───────────────────────────────────────────────────────────
    const COLS = 4;
    const ROWS = 3;
    const TOTAL = COLS * ROWS; // 12 holes

    const GOOD_COLORS = [
      { bg: '#00ffff', glow: '#00ffff', label: 'cyan' },
      { bg: '#00ff88', glow: '#00ff88', label: 'green' },
      { bg: '#ffff00', glow: '#ffff00', label: 'yellow' },
    ];
    const BAD_COLOR = { bg: '#ff2255', glow: '#ff2255', label: 'bomb' };

    function randomGoodColor() {
      return GOOD_COLORS[Math.floor(Math.random() * GOOD_COLORS.length)];
    }

    // ─── Main Game ────────────────────────────────────────────────────────────
    const NeonSmash = () => {
      const [phase, setPhase] = useState('idle'); // idle | playing | dead
      const [score, setScore] = useState(0);
      const [hiScore, setHiScore] = useState(() => {
        try { return parseInt(localStorage.getItem('neonSmashHighScore') || '0'); } catch { return 0; }
      });
      const [lives, setLives] = useState(3);
      const [combo, setCombo] = useState(0);
      const [comboDisplay, setComboDisplay] = useState(null);
      const [slots, setSlots] = useState(() => Array(TOTAL).fill(null));
      const [particles, setParticles] = useState([]);
      const [scorePopups, setScorePopups] = useState([]);
      const [bgHue, setBgHue] = useState(270);
      const [shake, setShake] = useState(false);

      const audioRef = useRef(null);
      const gameRef = useRef({ phase: 'idle', score: 0, lives: 3, combo: 0, speed: 1 });
      const timersRef = useRef({});
      const rafRef = useRef(null);
      const lastParticleRef = useRef(null);
      const popupIdRef = useRef(0);

      const containerRef = useRef(null);

      // bg pulse
      useEffect(() => {
        let h = 270;
        const iv = setInterval(() => {
          h = (h + 0.3) % 360;
          setBgHue(h);
        }, 50);
        return () => clearInterval(iv);
      }, []);

      // particle animation
      useEffect(() => {
        let last = performance.now();
        function loop(now) {
          const dt = Math.min((now - last) / 1000, 0.05);
          last = now;
          setParticles(prev => {
            if (!prev.length) return prev;
            return prev
              .map(p => ({
                ...p,
                x: p.x + p.vx * dt,
                y: p.y + p.vy * dt,
                vy: p.vy + 200 * dt,
                life: p.life - dt * 2.2
              }))
              .filter(p => p.life > 0);
          });
          rafRef.current = requestAnimationFrame(loop);
        }
        rafRef.current = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(rafRef.current);
      }, []);

      const getAudio = useCallback(() => {
        if (!audioRef.current) audioRef.current = createAudioCtx();
        return audioRef.current;
      }, []);

      const clearAllTimers = useCallback(() => {
        Object.values(timersRef.current).forEach(t => clearTimeout(t));
        timersRef.current = {};
      }, []);

      const triggerShake = useCallback(() => {
        setShake(true);
        setTimeout(() => setShake(false), 400);
      }, []);

      // Schedule a slot to pop up
      const scheduleSlot = useCallback((idx) => {
        if (gameRef.current.phase !== 'playing') return;
        const speed = gameRef.current.speed;
        // delay before popup: 300-900ms scaled
        const delay = (300 + Math.random() * 600) / speed;
        timersRef.current[`pop_${idx}`] = setTimeout(() => {
          if (gameRef.current.phase !== 'playing') return;
          const isBomb = Math.random() < 0.22 + (speed - 1) * 0.04;
          const color = isBomb ? BAD_COLOR : randomGoodColor();
          // how long it stays up: 1800-2800ms scaled down by speed
          const stayDur = Math.max(600, (1800 + Math.random() * 1000) / speed);

          setSlots(prev => {
            const n = [...prev];
            n[idx] = { color, isBomb, progress: 0, dur: stayDur, startTime: Date.now() };
            return n;
          });

          // auto-disappear
          timersRef.current[`hide_${idx}`] = setTimeout(() => {
            if (gameRef.current.phase !== 'playing') return;
            setSlots(prev => {
              if (!prev[idx]) return prev;
              const n = [...prev];
              n[idx] = null;
              return n;
            });
            // reset combo if missed a good one? No penalty for missing, just no combo.
            // reschedule
            scheduleSlot(idx);
          }, stayDur);
        }, delay);
      }, []);

      // update timers progress
      useEffect(() => {
        if (phase !== 'playing') return;
        const iv = setInterval(() => {
          const now = Date.now();
          setSlots(prev => prev.map(s => {
            if (!s) return s;
            const elapsed = now - s.startTime;
            return { ...s, progress: Math.min(elapsed / s.dur, 1) };
          }));
          // gradually increase speed
          gameRef.current.speed = 1 + Math.min(gameRef.current.score / 500, 3);
        }, 50);
        return () => clearInterval(iv);
      }, [phase]);

      const startGame = useCallback(() => {
        clearAllTimers();
        setSlots(Array(TOTAL).fill(null));
        setParticles([]);
        setScorePopups([]);
        setScore(0);
        setLives(3);
        setCombo(0);
        setComboDisplay(null);
        gameRef.current = { phase: 'playing', score: 0, lives: 3, combo: 0, speed: 1 };
        setPhase('playing');
        getAudio(); // unlock audio
        // stagger initial popups
        for (let i = 0; i < TOTAL; i++) {
          scheduleSlot(i);
        }
      }, [clearAllTimers, scheduleSlot, getAudio]);

      const endGame = useCallback((finalScore) => {
        gameRef.current.phase = 'dead';
        clearAllTimers();
        setPhase('dead');
        setSlots(Array(TOTAL).fill(null));
        setHiScore(prev => {
          const best = Math.max(prev, finalScore);
          try { localStorage.setItem('neonSmashHighScore', String(best)); } catch {}
          return best;
        });
      }, [clearAllTimers]);

      const addPopup = useCallback((text, x, y, color) => {
        const id = popupIdRef.current++;
        setScorePopups(prev => [...prev, { id, text, x, y, color }]);
        setTimeout(() => setScorePopups(prev => prev.filter(p => p.id !== id)), 900);
      }, []);

      const hitSlot = useCallback((idx, slotData, event) => {
        if (gameRef.current.phase !== 'playing') return;
        if (!slotData) return;

        // clear hide timer so it doesn't double-schedule
        clearTimeout(timersRef.current[`hide_${idx}`]);
        delete timersRef.current[`hide_${idx}`];

        setSlots(prev => {
          const n = [...prev];
          n[idx] = null;
          return n;
        });

        // get position for particles
        const rect = event.currentTarget.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;

        if (slotData.isBomb) {
          // hit a bomb — lose a life
          playMiss(getAudio());
          triggerShake();
          setParticles(prev => [...prev, ...spawnParticles(cx, cy, '#ff2255', 16)]);
          addPopup('-LIFE', cx, cy, '#ff2255');
          gameRef.current.combo = 0;
          setCombo(0);
          const newLives = gameRef.current.lives - 1;
          gameRef.current.lives = newLives;
          setLives(newLives);
          if (newLives <= 0) {
            endGame(gameRef.current.score);
          }
        } else {
          // good hit
          const newCombo = gameRef.current.combo + 1;
          gameRef.current.combo = newCombo;
          setCombo(newCombo);

          const mult = Math.min(Math.floor(newCombo / 3) + 1, 8);
          const pts = 10 * mult;
          const newScore = gameRef.current.score + pts;
          gameRef.current.score = newScore;
          setScore(newScore);
          try { localStorage.setItem('neonSmashHighScore', String(Math.max(newScore, parseInt(localStorage.getItem('neonSmashHighScore') || '0')))); } catch {}

          const freq = 440 + (newCombo * 40);
          playHit(getAudio(), Math.min(freq, 1200));
          if (newCombo % 3 === 0 && newCombo > 2) playCombo(getAudio(), mult);

          setParticles(prev => [...prev, ...spawnParticles(cx, cy, slotData.color.glow, 14)]);
          const popText = mult > 1 ? `+${pts} ×${mult}` : `+${pts}`;
          addPopup(popText, cx, cy, slotData.color.glow);

          if (newCombo >= 3) {
            setComboDisplay({ text: `COMBO ×${mult}`, color: slotData.color.glow });
            clearTimeout(timersRef.current['comboDisplay']);
            timersRef.current['comboDisplay'] = setTimeout(() => setComboDisplay(null), 800);
          }
        }

        // reschedule this slot
        scheduleSlot(idx);
      }, [getAudio, triggerShake, endGame, scheduleSlot, addPopup]);

      // Layout: calculate cell size
      const cellSize = Math.min(
        Math.floor((Math.min(window.innerWidth, 520) - 40) / COLS),
        Math.floor((window.innerHeight * 0.52) / ROWS)
      );
      const gap = Math.floor(cellSize * 0.2);
      const holeDiam = Math.floor(cellSize * 0.72);

      // Background gradient
      const bgStyle = {
        width: '100vw', height: '100vh',
        background: `radial-gradient(ellipse at 50% 40%, hsl(${bgHue},80%,8%) 0%, hsl(${(bgHue+60)%360},70%,4%) 60%, #000 100%)`,
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        position: 'relative', overflow: 'hidden',
        transform: shake ? 'translate(4px,3px)' : 'none',
        transition: shake ? 'none' : 'transform 0.1s'
      };

      const titleStyle = {
        fontSize: Math.max(28, Math.min(48, window.innerWidth * 0.1)),
        fontWeight: 900, letterSpacing: 4,
        color: '#fff',
        textShadow: `0 0 20px #00ffff, 0 0 40px #ff00ff, 0 0 80px #00ffff`,
        marginBottom: 8
      };

      return (
        <div style={bgStyle} id="game-container">
          {/* Particles */}
          {particles.map(p => (
            <div key={p.id} style={{
              position: 'fixed', left: p.x - p.size/2, top: p.y - p.size/2,
              width: p.size, height: p.size, borderRadius: '50%',
              background: p.color, opacity: p.life,
              boxShadow: `0 0 ${p.size*2}px ${p.color}`,
              pointerEvents: 'none', zIndex: 50
            }} />
          ))}

          {/* Score popups */}
          {scorePopups.map(p => (
            <div key={p.id} style={{
              position: 'fixed', left: p.x, top: p.y - 20,
              transform: 'translate(-50%,-50%)',
              color: p.color, fontSize: 22, fontWeight: 900,
              textShadow: `0 0 12px ${p.color}`,
              pointerEvents: 'none', zIndex: 60,
              animation: 'floatUp 0.9s ease-out forwards'
            }}>{p.text}</div>
          ))}

          <style>{`
            @keyframes floatUp { 0%{opacity:1;transform:translate(-50%,-50%)} 100%{opacity:0;transform:translate(-50%,-120%)} }
            @keyframes popIn { 0%{transform:scale(0.3);opacity:0} 60%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
            @keyframes shakeIn { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
            @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:1} }
            @keyframes timerArc { from{stroke-dashoffset:0} to{stroke-dashoffset:157} }
            .hole-btn { cursor: pointer; border: none; background: none; padding: 0; outline: none; }
            .hole-btn:focus { outline: none; }
          `}</style>

          {/* IDLE screen */}
          {phase === 'idle' && (
            <div style={{ textAlign: 'center', padding: 24 }}>
              <div style={titleStyle}>NEON SMASH</div>
              <div style={{ color: '#aaa', fontSize: 16, marginBottom: 20, lineHeight: 1.6 }}>
                Smash the <span style={{color:'#00ffff',textShadow:'0 0 8px #00ffff'}}>cyan</span>,{' '}
                <span style={{color:'#00ff88',textShadow:'0 0 8px #00ff88'}}>green</span> &{' '}
                <span style={{color:'#ffff00',textShadow:'0 0 8px #ffff00'}}>yellow</span> targets!<br/>
                Avoid the <span style={{color:'#ff2255',textShadow:'0 0 8px #ff2255'}}>red bombs</span> — 3 lives!<br/>
                Chain hits for COMBO multipliers!
              </div>
              {hiScore > 0 && <div style={{ color: '#ff88ff', fontSize: 18, marginBottom: 16, textShadow: '0 0 10px #ff00ff' }}>BEST: {hiScore}</div>}
              <button onClick={startGame} style={{
                padding: '14px 48px', fontSize: 22, fontWeight: 900, borderRadius: 12,
                background: 'linear-gradient(135deg,#00ffff,#ff00ff)',
                border: 'none', cursor: 'pointer', color: '#000',
                boxShadow: '0 0 30px #00ffff, 0 0 60px #ff00ff',
                letterSpacing: 2
              }}>PLAY</button>
            </div>
          )}

          {/* PLAYING screen */}
          {phase === 'playing' && (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
              {/* HUD */}
              <div style={{ display: 'flex', gap: 24, alignItems: 'center', marginBottom: 4 }}>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ color: '#888', fontSize: 11, letterSpacing: 2 }}>SCORE</div>
                  <div style={{ color: '#00ffff', fontSize: 28, fontWeight: 900, textShadow: '0 0 12px #00ffff' }}>{score}</div>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ color: '#888', fontSize: 11, letterSpacing: 2 }}>BEST</div>
                  <div style={{ color: '#ff88ff', fontSize: 20, fontWeight: 700 }}>{Math.max(hiScore, score)}</div>
                </div>
                <div style={{ textAlign: 'center' }}>
                  <div style={{ color: '#888', fontSize: 11, letterSpacing: 2 }}>LIVES</div>
                  <div style={{ fontSize: 20 }}>
                    {Array(3).fill(0).map((_, i) => (
                      <span key={i} style={{ color: i < lives ? '#ff4488' : '#333', textShadow: i < lives ? '0 0 8px #ff0055' : 'none' }}>♥ </span>
                    ))}
                  </div>
                </div>
                {combo >= 3 && (
                  <div style={{ textAlign: 'center' }}>
                    <div style={{ color: '#888', fontSize: 11, letterSpacing: 2 }}>COMBO</div>
                    <div style={{ color: '#ffff00', fontSize: 22, fontWeight: 900, textShadow: '0 0 12px #ffff00' }}>×{Math.min(Math.floor(combo/3)+1,8)}</div>
                  </div>
                )}
              </div>

              {/* Combo flash */}
              {comboDisplay && (
                <div style={{
                  position: 'fixed', top: '18%', left: '50%', transform: 'translateX(-50%)',
                  color: comboDisplay.color, fontSize: 36, fontWeight: 900,
                  textShadow: `0 0 20px ${comboDisplay.color}, 0 0 40px ${comboDisplay.color}`,
                  pointerEvents: 'none', zIndex: 55,
                  animation: 'popIn 0.3s ease-out'
                }}>{comboDisplay.text}</div>
              )}

              {/* Grid */}
              <div ref={containerRef} style={{
                display: 'grid',
                gridTemplateColumns: `repeat(${COLS}, ${cellSize}px)`,
                gap: `${gap}px`,
                padding: `${gap}px`,
                background: 'rgba(255,255,255,0.03)',
                borderRadius: 20,
                border: '1px solid rgba(255,255,255,0.06)',
                boxShadow: '0 0 40px rgba(0,255,255,0.08)'
              }}>
                {slots.map((slot, idx) => (
                  <HoleCell
                    key={idx}
                    idx={idx}
                    slot={slot}
                    holeDiam={holeDiam}
                    cellSize={cellSize}
                    onHit={hitSlot}
                  />
                ))}
              </div>

              <div style={{ color: '#444', fontSize: 12, marginTop: 4, letterSpacing: 1 }}>
                SPEED ×{gameRef.current.speed.toFixed(1)}
              </div>
            </div>
          )}

          {/* DEAD screen */}
          {phase === 'dead' && (
            <div style={{ textAlign: 'center', padding: 24 }}>
              <div style={{ color: '#ff2255', fontSize: 36, fontWeight: 900, textShadow: '0 0 20px #ff2255', marginBottom: 8 }}>GAME OVER</div>
              <div style={{ color: '#00ffff', fontSize: 52, fontWeight: 900, textShadow: '0 0 20px #00ffff', marginBottom: 4 }}>{score}</div>
              {score >= hiScore && score > 0 && (
                <div style={{ color: '#ffff00', fontSize: 20, textShadow: '0 0 12px #ffff00', marginBottom: 8, animation: 'pulse 1s infinite' }}>NEW BEST!</div>
              )}
              {score < hiScore && <div style={{ color: '#ff88ff', fontSize: 16, marginBottom: 16 }}>BEST: {hiScore}</div>}
              <button onClick={startGame} style={{
                marginTop: 20, padding: '14px 48px', fontSize: 22, fontWeight: 900, borderRadius: 12,
                background: 'linear-gradient(135deg,#00ffff,#ff00ff)',
                border: 'none', cursor: 'pointer', color: '#000',
                boxShadow: '0 0 30px #00ffff', letterSpacing: 2
              }}>RETRY</button>
            </div>
          )}
        </div>
      );
    };

    // ─── Hole Cell Component ──────────────────────────────────────────────────
    const HoleCell = React.memo(({ idx, slot, holeDiam, cellSize, onHit }) => {
      const isUp = !!slot;
      const color = slot ? slot.color : null;
      const progress = slot ? slot.progress : 0;

      // SVG timer arc
      const r = holeDiam / 2 - 4;
      const circ = 2 * Math.PI * r;
      const offset = circ * progress;

      const handleClick = (e) => {
        e.stopPropagation();
        if (slot) onHit(idx, slot, e);
      };

      return (
        <div style={{ width: cellSize, height: cellSize, display: 'flex', alignItems: 'center', justifyContent: 'center', position: 'relative' }}>
          {/* hole bg */}
          <div style={{
            width: holeDiam, height: holeDiam, borderRadius: '50%',
            background: 'radial-gradient(circle, #0a0a1a 60%, #050510 100%)',
            border: '2px solid rgba(255,255,255,0.08)',
            boxShadow: 'inset 0 4px 12px rgba(0,0,0,0.8)',
            position: 'absolute'
          }} />

          {/* target */}
          {isUp && (
            <button
              className="hole-btn"
              onPointerDown={handleClick}
              style={{
                width: holeDiam * 0.82,
                height: holeDiam * 0.82,
                borderRadius: '50%',
                background: `radial-gradient(circle at 35% 35%, ${color.bg}dd, ${color.bg}88 60%, ${color.bg}44)`,
                boxShadow: `0 0 ${12 + progress * 8}px ${color.glow}, 0 0 ${24 + progress * 16}px ${color.glow}44, inset 0 2px 6px rgba(255,255,255,0.3)`,
                position: 'absolute',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                animation: 'popIn 0.15s ease-out',
                zIndex: 2
              }}
            >
              {slot.isBomb && (
                <span style={{ fontSize: holeDiam * 0.36, filter: 'drop-shadow(0 0 6px #ff0000)' }}>💣</span>
              )}
            </button>
          )}

          {/* countdown ring */}
          {isUp && (
            <svg
              style={{ position: 'absolute', pointerEvents: 'none', zIndex: 3 }}
              width={holeDiam} height={holeDiam}
              viewBox={`0 0 ${holeDiam} ${holeDiam}`}
            >
              <circle
                cx={holeDiam/2} cy={holeDiam/2} r={r}
                fill="none"
                stroke={slot.isBomb ? '#ff4400' : color.glow}
                strokeWidth={3}
                strokeDasharray={circ}
                strokeDashoffset={offset}
                strokeLinecap="round"
                transform={`rotate(-90 ${holeDiam/2} ${holeDiam/2})`}
                opacity={0.85}
              />
            </svg>
          )}
        </div>
      );
    });

    ReactDOM.render(<NeonSmash />, document.getElementById('root'));
  </script>
</body>
</html>
