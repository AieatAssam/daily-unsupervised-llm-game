<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Cleave</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050010; overflow: hidden; }
    #root { width: 100vw; height: 100vh; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef } = React;

    const HS_KEY = 'neonCleave-highScore';
    try { if (!localStorage.getItem(HS_KEY)) localStorage.setItem(HS_KEY, '0'); } catch(e) {}

    const COLORS = ['#00ffff','#ff00ff','#ffcc00','#00ff88','#ff6600','#aa44ff'];
    const SHAPE_TYPES = ['circle','hexagon','triangle','pentagon','square'];
    const GAME_DURATION = 90;

    function ptLineDist(px, py, x1, y1, x2, y2) {
      const A = y2 - y1, B = x1 - x2, C = x2 * y1 - x1 * y2;
      return Math.abs(A * px + B * py + C) / Math.sqrt(A * A + B * B + 1e-9);
    }

    function lineHitsCircle(x1, y1, x2, y2, cx, cy, r) {
      if (ptLineDist(cx, cy, x1, y1, x2, y2) > r) return false;
      const dx = x2 - x1, dy = y2 - y1;
      const len2 = dx * dx + dy * dy;
      if (len2 < 1) return false;
      const t = ((cx - x1) * dx + (cy - y1) * dy) / len2;
      return t >= -0.25 && t <= 1.25;
    }

    function drawShape(ctx, x, y, r, type, color, rot, alpha) {
      ctx.save();
      ctx.globalAlpha = alpha == null ? 1 : alpha;
      ctx.translate(x, y);
      ctx.rotate(rot);
      ctx.shadowColor = color;
      ctx.shadowBlur = 20;
      ctx.beginPath();
      if (type === 'circle') {
        ctx.arc(0, 0, r, 0, Math.PI * 2);
      } else {
        const n = type === 'triangle' ? 3 : type === 'square' ? 4 : type === 'pentagon' ? 5 : 6;
        const off = (type === 'triangle' || type === 'pentagon') ? -Math.PI / 2 : 0;
        for (let i = 0; i < n; i++) {
          const a = off + (i / n) * Math.PI * 2;
          i === 0 ? ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r) : ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
        }
        ctx.closePath();
      }
      ctx.fillStyle = color + '28';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 3;
      ctx.stroke();
      ctx.restore();
    }

    function playFX(ac, type) {
      if (!ac) return;
      try {
        const t = ac.currentTime;
        const note = (freq, start, dur, vol, wave) => {
          const o = ac.createOscillator(), g = ac.createGain();
          o.connect(g); g.connect(ac.destination);
          o.type = wave || 'sine'; o.frequency.value = freq;
          g.gain.setValueAtTime(vol || 0.25, t + start);
          g.gain.exponentialRampToValueAtTime(0.001, t + start + dur);
          o.start(t + start); o.stop(t + start + dur);
        };
        if (type === 'perfect') { note(440,0,0.08); note(660,0.07,0.09); note(880,0.14,0.18); }
        else if (type === 'great') { note(330,0,0.08); note(550,0.08,0.15); }
        else if (type === 'good') { note(220,0,0.15,0.2,'triangle'); }
        else if (type === 'miss') { note(160,0,0.22,0.15,'sawtooth'); }
        else if (type === 'combo') { note(880,0,0.06,0.3); note(1100,0.06,0.12,0.25); }
        else if (type === 'start') { note(440,0,0.1); note(554,0.1,0.1); note(660,0.2,0.18); }
        else if (type === 'tick') { note(300,0,0.05,0.1,'square'); }
      } catch(e) {}
    }

    function Game() {
      const cvs = useRef(null);
      const g = useRef({
        phase: 'title',
        score: 0,
        highScore: parseInt(localStorage.getItem(HS_KEY) || '0'),
        combo: 0,
        timeLeft: GAME_DURATION,
        shapes: [], frags: [], parts: [], texts: [],
        drag: null,
        spawnTimer: 0, spawnInt: 2.0, level: 1,
        bgT: 0,
        lastTickSec: GAME_DURATION,
      });
      const acRef = useRef(null);
      const raf = useRef(null);

      function getAC() {
        if (!acRef.current) {
          try { acRef.current = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
        }
        if (acRef.current && acRef.current.state === 'suspended') acRef.current.resume().catch(()=>{});
        return acRef.current;
      }

      function spawnShape(W, H) {
        const s = g.current;
        const r = 38 + Math.random() * 28;
        const type = SHAPE_TYPES[Math.floor(Math.random() * SHAPE_TYPES.length)];
        const isGold = Math.random() < 0.14;
        const color = isGold ? '#ffcc00' : COLORS[Math.floor(Math.random() * COLORS.length)];
        const speed = 42 + s.level * 9;
        const side = Math.floor(Math.random() * 4);
        let x, y;
        if (side === 0) { x = r + Math.random() * (W - 2*r); y = -r; }
        else if (side === 1) { x = W + r; y = r + Math.random() * (H - 2*r); }
        else if (side === 2) { x = r + Math.random() * (W - 2*r); y = H + r; }
        else { x = -r; y = r + Math.random() * (H - 2*r); }
        const tx = W * (0.2 + Math.random() * 0.6);
        const ty = H * (0.2 + Math.random() * 0.6);
        const d = Math.sqrt((tx-x)**2 + (ty-y)**2) || 1;
        return {
          id: Math.random(), x, y,
          vx: ((tx-x)/d)*speed, vy: ((ty-y)/d)*speed,
          r, type, color, isGold,
          rot: Math.random() * Math.PI * 2,
          rotV: (Math.random()-0.5) * 2,
          age: 0,
        };
      }

      function addParts(x, y, color, n) {
        const s = g.current;
        for (let i = 0; i < n; i++) {
          const a = (i/n)*Math.PI*2 + Math.random()*0.6;
          const sp = 65 + Math.random()*110;
          s.parts.push({x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, decay:1.2+Math.random()*0.8, color, sz:2+Math.random()*3});
        }
      }

      function addLineParts(x1,y1,x2,y2,color,n) {
        const s = g.current;
        for (let i = 0; i < n; i++) {
          const t = i/n;
          const px = x1+(x2-x1)*t + (Math.random()-0.5)*14;
          const py = y1+(y2-y1)*t + (Math.random()-0.5)*14;
          const a = Math.random()*Math.PI*2;
          const sp = 28 + Math.random()*75;
          s.parts.push({x:px,y:py, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1, decay:1.8+Math.random()*1.2, color, sz:1+Math.random()*2.5});
        }
      }

      function addText(x, y, text, color) {
        g.current.texts.push({x,y,text,color,life:1});
      }

      function doSlice(x1,y1,x2,y2) {
        const s = g.current;
        const dx=x2-x1, dy=y2-y1;
        const len=Math.sqrt(dx*dx+dy*dy);
        if (len < 22) return;
        const px=-dy/len, py=dx/len;
        s.shapes.forEach(sh => {
          if (!lineHitsCircle(x1,y1,x2,y2,sh.x,sh.y,sh.r)) return;
          const dist = ptLineDist(sh.x, sh.y, x1, y1, x2, y2);
          const acc = 1 - Math.min(1, dist / (sh.r * 0.85));
          let grade, base, pc;
          if (acc > 0.82)       { grade='PERFECT!'; base=200; pc='#ffcc00'; }
          else if (acc > 0.60)  { grade='GREAT';    base=100; pc='#00ffff'; }
          else if (acc > 0.35)  { grade='GOOD';     base=50;  pc='#00ff88'; }
          else                  { grade='MISS';      base=10;  pc='#ff4466'; }
          if (grade !== 'MISS') s.combo++; else s.combo = 0;
          const mul = grade !== 'MISS' ? Math.min(s.combo, 8) : 1;
          const pts = base * (sh.isGold ? 2 : 1) * mul;
          s.score += pts;
          const snd = grade==='PERFECT!'?'perfect':grade==='GREAT'?'great':grade==='MISS'?'miss':'good';
          if (s.combo >= 5) playFX(getAC(),'combo'); else playFX(getAC(),snd);
          addLineParts(x1,y1,x2,y2,pc,22);
          addParts(sh.x,sh.y,sh.color,grade==='PERFECT!'?18:9);
          const ct = s.combo>=3?` ×${s.combo}`:'';
          addText(sh.x, sh.y-32, `${grade} +${pts}${ct}`, pc);
          // Two ghost fragments fly apart
          s.frags.push({...sh, vx:sh.vx+px*95, vy:sh.vy+py*95, rotV:sh.rotV+2.5, life:1, decay:2.2});
          s.frags.push({...sh, vx:sh.vx-px*95, vy:sh.vy-py*95, rotV:sh.rotV-2.5, life:1, decay:2.2});
          sh._dead = true;
        });
        g.current.shapes = g.current.shapes.filter(sh => !sh._dead);
      }

      useEffect(() => {
        const canvas = cvs.current;
        if (!canvas) return;
        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        resize();
        window.addEventListener('resize', resize);

        function drawBG(ctx, W, H, bt) {
          const h1 = (bt * 28) % 360;
          const gr = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.9);
          gr.addColorStop(0, `hsl(${h1},70%,8%)`);
          gr.addColorStop(0.55, `hsl(${(h1+70)%360},50%,4%)`);
          gr.addColorStop(1, `hsl(${(h1+140)%360},70%,2%)`);
          ctx.fillStyle = gr; ctx.fillRect(0,0,W,H);
        }

        function drawHUD(ctx, W, H, s) {
          ctx.save();
          ctx.font='bold 30px monospace'; ctx.textAlign='left';
          ctx.fillStyle='#00ffff'; ctx.shadowColor='#00ffff'; ctx.shadowBlur=22;
          ctx.fillText(String(s.score), 20, 44);
          ctx.font='14px monospace'; ctx.fillStyle='#ffffff55'; ctx.shadowBlur=0;
          ctx.fillText(`BEST: ${s.highScore}`, 20, 64);
          const tc = s.timeLeft<=10?'#ff4466':'#ffcc00';
          ctx.font='bold 30px monospace'; ctx.textAlign='right';
          ctx.fillStyle=tc; ctx.shadowColor=tc; ctx.shadowBlur=22;
          ctx.fillText(`${Math.ceil(s.timeLeft)}s`, W-20, 44);
          if (s.combo >= 3) {
            ctx.font='bold 22px monospace'; ctx.textAlign='center';
            ctx.fillStyle='#ff00ff'; ctx.shadowColor='#ff00ff'; ctx.shadowBlur=22;
            ctx.fillText(`COMBO ×${s.combo}`, W/2, 50);
          }
          ctx.font='12px monospace'; ctx.fillStyle='#ffffff2a'; ctx.shadowBlur=0;
          ctx.fillText('Drag to CLEAVE shapes — aim for the CENTER!', W/2, H-12);
          ctx.restore();
        }

        let last = performance.now();

        function loop(now) {
          const dt = Math.min((now - last)/1000, 0.05); last = now;
          const s = g.current;
          const W = canvas.width, H = canvas.height;
          const ctx = canvas.getContext('2d');
          s.bgT += dt;
          drawBG(ctx, W, H, s.bgT);

          if (s.phase === 'playing') {
            s.timeLeft -= dt;
            // Countdown ticks for last 10s
            const cs = Math.ceil(s.timeLeft);
            if (cs <= 10 && cs < s.lastTickSec) { playFX(getAC(),'tick'); s.lastTickSec = cs; }
            if (s.timeLeft <= 0) {
              s.timeLeft = 0; s.phase = 'gameover';
              if (s.score > s.highScore) {
                s.highScore = s.score;
                try { localStorage.setItem(HS_KEY, String(s.score)); } catch(e) {}
              }
            }
            s.level = Math.floor((GAME_DURATION - s.timeLeft) / 18) + 1;
            s.spawnInt = Math.max(0.65, 2.0 - s.level * 0.13);
            s.spawnTimer -= dt;
            if (s.spawnTimer <= 0 && s.shapes.length < 4 + s.level) {
              s.shapes.push(spawnShape(W, H));
              s.spawnTimer = s.spawnInt * (0.7 + Math.random() * 0.6);
            }
            s.shapes.forEach(sh => { sh.x+=sh.vx*dt; sh.y+=sh.vy*dt; sh.rot+=sh.rotV*dt; sh.age+=dt; });
            const m=90; s.shapes = s.shapes.filter(sh=>sh.x>-m&&sh.x<W+m&&sh.y>-m&&sh.y<H+m);
            s.frags.forEach(f=>{ f.x+=f.vx*dt; f.y+=f.vy*dt; f.rot+=f.rotV*dt; f.life-=f.decay*dt; });
            s.frags = s.frags.filter(f=>f.life>0);
            s.parts.forEach(p=>{ p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=Math.pow(0.91,dt*60); p.vy*=Math.pow(0.91,dt*60); p.life-=p.decay*dt; });
            s.parts = s.parts.filter(p=>p.life>0);
            s.texts.forEach(t=>{ t.y-=52*dt; t.life-=1.4*dt; });
            s.texts = s.texts.filter(t=>t.life>0);
          }

          // Frags
          s.frags.forEach(f=>drawShape(ctx,f.x,f.y,f.r*(0.55+f.life*0.45),f.type,f.color,f.rot,f.life*0.7));

          // Shapes
          s.shapes.forEach(sh=>{
            const a=Math.min(1,sh.age*2.5);
            drawShape(ctx,sh.x,sh.y,sh.r,sh.type,sh.color,sh.rot,a);
            // Center dot hint
            if (a > 0.5) {
              ctx.save();
              ctx.globalAlpha=a*0.55;
              ctx.beginPath();
              ctx.arc(sh.x,sh.y,4,0,Math.PI*2);
              ctx.fillStyle=sh.color;
              ctx.shadowColor=sh.color; ctx.shadowBlur=8;
              ctx.fill();
              if (sh.isGold) {
                ctx.font='bold 15px monospace'; ctx.textAlign='center';
                ctx.fillStyle='#ffcc00'; ctx.shadowBlur=12;
                ctx.fillText('★',sh.x,sh.y+6);
              }
              ctx.restore();
            }
          });

          // Drag line
          if (s.drag && s.phase==='playing') {
            ctx.save();
            ctx.strokeStyle='#ffffffbb'; ctx.lineWidth=2.5;
            ctx.setLineDash([7,5]); ctx.shadowColor='#ffffff'; ctx.shadowBlur=10;
            ctx.beginPath();
            ctx.moveTo(s.drag.x1,s.drag.y1);
            ctx.lineTo(s.drag.x2,s.drag.y2);
            ctx.stroke();
            ctx.restore();
          }

          // Particles
          s.parts.forEach(p=>{
            ctx.save(); ctx.globalAlpha=p.life;
            ctx.fillStyle=p.color; ctx.shadowColor=p.color; ctx.shadowBlur=8;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.sz,0,Math.PI*2); ctx.fill();
            ctx.restore();
          });

          // Texts
          s.texts.forEach(t=>{
            ctx.save(); ctx.globalAlpha=t.life;
            ctx.font='bold 20px monospace'; ctx.textAlign='center';
            ctx.fillStyle=t.color; ctx.shadowColor=t.color; ctx.shadowBlur=16;
            ctx.fillText(t.text,t.x,t.y);
            ctx.restore();
          });

          if (s.phase==='playing'||s.phase==='gameover') drawHUD(ctx,W,H,s);

          // Title screen
          if (s.phase === 'title') {
            COLORS.forEach((c,i)=>{
              const sx=W*0.12+(i%3)*W*0.38+Math.sin(s.bgT*0.4+i*1.3)*25;
              const sy=H*0.2+Math.floor(i/3)*H*0.45+Math.cos(s.bgT*0.35+i)*18;
              drawShape(ctx,sx,sy,44,SHAPE_TYPES[i%SHAPE_TYPES.length],c,s.bgT*0.25+i,0.35);
            });
            ctx.save();
            ctx.textAlign='center';
            const h=(s.bgT*48)%360;
            ctx.font='bold 68px monospace';
            ctx.fillStyle=`hsl(${h},100%,68%)`; ctx.shadowColor=`hsl(${h},100%,68%)`; ctx.shadowBlur=35;
            ctx.fillText('NEON',W/2,H/2-82);
            ctx.fillStyle=`hsl(${(h+130)%360},100%,68%)`; ctx.shadowColor=`hsl(${(h+130)%360},100%,68%)`;
            ctx.fillText('CLEAVE',W/2,H/2-14);
            ctx.font='18px monospace'; ctx.fillStyle='#ffffffcc'; ctx.shadowBlur=8;
            ctx.fillText('Drag through shapes — hit the CENTER for PERFECT!',W/2,H/2+42);
            ctx.fillText('Gold ★ shapes are worth double points.',W/2,H/2+68);
            const p=0.55+0.45*Math.sin(s.bgT*3);
            ctx.globalAlpha=p;
            ctx.font='bold 24px monospace'; ctx.fillStyle='#00ffff'; ctx.shadowColor='#00ffff'; ctx.shadowBlur=22;
            ctx.fillText('Tap or Click to Start!',W/2,H/2+122);
            ctx.globalAlpha=0.75;
            ctx.font='17px monospace'; ctx.fillStyle='#ffcc00'; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=14;
            ctx.fillText(`BEST: ${s.highScore}`,W/2,H/2+162);
            ctx.restore();
          }

          // Game over overlay
          if (s.phase === 'gameover') {
            ctx.save();
            ctx.fillStyle='rgba(0,0,10,0.78)'; ctx.fillRect(0,0,W,H);
            ctx.textAlign='center';
            ctx.font='bold 52px monospace'; ctx.fillStyle='#ff4466'; ctx.shadowColor='#ff4466'; ctx.shadowBlur=32;
            ctx.fillText("TIME'S UP!",W/2,H/2-72);
            ctx.font='bold 36px monospace'; ctx.fillStyle='#00ffff'; ctx.shadowColor='#00ffff'; ctx.shadowBlur=22;
            ctx.fillText(`Score: ${s.score}`,W/2,H/2-18);
            if (s.score >= s.highScore && s.score > 0) {
              ctx.font='bold 25px monospace'; ctx.fillStyle='#ffcc00'; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=18;
              ctx.fillText('✦ NEW BEST! ✦',W/2,H/2+28);
            } else {
              ctx.font='19px monospace'; ctx.fillStyle='#ffffff66'; ctx.shadowBlur=0;
              ctx.fillText(`Best: ${s.highScore}`,W/2,H/2+28);
            }
            const p=0.55+0.45*Math.sin(s.bgT*3);
            ctx.globalAlpha=p;
            ctx.font='bold 22px monospace'; ctx.fillStyle='#ffffff'; ctx.shadowColor='#ffffff'; ctx.shadowBlur=14;
            ctx.fillText('Click to Play Again!',W/2,H/2+86);
            ctx.restore();
          }

          raf.current = requestAnimationFrame(loop);
        }

        raf.current = requestAnimationFrame(loop);
        return () => {
          cancelAnimationFrame(raf.current);
          window.removeEventListener('resize', resize);
        };
      }, []);

      useEffect(() => {
        const canvas = cvs.current;
        if (!canvas) return;
        function pos(e) {
          const r=canvas.getBoundingClientRect();
          const src=e.touches?e.touches[0]:e;
          return {x:src.clientX-r.left, y:src.clientY-r.top};
        }
        function reset() {
          const s=g.current;
          Object.assign(s,{
            phase:'playing', score:0, combo:0,
            timeLeft:GAME_DURATION, shapes:[], frags:[], parts:[], texts:[],
            spawnTimer:0, level:1, lastTickSec:GAME_DURATION,
          });
          playFX(getAC(),'start');
        }
        function onDown(e) {
          e.preventDefault(); getAC();
          const s=g.current;
          if (s.phase==='title'||s.phase==='gameover') { reset(); return; }
          if (s.phase==='playing') {
            const p=pos(e);
            s.drag={x1:p.x,y1:p.y,x2:p.x,y2:p.y};
          }
        }
        function onMove(e) {
          e.preventDefault();
          const s=g.current;
          if (s.drag&&s.phase==='playing') {
            const p=pos(e); s.drag.x2=p.x; s.drag.y2=p.y;
          }
        }
        function onUp(e) {
          e.preventDefault();
          const s=g.current;
          if (s.drag&&s.phase==='playing') {
            doSlice(s.drag.x1,s.drag.y1,s.drag.x2,s.drag.y2);
            s.drag=null;
          }
        }
        canvas.addEventListener('mousedown',onDown);
        canvas.addEventListener('mousemove',onMove);
        canvas.addEventListener('mouseup',onUp);
        canvas.addEventListener('touchstart',onDown,{passive:false});
        canvas.addEventListener('touchmove',onMove,{passive:false});
        canvas.addEventListener('touchend',onUp,{passive:false});
        return ()=>{
          canvas.removeEventListener('mousedown',onDown);
          canvas.removeEventListener('mousemove',onMove);
          canvas.removeEventListener('mouseup',onUp);
          canvas.removeEventListener('touchstart',onDown);
          canvas.removeEventListener('touchmove',onMove);
          canvas.removeEventListener('touchend',onUp);
        };
      }, []);

      return <canvas ref={cvs} style={{display:'block',cursor:'crosshair'}} />;
    }

    ReactDOM.render(<Game />, document.getElementById('root'));
  </script>
</body>
</html>
