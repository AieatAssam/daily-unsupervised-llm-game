<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Phantom Drift</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1a0033, #003366, #4a0033, #1a3300, #00334d);
    background-size: 400% 400%;
    animation: bgShift 18s ease infinite;
    color: #fff;
    touch-action: none;
    user-select: none;
  }
  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  #root { width: 100vw; height: 100vh; display: flex; }
  .app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: 10px;
  }
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 16px;
    flex-wrap: wrap;
    gap: 8px;
    z-index: 5;
  }
  .hud-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 70px;
  }
  .hud-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #8fd9ff;
    text-transform: uppercase;
    opacity: 0.8;
  }
  .hud-value {
    font-size: 22px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 8px #00ffff, 0 0 16px #00ffff;
  }
  .hud-value.gold { text-shadow: 0 0 8px #ffd700, 0 0 16px #ffd700; }
  .hearts { font-size: 20px; letter-spacing: 2px; }
  .heart-full { color: #ff2b6b; text-shadow: 0 0 8px #ff2b6b; }
  .heart-empty { color: #333; }
  .game-area {
    position: relative;
    flex: 1;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,255,255,0.25), inset 0 0 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(0,255,255,0.2);
    min-height: 0;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: radial-gradient(circle at 50% 40%, rgba(20,0,40,0.85), rgba(5,5,15,0.95));
    z-index: 10;
    padding: 20px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .title {
    font-size: clamp(36px, 9vw, 72px);
    font-weight: 900;
    letter-spacing: 6px;
    margin: 0;
    background: linear-gradient(90deg, #00ffff, #ff2bd6, #ffd700, #00ffff);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: hueSlide 4s linear infinite;
    text-shadow: 0 0 30px rgba(0,255,255,0.5);
  }
  @keyframes hueSlide {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  .subtitle {
    font-size: clamp(14px, 3vw, 18px);
    color: #aef;
    margin: 10px 0 26px;
    letter-spacing: 1px;
    max-width: 480px;
    line-height: 1.6;
  }
  .echo-tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 6px;
    font-weight: bold;
    margin: 0 2px;
  }
  .btn {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 16px 48px;
    border-radius: 50px;
    border: 2px solid #00ffff;
    background: rgba(0,255,255,0.08);
    color: #00ffff;
    cursor: pointer;
    text-shadow: 0 0 10px #00ffff;
    box-shadow: 0 0 20px rgba(0,255,255,0.4), inset 0 0 20px rgba(0,255,255,0.1);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .btn:hover { transform: scale(1.06); background: rgba(0,255,255,0.18); }
  .btn:active { transform: scale(0.97); }
  .final-score {
    font-size: clamp(40px, 11vw, 80px);
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 20px #ffd700, 0 0 40px #ff8c00;
    margin: 6px 0;
  }
  .stat-row {
    display: flex;
    gap: 28px;
    margin: 14px 0 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .stat-label { font-size: 11px; letter-spacing: 2px; color: #8fd9ff; text-transform: uppercase; }
  .stat-value { font-size: 24px; font-weight: bold; color: #fff; }
  .new-high {
    color: #ff2bd6;
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 0 0 12px #ff2bd6;
    animation: pulse 0.8s ease infinite;
    margin-bottom: 8px;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }
  .announce {
    position: absolute;
    top: 14%;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(20px, 5vw, 36px);
    font-weight: 900;
    letter-spacing: 4px;
    z-index: 8;
    pointer-events: none;
    animation: announceAnim 1.6s ease forwards;
    white-space: nowrap;
  }
  @keyframes announceAnim {
    0% { opacity: 0; transform: translateX(-50%) translateY(-20px) scale(0.7); }
    20% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.1); }
    35% { transform: translateX(-50%) translateY(0) scale(1); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.95); }
  }
  .controls-hint {
    text-align: center;
    font-size: 11px;
    color: #6cf;
    opacity: 0.6;
    padding: 4px 0 0;
    letter-spacing: 1px;
  }
  @media (max-width: 600px) {
    .hud-block { min-width: 56px; }
    .hud-value { font-size: 17px; }
    .hearts { font-size: 15px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------- constants ---------- */
const PLAYER_RADIUS = 10;
const GEM_RADIUS = 8;
const HAZARD_RADIUS = 18;
const HAZARD_HIT_RADIUS = 14;
const PHANTOM_RADIUS = 10;
const MAX_HISTORY = 1300;

const PHANTOM_COLORS = ['#ff2bd6', '#ffa500', '#7fff00', '#a06bff'];
const PHANTOM_NAMES = ['CRIMSON', 'AMBER', 'TOXIC', 'VIOLET'];
const PHANTOM_DELAYS = [300, 540, 780, 1080]; // frames
const PHANTOM_THRESHOLDS = [0, 150, 400, 800]; // score to unlock
const PREVIEW_FRAMES = 150; // warning window before a newly-visible echo becomes solid

/* ---------- helpers ---------- */
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

function createGem(w, h) {
  return {
    x: clamp(Math.random() * w, 30, w - 30),
    y: clamp(Math.random() * h, 30, h - 30),
    gold: Math.random() < 0.15,
    phase: Math.random() * Math.PI * 2,
    ttl: 600,
  };
}

function createHazard(w, h) {
  const angle = Math.random() * Math.PI * 2;
  const speed = 0.7 + Math.random() * 1.0;
  return {
    x: clamp(Math.random() * w, 60, w - 60),
    y: clamp(Math.random() * h, 60, h - 60),
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    phase: Math.random() * Math.PI * 2,
  };
}

function spawnParticles(particles, x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (0.4 + Math.random()) * speed;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: 0.018 + Math.random() * 0.025,
      color,
      size: 1.5 + Math.random() * 3,
    });
  }
}

/* ---------- audio ---------- */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur, type, vol, ramp) {
  try {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (ramp) osc.frequency.exponentialRampToValueAtTime(ramp, ctx.currentTime + dur);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (e) { /* audio unavailable */ }
}
function sndCollect(mult) { tone(523 + mult * 40, 0.12, 'square', 0.18, 1046 + mult * 40); }
function sndGold() {
  tone(660, 0.08, 'square', 0.2, 1320);
  setTimeout(() => tone(880, 0.16, 'square', 0.2, 1760), 60);
}
function sndHit() { tone(220, 0.35, 'sawtooth', 0.25, 55); }
function sndEcho() {
  tone(330, 0.2, 'sine', 0.16, 330);
  setTimeout(() => tone(330, 0.25, 'sine', 0.1, 165), 150);
}
function sndIncoming() { tone(220, 0.18, 'triangle', 0.08, 280); }
function sndStart() {
  tone(440, 0.1, 'square', 0.15, 880);
  setTimeout(() => tone(660, 0.15, 'square', 0.15, 1320), 100);
}
function sndGameOver() {
  tone(440, 0.2, 'sawtooth', 0.2, 220);
  setTimeout(() => tone(330, 0.2, 'sawtooth', 0.2, 165), 180);
  setTimeout(() => tone(220, 0.3, 'sawtooth', 0.2, 110), 360);
}

/* ---------- game state ---------- */
function createGame(w, h) {
  return {
    w, h,
    player: { x: w / 2, y: h * 0.8 },
    target: { x: w / 2, y: h * 0.8 },
    keys: {},
    usingPointer: false,
    history: [],
    phantomPositions: [],
    frame: 0,
    score: 0,
    combo: 0,
    multiplier: 1,
    lives: 3,
    invincible: 0,
    shakeTime: 0,
    shakeMag: 0,
    gems: [],
    hazards: [createHazard(w, h)],
    particles: [],
    gemTimer: 50,
    gemInterval: 70,
    phantomUnlocked: [true, false, false, false],
    phantomVisibleFrame: [null, null, null, null],
    phantomActive: [false, false, false, false],
    activeEchoes: 0,
    over: false,
  };
}

function updateGame(game, dt, w, h, cb) {
  game.w = w; game.h = h;

  // movement target
  if (!game.usingPointer) {
    const speed = 6 * dt;
    if (game.keys['arrowleft'] || game.keys['a']) game.target.x -= speed;
    if (game.keys['arrowright'] || game.keys['d']) game.target.x += speed;
    if (game.keys['arrowup'] || game.keys['w']) game.target.y -= speed;
    if (game.keys['arrowdown'] || game.keys['s']) game.target.y += speed;
  }
  game.target.x = clamp(game.target.x, PLAYER_RADIUS, w - PLAYER_RADIUS);
  game.target.y = clamp(game.target.y, PLAYER_RADIUS, h - PLAYER_RADIUS);

  const ease = 1 - Math.pow(1 - 0.2, dt);
  game.player.x += (game.target.x - game.player.x) * ease;
  game.player.y += (game.target.y - game.player.y) * ease;
  game.player.x = clamp(game.player.x, PLAYER_RADIUS, w - PLAYER_RADIUS);
  game.player.y = clamp(game.player.y, PLAYER_RADIUS, h - PLAYER_RADIUS);

  // record movement history - phantoms replay this trail with a delay
  game.history.push({ x: game.player.x, y: game.player.y });
  if (game.history.length > MAX_HISTORY) game.history.shift();
  game.frame++;

  // gems
  game.gemTimer -= dt;
  if (game.gemTimer <= 0 && game.gems.length < 8) {
    game.gems.push(createGem(w, h));
    game.gemInterval = Math.max(26, game.gemInterval - 1);
    game.gemTimer = game.gemInterval;
  }
  for (let i = game.gems.length - 1; i >= 0; i--) {
    const g = game.gems[i];
    g.phase += 0.08 * dt;
    g.ttl -= dt;
    if (g.ttl <= 0) game.gems.splice(i, 1);
  }

  // hazards
  game.hazards.forEach(hz => {
    hz.x += hz.vx * dt; hz.y += hz.vy * dt;
    if (hz.x < HAZARD_RADIUS || hz.x > w - HAZARD_RADIUS) hz.vx *= -1;
    if (hz.y < HAZARD_RADIUS || hz.y > h - HAZARD_RADIUS) hz.vy *= -1;
    hz.x = clamp(hz.x, HAZARD_RADIUS, w - HAZARD_RADIUS);
    hz.y = clamp(hz.y, HAZARD_RADIUS, h - HAZARD_RADIUS);
    hz.phase += 0.04 * dt;
  });

  // phantom positions = your own past positions, offset by a fixed delay.
  // each echo first appears as a harmless preview for PREVIEW_FRAMES so the
  // player gets a fair warning before it becomes solid and collidable.
  game.activeEchoes = 0;
  game.phantomPositions = [];
  for (let i = 0; i < PHANTOM_DELAYS.length; i++) {
    if (!game.phantomUnlocked[i]) continue;
    const idx = game.history.length - 1 - PHANTOM_DELAYS[i];
    if (idx < 0) continue;
    if (game.phantomVisibleFrame[i] === null) {
      game.phantomVisibleFrame[i] = game.frame;
      cb.onEchoIncoming(i);
    }
    game.phantomPositions[i] = game.history[idx];
    const since = game.frame - game.phantomVisibleFrame[i];
    if (!game.phantomActive[i]) {
      // an echo can't solidify on top of the player - it stays a harmless
      // preview until they've moved clear of the spot it'll appear at.
      const clear = dist(game.player, game.phantomPositions[i]) > PLAYER_RADIUS + PHANTOM_RADIUS + 40;
      if (since >= PREVIEW_FRAMES && clear) { game.phantomActive[i] = true; cb.onEcho(i); }
    }
    if (game.phantomActive[i]) game.activeEchoes++;
  }

  // unlock additional echoes / hazards based on score
  for (let i = 1; i < PHANTOM_THRESHOLDS.length; i++) {
    if (!game.phantomUnlocked[i] && game.score >= PHANTOM_THRESHOLDS[i]) {
      game.phantomUnlocked[i] = true;
    }
  }
  if (game.hazards.length === 1 && game.score >= 300) game.hazards.push(createHazard(w, h));
  if (game.hazards.length === 2 && game.score >= 700) game.hazards.push(createHazard(w, h));

  // gem collection
  for (let i = game.gems.length - 1; i >= 0; i--) {
    const g = game.gems[i];
    if (dist(game.player, g) < PLAYER_RADIUS + GEM_RADIUS) {
      game.combo++;
      game.multiplier = Math.min(5, 1 + Math.floor(game.combo / 5));
      const pts = (g.gold ? 30 : 10) * game.multiplier;
      game.score += pts;
      spawnParticles(game.particles, g.x, g.y, g.gold ? '#ffd700' : '#00ffff', 14, 3.5);
      game.gems.splice(i, 1);
      cb.onCollect(g.gold);
    }
  }

  // collision with hazards / phantoms
  if (game.invincible > 0) {
    game.invincible -= dt;
  } else {
    let hit = false; let hitColor = '#ff3030';
    for (const hz of game.hazards) {
      if (dist(game.player, hz) < PLAYER_RADIUS + HAZARD_HIT_RADIUS) { hit = true; hitColor = '#ff3030'; break; }
    }
    if (!hit) {
      for (let i = 0; i < PHANTOM_DELAYS.length; i++) {
        const pos = game.phantomPositions[i];
        if (pos && game.phantomActive[i] && dist(game.player, pos) < PLAYER_RADIUS + PHANTOM_RADIUS) {
          hit = true; hitColor = PHANTOM_COLORS[i]; break;
        }
      }
    }
    if (hit) {
      game.lives--;
      game.combo = 0;
      game.multiplier = 1;
      game.invincible = 150;
      game.shakeTime = 20;
      game.shakeMag = 9;
      spawnParticles(game.particles, game.player.x, game.player.y, hitColor, 24, 4.5);
      cb.onHit();
      if (game.lives <= 0) {
        game.over = true;
        cb.onGameOver({ score: game.score, echoes: game.activeEchoes });
      }
    }
  }

  // particles
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= p.decay * dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }

  if (game.shakeTime > 0) game.shakeTime -= dt;
}

/* ---------- rendering ---------- */
function drawGlow(ctx, x, y, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = color;
  ctx.shadowBlur = 22;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}
function drawDiamond(ctx, x, y, r, color) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = 16;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - r); ctx.lineTo(x + r, y); ctx.lineTo(x, y + r); ctx.lineTo(x - r, y);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}
function drawRing(ctx, x, y, r, color, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = color;
  ctx.shadowBlur = 12;
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function renderGame(ctx, game, w, h) {
  ctx.save();
  if (game.shakeTime > 0) {
    const m = game.shakeMag * (game.shakeTime / 20);
    ctx.translate((Math.random() - 0.5) * m, (Math.random() - 0.5) * m);
  }

  // slowly hue-shifting trail fade
  const hue = (game.frame * 0.15) % 360;
  ctx.fillStyle = `hsla(${hue}, 60%, 7%, 0.22)`;
  ctx.fillRect(-30, -30, w + 60, h + 60);

  // subtle grid
  ctx.strokeStyle = 'rgba(0,255,255,0.045)';
  ctx.lineWidth = 1;
  for (let x = 0; x < w; x += 44) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke(); }
  for (let y = 0; y < h; y += 44) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }

  // hazards
  game.hazards.forEach(hz => {
    const pulse = 0.75 + 0.25 * Math.sin(hz.phase);
    drawGlow(ctx, hz.x, hz.y, HAZARD_RADIUS * pulse, '#ff3030', 0.85);
  });

  // gems
  game.gems.forEach(g => {
    const pulse = 0.8 + 0.2 * Math.sin(g.phase * 3);
    drawDiamond(ctx, g.x, g.y, GEM_RADIUS * pulse, g.gold ? '#ffd700' : '#00ffff');
  });

  // phantoms - translucent echoes of the player's past self.
  // a dashed ring telegraphs an echo before it solidifies and becomes dangerous.
  for (let i = 0; i < PHANTOM_DELAYS.length; i++) {
    const pos = game.phantomPositions[i];
    if (!pos) continue;
    if (game.phantomActive[i]) {
      drawGlow(ctx, pos.x, pos.y, PHANTOM_RADIUS, PHANTOM_COLORS[i], 0.55);
    } else {
      const pulse = 0.8 + 0.2 * Math.sin(game.frame * 0.3);
      drawRing(ctx, pos.x, pos.y, PHANTOM_RADIUS * pulse, PHANTOM_COLORS[i], 0.7);
    }
  }

  // particles
  game.particles.forEach(p => {
    ctx.globalAlpha = Math.max(p.life, 0);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // player
  const visible = game.invincible > 0 ? (Math.floor(game.frame / 4) % 2 === 0) : true;
  if (visible) drawGlow(ctx, game.player.x, game.player.y, PLAYER_RADIUS, '#00ffff', 1);

  ctx.restore();
}

/* ---------- main component ---------- */
function App() {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const gameRef = useRef(null);
  const [screen, setScreen] = useState('start'); // start | playing | gameover
  const [hud, setHud] = useState({ score: 0, combo: 0, multiplier: 1, lives: 3, echoes: 0 });
  const [highScore, setHighScore] = useState(0);
  const [announce, setAnnounce] = useState(null);
  const [finalStats, setFinalStats] = useState(null);
  const [isNewHigh, setIsNewHigh] = useState(false);

  useEffect(() => {
    const stored = localStorage.getItem('phantomDriftHighScore');
    if (stored === null) {
      localStorage.setItem('phantomDriftHighScore', '0');
      setHighScore(0);
    } else {
      setHighScore(parseInt(stored, 10));
    }
  }, []);

  // size the canvas to its container
  useEffect(() => {
    const canvas = canvasRef.current;
    const container = containerRef.current;
    function resize() {
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      if (gameRef.current && !gameRef.current.over) {
        gameRef.current.w = canvas.width;
        gameRef.current.h = canvas.height;
      }
    }
    resize();
    window.addEventListener('resize', resize);
    return () => window.removeEventListener('resize', resize);
  }, []);

  // input handling
  useEffect(() => {
    const canvas = canvasRef.current;
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const t = e.touches && e.touches[0];
      const clientX = t ? t.clientX : e.clientX;
      const clientY = t ? t.clientY : e.clientY;
      return { x: clientX - rect.left, y: clientY - rect.top };
    }
    function onMove(e) {
      const game = gameRef.current;
      if (!game) return;
      const pos = getPos(e);
      game.target.x = pos.x;
      game.target.y = pos.y;
      game.usingPointer = true;
    }
    function onTouchMove(e) {
      e.preventDefault();
      onMove(e);
    }
    function onKeyDown(e) {
      const game = gameRef.current;
      const k = e.key.toLowerCase();
      const moveKeys = ['arrowleft', 'arrowright', 'arrowup', 'arrowdown', 'a', 'd', 'w', 's'];
      if (moveKeys.includes(k)) {
        if (game) { game.keys[k] = true; game.usingPointer = false; }
        e.preventDefault();
      }
    }
    function onKeyUp(e) {
      const game = gameRef.current;
      const k = e.key.toLowerCase();
      if (game) game.keys[k] = false;
    }
    canvas.addEventListener('mousemove', onMove);
    canvas.addEventListener('touchstart', onTouchMove, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
    return () => {
      canvas.removeEventListener('mousemove', onMove);
      canvas.removeEventListener('touchstart', onTouchMove);
      canvas.removeEventListener('touchmove', onTouchMove);
      window.removeEventListener('keydown', onKeyDown);
      window.removeEventListener('keyup', onKeyUp);
    };
  }, []);

  const showAnnounce = useCallback((text, color) => {
    setAnnounce({ text, color, key: Math.random() });
    setTimeout(() => setAnnounce(null), 1600);
  }, []);

  const startGame = useCallback(() => {
    const canvas = canvasRef.current;
    ensureAudio();
    sndStart();
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#06061a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    gameRef.current = createGame(canvas.width, canvas.height);
    setFinalStats(null);
    setIsNewHigh(false);
    setAnnounce(null);
    setHud({ score: 0, combo: 0, multiplier: 1, lives: 3, echoes: 0 });
    setScreen('playing');
  }, []);

  // main loop
  useEffect(() => {
    if (screen !== 'playing') return;
    let rafId;
    let lastTime = performance.now();
    let accumulator = 0;

    const callbacks = {
      onCollect: (gold) => { if (gold) sndGold(); else sndCollect(gameRef.current.multiplier); },
      onHit: () => sndHit(),
      onEchoIncoming: (idx) => { sndIncoming(); showAnnounce(`${PHANTOM_NAMES[idx]} ECHO INCOMING`, PHANTOM_COLORS[idx]); },
      onEcho: (idx) => { sndEcho(); showAnnounce(`${PHANTOM_NAMES[idx]} ECHO ACTIVE`, PHANTOM_COLORS[idx]); },
      onGameOver: (stats) => {
        sndGameOver();
        const prevHigh = parseInt(localStorage.getItem('phantomDriftHighScore') || '0', 10);
        if (stats.score > prevHigh) {
          localStorage.setItem('phantomDriftHighScore', String(stats.score));
          setHighScore(stats.score);
          setIsNewHigh(true);
        }
        setFinalStats(stats);
        setScreen('gameover');
      },
    };

    function loop(now) {
      // fixed-timestep accumulator: decouples simulation speed from the
      // browser's actual rAF rate, so echo delays (measured in frames)
      // always correspond to real elapsed time regardless of refresh rate.
      const frameTime = Math.min((now - lastTime) / 16.6667, 5);
      lastTime = now;
      accumulator += frameTime;
      const canvas = canvasRef.current;
      const game = gameRef.current;
      let steps = 0;
      while (accumulator >= 1 && steps < 5) {
        if (game && canvas && !game.over) {
          updateGame(game, 1, canvas.width, canvas.height, callbacks);
        }
        accumulator -= 1;
        steps++;
      }
      if (game && canvas) {
        renderGame(canvas.getContext('2d'), game, canvas.width, canvas.height);
        if (!game.over) {
          setHud({
            score: game.score,
            combo: game.combo,
            multiplier: game.multiplier,
            lives: game.lives,
            echoes: game.activeEchoes,
          });
        }
      }
      rafId = requestAnimationFrame(loop);
    }
    rafId = requestAnimationFrame(loop);
    return () => cancelAnimationFrame(rafId);
  }, [screen, showAnnounce]);

  const isMobile = typeof window !== 'undefined' && ('ontouchstart' in window || navigator.maxTouchPoints > 0);

  return (
    <div className="app">
      <div className="hud">
        <div className="hud-block">
          <div className="hud-label">Score</div>
          <div className="hud-value">{hud.score}</div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Combo</div>
          <div className="hud-value gold">x{hud.multiplier}</div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Echoes</div>
          <div className="hud-value" style={{ color: hud.echoes > 0 ? PHANTOM_COLORS[hud.echoes - 1] : '#fff', textShadow: hud.echoes > 0 ? `0 0 8px ${PHANTOM_COLORS[hud.echoes - 1]}, 0 0 16px ${PHANTOM_COLORS[hud.echoes - 1]}` : 'none' }}>
            {hud.echoes}
          </div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Lives</div>
          <div className="hearts">
            {[0, 1, 2].map(i => (
              <span key={i} className={i < hud.lives ? 'heart-full' : 'heart-empty'}>&#9829;</span>
            ))}
          </div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Best</div>
          <div className="hud-value" style={{ fontSize: '16px' }}>{highScore}</div>
        </div>
      </div>

      <div className="game-area" ref={containerRef}>
        <canvas ref={canvasRef}></canvas>

        {announce && (
          <div className="announce" key={announce.key} style={{ color: announce.color, textShadow: `0 0 12px ${announce.color}, 0 0 24px ${announce.color}` }}>
            {announce.text}
          </div>
        )}

        {screen === 'start' && (
          <div className="overlay">
            <h1 className="title">PHANTOM DRIFT</h1>
            <p className="subtitle">
              Drift your glowing orb to collect crystals and dodge red voids.
              Every move you make is recorded &mdash; and after a few seconds, a{' '}
              <span className="echo-tag" style={{ background: 'rgba(255,43,214,0.2)', color: '#ff2bd6' }}>CRIMSON</span>
              {' '}echo of your past self awakens and retraces your exact path.
              Touch your own echo and you lose a life. The longer you survive, the more echoes haunt the field!
            </p>
            <button className="btn" onClick={startGame}>START</button>
            <p className="controls-hint">
              {isMobile ? 'Drag anywhere to drift' : 'Move mouse or use WASD / Arrow Keys to drift'}
            </p>
          </div>
        )}

        {screen === 'gameover' && finalStats && (
          <div className="overlay">
            {isNewHigh && <div className="new-high">★ NEW HIGH SCORE ★</div>}
            <h1 className="title" style={{ fontSize: 'clamp(28px, 6vw, 48px)' }}>OVERRUN BY YOUR PAST</h1>
            <div className="final-score">{finalStats.score}</div>
            <div className="stat-row">
              <div className="stat">
                <div className="stat-label">Best</div>
                <div className="stat-value">{highScore}</div>
              </div>
              <div className="stat">
                <div className="stat-label">Echoes Faced</div>
                <div className="stat-value">{finalStats.echoes}</div>
              </div>
            </div>
            <button className="btn" onClick={startGame}>DRIFT AGAIN</button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
