<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeet Surge</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050010; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; cursor: crosshair; touch-action: none; }
    @keyframes pulseBtn {
      0%, 100% { box-shadow: 0 0 15px #00ff88, 0 0 30px #00ff8840; opacity: 1; }
      50% { box-shadow: 0 0 30px #00ff88, 0 0 60px #00ff8840; opacity: 0.8; }
    }
    @keyframes bgPulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── Audio ───────────────────────────────────────────────────────────────
    let audioCtx = null;
    function getCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playSound(type) {
      try {
        const c = getCtx();
        const now = c.currentTime;
        if (type === 'shoot') {
          const o = c.createOscillator(), g = c.createGain();
          o.connect(g); g.connect(c.destination);
          o.frequency.setValueAtTime(900, now);
          o.frequency.exponentialRampToValueAtTime(150, now + 0.12);
          g.gain.setValueAtTime(0.25, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
          o.start(now); o.stop(now + 0.12);
        } else if (type === 'hit') {
          const o = c.createOscillator(), g = c.createGain();
          o.type = 'sawtooth';
          o.connect(g); g.connect(c.destination);
          o.frequency.setValueAtTime(300, now);
          o.frequency.exponentialRampToValueAtTime(1400, now + 0.18);
          g.gain.setValueAtTime(0.35, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.22);
          o.start(now); o.stop(now + 0.22);
          // crack noise
          const buf = c.createBuffer(1, c.sampleRate * 0.05, c.sampleRate);
          const data = buf.getChannelData(0);
          for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
          const src = c.createBufferSource(), g2 = c.createGain();
          src.buffer = buf; src.connect(g2); g2.connect(c.destination);
          g2.gain.setValueAtTime(0.3, now);
          src.start(now);
        } else if (type === 'miss') {
          const o = c.createOscillator(), g = c.createGain();
          o.type = 'triangle';
          o.connect(g); g.connect(c.destination);
          o.frequency.setValueAtTime(180, now);
          o.frequency.exponentialRampToValueAtTime(70, now + 0.35);
          g.gain.setValueAtTime(0.2, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          o.start(now); o.stop(now + 0.35);
        } else if (type === 'bullseye') {
          [1, 1.5, 2, 2.5].forEach((f, i) => {
            const o = c.createOscillator(), g = c.createGain();
            o.connect(g); g.connect(c.destination);
            o.frequency.setValueAtTime(440 * f, now + i * 0.07);
            g.gain.setValueAtTime(0, now + i * 0.07);
            g.gain.linearRampToValueAtTime(0.25, now + i * 0.07 + 0.03);
            g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.07 + 0.18);
            o.start(now + i * 0.07); o.stop(now + i * 0.07 + 0.2);
          });
        } else if (type === 'combo') {
          [1, 1.25, 1.5, 2].forEach((f, i) => {
            const o = c.createOscillator(), g = c.createGain();
            o.connect(g); g.connect(c.destination);
            o.frequency.setValueAtTime(500 * f, now + i * 0.06);
            g.gain.setValueAtTime(0, now + i * 0.06);
            g.gain.linearRampToValueAtTime(0.2, now + i * 0.06 + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.06 + 0.14);
            o.start(now + i * 0.06); o.stop(now + i * 0.06 + 0.16);
          });
        }
      } catch (e) {}
    }

    // ─── Constants ───────────────────────────────────────────────────────────
    const DISC_COLORS = ['#00ffff', '#ff00ff', '#ff6600', '#00ff88', '#ffff00', '#ff3399'];
    const HIT_RADIUS = 22; // extra hit padding beyond disc radius

    // ─── Main Game Component ──────────────────────────────────────────────────
    function SkeetSurge() {
      const canvasRef = useRef(null);
      const rafRef = useRef(null);
      const lastTsRef = useRef(0);
      const [display, setDisplay] = useState({
        phase: 'start', score: 0, lives: 3, combo: 0, highScore: parseInt(localStorage.getItem('skeetSurgeHigh') || '0')
      });

      // All mutable game state lives here to avoid stale closures
      const gs = useRef({
        phase: 'start',
        score: 0, lives: 3, combo: 0, maxCombo: 0,
        highScore: parseInt(localStorage.getItem('skeetSurgeHigh') || '0'),
        discs: [], particles: [], floatTexts: [],
        mouseX: 400, mouseY: 300,
        muzzleFlash: 0, muzzleX: 400, muzzleY: 300,
        screenShake: 0,
        spawnTimer: 0, spawnInterval: 2400,
        wave: 1, totalHits: 0,
        bgT: 0, gridOffset: 0,
      });

      const W = useRef(800), H = useRef(600);

      // ── Helpers ──────────────────────────────────────────────────────────
      function spawnDisc() {
        const w = W.current, h = H.current;
        const fromLeft = Math.random() > 0.5;
        const x0 = fromLeft ? -50 : w + 50;
        const y0 = h * (0.35 + Math.random() * 0.3);
        const speed = 2.5 + gs.current.wave * 0.4 + Math.random() * 1.5;
        const vx = fromLeft ? speed : -speed;
        const vy = -(3 + Math.random() * 3);
        const color = DISC_COLORS[Math.floor(Math.random() * DISC_COLORS.length)];
        const r = 20 + Math.random() * 12;
        gs.current.discs.push({
          id: Date.now() + Math.random(),
          x: x0, y: y0,
          vx, vy, gravity: 0.06 + Math.random() * 0.05,
          color, r,
          trail: [],
          rot: 0, rotSpeed: (fromLeft ? 1 : -1) * (0.08 + Math.random() * 0.06),
          alive: true,
          scored: false,
        });
      }

      function addParticles(x, y, color, count = 28, fast = false) {
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
          const spd = fast ? (3 + Math.random() * 7) : (1.5 + Math.random() * 4);
          gs.current.particles.push({
            x, y,
            vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
            color,
            life: 1, decay: 0.025 + Math.random() * 0.03,
            size: 2 + Math.random() * 4,
          });
        }
      }

      function addFloatText(x, y, text, color) {
        gs.current.floatTexts.push({ x, y, vy: -1.2, text, color, life: 1.4 });
      }

      function startGame() {
        const s = gs.current;
        s.phase = 'playing';
        s.score = 0; s.lives = 3; s.combo = 0; s.maxCombo = 0;
        s.discs = []; s.particles = []; s.floatTexts = [];
        s.wave = 1; s.totalHits = 0;
        s.spawnTimer = 0; s.spawnInterval = 2400;
        s.screenShake = 0; s.muzzleFlash = 0;
        // Persist high score key so tests can detect it
        localStorage.setItem('skeetSurgeHigh', s.highScore);
        spawnDisc();
        setDisplay({ phase: 'playing', score: 0, lives: 3, combo: 0, highScore: s.highScore });
      }

      function handleShoot(cx, cy) {
        const s = gs.current;
        if (s.phase === 'start' || s.phase === 'dead') { startGame(); return; }
        if (s.phase !== 'playing') return;

        playSound('shoot');
        s.muzzleFlash = 1;
        s.muzzleX = cx; s.muzzleY = cy;

        // Find closest disc within hit range
        let best = null, bestDist = Infinity;
        for (const d of s.discs) {
          if (!d.alive) continue;
          const dx = d.x - cx, dy = d.y - cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < d.r + HIT_RADIUS && dist < bestDist) {
            best = d; bestDist = dist;
          }
        }

        if (best) {
          best.alive = false;
          s.combo++;
          if (s.combo > s.maxCombo) s.maxCombo = s.combo;
          s.totalHits++;

          const precision = Math.max(0, 1 - bestDist / (best.r + HIT_RADIUS));
          const base = Math.round(100 + precision * 200);
          const mult = Math.min(s.combo, 10);
          const pts = base * mult;
          s.score += pts;
          // Update high score in localStorage on every hit
          if (s.score > s.highScore) {
            s.highScore = s.score;
            localStorage.setItem('skeetSurgeHigh', s.highScore);
          }

          addParticles(best.x, best.y, best.color, 36, true);
          // Shrapnel
          addParticles(best.x, best.y, '#ffffff', 12, true);
          s.screenShake = 10;

          const label = precision > 0.85 ? 'BULLSEYE!' : precision > 0.5 ? 'GREAT!' : 'HIT!';
          addFloatText(best.x, best.y - 20, `${label} +${pts}`, best.color);

          if (s.combo >= 5) {
            playSound('combo');
            addFloatText(W.current / 2, H.current * 0.28, `${s.combo}× COMBO!`, '#ffff00');
          } else if (precision > 0.85) {
            playSound('bullseye');
          } else {
            playSound('hit');
          }

          // Difficulty ramp
          if (s.totalHits % 8 === 0) {
            s.wave++;
            s.spawnInterval = Math.max(700, s.spawnInterval - 180);
          }

          setDisplay(d => ({ ...d, score: s.score, combo: s.combo }));
        } else {
          // Shot missed
          s.combo = 0;
          setDisplay(d => ({ ...d, combo: 0 }));
        }
      }

      // ── Event Handlers ───────────────────────────────────────────────────
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const onMove = (e) => {
          const rect = canvas.getBoundingClientRect();
          gs.current.mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
          gs.current.mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        };
        const onClick = (e) => {
          const rect = canvas.getBoundingClientRect();
          const cx = (e.clientX - rect.left) * (canvas.width / rect.width);
          const cy = (e.clientY - rect.top) * (canvas.height / rect.height);
          handleShoot(cx, cy);
        };
        const onTouch = (e) => {
          e.preventDefault();
          const rect = canvas.getBoundingClientRect();
          const t = e.changedTouches[0];
          const cx = (t.clientX - rect.left) * (canvas.width / rect.width);
          const cy = (t.clientY - rect.top) * (canvas.height / rect.height);
          gs.current.mouseX = cx; gs.current.mouseY = cy;
          handleShoot(cx, cy);
        };

        canvas.addEventListener('mousemove', onMove);
        canvas.addEventListener('click', onClick);
        canvas.addEventListener('touchstart', onTouch, { passive: false });
        return () => {
          canvas.removeEventListener('mousemove', onMove);
          canvas.removeEventListener('click', onClick);
          canvas.removeEventListener('touchstart', onTouch);
        };
      }, []);

      // ── Render Loop ──────────────────────────────────────────────────────
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const resize = () => {
          canvas.width = Math.min(window.innerWidth, 960);
          canvas.height = Math.min(window.innerHeight, 640);
          W.current = canvas.width;
          H.current = canvas.height;
        };
        resize();
        window.addEventListener('resize', resize);

        function drawBackground(t) {
          const w = W.current, h = H.current;
          // Gradient bg
          const bg = ctx.createLinearGradient(0, 0, w, h);
          const hue1 = (t * 8) % 360;
          bg.addColorStop(0, `hsl(${hue1}, 80%, 4%)`);
          bg.addColorStop(0.5, `hsl(${(hue1 + 60) % 360}, 70%, 3%)`);
          bg.addColorStop(1, `hsl(${(hue1 + 120) % 360}, 80%, 4%)`);
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, w, h);

          // Grid
          const cell = 70;
          const offX = (t * 20) % cell;
          ctx.strokeStyle = `rgba(0, 120, 255, 0.08)`;
          ctx.lineWidth = 1;
          for (let x = -offX; x < w + cell; x += cell) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
          }
          for (let y = 0; y < h; y += cell) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
          }

          // Horizon line
          ctx.strokeStyle = 'rgba(0, 200, 255, 0.15)';
          ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(0, h * 0.68); ctx.lineTo(w, h * 0.68); ctx.stroke();

          // Atmospheric glow spots
          for (let i = 0; i < 3; i++) {
            const gx = w * (0.15 + i * 0.35);
            const gy = h * 0.6;
            const gr = ctx.createRadialGradient(gx, gy, 0, gx, gy, 200);
            const hue = (hue1 + i * 80) % 360;
            gr.addColorStop(0, `hsla(${hue}, 100%, 50%, 0.06)`);
            gr.addColorStop(1, 'transparent');
            ctx.fillStyle = gr;
            ctx.fillRect(0, 0, w, h);
          }
        }

        function drawDisc(disc) {
          ctx.save();
          ctx.translate(disc.x, disc.y);
          ctx.rotate(disc.rot);

          // Glow
          ctx.shadowColor = disc.color;
          ctx.shadowBlur = 25;

          // Body (ellipse to look like spinning disc seen from an angle)
          const rx = disc.r;
          const ry = disc.r * 0.32;
          ctx.globalAlpha = 0.9;
          ctx.fillStyle = disc.color;
          ctx.beginPath();
          ctx.ellipse(0, 0, rx, ry, 0, 0, Math.PI * 2);
          ctx.fill();

          // Rim
          ctx.strokeStyle = '#ffffff';
          ctx.lineWidth = 2;
          ctx.globalAlpha = 0.6;
          ctx.stroke();

          // Inner highlight
          ctx.globalAlpha = 0.35;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.ellipse(0, 0, rx * 0.42, ry * 0.4, 0, 0, Math.PI * 2);
          ctx.fill();

          // Center dot
          ctx.globalAlpha = 0.8;
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(0, 0, 3, 0, Math.PI * 2);
          ctx.fill();

          ctx.restore();
        }

        function drawTrail(disc) {
          for (let i = 0; i < disc.trail.length; i++) {
            const tp = disc.trail[i];
            const alpha = (i / disc.trail.length) * 0.25;
            const frac = i / disc.trail.length;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = disc.color;
            ctx.shadowColor = disc.color;
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.ellipse(tp.x, tp.y, disc.r * (0.3 + frac * 0.5), disc.r * 0.1, tp.rot, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        function drawCrosshair(x, y) {
          ctx.save();
          const r = 22, gap = 8, arm = 14;
          ctx.strokeStyle = 'rgba(255,255,0,0.9)';
          ctx.lineWidth = 2;
          ctx.shadowColor = '#ffff00';
          ctx.shadowBlur = 12;
          // Circle
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.stroke();
          // Arms
          [[x - r - arm, y, x - r - gap, y],
           [x + r + gap, y, x + r + arm, y],
           [x, y - r - arm, x, y - r - gap],
           [x, y + r + gap, x, y + r + arm]].forEach(([x1,y1,x2,y2]) => {
            ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
          });
          // Center dot
          ctx.fillStyle = '#ffff00';
          ctx.shadowBlur = 6;
          ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }

        function drawMuzzleFlash(x, y, intensity) {
          if (intensity <= 0) return;
          ctx.save();
          ctx.globalAlpha = intensity * 0.7;
          ctx.strokeStyle = '#ffff00';
          ctx.lineWidth = 3;
          ctx.shadowColor = '#ffff00';
          ctx.shadowBlur = 30 * intensity;
          ctx.beginPath();
          ctx.arc(x, y, 40 * intensity, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = intensity * 0.4;
          ctx.strokeStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(x, y, 20 * intensity, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        function drawHUD() {
          const s = gs.current;
          const w = W.current, h = H.current;
          // Score
          ctx.save();
          ctx.font = `bold ${Math.max(20, Math.floor(w * 0.032))}px Courier New`;
          ctx.fillStyle = '#00ffff';
          ctx.shadowColor = '#00ffff';
          ctx.shadowBlur = 15;
          ctx.textAlign = 'left';
          ctx.fillText(s.score.toLocaleString(), 20, 44);
          ctx.font = `${Math.floor(w * 0.016)}px Courier New`;
          ctx.fillStyle = '#aaa';
          ctx.shadowBlur = 0;
          ctx.fillText('SCORE', 20, 22);

          // Lives
          ctx.textAlign = 'right';
          for (let i = 0; i < 3; i++) {
            ctx.fillStyle = i < s.lives ? '#ff4400' : '#1a0000';
            ctx.shadowColor = '#ff4400';
            ctx.shadowBlur = i < s.lives ? 12 : 0;
            ctx.font = `${Math.floor(w * 0.032)}px Courier New`;
            ctx.fillText('●', w - 20 - i * (Math.floor(w * 0.032) + 4), 44);
          }

          // Combo
          if (s.combo >= 2) {
            ctx.textAlign = 'center';
            ctx.font = `bold ${Math.floor(w * 0.028)}px Courier New`;
            ctx.fillStyle = s.combo >= 5 ? '#ffff00' : '#ff00ff';
            ctx.shadowColor = ctx.fillStyle;
            ctx.shadowBlur = 20;
            ctx.fillText(`×${s.combo} COMBO`, w / 2, 44);
          }

          // Wave indicator (subtle)
          ctx.textAlign = 'center';
          ctx.font = `${Math.floor(w * 0.014)}px Courier New`;
          ctx.fillStyle = 'rgba(0,255,136,0.5)';
          ctx.shadowBlur = 0;
          ctx.fillText(`WAVE ${s.wave}`, w / 2, h - 14);

          ctx.restore();
        }

        function loop(ts) {
          const dt = Math.min((ts - lastTsRef.current) / 1000, 0.05);
          lastTsRef.current = ts;
          const s = gs.current;
          s.bgT += dt;

          const w = W.current, h = H.current;

          ctx.save();
          // Screen shake
          if (s.screenShake > 0) {
            s.screenShake = Math.max(0, s.screenShake - 1.2);
            const mag = s.screenShake * 0.4;
            ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
          }

          drawBackground(s.bgT);

          // Spawn discs
          if (s.phase === 'playing') {
            s.spawnTimer += dt * 1000;
            if (s.spawnTimer >= s.spawnInterval) {
              s.spawnTimer = 0;
              spawnDisc();
              if (s.wave >= 4 && Math.random() < 0.35) spawnDisc();
              if (s.wave >= 7 && Math.random() < 0.25) spawnDisc();
            }
          }

          // Update & draw discs
          for (let i = s.discs.length - 1; i >= 0; i--) {
            const d = s.discs[i];
            if (!d.alive) { s.discs.splice(i, 1); continue; }

            // Trail
            d.trail.unshift({ x: d.x, y: d.y, rot: d.rot });
            if (d.trail.length > 10) d.trail.pop();

            // Physics
            d.vy += d.gravity;
            d.x += d.vx;
            d.y += d.vy;
            d.rot += d.rotSpeed;

            drawTrail(d);
            drawDisc(d);

            // Escaped?
            if (d.y > h + 80 || d.x < -120 || d.x > w + 120) {
              s.discs.splice(i, 1);
              if (s.phase === 'playing') {
                s.lives--;
                s.combo = 0;
                playSound('miss');
                addFloatText(d.x < 0 ? 80 : d.x > w ? w - 80 : d.x, h * 0.5, 'MISSED! -1♥', '#ff4400');
                if (s.lives <= 0) {
                  s.phase = 'dead';
                  const hs = Math.max(s.score, s.highScore);
                  s.highScore = hs;
                  localStorage.setItem('skeetSurgeHigh', hs);
                  setDisplay({ phase: 'dead', score: s.score, lives: 0, combo: 0, highScore: hs });
                } else {
                  setDisplay(dd => ({ ...dd, lives: s.lives, combo: 0 }));
                }
              }
            }
          }

          // Particles
          for (let i = s.particles.length - 1; i >= 0; i--) {
            const p = s.particles[i];
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.12; p.vx *= 0.97;
            p.life -= p.decay;
            if (p.life <= 0) { s.particles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          // Float texts
          for (let i = s.floatTexts.length - 1; i >= 0; i--) {
            const ft = s.floatTexts[i];
            ft.y += ft.vy; ft.life -= 0.022;
            if (ft.life <= 0) { s.floatTexts.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = Math.min(ft.life, 1);
            ctx.font = `bold ${Math.floor(w * 0.025)}px Courier New`;
            ctx.textAlign = 'center';
            ctx.fillStyle = ft.color;
            ctx.shadowColor = ft.color;
            ctx.shadowBlur = 18;
            ctx.fillText(ft.text, ft.x, ft.y);
            ctx.restore();
          }

          // Muzzle flash
          s.muzzleFlash = Math.max(0, s.muzzleFlash - dt * 6);
          drawMuzzleFlash(s.muzzleX, s.muzzleY, s.muzzleFlash);

          // Crosshair
          if (s.phase === 'playing') drawCrosshair(s.mouseX, s.mouseY);

          // HUD
          if (s.phase === 'playing') drawHUD();

          ctx.restore();
          rafRef.current = requestAnimationFrame(loop);
        }

        rafRef.current = requestAnimationFrame(loop);
        return () => {
          cancelAnimationFrame(rafRef.current);
          window.removeEventListener('resize', resize);
        };
      }, []);

      const hs = display.highScore;

      return (
        <div style={{ position: 'relative', width: '100vw', height: '100vh', overflow: 'hidden', background: '#050010' }}>
          <canvas ref={canvasRef} style={{ width: '100%', height: '100%' }} />

          {/* START SCREEN */}
          {display.phase === 'start' && (
            <div onClick={startGame} style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center',
              background: 'rgba(5,0,16,0.88)', userSelect: 'none', cursor: 'crosshair',
            }}>
              <div style={{ fontFamily: 'Courier New', textAlign: 'center' }}>
                <div style={{ fontSize: '13px', letterSpacing: '8px', color: '#00ffff',
                  textShadow: '0 0 20px #00ffff', marginBottom: '10px' }}>NEON</div>
                <div style={{
                  fontSize: 'clamp(36px,8vw,72px)', fontWeight: 'bold', letterSpacing: '4px',
                  background: 'linear-gradient(135deg, #ff00ff 0%, #00ffff 50%, #ffff00 100%)',
                  WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
                  filter: 'drop-shadow(0 0 20px #ff00ff)',
                  marginBottom: '12px', lineHeight: 1.1,
                }}>
                  SKEET SURGE
                </div>
                <div style={{ fontSize: '15px', color: '#aaa', marginBottom: '36px', letterSpacing: '1px' }}>
                  Shoot neon clay discs before they escape!
                </div>
                <div style={{ fontSize: '13px', color: '#666', lineHeight: '2.2', marginBottom: '36px' }}>
                  🖱 Move mouse to aim the crosshair<br />
                  🖱 Click to shoot at discs<br />
                  🎯 Bullseye hits score massive bonus<br />
                  ⚠️ Miss 3 discs and it's game over
                </div>
                {hs > 0 && (
                  <div style={{ fontSize: '16px', color: '#ffd700', textShadow: '0 0 12px #ffd700', marginBottom: '28px' }}>
                    🏆 BEST: {hs.toLocaleString()}
                  </div>
                )}
                <div style={{
                  fontSize: '20px', color: '#00ff88', letterSpacing: '2px',
                  border: '2px solid #00ff88', padding: '14px 48px', borderRadius: '4px',
                  animation: 'pulseBtn 1.4s infinite',
                  textShadow: '0 0 10px #00ff88',
                }}>
                  CLICK TO FIRE!
                </div>
              </div>
            </div>
          )}

          {/* GAME OVER SCREEN */}
          {display.phase === 'dead' && (
            <div onClick={startGame} style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center',
              background: 'rgba(5,0,16,0.92)', userSelect: 'none', cursor: 'crosshair',
            }}>
              <div style={{ fontFamily: 'Courier New', textAlign: 'center' }}>
                <div style={{ fontSize: 'clamp(36px,7vw,60px)', fontWeight: 'bold',
                  color: '#ff4400', textShadow: '0 0 30px #ff4400', marginBottom: '24px', letterSpacing: '3px' }}>
                  GAME OVER
                </div>
                <div style={{ fontSize: 'clamp(20px,4vw,32px)', color: '#00ffff',
                  textShadow: '0 0 15px #00ffff', marginBottom: '10px' }}>
                  {display.score.toLocaleString()} PTS
                </div>
                <div style={{ fontSize: '18px', color: '#ff00ff', textShadow: '0 0 10px #ff00ff', marginBottom: '8px' }}>
                  BEST COMBO ×{gs.current.maxCombo}
                </div>
                {display.score > 0 && display.score >= hs && (
                  <div style={{ fontSize: '20px', color: '#ffd700', textShadow: '0 0 20px #ffd700',
                    marginBottom: '24px', animation: 'bgPulse 1s infinite' }}>
                    🏆 NEW HIGH SCORE!
                  </div>
                )}
                {(display.score === 0 || display.score < hs) && hs > 0 && (
                  <div style={{ fontSize: '15px', color: '#888', marginBottom: '24px' }}>
                    Best: {hs.toLocaleString()}
                  </div>
                )}
                <div style={{
                  fontSize: '18px', color: '#00ff88', letterSpacing: '2px',
                  border: '2px solid #00ff88', padding: '12px 36px', borderRadius: '4px',
                  animation: 'pulseBtn 1.4s infinite',
                  textShadow: '0 0 10px #00ff88', marginTop: '16px',
                }}>
                  CLICK TO RETRY
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SkeetSurge />);
  </script>
</body>
</html>
