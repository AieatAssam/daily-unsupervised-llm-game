<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Infiltrator</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #040010; overflow: hidden; }
    #root { width: 100vw; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef } = React;

    // ── Audio ────────────────────────────────────────────────────────────────
    let _audioCtx = null;
    const ac = () => {
      if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return _audioCtx;
    };
    const beep = (freq, dur, vol = 0.25, type = 'sine') => {
      try {
        const c = ac(), o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.frequency.value = freq; o.type = type;
        g.gain.setValueAtTime(vol, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
        o.start(); o.stop(c.currentTime + dur);
      } catch (_) {}
    };
    const playStep  = () => beep(280 + Math.random() * 80, 0.05, 0.07, 'square');
    const playAlarm = () => {
      [0, 0.1, 0.2].forEach(t => beep(200, 0.09, 0.4, 'sawtooth'));
    };
    const playWin   = () => [523, 659, 784, 1047].forEach((f, i) =>
      setTimeout(() => beep(f, 0.3, 0.22), i * 80));

    // ── Constants ────────────────────────────────────────────────────────────
    const GRID = 10;

    // ── Level generation ─────────────────────────────────────────────────────
    const makeLevel = (level) => {
      const count = Math.min(2 + Math.floor((level - 1) * 0.7), 6);
      const guards = [];
      const used = new Set(['0,0', `${GRID-1},${GRID-1}`]);

      for (let i = 0; i < count; i++) {
        let gx, gy, tries = 0;
        do {
          gx = 1 + Math.floor(Math.random() * (GRID - 2));
          gy = 1 + Math.floor(Math.random() * (GRID - 2));
          tries++;
        } while (
          (used.has(`${gx},${gy}`) || (gx < 2 && gy < 2) || (gx > GRID-3 && gy > GRID-3))
          && tries < 80
        );
        used.add(`${gx},${gy}`);

        // Start facing away from spawn (0,0)
        const awayAngle = Math.atan2(gy, gx) * 180 / Math.PI + 90 + Math.random() * 100;

        guards.push({
          x: gx, y: gy,
          angle: awayAngle,
          speed: (22 + level * 7) * (Math.random() > 0.5 ? 1 : -1),
          cone:  Math.max(55 - (level - 1) * 4, 30),   // degrees
          range: Math.min(3 + Math.floor(level / 2), 6), // cells
        });
      }
      return guards;
    };

    // ── Spotlight detection ──────────────────────────────────────────────────
    const inSpotlight = (px, py, guards) => {
      for (const g of guards) {
        const dx = px - g.x, dy = py - g.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist === 0 || dist > g.range) continue;
        const atp = Math.atan2(dy, dx) * 180 / Math.PI;
        const ga  = ((g.angle % 360) + 360) % 360;
        const ap  = ((atp % 360) + 360) % 360;
        let diff  = Math.abs(ap - ga);
        if (diff > 180) diff = 360 - diff;
        if (diff <= g.cone / 2) return true;
      }
      return false;
    };

    // ── Main App ─────────────────────────────────────────────────────────────
    const App = () => {
      const cvs = useRef(null);
      const raf = useRef(null);

      useEffect(() => {
        const canvas = cvs.current;
        const ctx    = canvas.getContext('2d');

        // Ensure localStorage key exists for tests
        if (!localStorage.getItem('neonInfiltrator_highScore'))
          localStorage.setItem('neonInfiltrator_highScore', '0');

        const S = {
          phase:       'menu', // menu | playing | caught | win | gameover
          px: 0, py: 0,
          guards:      [],
          lives:       3,
          score:       0,
          combo:       1,
          level:       1,
          highScore:   parseInt(localStorage.getItem('neonInfiltrator_highScore') || '0'),
          particles:   [],
          lastT:       0,
          flashT:      0, flashCol: '',
          invincible:  0,
          busy:        false,   // transitioning between phases
          lastBonus:   0,
          mCtrl:       null,    // mobile d-pad bounds
        };

        const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        resize();
        window.addEventListener('resize', resize);

        const cw   = () => Math.min(canvas.width * 0.83, canvas.height * 0.73) / GRID;
        const offX = () => (canvas.width  - cw() * GRID) / 2;
        const offY = () => (canvas.height - cw() * GRID) / 2 + (canvas.height > 700 ? 15 : 5);

        const burst = (wx, wy, col, n = 22) => {
          for (let i = 0; i < n; i++) {
            const a = Math.random() * Math.PI * 2, sp = 60 + Math.random() * 200;
            S.particles.push({ x:wx, y:wy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
              life:1, decay: 0.5 + Math.random()*0.9, col, sz: 2+Math.random()*4 });
          }
        };

        const initLevel = () => {
          S.px = 0; S.py = 0;
          S.guards = makeLevel(S.level);
          S.phase  = 'playing';
          S.busy   = false;
          S.invincible = 2.8;  // grace period on spawn
        };

        const startGame = () => {
          S.lives = 3; S.score = 0; S.combo = 1; S.level = 1;
          S.particles = [];
          initLevel();
        };

        const saveHigh = () => {
          if (S.score > S.highScore) {
            S.highScore = S.score;
            localStorage.setItem('neonInfiltrator_highScore', S.score.toString());
          }
        };

        const onCaught = () => {
          if (S.phase !== 'playing' || S.invincible > 0 || S.busy) return;
          S.busy = true; S.phase = 'caught';
          S.combo = 1;
          S.flashCol = '#ff0055'; S.flashT = 0.9;
          const c = cw(), ox = offX(), oy = offY();
          burst(ox+(S.px+.5)*c, oy+(S.py+.5)*c, '#ff0055', 28);
          playAlarm();
          S.lives--;
          saveHigh();
          setTimeout(() => {
            if (S.lives <= 0) { S.phase = 'gameover'; }
            else              { initLevel(); }
          }, 1900);
        };

        const onWin = () => {
          if (S.phase !== 'playing' || S.busy) return;
          S.busy = true; S.phase = 'win';
          const bonus = 100 * S.combo * S.level;
          S.score += bonus; S.lastBonus = bonus;
          S.combo++;
          S.flashCol = '#00ffcc'; S.flashT = 0.8;
          const c = cw(), ox = offX(), oy = offY();
          burst(ox+(GRID-.5)*c, oy+(GRID-.5)*c, '#ffdd00', 45);
          burst(ox+(S.px+.5)*c, oy+(S.py+.5)*c, '#00ffcc', 25);
          playWin();
          saveHigh();
          setTimeout(() => { S.level++; S.particles = []; initLevel(); }, 2100);
        };

        const move = (dx, dy) => {
          if (S.phase !== 'playing' || S.busy) return;
          const nx = S.px + dx, ny = S.py + dy;
          if (nx < 0 || nx >= GRID || ny < 0 || ny >= GRID) return;
          S.px = nx; S.py = ny;
          playStep();
          if (nx === GRID-1 && ny === GRID-1) { onWin(); return; }
          if (S.invincible <= 0 && inSpotlight(nx, ny, S.guards)) onCaught();
        };

        const onKey = (e) => {
          if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
          if (S.phase === 'menu' || S.phase === 'gameover') {
            if (e.key === 'Enter' || e.key === ' ') startGame();
            return;
          }
          switch (e.key) {
            case 'ArrowUp':    case 'w': case 'W': move( 0,-1); break;
            case 'ArrowDown':  case 's': case 'S': move( 0, 1); break;
            case 'ArrowLeft':  case 'a': case 'A': move(-1, 0); break;
            case 'ArrowRight': case 'd': case 'D': move( 1, 0); break;
          }
        };
        window.addEventListener('keydown', onKey);

        const onTouch = (e) => {
          e.preventDefault();
          const rect = canvas.getBoundingClientRect();
          const t = e.touches ? e.touches[0] : e;
          const cx = t.clientX - rect.left, cy = t.clientY - rect.top;

          if (S.phase === 'menu' || S.phase === 'gameover') { startGame(); return; }
          if (S.phase !== 'playing') return;

          const mc = S.mCtrl;
          if (!mc) return;
          const { bx, by, bs } = mc;
          const th = bs * 0.62;
          if (Math.abs(cx - bx) < th && cy < by - bs*0.25)      move( 0,-1);
          else if (Math.abs(cx - bx) < th && cy > by + bs*0.25) move( 0, 1);
          else if (cx < bx - bs*0.25 && Math.abs(cy - by) < th) move(-1, 0);
          else if (cx > bx + bs*0.25 && Math.abs(cy - by) < th) move( 1, 0);
        };
        canvas.addEventListener('click',      onTouch);
        canvas.addEventListener('touchstart', onTouch, { passive: false });

        // ── Render loop ───────────────────────────────────────────────────
        const loop = (ts) => {
          const dt = Math.min((ts - (S.lastT || ts)) / 1000, 0.05);
          S.lastT = ts;
          const t = ts / 1000;

          const W = canvas.width, H = canvas.height;
          const c = cw(), ox = offX(), oy = offY();

          // Update guards
          if (S.phase !== 'menu' && S.phase !== 'gameover') {
            for (const g of S.guards) g.angle += g.speed * dt;
          }

          // Invincibility countdown
          if (S.phase === 'playing') {
            if (S.invincible > 0) {
              S.invincible -= dt;
            } else if (!S.busy && inSpotlight(S.px, S.py, S.guards)) {
              onCaught();
            }
          }

          // Flash
          if (S.flashT > 0) S.flashT -= dt;

          // Particles
          for (let i = S.particles.length - 1; i >= 0; i--) {
            const p = S.particles[i];
            p.x += p.vx * dt; p.y += p.vy * dt;
            p.vy += 130 * dt;
            p.life -= p.decay * dt;
            if (p.life <= 0) S.particles.splice(i, 1);
          }

          // ── DRAW ─────────────────────────────────────────────────────────

          // Background
          ctx.fillStyle = '#040010';
          ctx.fillRect(0, 0, W, H);

          // Subtle scanlines
          ctx.fillStyle = 'rgba(0,0,0,0.06)';
          for (let y = 0; y < H; y += 4) ctx.fillRect(0, y, W, 2);

          // Grid lines
          ctx.strokeStyle = '#0d0d2a';
          ctx.lineWidth = 1;
          for (let i = 0; i <= GRID; i++) {
            ctx.beginPath();
            ctx.moveTo(ox + i*c, oy); ctx.lineTo(ox + i*c, oy + GRID*c);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(ox, oy + i*c); ctx.lineTo(ox + GRID*c, oy + i*c);
            ctx.stroke();
          }

          // Grid border
          ctx.strokeStyle = '#220055';
          ctx.lineWidth = 2;
          ctx.strokeRect(ox, oy, GRID*c, GRID*c);

          // Spotlights & Guards
          if (S.phase !== 'menu' && S.phase !== 'gameover') {
            for (const g of S.guards) {
              const gx  = ox + (g.x + .5) * c;
              const gy  = oy + (g.y + .5) * c;
              const rng = g.range * c;
              const hc  = (g.cone / 2) * Math.PI / 180;
              const ar  = g.angle * Math.PI / 180;

              // Glow halo around guard
              const halo = ctx.createRadialGradient(gx, gy, 0, gx, gy, c * 0.7);
              halo.addColorStop(0, 'rgba(255,140,0,0.6)');
              halo.addColorStop(1, 'rgba(255,80,0,0)');
              ctx.beginPath(); ctx.arc(gx, gy, c*0.7, 0, Math.PI*2);
              ctx.fillStyle = halo; ctx.fill();

              // Spotlight cone
              const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, rng);
              grad.addColorStop(0,   'rgba(255,230,80,0.55)');
              grad.addColorStop(0.5, 'rgba(255,200,30,0.28)');
              grad.addColorStop(1,   'rgba(255,160,0,0)');

              ctx.save();
              ctx.beginPath();
              ctx.moveTo(gx, gy);
              ctx.arc(gx, gy, rng, ar - hc, ar + hc);
              ctx.closePath();
              ctx.fillStyle = grad;
              ctx.shadowColor = 'rgba(255,200,0,0.3)';
              ctx.shadowBlur  = 20;
              ctx.fill();
              ctx.restore();

              // Guard body
              ctx.beginPath();
              ctx.arc(gx, gy, c*0.3, 0, Math.PI*2);
              ctx.fillStyle = '#ff5500';
              ctx.fill();
              ctx.strokeStyle = '#ffaa00';
              ctx.lineWidth = 2;
              ctx.stroke();

              // Guard "eye" dot at center + direction tick
              ctx.beginPath();
              ctx.arc(gx + Math.cos(ar)*c*0.14, gy + Math.sin(ar)*c*0.14, c*0.07, 0, Math.PI*2);
              ctx.fillStyle = '#ffee00';
              ctx.fill();
            }
          }

          // Start cell
          ctx.fillStyle = 'rgba(0,255,100,0.1)';
          ctx.fillRect(ox+1, oy+1, c-2, c-2);
          ctx.strokeStyle = '#00ff66';
          ctx.lineWidth = 1.5;
          ctx.strokeRect(ox+2, oy+2, c-4, c-4);
          ctx.fillStyle = '#00ff66';
          ctx.font = `${c*0.35}px Arial`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('▣', ox+c*.5, oy+c*.5);

          // Vault cell (goal)
          const vp = 0.18 + 0.1 * Math.sin(t * 5);
          ctx.fillStyle = `rgba(255,210,0,${vp})`;
          ctx.fillRect(ox+(GRID-1)*c+1, oy+(GRID-1)*c+1, c-2, c-2);
          ctx.strokeStyle = '#ffdd00';
          ctx.shadowColor = '#ffdd00';
          ctx.shadowBlur  = 12;
          ctx.lineWidth = 2;
          ctx.strokeRect(ox+(GRID-1)*c+2, oy+(GRID-1)*c+2, c-4, c-4);
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#ffdd00';
          ctx.font = `bold ${c*0.45}px Arial`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText('★', ox+(GRID-.5)*c, oy+(GRID-.5)*c);

          // Player
          if (S.phase !== 'menu' && S.phase !== 'gameover') {
            const px = ox + (S.px + .5) * c;
            const py = oy + (S.py + .5) * c;
            const pr = c * 0.27;
            const blinkShow = S.invincible <= 0 || Math.sin(t * 18) > 0;

            if (blinkShow) {
              ctx.save();
              ctx.shadowColor = '#00ffcc';
              ctx.shadowBlur  = 22;
              ctx.beginPath();
              ctx.arc(px, py, pr, 0, Math.PI*2);
              ctx.fillStyle   = S.invincible > 0 ? '#88ffee' : '#00ffcc';
              ctx.fill();
              ctx.strokeStyle = '#ffffff';
              ctx.lineWidth   = 2;
              ctx.stroke();
              ctx.restore();

              // Danger ring — shows proximity to detection
              if (S.invincible <= 0 && S.phase === 'playing') {
                let minDist = Infinity;
                for (const g of S.guards) {
                  const dx = S.px - g.x, dy = S.py - g.y;
                  const dist = Math.sqrt(dx*dx + dy*dy);
                  if (dist > g.range) continue;
                  const atp = Math.atan2(dy, dx) * 180 / Math.PI;
                  const ga  = ((g.angle % 360) + 360) % 360;
                  const ap  = ((atp % 360) + 360) % 360;
                  let diff  = Math.abs(ap - ga);
                  if (diff > 180) diff = 360 - diff;
                  const pct = 1 - diff / (g.cone / 2 + 15);
                  if (pct > 0) minDist = Math.min(minDist, pct);
                }
                if (minDist < Infinity && minDist > 0) {
                  ctx.beginPath();
                  ctx.arc(px, py, pr + 5 + Math.sin(t*12)*2, 0, Math.PI*2);
                  ctx.strokeStyle = `rgba(255,${Math.floor(120*(1-minDist))},0,${minDist*0.8})`;
                  ctx.lineWidth   = 2.5;
                  ctx.stroke();
                }
              }
            }
          }

          // Particles
          for (const p of S.particles) {
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.sz, 0, Math.PI*2);
            ctx.fillStyle = p.col;
            ctx.fill();
          }
          ctx.globalAlpha = 1;

          // Screen flash
          if (S.flashT > 0) {
            ctx.fillStyle   = S.flashCol;
            ctx.globalAlpha = Math.min(S.flashT * 0.5, 0.35);
            ctx.fillRect(0, 0, W, H);
            ctx.globalAlpha = 1;
          }

          // ── HUD ────────────────────────────────────────────────────────
          const hudY  = Math.max(oy - 48, 10);
          const fSize = Math.min(W * 0.027, 20);

          ctx.font = `bold ${fSize}px 'Courier New', monospace`;
          ctx.textBaseline = 'top';

          ctx.textAlign = 'left';
          ctx.fillStyle = '#00ffcc';
          ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 8;
          ctx.fillText(`${S.score}`, ox, hudY);
          ctx.shadowBlur = 0;

          ctx.textAlign = 'center';
          ctx.fillStyle = '#aa88ff';
          ctx.fillText(`LEVEL ${S.level}`, W/2, hudY);

          ctx.textAlign = 'right';
          ctx.fillStyle = '#444466';
          ctx.fillText(`BEST ${S.highScore}`, ox + GRID*c, hudY);

          // Lives pips
          if (S.phase !== 'menu') {
            const lY = hudY + fSize + 6;
            for (let i = 0; i < 3; i++) {
              ctx.beginPath();
              ctx.arc(ox + 9 + i*20, lY + 7, 7, 0, Math.PI*2);
              ctx.fillStyle = i < S.lives ? '#00ffcc' : '#1a1a33';
              ctx.fill();
              if (i < S.lives) { ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 1; ctx.stroke(); }
            }

            // Combo badge
            if (S.combo > 1) {
              ctx.textAlign = 'right';
              ctx.fillStyle = '#ffdd00';
              ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 10;
              ctx.font = `bold ${Math.min(W*0.02, 15)}px 'Courier New', monospace`;
              ctx.fillText(`×${S.combo} COMBO`, ox + GRID*c, lY + 2);
              ctx.shadowBlur = 0;
            }
          }

          // Mobile D-pad (bottom center, shown during play)
          if (S.phase === 'playing') {
            const bs = Math.min(W, H) * 0.085;
            const bx = W * 0.5, by = H - bs * 2.3;
            S.mCtrl = { bx, by, bs };

            const pad = (x, y, lbl) => {
              ctx.fillStyle   = 'rgba(0,255,200,0.1)';
              ctx.strokeStyle = 'rgba(0,255,200,0.35)';
              ctx.lineWidth   = 1.5;
              ctx.fillRect(x-bs/2, y-bs/2, bs, bs);
              ctx.strokeRect(x-bs/2, y-bs/2, bs, bs);
              ctx.fillStyle = 'rgba(0,255,200,0.65)';
              ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
              ctx.font = `${bs*0.44}px Arial`;
              ctx.fillText(lbl, x, y);
            };
            pad(bx,      by - bs, '▲');
            pad(bx,      by + bs, '▼');
            pad(bx - bs, by,      '◀');
            pad(bx + bs, by,      '▶');
          }

          // ── Overlay Screens ───────────────────────────────────────────

          if (S.phase === 'menu') {
            ctx.fillStyle = 'rgba(4,0,16,0.84)';
            ctx.fillRect(0, 0, W, H);
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

            const tsz = Math.min(W*0.085, 64);
            ctx.font = `bold ${tsz}px 'Courier New', monospace`;
            ctx.shadowBlur = 40; ctx.shadowColor = '#00ffcc';
            ctx.fillStyle = '#00ffcc';
            ctx.fillText('NEON', W/2, H/2 - tsz*1.5);
            ctx.shadowColor = '#ff44ff'; ctx.fillStyle = '#ff44ff';
            ctx.fillText('INFILTRATOR', W/2, H/2 - tsz*0.45);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#7777aa';
            ctx.font = `${Math.min(W*0.026, 18)}px 'Courier New', monospace`;
            ctx.fillText('Dodge the spotlight cones — reach the ★ vault!', W/2, H/2 + tsz*0.75);
            ctx.fillText('Arrow Keys / WASD to move  •  Tap the D-pad on mobile', W/2, H/2 + tsz*1.25);

            const pl = 0.55 + 0.45 * Math.sin(t * 3.2);
            ctx.globalAlpha = pl;
            ctx.fillStyle = '#00ffcc';
            ctx.font = `bold ${Math.min(W*0.03, 22)}px 'Courier New', monospace`;
            ctx.fillText('▶  CLICK OR PRESS ENTER TO START', W/2, H/2 + tsz*2.25);
            ctx.globalAlpha = 1;

            if (S.highScore > 0) {
              ctx.fillStyle = '#ffdd00';
              ctx.font = `${Math.min(W*0.022, 16)}px 'Courier New', monospace`;
              ctx.fillText(`HIGH SCORE: ${S.highScore}`, W/2, H/2 + tsz*3.1);
            }
          }

          if (S.phase === 'caught') {
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ff0055'; ctx.shadowBlur = 55;
            ctx.fillStyle = '#ff2255';
            ctx.font = `bold ${Math.min(W*0.075, 60)}px 'Courier New', monospace`;
            ctx.fillText('CAUGHT!', W/2, H/2 - 20);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffaaaa';
            ctx.font = `${Math.min(W*0.025, 18)}px 'Courier New', monospace`;
            const ll = S.lives;
            ctx.fillText(ll > 0 ? `${ll} ${ll===1?'LIFE':'LIVES'} REMAINING` : 'NO LIVES LEFT…', W/2, H/2 + 38);
          }

          if (S.phase === 'win') {
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 50;
            ctx.fillStyle = '#00ffcc';
            ctx.font = `bold ${Math.min(W*0.065, 52)}px 'Courier New', monospace`;
            ctx.fillText('VAULT CRACKED!', W/2, H/2 - 25);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffdd00';
            ctx.font = `bold ${Math.min(W*0.033, 26)}px 'Courier New', monospace`;
            ctx.fillText(`+${S.lastBonus} pts  ×${S.combo} COMBO`, W/2, H/2 + 38);
          }

          if (S.phase === 'gameover') {
            ctx.fillStyle = 'rgba(4,0,16,0.88)';
            ctx.fillRect(0, 0, W, H);
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

            ctx.shadowColor = '#ff0055'; ctx.shadowBlur = 35;
            ctx.fillStyle = '#ff0055';
            ctx.font = `bold ${Math.min(W*0.075, 58)}px 'Courier New', monospace`;
            ctx.fillText('GAME OVER', W/2, H/2 - 70);
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#00ffcc';
            ctx.shadowColor = '#00ffcc'; ctx.shadowBlur = 12;
            ctx.font = `bold ${Math.min(W*0.045, 36)}px 'Courier New', monospace`;
            ctx.fillText(`SCORE: ${S.score}`, W/2, H/2 - 5);
            ctx.shadowBlur = 0;

            if (S.score > 0 && S.score >= S.highScore) {
              ctx.fillStyle = '#ffdd00';
              ctx.shadowColor = '#ffdd00'; ctx.shadowBlur = 20;
              ctx.font = `bold ${Math.min(W*0.032, 24)}px 'Courier New', monospace`;
              ctx.fillText('★  NEW HIGH SCORE!  ★', W/2, H/2 + 45);
              ctx.shadowBlur = 0;
            } else {
              ctx.fillStyle = '#444466';
              ctx.font = `${Math.min(W*0.024, 18)}px 'Courier New', monospace`;
              ctx.fillText(`BEST: ${S.highScore}`, W/2, H/2 + 45);
            }

            const pl2 = 0.55 + 0.45 * Math.sin(t * 3);
            ctx.globalAlpha = pl2;
            ctx.fillStyle = '#00ffcc';
            ctx.font = `bold ${Math.min(W*0.025, 19)}px 'Courier New', monospace`;
            ctx.fillText('CLICK OR PRESS ENTER TO RETRY', W/2, H/2 + 105);
            ctx.globalAlpha = 1;
          }

          raf.current = requestAnimationFrame(loop);
        };

        raf.current = requestAnimationFrame(loop);

        return () => {
          cancelAnimationFrame(raf.current);
          window.removeEventListener('resize', resize);
          window.removeEventListener('keydown', onKey);
          canvas.removeEventListener('click',      onTouch);
          canvas.removeEventListener('touchstart', onTouch);
        };
      }, []);

      return <canvas ref={cvs} style={{ display: 'block' }} />;
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
