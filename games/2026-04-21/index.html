<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Storm Dash</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #04000e; overflow: hidden; font-family: 'Courier New', monospace; user-select: none; touch-action: none; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LS_KEY = 'stormDashHighScore';

    // ── Audio ─────────────────────────────────────────────────────────────────
    let _actx = null;
    function getACtx() {
      if (!_actx) try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      return _actx;
    }
    function tone(freq, type, dur, vol, freqEnd) {
      try {
        const c = getACtx(); if (!c) return;
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = type;
        o.frequency.setValueAtTime(freq, c.currentTime);
        o.frequency.exponentialRampToValueAtTime(freqEnd || freq * 0.5, c.currentTime + dur);
        g.gain.setValueAtTime(vol, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
        o.start(); o.stop(c.currentTime + dur);
      } catch(e) {}
    }
    function sndTeleport() { tone(1200,'sine',0.06,0.18); tone(800,'sine',0.1,0.1,400); }
    function sndCollect(combo) { tone(440 + Math.min(combo,10)*55,'triangle',0.14,0.22); }
    function sndStrike() { tone(80,'sawtooth',0.3,0.5,40); }
    function sndHit() { tone(110,'sawtooth',0.6,0.55,55); }
    function sndOver() { tone(90,'sawtooth',1.0,0.6,45); }

    // ── Lightning helper (module-level so start screen can call it) ──────────
    function drawLightningSegments(ctx, x1, y1, x2, y2, alpha, width) {
      const segs = 14;
      const pts = [{ x: x1, y: y1 }];
      for (let i = 1; i < segs; i++) {
        const t = i / segs;
        const jitter = (Math.random() - 0.5) * 28;
        pts.push({ x: x1 + jitter, y: y1 + (y2 - y1) * t });
      }
      pts.push({ x: x2, y: y2 });
      ctx.save();
      // glow pass
      ctx.shadowBlur = 18; ctx.shadowColor = `rgba(255,255,100,${alpha})`;
      ctx.strokeStyle = `rgba(255,255,180,${alpha})`; ctx.lineWidth = (width || 3) + 1;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.beginPath(); pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y)); ctx.stroke();
      // core
      ctx.shadowBlur = 0;
      ctx.strokeStyle = `rgba(255,255,255,${alpha})`; ctx.lineWidth = width || 2;
      ctx.beginPath(); pts.forEach((p,i) => i===0 ? ctx.moveTo(p.x,p.y) : ctx.lineTo(p.x,p.y)); ctx.stroke();
      ctx.restore();
    }

    // ── Main component ────────────────────────────────────────────────────────
    function StormDash() {
      const canvasRef = useRef(null);
      const gsRef     = useRef(null);  // game state
      const rafRef    = useRef(null);
      const [ui, setUi] = useState({
        phase: 'start', score: 0, lives: 3, combo: 0,
        best: parseInt(localStorage.getItem(LS_KEY) || '0'),
      });

      const W = Math.min(window.innerWidth,  520);
      const H = Math.min(window.innerHeight, 720);

      // ── State factory ──────────────────────────────────────────────────────
      function mkGS() {
        return {
          phase: 'playing',
          orb: { x: W/2, y: H*0.7, blink: 0 },
          bolts: [],    // {x, warnLeft, warnDur, strikeLeft, striking, id}
          gems: [],     // {x, y, t, period, collected}
          particles: [],// {x,y,vx,vy,life,maxLife,color,size}
          score: 0, lives: 3, combo: 0, bestCombo: 0,
          elapsed: 0,
          nextBolt: 1.8, nextGem: 0.8,
          flashAlpha: 0, bgT: 0,
          boltIdSeq: 0,
        };
      }

      function addParticles(gs, x, y, color, n, spd) {
        for (let i = 0; i < n; i++) {
          const a = Math.random() * Math.PI * 2;
          const s = (0.4 + Math.random() * 0.6) * spd;
          gs.particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
            life: 0.5 + Math.random()*0.4, maxLife: 1, color,
            size: 2 + Math.random()*4 });
        }
      }

      // ── Update ─────────────────────────────────────────────────────────────
      function update(gs, dt) {
        gs.elapsed += dt;
        gs.bgT += dt * 0.28;

        // difficulty ramps over 90 s
        const diff = Math.min(gs.elapsed / 90, 1);
        const warnDur = Math.max(0.45, 1.5 - diff * 0.9);
        const boltIv  = Math.max(0.55, 2.0 - diff * 1.1);

        // ── orb blink timer ──
        if (gs.orb.blink > 0) gs.orb.blink -= dt;

        // ── spawn gems ──
        gs.nextGem -= dt;
        if (gs.nextGem <= 0 && gs.gems.filter(g => !g.collected).length < 6) {
          gs.gems.push({
            x: 28 + Math.random() * (W - 56),
            y: 70  + Math.random() * (H - 160),
            t: 0, period: 0.7 + Math.random() * 0.5,
            collected: false,
          });
          gs.nextGem = 0.9 + Math.random() * 1.2;
        }
        gs.gems.forEach(g => { g.t += dt; });
        gs.gems = gs.gems.filter(g => !g.collected || g.t < 10);

        // ── spawn bolts ──
        gs.nextBolt -= dt;
        if (gs.nextBolt <= 0) {
          const count = diff > 0.7 ? 3 : diff > 0.4 ? 2 : 1;
          for (let i = 0; i < count; i++) {
            if (gs.bolts.length < 9) {
              gs.bolts.push({
                x: 22 + Math.random() * (W - 44),
                warnLeft: warnDur, warnDur,
                strikeLeft: 0.28,
                striking: false, done: false,
                id: gs.boltIdSeq++,
              });
            }
          }
          gs.nextBolt = boltIv * (0.6 + Math.random() * 0.7);
        }

        // ── update bolts ──
        gs.bolts = gs.bolts.filter(b => {
          if (b.done) return false;
          if (!b.striking) {
            b.warnLeft -= dt;
            if (b.warnLeft <= 0) {
              b.striking = true;
              sndStrike();
              addParticles(gs, b.x, 30, '#ffff88', 12, 280);
              addParticles(gs, b.x, H*0.55, '#ffffff', 8, 220);
              // hit check
              const dx = Math.abs(gs.orb.x - b.x);
              if (dx < 18) {
                gs.lives--;
                gs.combo = 0;
                sndHit();
                addParticles(gs, gs.orb.x, gs.orb.y, '#ff3333', 20, 320);
                gs.flashAlpha = 0.85;
                gs.orb.blink = 1.2;
                if (gs.lives <= 0) {
                  gs.phase = 'over';
                  sndOver();
                  const prev = parseInt(localStorage.getItem(LS_KEY) || '0');
                  if (gs.score > prev) localStorage.setItem(LS_KEY, String(gs.score));
                }
              }
            }
          } else {
            b.strikeLeft -= dt;
            if (b.strikeLeft <= 0) b.done = true;
          }
          return true;
        });

        // ── gem collection ──
        gs.gems.forEach(g => {
          if (g.collected) return;
          const dx = gs.orb.x - g.x, dy = gs.orb.y - g.y;
          if (dx*dx + dy*dy < 24*24) {
            g.collected = true;
            g.t = 0;
            gs.combo++;
            if (gs.combo > gs.bestCombo) gs.bestCombo = gs.combo;
            const pts = 10 * Math.max(1, gs.combo);
            gs.score += pts;
            sndCollect(gs.combo);
            addParticles(gs, g.x, g.y, '#00ffff', 14, 210);
          }
        });

        // ── particles ──
        gs.particles = gs.particles.filter(p => {
          p.x += p.vx * dt; p.y += p.vy * dt;
          p.vy += 190 * dt;
          p.life -= dt;
          return p.life > 0;
        });

        if (gs.flashAlpha > 0) gs.flashAlpha = Math.max(0, gs.flashAlpha - dt * 2.8);

        setUi({ phase: gs.phase, score: gs.score, lives: gs.lives, combo: gs.combo,
          best: parseInt(localStorage.getItem(LS_KEY) || '0') });
      }

      // ── Draw ───────────────────────────────────────────────────────────────
      function draw(ctx, gs) {
        const t = gs.bgT;

        // Background gradient
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, `hsl(${255 + Math.sin(t)*18},72%,7%)`);
        bg.addColorStop(0.5, `hsl(${272 + Math.cos(t*0.65)*14},60%,5%)`);
        bg.addColorStop(1,   `hsl(${245 + Math.sin(t*1.1)*18},80%,6%)`);
        ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

        // Ambient cloud wisps
        for (let i = 0; i < 4; i++) {
          const cx = W * 0.15 + i * W * 0.25 + Math.sin(t*0.28 + i*1.4) * 25;
          const cy = H * 0.08 + Math.cos(t*0.2 + i*0.9) * 18;
          const r  = 75 + i * 12;
          const wg = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
          wg.addColorStop(0,   `rgba(120,60,220,0.07)`);
          wg.addColorStop(1,   'transparent');
          ctx.fillStyle = wg;
          ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
        }

        // Ground line
        ctx.strokeStyle = 'rgba(120,60,220,0.25)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(0, H-28); ctx.lineTo(W, H-28); ctx.stroke();

        // ── Bolts ──
        gs.bolts.forEach(b => {
          if (!b.striking) {
            const wf = 1 - b.warnLeft / b.warnDur; // 0→1
            const pulse = 0.5 + 0.5 * Math.sin(t * 12 + b.id);
            const alpha = 0.15 + wf * 0.55 + pulse * 0.12 * wf;

            // Warning column (danger zone tint)
            const col = ctx.createLinearGradient(b.x - 14, 0, b.x + 14, 0);
            col.addColorStop(0, 'transparent');
            col.addColorStop(0.5, `rgba(255,255,60,${alpha * 0.18})`);
            col.addColorStop(1, 'transparent');
            ctx.fillStyle = col; ctx.fillRect(b.x - 14, 0, 28, H - 28);

            // Dashed warning line
            ctx.setLineDash([6, 9]);
            ctx.strokeStyle = `rgba(255,255,80,${alpha})`;
            ctx.lineWidth = 1.2 + wf * 1.8;
            ctx.beginPath(); ctx.moveTo(b.x, 0); ctx.lineTo(b.x, H - 28); ctx.stroke();
            ctx.setLineDash([]);

            // Arrowhead warning at top
            const af = 0.3 + wf * 0.7;
            ctx.fillStyle = `rgba(255,220,40,${af})`;
            ctx.beginPath();
            ctx.moveTo(b.x, 36); ctx.lineTo(b.x - 9, 14); ctx.lineTo(b.x + 9, 14);
            ctx.closePath(); ctx.fill();
          } else {
            // STRIKE
            const a = b.strikeLeft / 0.28;
            drawLightningSegments(ctx, b.x, 0, b.x, H - 28, a, 3);
            // strike glow on ground
            const sg = ctx.createRadialGradient(b.x, H-28, 0, b.x, H-28, 40);
            sg.addColorStop(0, `rgba(255,255,150,${a*0.6})`);
            sg.addColorStop(1, 'transparent');
            ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(b.x, H-28, 40, 0, Math.PI*2); ctx.fill();
          }
        });

        // ── Gems ──
        gs.gems.forEach(g => {
          if (g.collected) return;
          const pulse = 0.82 + 0.18 * Math.sin(g.t / g.period * Math.PI * 2);
          const r = 10 * pulse;
          // outer glow
          const gg = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, r * 2.8);
          gg.addColorStop(0, 'rgba(0,255,255,0.85)');
          gg.addColorStop(0.45,'rgba(0,200,255,0.4)');
          gg.addColorStop(1, 'transparent');
          ctx.fillStyle = gg;
          ctx.beginPath(); ctx.arc(g.x, g.y, r*2.8, 0, Math.PI*2); ctx.fill();
          // core gem (diamond shape)
          ctx.save();
          ctx.translate(g.x, g.y); ctx.rotate(Math.PI/4 + g.t*0.4);
          ctx.fillStyle = '#00ffff';
          ctx.shadowBlur = 8; ctx.shadowColor = '#00ffff';
          ctx.fillRect(-r*0.7, -r*0.7, r*1.4, r*1.4);
          ctx.restore();
          ctx.shadowBlur = 0;
        });

        // ── Player orb ──
        const orb = gs.orb;
        const visible = orb.blink <= 0 || (Math.floor(orb.blink * 12) % 2 === 0);
        if (visible) {
          // outer aura
          const og = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, 34);
          og.addColorStop(0, 'rgba(200,100,255,1.0)');
          og.addColorStop(0.4,'rgba(140,50,240,0.55)');
          og.addColorStop(1, 'transparent');
          ctx.fillStyle = og;
          ctx.beginPath(); ctx.arc(orb.x, orb.y, 34, 0, Math.PI*2); ctx.fill();
          // core
          ctx.fillStyle = '#cc88ff';
          ctx.shadowBlur = 10; ctx.shadowColor = '#aa44ff';
          ctx.beginPath(); ctx.arc(orb.x, orb.y, 10, 0, Math.PI*2); ctx.fill();
          ctx.shadowBlur = 0;
          // specular
          ctx.fillStyle = 'rgba(255,255,255,0.7)';
          ctx.beginPath(); ctx.arc(orb.x - 3, orb.y - 3, 3.5, 0, Math.PI*2); ctx.fill();
        }

        // ── Particles ──
        gs.particles.forEach(p => {
          ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
          ctx.fillStyle = p.color;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.size * Math.max(0,p.life/p.maxLife), 0, Math.PI*2); ctx.fill();
        });
        ctx.globalAlpha = 1;

        // Flash overlay
        if (gs.flashAlpha > 0) {
          ctx.fillStyle = `rgba(255,40,40,${gs.flashAlpha * 0.32})`;
          ctx.fillRect(0, 0, W, H);
        }

        // Game over overlay
        if (gs.phase === 'over') {
          ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
          ctx.textAlign = 'center';
          ctx.shadowBlur = 20; ctx.shadowColor = '#ff4466';
          ctx.fillStyle = '#ff4466'; ctx.font = `bold 50px 'Courier New'`;
          ctx.fillText('ZAPPED!', W/2, H*0.35);
          ctx.shadowBlur = 0;
          ctx.fillStyle = '#ffffff'; ctx.font = `26px 'Courier New'`;
          ctx.fillText(`Score: ${gs.score}`, W/2, H*0.46);
          const best = parseInt(localStorage.getItem(LS_KEY) || '0');
          ctx.fillStyle = '#ffff55'; ctx.font = `20px 'Courier New'`;
          ctx.fillText(`Best: ${best}`, W/2, H*0.53);
          if (gs.bestCombo >= 3) {
            ctx.fillStyle = '#00ffff'; ctx.font = `16px 'Courier New'`;
            ctx.fillText(`Best Combo: ×${gs.bestCombo}`, W/2, H*0.60);
          }
          ctx.fillStyle = '#aaaaff'; ctx.font = `16px 'Courier New'`;
          ctx.fillText('Tap to play again', W/2, H*0.72);
        }
      }

      // ── Draw start screen ──────────────────────────────────────────────────
      function drawStart(ctx) {
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#0a0020'); bg.addColorStop(1, '#030010');
        ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

        // Decorative bolts
        [[W*0.18,0.3],[W*0.5,0.25],[W*0.82,0.28]].forEach(([lx, a]) => {
          drawLightningSegments(ctx, lx, 0, lx, H*0.32, a, 2.5);
        });

        ctx.textAlign = 'center';
        ctx.shadowBlur = 24; ctx.shadowColor = '#9933ff';
        ctx.fillStyle = '#cc88ff'; ctx.font = `bold 52px 'Courier New'`;
        ctx.fillText('STORM DASH', W/2, H*0.44);
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#ffff88'; ctx.font = `15px 'Courier New'`;
        ctx.fillText('Dodge the lightning — collect the gems!', W/2, H*0.53);
        ctx.fillStyle = '#aaaaff'; ctx.font = `14px 'Courier New'`;
        ctx.fillText('Tap anywhere to TELEPORT your orb', W/2, H*0.59);

        const best = parseInt(localStorage.getItem(LS_KEY) || '0');
        if (best > 0) {
          ctx.fillStyle = '#ffff55'; ctx.font = `14px 'Courier New'`;
          ctx.fillText(`Best: ${best}`, W/2, H*0.66);
        }
        ctx.fillStyle = '#cc88ff'; ctx.font = `bold 18px 'Courier New'`;
        ctx.fillText('▶  Tap to Begin', W/2, H*0.76);
      }

      // ── Game loop ──────────────────────────────────────────────────────────
      function loop(gs, last) {
        const now = performance.now();
        const dt  = Math.min((now - last) / 1000, 0.05);
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        if (gs.phase === 'playing') {
          update(gs, dt);
          draw(ctx, gs);
          rafRef.current = requestAnimationFrame(() => loop(gs, now));
        } else {
          draw(ctx, gs); // final frame with overlay
        }
      }

      function startGame() {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const gs = mkGS();
        gsRef.current = gs;
        setUi({ phase: 'playing', score: 0, lives: 3, combo: 0,
          best: parseInt(localStorage.getItem(LS_KEY) || '0') });
        rafRef.current = requestAnimationFrame(now => loop(gs, now));
      }

      // ── Input ──────────────────────────────────────────────────────────────
      function handleInput(cx, cy) {
        const gs = gsRef.current;
        if (!gs || gs.phase === 'start') { startGame(); return; }
        if (gs.phase === 'over') { startGame(); return; }
        if (gs.phase !== 'playing') return;

        // Clamp to safe area
        const nx = Math.max(14, Math.min(W - 14, cx));
        const ny = Math.max(14, Math.min(H - 50, cy));
        gs.orb.x = nx; gs.orb.y = ny;
        gs.orb.blink = Math.max(gs.orb.blink, 0.15);
        sndTeleport();
        addParticles(gs, nx, ny, '#cc88ff', 7, 160);
      }

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        drawStart(ctx);

        function onPointer(e) {
          e.preventDefault();
          const rect = canvas.getBoundingClientRect();
          const sx = W / rect.width, sy = H / rect.height;
          if (e.touches && e.touches.length > 0) {
            handleInput(
              (e.touches[0].clientX - rect.left) * sx,
              (e.touches[0].clientY - rect.top)  * sy,
            );
          } else {
            handleInput(
              (e.clientX - rect.left) * sx,
              (e.clientY - rect.top)  * sy,
            );
          }
        }

        canvas.addEventListener('click',      onPointer);
        canvas.addEventListener('touchstart', onPointer, { passive: false });

        return () => {
          canvas.removeEventListener('click',      onPointer);
          canvas.removeEventListener('touchstart', onPointer);
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
        };
      }, []); // eslint-disable-line

      // ── HUD ───────────────────────────────────────────────────────────────
      const { phase, score, lives, combo } = ui;
      const showHud = phase === 'playing';

      return (
        <div style={{ position: 'relative', width: W, height: H, margin: '0 auto', overflow: 'hidden' }}>
          <canvas ref={canvasRef} width={W} height={H} style={{ display: 'block' }} />
          {showHud && (
            <div style={{
              position: 'absolute', top: 0, left: 0, right: 0,
              display: 'flex', justifyContent: 'space-between', alignItems: 'center',
              padding: '8px 14px', pointerEvents: 'none',
            }}>
              <span style={{ color: '#00ffff', fontSize: 22, fontFamily: 'Courier New',
                textShadow: '0 0 10px #00ffff' }}>
                {score}
              </span>
              <div style={{ display: 'flex', gap: 6 }}>
                {[0,1,2].map(i => (
                  <span key={i} style={{ fontSize: 20, opacity: i < lives ? 1 : 0.18,
                    textShadow: i < lives ? '0 0 8px #ffff44' : 'none' }}>⚡</span>
                ))}
              </div>
              {combo >= 2 && (
                <span style={{ color: '#ffff44', fontSize: 15, fontFamily: 'Courier New',
                  textShadow: '0 0 8px #ffff44' }}>
                  ×{combo} COMBO
                </span>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<StormDash />, document.getElementById('root'));
  </script>
</body>
</html>
