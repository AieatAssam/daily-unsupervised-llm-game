<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirror Blaze</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0015;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #fff;
    }
    #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const GRID = 8;
    const CELL = typeof window !== 'undefined' ? Math.floor(Math.min(window.innerWidth, window.innerHeight) * 0.72 / GRID) : 64;

    // AudioContext
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      }
      return audioCtx;
    }

    function playTone(freq, type = 'sine', dur = 0.1, vol = 0.3) {
      const ctx = getAudio(); if (!ctx) return;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      o.start(); o.stop(ctx.currentTime + dur);
    }

    function playPlace() { playTone(440, 'triangle', 0.08, 0.25); }
    function playRemove() { playTone(220, 'sawtooth', 0.08, 0.2); }
    function playHit() {
      [523, 659, 784].forEach((f, i) => setTimeout(() => playTone(f, 'sine', 0.12, 0.3), i * 60));
    }
    function playWin() {
      [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => playTone(f, 'triangle', 0.2, 0.4), i * 80));
    }
    function playGameOver() { playTone(200, 'sawtooth', 0.4, 0.3); setTimeout(() => playTone(150, 'sawtooth', 0.5, 0.3), 150); }

    // Trace laser beam through grid
    // Returns array of {x, y, dir} segments and set of hit target indices
    function traceLaser(source, mirrors, obstacles, targets, gridSize = GRID) {
      // source: {x, y, dir} — dir: 'right','left','up','down'
      // mirrors: Map of "x,y" => '/' | '\\'
      // obstacles: Set of "x,y"
      const segments = [];
      const hitTargets = new Set();
      const visited = new Set();

      let { x, y, dir } = source;
      const MAX_STEPS = gridSize * gridSize * 4;

      for (let step = 0; step < MAX_STEPS; step++) {
        // Check bounds
        if (x < 0 || x >= gridSize || y < 0 || y >= gridSize) break;

        const key = `${x},${y},${dir}`;
        if (visited.has(key)) break;
        visited.add(key);

        segments.push({ x, y, dir });

        // Check obstacle
        if (obstacles.has(`${x},${y}`)) break;

        // Check target
        targets.forEach((t, idx) => {
          if (t.x === x && t.y === y) hitTargets.add(idx);
        });

        // Check mirror
        const mKey = `${x},${y}`;
        const mirror = mirrors[mKey];
        if (mirror) {
          if (mirror === '/') {
            if (dir === 'right') dir = 'up';
            else if (dir === 'left') dir = 'down';
            else if (dir === 'up') dir = 'right';
            else if (dir === 'down') dir = 'left';
          } else { // '\'
            if (dir === 'right') dir = 'down';
            else if (dir === 'left') dir = 'up';
            else if (dir === 'up') dir = 'left';
            else if (dir === 'down') dir = 'right';
          }
        }

        // Move
        if (dir === 'right') x++;
        else if (dir === 'left') x--;
        else if (dir === 'up') y--;
        else if (dir === 'down') y++;
      }

      return { segments, hitTargets };
    }

    // Generate levels
    function generateLevel(lvl) {
      const seed = lvl * 12345 + 7;
      const rng = (() => { let s = seed; return () => { s = (s * 1664525 + 1013904223) & 0xffffffff; return (s >>> 0) / 0xffffffff; }; })();

      const edges = ['left','top','right','bottom'];
      const sourceEdge = edges[Math.floor(rng() * 4)];
      let sourcePos;
      const mid = Math.floor(GRID / 2);
      if (sourceEdge === 'left')  sourcePos = { x: 0, y: Math.floor(rng() * GRID), dir: 'right' };
      if (sourceEdge === 'right') sourcePos = { x: GRID-1, y: Math.floor(rng() * GRID), dir: 'left' };
      if (sourceEdge === 'top')   sourcePos = { x: Math.floor(rng() * GRID), y: 0, dir: 'down' };
      if (sourceEdge === 'bottom')sourcePos = { x: Math.floor(rng() * GRID), y: GRID-1, dir: 'up' };

      const numTargets = Math.min(2 + Math.floor(lvl / 3), 4);
      const targets = [];
      const used = new Set([`${sourcePos.x},${sourcePos.y}`]);
      let attempts = 0;
      while (targets.length < numTargets && attempts < 100) {
        attempts++;
        const tx = Math.floor(rng() * GRID);
        const ty = Math.floor(rng() * GRID);
        const key = `${tx},${ty}`;
        if (!used.has(key)) {
          used.add(key);
          targets.push({ x: tx, y: ty });
        }
      }

      // Pre-place some obstacles for higher levels
      const obstacles = new Set();
      if (lvl >= 4) {
        const numObs = Math.min(Math.floor((lvl - 3) * 1.5), 6);
        let att = 0;
        while (obstacles.size < numObs && att < 50) {
          att++;
          const ox = Math.floor(rng() * GRID);
          const oy = Math.floor(rng() * GRID);
          const key = `${ox},${oy}`;
          if (!used.has(key)) {
            used.add(key);
            obstacles.add(key);
          }
        }
      }

      // Time limit: 90s for lvl1, decreasing
      const timeLimit = Math.max(30, 90 - (lvl - 1) * 6);

      return { sourcePos, targets, obstacles, timeLimit, lvl };
    }

    const LASER_COLORS = ['#00ffff', '#ff00ff', '#00ff88', '#ffaa00'];

    const ParticleSystem = ({ particles }) => (
      <g>
        {particles.map(p => (
          <circle key={p.id} cx={p.x} cy={p.y} r={p.r} fill={p.color} opacity={p.life} />
        ))}
      </g>
    );

    function App() {
      const [screen, setScreen] = useState('start'); // start, play, win, gameover
      const [level, setLevel] = useState(1);
      const [score, setScore] = useState(0);
      const [highScore, setHighScore] = useState(() => parseInt(localStorage.getItem('mirrorBlazeHighScore') || '0'));
      const [combo, setCombo] = useState(0);
      const [timeLeft, setTimeLeft] = useState(90);
      const [mirrors, setMirrors] = useState({}); // key => '/' or '\'
      const [levelData, setLevelData] = useState(null);
      const [laserPath, setLaserPath] = useState([]);
      const [hitTargets, setHitTargets] = useState(new Set());
      const [particles, setParticles] = useState([]);
      const [prevHitCount, setPrevHitCount] = useState(0);
      const [flash, setFlash] = useState(false);
      const [bgHue, setBgHue] = useState(270);
      const particleId = useRef(0);
      const timerRef = useRef(null);
      const winTimeoutRef = useRef(null);

      const laserColor = LASER_COLORS[(level - 1) % LASER_COLORS.length];

      const spawnParticles = useCallback((cx, cy, color, count = 8) => {
        const newP = Array.from({ length: count }, () => ({
          id: particleId.current++,
          x: cx, y: cy,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          r: Math.random() * 4 + 2,
          color, life: 1,
        }));
        setParticles(p => [...p.slice(-60), ...newP]);
      }, []);

      // Animate particles
      useEffect(() => {
        const id = setInterval(() => {
          setParticles(prev => prev
            .map(p => ({ ...p, x: p.x + p.vx, y: p.y + p.vy, life: p.life - 0.05, r: p.r * 0.96 }))
            .filter(p => p.life > 0)
          );
          setBgHue(h => (h + 0.3) % 360);
        }, 30);
        return () => clearInterval(id);
      }, []);

      const initLevel = useCallback((lvl) => {
        const data = generateLevel(lvl);
        setLevelData(data);
        setMirrors({});
        setTimeLeft(data.timeLimit);
        setHitTargets(new Set());
        setPrevHitCount(0);
        setLaserPath([]);
      }, []);

      const startGame = useCallback(() => {
        setScore(0); setCombo(0); setLevel(1);
        setScreen('play');
        initLevel(1);
      }, [initLevel]);

      // Recompute laser whenever mirrors or levelData changes
      useEffect(() => {
        if (!levelData) return;
        const { segments, hitTargets: ht } = traceLaser(
          levelData.sourcePos, mirrors, levelData.obstacles, levelData.targets
        );
        setLaserPath(segments);
        setHitTargets(ht);

        // Spawn particles for newly hit targets
        if (ht.size > prevHitCount) {
          ht.forEach(idx => {
            if (idx >= prevHitCount) {
              const t = levelData.targets[idx];
              const cx = t.x * CELL + CELL / 2;
              const cy = t.y * CELL + CELL / 2;
              spawnParticles(cx, cy, laserColor, 12);
              playHit();
            }
          });
          setPrevHitCount(ht.size);
        }

        // Check win: all targets hit
        if (ht.size === levelData.targets.length && levelData.targets.length > 0) {
          clearInterval(timerRef.current);
          playWin();
          setFlash(true);
          const timeBonus = timeLeft * 10;
          const comboMult = combo + 1;
          const earned = (500 + timeBonus) * comboMult;
          setScore(s => s + earned);
          setCombo(c => c + 1);
          spawnParticles(CELL * GRID / 2, CELL * GRID / 2, '#ffff00', 30);
          winTimeoutRef.current = setTimeout(() => {
            setFlash(false);
            if (level >= 10) {
              setScreen('gameover');
              setHighScore(hs => { const n = Math.max(hs, score + earned); localStorage.setItem('mirrorBlazeHighScore', n); return n; });
            } else {
              setLevel(l => { const nl = l + 1; initLevel(nl); return nl; });
            }
          }, 1500);
        }
      }, [mirrors, levelData]);

      // Timer
      useEffect(() => {
        if (screen !== 'play') return;
        clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setTimeLeft(t => {
            if (t <= 1) {
              clearInterval(timerRef.current);
              playGameOver();
              setScreen('gameover');
              setHighScore(hs => { const n = Math.max(hs, score); localStorage.setItem('mirrorBlazeHighScore', n); return n; });
              return 0;
            }
            return t - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [screen, level]);

      const handleCellClick = useCallback((x, y) => {
        if (screen !== 'play' || !levelData) return;
        if (levelData.obstacles.has(`${x},${y}`)) return;
        // Don't place on source
        if (levelData.sourcePos.x === x && levelData.sourcePos.y === y) return;
        // Don't place on target
        if (levelData.targets.some(t => t.x === x && t.y === y)) return;

        const key = `${x},${y}`;
        setMirrors(prev => {
          const cur = prev[key];
          if (!cur) { playPlace(); return { ...prev, [key]: '/' }; }
          if (cur === '/') { playPlace(); return { ...prev, [key]: '\\' }; }
          playRemove(); const n = { ...prev }; delete n[key]; return n;
        });
        spawnParticles(x * CELL + CELL / 2, y * CELL + CELL / 2, '#ffffff', 4);
      }, [screen, levelData, spawnParticles]);

      // Touch support
      const handleTouch = useCallback((e) => {
        e.preventDefault();
        const touch = e.changedTouches[0];
        const rect = e.currentTarget.getBoundingClientRect();
        const px = touch.clientX - rect.left;
        const py = touch.clientY - rect.top;
        const gx = Math.floor(px / CELL);
        const gy = Math.floor(py / CELL);
        if (gx >= 0 && gx < GRID && gy >= 0 && gy < GRID) handleCellClick(gx, gy);
      }, [handleCellClick]);

      const gridSize = CELL * GRID;

      // Laser segment rendering helper
      const renderLaser = () => {
        if (!laserPath.length) return null;
        const lines = [];
        for (let i = 0; i < laserPath.length - 1; i++) {
          const a = laserPath[i], b = laserPath[i + 1];
          const x1 = a.x * CELL + CELL / 2;
          const y1 = a.y * CELL + CELL / 2;
          const x2 = b.x * CELL + CELL / 2;
          const y2 = b.y * CELL + CELL / 2;
          lines.push(
            <line key={i} x1={x1} y1={y1} x2={x2} y2={y2}
              stroke={laserColor} strokeWidth={3}
              strokeLinecap="round" opacity={0.9}
              filter="url(#glow)" />,
            <line key={`${i}c`} x1={x1} y1={y1} x2={x2} y2={y2}
              stroke="white" strokeWidth={1}
              strokeLinecap="round" opacity={0.6} />
          );
        }
        // Exit ray from last segment
        const last = laserPath[laserPath.length - 1];
        if (last) {
          const x1 = last.x * CELL + CELL / 2;
          const y1 = last.y * CELL + CELL / 2;
          const dx = last.dir === 'right' ? 1 : last.dir === 'left' ? -1 : 0;
          const dy = last.dir === 'down' ? 1 : last.dir === 'up' ? -1 : 0;
          const x2 = x1 + dx * CELL;
          const y2 = y1 + dy * CELL;
          lines.push(
            <line key="exit" x1={x1} y1={y1} x2={x2} y2={y2}
              stroke={laserColor} strokeWidth={3} strokeLinecap="round"
              opacity={0.7} filter="url(#glow)" />
          );
        }
        return lines;
      };

      // Source arrow indicator
      const renderSource = () => {
        if (!levelData) return null;
        const { sourcePos } = levelData;
        const cx = sourcePos.x * CELL + CELL / 2;
        const cy = sourcePos.y * CELL + CELL / 2;
        const arrowSize = CELL * 0.3;
        const angle = { right: 0, left: 180, down: 90, up: -90 }[sourcePos.dir];
        return (
          <g transform={`translate(${cx},${cy}) rotate(${angle})`}>
            <polygon points={`${arrowSize},0 ${-arrowSize * 0.6},${-arrowSize * 0.5} ${-arrowSize * 0.6},${arrowSize * 0.5}`}
              fill={laserColor} opacity={0.9} filter="url(#glow)" />
            <circle cx={-arrowSize * 0.8} cy={0} r={arrowSize * 0.4} fill={laserColor} opacity={0.6} />
          </g>
        );
      };

      if (screen === 'start') {
        return (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            width: '100vw', height: '100vh', background: `radial-gradient(ellipse at center, #1a0030 0%, #0a0015 100%)`,
            gap: 16 }}>
            <div style={{ fontSize: 'clamp(32px,7vw,64px)', fontWeight: 'bold', fontFamily: 'Courier New',
              background: 'linear-gradient(90deg,#00ffff,#ff00ff,#00ff88)', WebkitBackgroundClip: 'text',
              WebkitTextFillColor: 'transparent', textShadow: 'none', letterSpacing: 4 }}>
              MIRROR BLAZE
            </div>
            <div style={{ color: '#aaf', fontSize: 'clamp(12px,2.5vw,18px)', textAlign: 'center', maxWidth: 340, lineHeight: 1.6, padding: '0 16px' }}>
              Redirect the laser beam to hit all targets!<br/>
              Click a cell to place a <span style={{color:'#0ff'}}>/</span> mirror · click again for <span style={{color:'#f0f'}}>\ </span>· click again to remove.
            </div>
            <div style={{ color: '#888', fontSize: 'clamp(11px,2vw,14px)', textAlign: 'center' }}>
              10 levels · Chain solves for combos · Beat the clock!
            </div>
            <button onClick={startGame} style={{
              marginTop: 16, padding: '14px 48px', fontSize: 20, fontWeight: 'bold',
              background: 'linear-gradient(135deg,#00ffff22,#ff00ff22)', border: '2px solid #00ffff',
              color: '#00ffff', borderRadius: 8, cursor: 'pointer', fontFamily: 'Courier New',
              boxShadow: '0 0 20px #00ffff88, inset 0 0 10px #00ffff22',
              transition: 'all 0.2s'
            }}>PLAY</button>
            {highScore > 0 && <div style={{ color: '#ffaa00', fontSize: 14 }}>Best: {highScore.toLocaleString()}</div>}
          </div>
        );
      }

      if (screen === 'gameover') {
        const isWin = level > 10;
        return (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            width: '100vw', height: '100vh', background: `radial-gradient(ellipse at center, #1a0030 0%, #0a0015 100%)`, gap: 16 }}>
            <div style={{ fontSize: 'clamp(28px,6vw,54px)', fontWeight: 'bold',
              color: isWin ? '#ffff00' : '#ff4444', textShadow: `0 0 30px ${isWin ? '#ffff00' : '#ff4444'}` }}>
              {isWin ? 'BLAZED!' : 'TIME UP!'}
            </div>
            <div style={{ color: '#aaf', fontSize: 22 }}>Score: <span style={{color:'#0ff'}}>{score.toLocaleString()}</span></div>
            <div style={{ color: '#ffaa00', fontSize: 18 }}>Best: {highScore.toLocaleString()}</div>
            <div style={{ color: '#888', fontSize: 16 }}>Level reached: {level}</div>
            <button onClick={startGame} style={{
              marginTop: 16, padding: '12px 40px', fontSize: 18, fontWeight: 'bold',
              background: 'linear-gradient(135deg,#00ffff22,#ff00ff22)', border: '2px solid #ff00ff',
              color: '#ff00ff', borderRadius: 8, cursor: 'pointer', fontFamily: 'Courier New',
              boxShadow: '0 0 20px #ff00ff88'
            }}>PLAY AGAIN</button>
          </div>
        );
      }

      if (!levelData) return null;

      const timerPct = timeLeft / levelData.timeLimit;
      const timerColor = timerPct > 0.5 ? '#00ff88' : timerPct > 0.25 ? '#ffaa00' : '#ff4444';

      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
          width: '100vw', height: '100vh',
          background: `radial-gradient(ellipse at center, hsl(${bgHue},60%,8%) 0%, #050010 100%)` }}>

          {/* HUD */}
          <div style={{ display: 'flex', gap: 24, marginBottom: 10, alignItems: 'center', flexWrap: 'wrap', justifyContent: 'center' }}>
            <div style={{ color: '#0ff', fontSize: 'clamp(12px,2.5vw,16px)', fontFamily: 'Courier New' }}>
              LEVEL <span style={{color:'#fff',fontWeight:'bold'}}>{level}</span>/10
            </div>
            <div style={{ color: '#0ff', fontSize: 'clamp(12px,2.5vw,16px)', fontFamily: 'Courier New' }}>
              SCORE <span style={{color:'#fff',fontWeight:'bold'}}>{score.toLocaleString()}</span>
            </div>
            {combo > 0 && <div style={{ color: '#ffaa00', fontSize: 'clamp(11px,2.2vw,15px)', fontFamily: 'Courier New' }}>
              COMBO ×{combo + 1}
            </div>}
            <div style={{ color: timerColor, fontSize: 'clamp(12px,2.5vw,16px)', fontFamily: 'Courier New',
              textShadow: timerPct < 0.25 ? `0 0 10px ${timerColor}` : 'none' }}>
              ⏱ {timeLeft}s
            </div>
          </div>

          {/* Target counter */}
          <div style={{ color: '#aaf', fontSize: 'clamp(11px,2vw,14px)', marginBottom: 8, fontFamily: 'Courier New' }}>
            Targets: {hitTargets.size}/{levelData.targets.length}
            {' · '}
            Mirrors placed: {Object.keys(mirrors).length}
          </div>

          {/* Grid */}
          <svg
            width={gridSize} height={gridSize}
            style={{
              cursor: 'crosshair',
              borderRadius: 8,
              boxShadow: flash ? `0 0 60px 20px ${laserColor}` : `0 0 20px #00ffff44`,
              transition: 'box-shadow 0.3s',
              touchAction: 'none',
              userSelect: 'none',
            }}
            onClick={(e) => {
              const rect = e.currentTarget.getBoundingClientRect();
              const gx = Math.floor((e.clientX - rect.left) / CELL);
              const gy = Math.floor((e.clientY - rect.top) / CELL);
              handleCellClick(gx, gy);
            }}
            onTouchEnd={handleTouch}
          >
            <defs>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="4" result="blur" />
                <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
              <filter id="glowStrong" x="-80%" y="-80%" width="260%" height="260%">
                <feGaussianBlur stdDeviation="8" result="blur" />
                <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
            </defs>

            {/* Background */}
            <rect width={gridSize} height={gridSize} fill="#08001a" rx={8} />

            {/* Grid lines */}
            {Array.from({length: GRID + 1}, (_, i) => (
              <React.Fragment key={i}>
                <line x1={i * CELL} y1={0} x2={i * CELL} y2={gridSize} stroke="#ffffff0e" strokeWidth={1} />
                <line x1={0} y1={i * CELL} x2={gridSize} y2={i * CELL} stroke="#ffffff0e" strokeWidth={1} />
              </React.Fragment>
            ))}

            {/* Obstacles */}
            {Array.from(levelData.obstacles).map(key => {
              const [ox, oy] = key.split(',').map(Number);
              return (
                <g key={key}>
                  <rect x={ox * CELL + 4} y={oy * CELL + 4} width={CELL - 8} height={CELL - 8}
                    fill="#441144" stroke="#883388" strokeWidth={2} rx={4} />
                  <line x1={ox * CELL + 8} y1={oy * CELL + 8} x2={ox * CELL + CELL - 8} y2={oy * CELL + CELL - 8}
                    stroke="#aa44aa" strokeWidth={2} />
                  <line x1={ox * CELL + CELL - 8} y1={oy * CELL + 8} x2={ox * CELL + 8} y2={oy * CELL + CELL - 8}
                    stroke="#aa44aa" strokeWidth={2} />
                </g>
              );
            })}

            {/* Laser beam */}
            {renderLaser()}

            {/* Targets */}
            {levelData.targets.map((t, idx) => {
              const hit = hitTargets.has(idx);
              const cx = t.x * CELL + CELL / 2;
              const cy = t.y * CELL + CELL / 2;
              return (
                <g key={idx}>
                  <circle cx={cx} cy={cy} r={CELL * 0.3} fill="none"
                    stroke={hit ? '#ffff00' : '#ff00aa'} strokeWidth={3}
                    filter={hit ? 'url(#glowStrong)' : 'url(#glow)'} />
                  <circle cx={cx} cy={cy} r={CELL * 0.18} fill="none"
                    stroke={hit ? '#ffff00' : '#ff00aa'} strokeWidth={2} opacity={0.7} />
                  <circle cx={cx} cy={cy} r={CELL * 0.08}
                    fill={hit ? '#ffff00' : '#ff00aa'}
                    filter={hit ? 'url(#glowStrong)' : 'url(#glow)'} />
                  {hit && <circle cx={cx} cy={cy} r={CELL * 0.38} fill="none"
                    stroke="#ffff00" strokeWidth={1.5} opacity={0.4} />}
                </g>
              );
            })}

            {/* Laser source */}
            {renderSource()}

            {/* Mirrors */}
            {Object.entries(mirrors).map(([key, type]) => {
              const [mx, my] = key.split(',').map(Number);
              const cx = mx * CELL + CELL / 2;
              const cy = my * CELL + CELL / 2;
              const half = CELL * 0.36;
              const [x1, y1, x2, y2] = type === '/'
                ? [cx + half, cy - half, cx - half, cy + half]
                : [cx - half, cy - half, cx + half, cy + half];
              return (
                <g key={key}>
                  <rect x={mx * CELL + 3} y={my * CELL + 3} width={CELL - 6} height={CELL - 6}
                    fill="#001a3a" stroke="#003366" strokeWidth={1} rx={3} />
                  <line x1={x1} y1={y1} x2={x2} y2={y2}
                    stroke="#00ccff" strokeWidth={4} strokeLinecap="round" filter="url(#glow)" />
                  <line x1={x1} y1={y1} x2={x2} y2={y2}
                    stroke="white" strokeWidth={1.5} strokeLinecap="round" opacity={0.8} />
                  <text x={mx * CELL + CELL / 2} y={my * CELL + CELL - 4}
                    fill="#0088cc" fontSize={9} textAnchor="middle" opacity={0.7}>{type}</text>
                </g>
              );
            })}

            {/* Particles */}
            <ParticleSystem particles={particles} />
          </svg>

          {/* Instructions */}
          <div style={{ color: '#445566', fontSize: 'clamp(9px,1.5vw,12px)', marginTop: 8, textAlign: 'center', fontFamily: 'Courier New' }}>
            Click empty cell → / mirror · Click again → \ mirror · Click again → remove
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
