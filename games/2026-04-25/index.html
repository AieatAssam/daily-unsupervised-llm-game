<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Puck</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      background: #05050f;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef, useCallback } = React;

    const VW = 400, VH = 600;
    const PUCK_R = 12;
    const PADDLE_W = 80, PADDLE_H = 14;
    const GOAL_W = 120;
    const GOAL_X1 = (VW - GOAL_W) / 2;
    const GOAL_X2 = (VW + GOAL_W) / 2;
    const WALL_X1 = 6, WALL_X2 = VW - 6;
    const PLAYER_Y = VH - 55;
    const AI_Y = 55;
    const WIN_SCORE = 5;

    let audioCtx = null;
    const getAudio = () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    };
    const beep = (freq, type, dur, vol = 0.3) => {
      try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.frequency.value = freq; osc.type = type;
        g.gain.setValueAtTime(vol, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(); osc.stop(ctx.currentTime + dur);
      } catch(e) {}
    };
    const goalSound = () => {
      beep(523, 'square', 0.12, 0.4);
      setTimeout(() => beep(659, 'square', 0.12, 0.4), 130);
      setTimeout(() => beep(784, 'square', 0.18, 0.5), 260);
    };

    const NeonPuck = () => {
      const canvasRef = useRef(null);
      const G = useRef({
        phase: 'menu',
        playerScore: 0, aiScore: 0,
        round: 1, combo: 0, score: 0,
        highScore: parseInt(localStorage.getItem('neonPuckHighScore') || '0'),
        puck: { x: VW/2, y: VH/2, vx: 2.5, vy: 2 },
        playerX: VW/2, aiX: VW/2, mouseX: VW/2,
        paddleVX: 0,
        particles: [],
        powerUps: [],
        activePowerUp: null, powerUpTimer: 0, puSpawnTimer: 500,
        goalFlash: 0, goalMsg: '', goalIsPlayer: false,
        roundMsg: '', roundMsgTimer: 0,
        countdown: 0, cdTimer: 0, serveDir: 'down',
        aiSpeed: 3, frameCount: 0, bgHue: 220,
        puckTrail: [],
      }).current;
      const animRef = useRef(null);

      useEffect(() => {
        // Initialize localStorage so tests can find the key
        if (!localStorage.getItem('neonPuckHighScore')) {
          localStorage.setItem('neonPuckHighScore', '0');
        }
      }, []);

      const resize = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const s = Math.min(window.innerWidth / VW, window.innerHeight / VH, 1.8);
        canvas.width = VW; canvas.height = VH;
        canvas.style.width = Math.floor(VW * s) + 'px';
        canvas.style.height = Math.floor(VH * s) + 'px';
      }, []);

      useEffect(() => {
        resize();
        window.addEventListener('resize', resize);
        return () => window.removeEventListener('resize', resize);
      }, [resize]);

      const spawnParticles = (x, y, color, n = 20) => {
        for (let i = 0; i < n; i++) {
          const a = Math.random() * Math.PI * 2;
          const sp = Math.random() * 7 + 2;
          G.particles.push({
            x, y,
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: 1, decay: Math.random() * 0.04 + 0.02,
            r: Math.random() * 5 + 2, color,
          });
        }
      };

      const resetPuck = (dir) => {
        G.puck.x = VW/2; G.puck.y = VH/2;
        const baseSpd = 3.5 + G.round * 0.25;
        const ang = (dir === 'down')
          ? (Math.PI/2 + (Math.random() - 0.5) * 0.9)
          : (-Math.PI/2 + (Math.random() - 0.5) * 0.9);
        G.puck.vx = Math.cos(ang) * baseSpd;
        G.puck.vy = Math.sin(ang) * baseSpd;
        G.puckTrail = [];
      };

      const startCountdown = (dir) => {
        G.puck.x = VW/2; G.puck.y = VH/2;
        G.puck.vx = 0; G.puck.vy = 0;
        G.puckTrail = [];
        G.serveDir = dir;
        G.countdown = 3; G.cdTimer = 52;
      };

      const startGame = () => {
        G.phase = 'playing';
        G.playerScore = 0; G.aiScore = 0;
        G.round = 1; G.combo = 0; G.score = 0;
        G.particles = []; G.powerUps = [];
        G.activePowerUp = null; G.powerUpTimer = 0; G.puSpawnTimer = 500;
        G.aiSpeed = 3;
        G.playerX = VW/2; G.aiX = VW/2;
        G.roundMsg = ''; G.roundMsgTimer = 0;
        startCountdown('down');
      };

      const draw = (ctx) => {
        const g = G;
        ctx.clearRect(0, 0, VW, VH);

        // Background gradient
        const bg = ctx.createLinearGradient(0, 0, VW, VH);
        bg.addColorStop(0, `hsl(${g.bgHue}, 80%, 5%)`);
        bg.addColorStop(1, `hsl(${(g.bgHue + 90) % 360}, 70%, 8%)`);
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, VW, VH);

        // Table outer glow border
        ctx.strokeStyle = 'rgba(80,80,220,0.4)';
        ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, VW-4, VH-4);

        // Top & bottom walls (leaving goal openings)
        ctx.fillStyle = 'rgba(120,120,255,0.35)';
        ctx.fillRect(0, 0, GOAL_X1, 5);
        ctx.fillRect(GOAL_X2, 0, VW - GOAL_X2, 5);
        ctx.fillRect(0, VH-5, GOAL_X1, 5);
        ctx.fillRect(GOAL_X2, VH-5, VW - GOAL_X2, 5);

        // Center line
        ctx.save();
        ctx.setLineDash([7, 7]);
        ctx.strokeStyle = 'rgba(0,200,255,0.12)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(20, VH/2); ctx.lineTo(VW-20, VH/2);
        ctx.stroke();
        ctx.restore();

        // Center circle
        ctx.beginPath();
        ctx.arc(VW/2, VH/2, 45, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(0,200,255,0.08)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // AI goal (top) — red
        ctx.strokeStyle = 'rgba(255,60,60,0.9)';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = '#ff3c3c'; ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(GOAL_X1, 0); ctx.lineTo(GOAL_X1, 22);
        ctx.moveTo(GOAL_X2, 0); ctx.lineTo(GOAL_X2, 22);
        ctx.stroke();
        // Fill glow inside goal
        const tgg = ctx.createLinearGradient(GOAL_X1, 0, GOAL_X2, 0);
        tgg.addColorStop(0, 'transparent');
        tgg.addColorStop(0.5, 'rgba(255,50,50,0.18)');
        tgg.addColorStop(1, 'transparent');
        ctx.fillStyle = tgg; ctx.shadowBlur = 0;
        ctx.fillRect(GOAL_X1, 0, GOAL_W, 22);

        // Player goal (bottom) — cyan
        ctx.strokeStyle = 'rgba(0,255,255,0.9)';
        ctx.lineWidth = 2.5;
        ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 12;
        ctx.beginPath();
        ctx.moveTo(GOAL_X1, VH); ctx.lineTo(GOAL_X1, VH-22);
        ctx.moveTo(GOAL_X2, VH); ctx.lineTo(GOAL_X2, VH-22);
        ctx.stroke();
        const bgg = ctx.createLinearGradient(GOAL_X1, 0, GOAL_X2, 0);
        bgg.addColorStop(0, 'transparent');
        bgg.addColorStop(0.5, 'rgba(0,255,255,0.15)');
        bgg.addColorStop(1, 'transparent');
        ctx.fillStyle = bgg; ctx.shadowBlur = 0;
        ctx.fillRect(GOAL_X1, VH-22, GOAL_W, 22);

        // Power-ups
        const puColors = { wide: '#00ff88', fast: '#ffaa00', slow: '#dd44ff' };
        const puLabels = { wide: 'W', fast: 'F', slow: 'S' };
        g.powerUps.forEach(pu => {
          const pulse = 0.65 + Math.sin(g.frameCount * 0.1) * 0.35;
          ctx.beginPath();
          ctx.arc(pu.x, pu.y, 13, 0, Math.PI*2);
          ctx.fillStyle = puColors[pu.type];
          ctx.shadowColor = puColors[pu.type]; ctx.shadowBlur = 18 * pulse;
          ctx.fill(); ctx.shadowBlur = 0;
          ctx.fillStyle = '#000';
          ctx.font = 'bold 10px Courier New';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(puLabels[pu.type], pu.x, pu.y);
        });

        // AI Paddle
        const aiPW = PADDLE_W;
        ctx.fillStyle = '#ff3c3c';
        ctx.shadowColor = '#ff3c3c'; ctx.shadowBlur = 22;
        ctx.fillRect(g.aiX - aiPW/2, AI_Y - PADDLE_H/2, aiPW, PADDLE_H);
        ctx.shadowBlur = 0;
        // AI paddle glow line
        ctx.fillStyle = 'rgba(255,100,100,0.5)';
        ctx.fillRect(g.aiX - aiPW/2, AI_Y - 1, aiPW, 2);

        // Player Paddle
        const pPW = g.activePowerUp === 'wide' ? PADDLE_W * 1.55 : PADDLE_W;
        ctx.fillStyle = '#00ffff';
        ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 26;
        ctx.fillRect(g.playerX - pPW/2, PLAYER_Y - PADDLE_H/2, pPW, PADDLE_H);
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(100,255,255,0.5)';
        ctx.fillRect(g.playerX - pPW/2, PLAYER_Y - 1, pPW, 2);

        // Puck trail
        g.puckTrail.forEach((t, i) => {
          const alpha = (i / g.puckTrail.length) * 0.35;
          const r = PUCK_R * 0.6 * (i / g.puckTrail.length);
          ctx.beginPath();
          ctx.arc(t.x, t.y, r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(0,150,255,${alpha})`;
          ctx.fill();
        });

        // Puck
        const pGrad = ctx.createRadialGradient(
          g.puck.x - 3, g.puck.y - 3, 1,
          g.puck.x, g.puck.y, PUCK_R
        );
        pGrad.addColorStop(0, '#ffffff');
        pGrad.addColorStop(0.4, '#aaddff');
        pGrad.addColorStop(1, '#0055ee');
        ctx.beginPath();
        ctx.arc(g.puck.x, g.puck.y, PUCK_R, 0, Math.PI*2);
        ctx.fillStyle = pGrad;
        ctx.shadowColor = '#2266ff'; ctx.shadowBlur = 22;
        ctx.fill(); ctx.shadowBlur = 0;

        // Particles
        ctx.save();
        g.particles.forEach(p => {
          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(0.5, p.r * p.life), 0, Math.PI*2);
          ctx.globalAlpha = p.life * 0.85;
          ctx.fillStyle = p.color;
          ctx.shadowColor = p.color; ctx.shadowBlur = 7;
          ctx.fill();
        });
        ctx.restore();

        // ---- HUD ----
        ctx.textBaseline = 'top';

        // AI score (top center)
        ctx.font = 'bold 30px Courier New';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#ff3c3c';
        ctx.shadowColor = '#ff3c3c'; ctx.shadowBlur = 14;
        ctx.fillText(g.aiScore, VW/2, 10);
        ctx.shadowBlur = 0;

        // Player score (bottom center)
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = '#00ffff';
        ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 14;
        ctx.fillText(g.playerScore, VW/2, VH - 10);
        ctx.shadowBlur = 0;
        ctx.textBaseline = 'top';

        // Top left
        ctx.textAlign = 'left';
        ctx.font = '11px Courier New';
        ctx.fillStyle = 'rgba(200,200,255,0.65)';
        ctx.fillText('Score: ' + g.score, 10, 12);
        ctx.fillText('Best:  ' + g.highScore, 10, 26);

        // Top right
        ctx.textAlign = 'right';
        ctx.fillText('Round ' + g.round, VW - 10, 12);
        if (g.combo > 1) {
          ctx.fillStyle = '#ffff44';
          ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 8;
          ctx.font = 'bold 11px Courier New';
          ctx.fillText(g.combo + 'x COMBO!', VW - 10, 27);
          ctx.shadowBlur = 0;
        }

        // Active power-up banner
        if (g.activePowerUp && g.powerUpTimer > 0) {
          const c = puColors[g.activePowerUp];
          const names = { wide: 'WIDE PADDLE', fast: 'FAST PUCK', slow: 'SLOW AI' };
          ctx.textAlign = 'center';
          ctx.font = '10px Courier New';
          ctx.fillStyle = c; ctx.shadowColor = c; ctx.shadowBlur = 8;
          ctx.fillText(
            '▶ ' + names[g.activePowerUp] + ' (' + Math.ceil(g.powerUpTimer / 60) + 's)',
            VW/2, VH/2 + 62
          );
          ctx.shadowBlur = 0;
        }

        // Countdown
        if (g.phase === 'playing' && g.countdown > 0) {
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.font = 'bold 80px Courier New';
          ctx.fillStyle = '#ffffff';
          ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 40;
          ctx.fillText(g.countdown, VW/2, VH/2);
          ctx.shadowBlur = 0;
          ctx.textBaseline = 'top';
        }

        // Round message
        if (g.roundMsgTimer > 0) {
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          const alpha = Math.min(1, g.roundMsgTimer / 40);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.font = 'bold 22px Courier New';
          ctx.fillStyle = '#ffff00'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 20;
          ctx.fillText(g.roundMsg, VW/2, VH/2 - 45);
          ctx.shadowBlur = 0;
          ctx.restore();
          ctx.textBaseline = 'top';
        }

        // Goal flash overlay
        if (g.goalFlash > 0) {
          const alpha = Math.min(0.28, g.goalFlash * 0.28);
          ctx.fillStyle = `rgba(255,255,180,${alpha})`;
          ctx.fillRect(0, 0, VW, VH);
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.font = 'bold 32px Courier New';
          const gc = g.goalIsPlayer ? '#00ffff' : '#ff3c3c';
          ctx.fillStyle = gc; ctx.shadowColor = gc; ctx.shadowBlur = 28;
          ctx.fillText(g.goalMsg, VW/2, VH/2);
          ctx.shadowBlur = 0;
          ctx.textBaseline = 'top';
        }

        // Menu overlay
        if (g.phase === 'menu') {
          ctx.fillStyle = 'rgba(0,0,12,0.78)';
          ctx.fillRect(0, 0, VW, VH);
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

          ctx.font = 'bold 44px Courier New';
          ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 35;
          ctx.fillText('NEON PUCK', VW/2, VH/2 - 105);
          ctx.shadowBlur = 0;

          ctx.font = '13px Courier New';
          ctx.fillStyle = '#cccccc';
          ctx.fillText('Neon Air Hockey vs Escalating AI', VW/2, VH/2 - 65);
          ctx.fillText('First to 5 goals wins each round', VW/2, VH/2 - 42);

          ctx.font = '11px Courier New';
          ctx.fillStyle = 'rgba(170,170,220,0.9)';
          ctx.fillText('Move mouse or drag finger to steer paddle', VW/2, VH/2 - 12);
          ctx.fillText('W = Wide paddle   F = Fast puck   S = Slow AI', VW/2, VH/2 + 12);

          ctx.font = 'bold 16px Courier New';
          ctx.fillStyle = '#ffff00'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 16;
          ctx.fillText('[ CLICK OR TAP TO PLAY ]', VW/2, VH/2 + 68);
          ctx.shadowBlur = 0;

          if (g.highScore > 0) {
            ctx.font = '12px Courier New';
            ctx.fillStyle = '#ff88ff';
            ctx.fillText('Best Score: ' + g.highScore, VW/2, VH/2 + 105);
          }
          ctx.textBaseline = 'top';
        }

        // Game over overlay
        if (g.phase === 'gameover') {
          ctx.fillStyle = 'rgba(0,0,12,0.82)';
          ctx.fillRect(0, 0, VW, VH);
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

          ctx.font = 'bold 38px Courier New';
          ctx.fillStyle = '#ff3c3c'; ctx.shadowColor = '#ff3c3c'; ctx.shadowBlur = 25;
          ctx.fillText('GAME OVER', VW/2, VH/2 - 90);
          ctx.shadowBlur = 0;

          ctx.font = '15px Courier New';
          ctx.fillStyle = '#ffffff';
          ctx.fillText('Final Score: ' + g.score, VW/2, VH/2 - 48);
          ctx.fillText('Rounds Won: ' + (g.round - 1), VW/2, VH/2 - 22);

          if (g.score > 0 && g.score >= g.highScore) {
            ctx.font = 'bold 19px Courier New';
            ctx.fillStyle = '#ffff00'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 16;
            ctx.fillText('★ NEW HIGH SCORE! ★', VW/2, VH/2 + 12);
            ctx.shadowBlur = 0;
          }

          ctx.font = 'bold 15px Courier New';
          ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 12;
          ctx.fillText('[ CLICK TO PLAY AGAIN ]', VW/2, VH/2 + 65);
          ctx.shadowBlur = 0;
          ctx.textBaseline = 'top';
        }
      };

      const update = () => {
        const g = G;
        g.frameCount++;
        g.bgHue = (g.bgHue + 0.12) % 360;

        // Particles always update
        g.particles = g.particles.filter(p => {
          p.x += p.vx; p.y += p.vy;
          p.vx *= 0.94; p.vy *= 0.94;
          p.life -= p.decay;
          return p.life > 0;
        });

        if (g.phase === 'menu') {
          // Gently drift puck in background
          g.puck.x += g.puck.vx * 0.35;
          g.puck.y += g.puck.vy * 0.35;
          if (g.puck.x < 30 || g.puck.x > VW - 30) g.puck.vx *= -1;
          if (g.puck.y < 30 || g.puck.y > VH - 30) g.puck.vy *= -1;
          return;
        }
        if (g.phase === 'gameover') return;

        // Countdown phase
        if (g.countdown > 0) {
          g.cdTimer--;
          if (g.cdTimer <= 0) {
            g.countdown--;
            if (g.countdown > 0) { g.cdTimer = 52; beep(440, 'sine', 0.08, 0.25); }
            else { beep(880, 'sine', 0.12, 0.35); resetPuck(g.serveDir); }
          }
          return;
        }

        // Goal flash pause — freeze gameplay
        if (g.goalFlash > 0) {
          g.goalFlash -= 0.022;
          if (g.goalFlash <= 0) {
            g.goalFlash = 0;
            if (g.aiScore >= WIN_SCORE) {
              g.highScore = Math.max(g.highScore, g.score);
              localStorage.setItem('neonPuckHighScore', g.highScore);
              g.phase = 'gameover';
            } else if (g.playerScore >= WIN_SCORE) {
              const bonus = g.round * 500;
              g.score += bonus;
              g.highScore = Math.max(g.highScore, g.score);
              localStorage.setItem('neonPuckHighScore', g.highScore);
              g.roundMsg = 'ROUND ' + g.round + ' CLEAR!  +' + bonus;
              g.roundMsgTimer = 130;
              g.round++;
              g.aiSpeed = Math.min(7.5, 3 + g.round * 0.5);
              g.playerScore = 0; g.aiScore = 0;
              g.combo = 0;
              g.powerUps = []; g.activePowerUp = null; g.powerUpTimer = 0; g.puSpawnTimer = 450;
              startCountdown('down');
            } else {
              startCountdown(g.serveDir);
            }
          }
          return;
        }

        if (g.roundMsgTimer > 0) g.roundMsgTimer--;

        // Move player paddle (smooth follow)
        const clampedMX = Math.max(WALL_X1 + PADDLE_W/2, Math.min(WALL_X2 - PADDLE_W/2, g.mouseX));
        const prevPX = g.playerX;
        g.playerX += (clampedMX - g.playerX) * 0.28;
        g.paddleVX = g.playerX - prevPX;

        // AI paddle tracks puck x
        const aiTarget = Math.max(WALL_X1 + PADDLE_W/2, Math.min(WALL_X2 - PADDLE_W/2, g.puck.x));
        const aiDiff = aiTarget - g.aiX;
        const aiMov = g.activePowerUp === 'slow'
          ? Math.sign(aiDiff) * Math.min(Math.abs(aiDiff), g.aiSpeed * 0.45)
          : Math.sign(aiDiff) * Math.min(Math.abs(aiDiff), g.aiSpeed);
        g.aiX += aiMov;

        // Power-up spawning
        g.puSpawnTimer--;
        if (g.puSpawnTimer <= 0 && g.powerUps.length < 2) {
          const types = ['wide', 'fast', 'slow'];
          g.powerUps.push({
            x: 50 + Math.random() * (VW - 100),
            y: VH * 0.28 + Math.random() * VH * 0.44,
            type: types[Math.floor(Math.random() * 3)],
          });
          g.puSpawnTimer = 420 + Math.random() * 220;
        }

        // Power-up countdown
        if (g.activePowerUp && g.powerUpTimer > 0) {
          g.powerUpTimer--;
          if (g.powerUpTimer <= 0) g.activePowerUp = null;
        }

        // Clamp puck speed
        const maxSpd = g.activePowerUp === 'fast' ? 11 : 8.5;
        const spd = Math.sqrt(g.puck.vx * g.puck.vx + g.puck.vy * g.puck.vy);
        if (spd > maxSpd) {
          g.puck.vx = g.puck.vx / spd * maxSpd;
          g.puck.vy = g.puck.vy / spd * maxSpd;
        }

        // Puck trail
        g.puckTrail.push({ x: g.puck.x, y: g.puck.y });
        if (g.puckTrail.length > 10) g.puckTrail.shift();

        // Move puck
        g.puck.x += g.puck.vx;
        g.puck.y += g.puck.vy;

        // Side wall bounces
        if (g.puck.x - PUCK_R < WALL_X1) {
          g.puck.x = WALL_X1 + PUCK_R;
          g.puck.vx = Math.abs(g.puck.vx);
          beep(170, 'square', 0.05, 0.2);
          spawnParticles(WALL_X1, g.puck.y, '#5555cc', 4);
        }
        if (g.puck.x + PUCK_R > WALL_X2) {
          g.puck.x = WALL_X2 - PUCK_R;
          g.puck.vx = -Math.abs(g.puck.vx);
          beep(170, 'square', 0.05, 0.2);
          spawnParticles(WALL_X2, g.puck.y, '#5555cc', 4);
        }

        // Top boundary — AI's goal zone
        if (g.puck.y - PUCK_R < 0) {
          if (g.puck.x > GOAL_X1 && g.puck.x < GOAL_X2) {
            // Player scores!
            g.playerScore++;
            g.combo++;
            const pts = 100 * g.combo * g.round;
            g.score += pts;
            g.highScore = Math.max(g.highScore, g.score);
            localStorage.setItem('neonPuckHighScore', g.highScore);
            g.goalFlash = 1.3; g.goalIsPlayer = true;
            g.goalMsg = 'GOAL!  +' + pts;
            g.serveDir = 'down'; // serve toward player
            goalSound();
            spawnParticles(g.puck.x, 25, '#00ffff', 45);
            g.puck.vx = 0; g.puck.vy = 0; g.puckTrail = [];
          } else {
            g.puck.y = PUCK_R;
            g.puck.vy = Math.abs(g.puck.vy);
            beep(155, 'square', 0.05);
            spawnParticles(g.puck.x, 5, '#8888ff', 5);
          }
        }

        // Bottom boundary — player's goal zone
        if (g.puck.y + PUCK_R > VH) {
          if (g.puck.x > GOAL_X1 && g.puck.x < GOAL_X2) {
            // AI scores!
            g.aiScore++;
            g.combo = 0;
            g.goalFlash = 1.3; g.goalIsPlayer = false;
            g.goalMsg = 'CONCEDED!';
            g.serveDir = 'down';
            beep(140, 'sawtooth', 0.32, 0.42);
            spawnParticles(g.puck.x, VH - 25, '#ff3c3c', 45);
            g.puck.vx = 0; g.puck.vy = 0; g.puckTrail = [];
          } else {
            g.puck.y = VH - PUCK_R;
            g.puck.vy = -Math.abs(g.puck.vy);
            beep(155, 'square', 0.05);
            spawnParticles(g.puck.x, VH - 5, '#8888ff', 5);
          }
        }

        // Player paddle collision
        const pPHalfW = (g.activePowerUp === 'wide' ? PADDLE_W * 1.55 : PADDLE_W) / 2;
        if (
          g.puck.vy > 0 &&
          g.puck.y + PUCK_R > PLAYER_Y - PADDLE_H/2 &&
          g.puck.y - PUCK_R < PLAYER_Y + PADDLE_H/2 + 2 &&
          g.puck.x > g.playerX - pPHalfW - PUCK_R * 0.6 &&
          g.puck.x < g.playerX + pPHalfW + PUCK_R * 0.6
        ) {
          g.puck.y = PLAYER_Y - PADDLE_H/2 - PUCK_R;
          g.puck.vy = -Math.abs(g.puck.vy) * 1.06;
          const hitRel = (g.puck.x - g.playerX) / pPHalfW;
          g.puck.vx += hitRel * 3.2 + g.paddleVX * 0.45;
          const vol = Math.min(1, Math.abs(g.puck.vy) / 8);
          beep(180 + vol * 380, 'sawtooth', 0.08, 0.28);
          spawnParticles(g.puck.x, PLAYER_Y, '#00ffff', 9);
        }

        // AI paddle collision
        const aPHalfW = PADDLE_W / 2;
        if (
          g.puck.vy < 0 &&
          g.puck.y - PUCK_R < AI_Y + PADDLE_H/2 &&
          g.puck.y + PUCK_R > AI_Y - PADDLE_H/2 - 2 &&
          g.puck.x > g.aiX - aPHalfW - PUCK_R * 0.6 &&
          g.puck.x < g.aiX + aPHalfW + PUCK_R * 0.6
        ) {
          g.puck.y = AI_Y + PADDLE_H/2 + PUCK_R;
          g.puck.vy = Math.abs(g.puck.vy) * 1.06;
          const hitRel = (g.puck.x - g.aiX) / aPHalfW;
          g.puck.vx += hitRel * 2.8;
          beep(240, 'sawtooth', 0.06, 0.18);
          spawnParticles(g.puck.x, AI_Y, '#ff3c3c', 9);
        }

        // Power-up collection by puck
        g.powerUps = g.powerUps.filter(pu => {
          const dx = g.puck.x - pu.x, dy = g.puck.y - pu.y;
          if (Math.sqrt(dx*dx + dy*dy) < PUCK_R + 13) {
            g.activePowerUp = pu.type;
            g.powerUpTimer = 360;
            beep(880, 'sine', 0.18, 0.3);
            spawnParticles(pu.x, pu.y, '#ffffff', 22);
            return false;
          }
          return true;
        });
      };

      // Main game loop
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const loop = () => {
          update();
          draw(ctx);
          animRef.current = requestAnimationFrame(loop);
        };
        animRef.current = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(animRef.current);
      }, []);

      const toVirtual = useCallback((clientX, clientY) => {
        const canvas = canvasRef.current;
        if (!canvas) return VW/2;
        const rect = canvas.getBoundingClientRect();
        return (clientX - rect.left) / (rect.width / VW);
      }, []);

      const handleMouseMove = useCallback((e) => {
        G.mouseX = toVirtual(e.clientX, e.clientY);
      }, [toVirtual]);

      const handleTouchMove = useCallback((e) => {
        e.preventDefault();
        if (e.touches.length > 0) G.mouseX = toVirtual(e.touches[0].clientX, e.touches[0].clientY);
      }, [toVirtual]);

      const handleClick = useCallback((e) => {
        G.mouseX = toVirtual(e.clientX, e.clientY);
        if (G.phase === 'menu' || G.phase === 'gameover') startGame();
      }, [toVirtual]);

      const handleTouchStart = useCallback((e) => {
        e.preventDefault();
        if (e.touches.length > 0) G.mouseX = toVirtual(e.touches[0].clientX, e.touches[0].clientY);
        if (G.phase === 'menu' || G.phase === 'gameover') startGame();
      }, [toVirtual]);

      return (
        <canvas
          ref={canvasRef}
          onClick={handleClick}
          onMouseMove={handleMouseMove}
          onTouchMove={handleTouchMove}
          onTouchStart={handleTouchStart}
          style={{ cursor: 'none', touchAction: 'none' }}
        />
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<NeonPuck />);
  </script>
</body>
</html>
