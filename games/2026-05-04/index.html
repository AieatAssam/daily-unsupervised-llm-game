<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Drift</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030008; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const NeonDrift = () => {
      const canvasRef = useRef(null);
      const [ui, setUi] = useState({
        phase: 'title',
        score: 0,
        highScore: parseInt(localStorage.getItem('neonDrift_highScore') || '0'),
        lives: 3,
        multiplier: 1,
        speed: 0,
      });

      useEffect(() => {
        const canvas = canvasRef.current;
        const W = canvas.width = window.innerWidth;
        const H = canvas.height = window.innerHeight;
        const ctx = canvas.getContext('2d');

        const SEG_H = 15;
        const CAR_Y = H * 0.82;
        const NUM_SEGS = Math.ceil(H / SEG_H) + 8;

        // ── Audio (lazy) ──────────────────────────────────────────────
        let audioCtx = null;
        const getAudio = () => {
          if (!audioCtx) {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
          }
          return audioCtx;
        };
        const playSound = (freq, type = 'sine', dur = 0.12, vol = 0.28) => {
          const ac = getAudio();
          if (!ac) return;
          try {
            if (ac.state === 'suspended') ac.resume();
            const osc = ac.createOscillator();
            const gain = ac.createGain();
            osc.connect(gain);
            gain.connect(ac.destination);
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, ac.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
            osc.start();
            osc.stop(ac.currentTime + dur);
          } catch(e) {}
        };

        // ── Game state ────────────────────────────────────────────────
        const g = {
          phase: 'title',
          score: 0,
          highScore: parseInt(localStorage.getItem('neonDrift_highScore') || '0'),
          lives: 3,
          speed: 4,
          distance: 0,
          carX: W / 2,
          steerDir: 0,
          roadSegs: [],       // [{cx, w}] index 0 = farthest (top), last = nearest (bottom)
          scrollOffset: 0,
          roadCurveX: W / 2,
          roadCurveVX: 0,
          roadCurveSeed: 0,
          gems: [],
          particles: [],
          keys: {},
          touches: { left: false, right: false },
          invincible: 0,
          combo: 0,
          multiplier: 1,
          comboTimer: 0,
          flashTimer: 0,
          uiTimer: 0,
        };

        // Ensure highScore key exists in localStorage immediately
        localStorage.setItem('neonDrift_highScore', g.highScore.toString());

        // ── Road helpers ──────────────────────────────────────────────
        const initRoad = () => {
          g.roadSegs = Array.from({ length: NUM_SEGS }, () => ({ cx: W / 2, w: 220 }));
          g.scrollOffset = 0;
          g.roadCurveX = W / 2;
          g.roadCurveVX = 0;
          g.roadCurveSeed = 0;
        };

        const genNewSeg = () => {
          g.roadCurveSeed += 0.025;
          const curveForceMult = Math.min(1, g.distance / 60);
          const force = (
            Math.sin(g.roadCurveSeed * 1.4) * 1.8 +
            Math.sin(g.roadCurveSeed * 0.45) * 2.8
          ) * curveForceMult;
          g.roadCurveVX += force;
          g.roadCurveVX *= 0.87;
          g.roadCurveX += g.roadCurveVX;
          const margin = 110;
          g.roadCurveX = Math.max(margin, Math.min(W - margin, g.roadCurveX));
          const newW = Math.max(88, 220 - g.distance * 0.018);
          g.roadSegs.unshift({ cx: g.roadCurveX, w: newW });
          g.roadSegs.pop();
        };

        // Screen Y of segment index i
        const segY = (i) => i * SEG_H - g.scrollOffset;

        // Road segment at a given screen Y position
        const getRoadAtY = (y) => {
          const i = Math.round((y + g.scrollOffset) / SEG_H);
          return g.roadSegs[Math.max(0, Math.min(NUM_SEGS - 1, i))];
        };

        // ── Game init / restart ───────────────────────────────────────
        const startGame = () => {
          g.phase = 'playing';
          g.score = 0;
          g.lives = 3;
          g.speed = 4;
          g.distance = 0;
          g.carX = W / 2;
          g.steerDir = 0;
          g.combo = 0;
          g.multiplier = 1;
          g.comboTimer = 0;
          g.invincible = 0;
          g.flashTimer = 0;
          g.gems = [];
          g.particles = [];
          initRoad();
          setUi({ phase: 'playing', score: 0, highScore: g.highScore, lives: 3, multiplier: 1, speed: 60 });
        };

        // ── Particles ─────────────────────────────────────────────────
        const burst = (x, y, color, n = 10) => {
          for (let i = 0; i < n; i++) {
            const a = Math.random() * Math.PI * 2;
            const s = Math.random() * 4.5 + 1;
            g.particles.push({
              x, y,
              vx: Math.cos(a) * s,
              vy: Math.sin(a) * s - 1,
              life: 1,
              decay: 0.025 + Math.random() * 0.025,
              color,
              r: Math.random() * 3 + 1.5,
            });
          }
        };

        // ── Static stars ──────────────────────────────────────────────
        const stars = Array.from({ length: 120 }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          b: Math.random() * 0.5 + 0.2,
        }));

        // ── Event listeners ───────────────────────────────────────────
        const onKeyDown = (e) => {
          g.keys[e.code] = true;
          if (g.phase !== 'playing') startGame();
        };
        const onKeyUp = (e) => { g.keys[e.code] = false; };

        const onPointerDown = (e) => {
          if (g.phase !== 'playing') { startGame(); return; }
          const x = e.clientX;
          if (x < W / 2) g.touches.left = true;
          else g.touches.right = true;
        };
        const onPointerUp = () => { g.touches.left = false; g.touches.right = false; };
        const onTouchMove = (e) => {
          g.touches.left = false;
          g.touches.right = false;
          for (const t of e.touches) {
            if (t.clientX < W / 2) g.touches.left = true;
            else g.touches.right = true;
          }
        };

        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);
        window.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointerup', onPointerUp);
        window.addEventListener('touchmove', onTouchMove, { passive: true });

        initRoad();

        // ── Main loop ─────────────────────────────────────────────────
        let prevTime = performance.now();
        let frameId;

        const loop = (now) => {
          frameId = requestAnimationFrame(loop);
          const dt = Math.min((now - prevTime) / 16.67, 3);
          prevTime = now;

          // ── Physics ──────────────────────────────────────────────
          if (g.phase === 'playing') {
            // Steer
            const steerAmt = g.speed * 0.52 * dt;
            if (g.keys['ArrowLeft'] || g.keys['KeyA'] || g.touches.left) {
              g.carX -= steerAmt; g.steerDir = -1;
            } else if (g.keys['ArrowRight'] || g.keys['KeyD'] || g.touches.right) {
              g.carX += steerAmt; g.steerDir = 1;
            } else {
              g.steerDir = 0;
            }
            g.carX = Math.max(14, Math.min(W - 14, g.carX));

            // Scroll road
            g.scrollOffset += g.speed * dt;
            if (g.scrollOffset >= SEG_H) {
              g.scrollOffset -= SEG_H;
              genNewSeg();
              // Spawn gem occasionally
              if (Math.random() < 0.09 && g.gems.length < 7) {
                const topSeg = g.roadSegs[1];
                const half = topSeg.w * 0.38;
                const colors = ['#00ffcc', '#00aaff', '#aa44ff', '#ff44cc'];
                g.gems.push({
                  x: topSeg.cx + (Math.random() * 2 - 1) * half,
                  y: -12,
                  color: colors[Math.floor(Math.random() * colors.length)],
                  pulse: Math.random() * Math.PI * 2,
                  collected: false,
                });
              }
            }

            // Update gems
            for (const gem of g.gems) {
              if (gem.collected) continue;
              gem.y += g.speed * dt;
              gem.pulse += 0.1 * dt;
              const dx = g.carX - gem.x;
              const dy = CAR_Y - gem.y;
              if (dx * dx + dy * dy < 26 * 26) {
                gem.collected = true;
                g.combo++;
                g.comboTimer = 110;
                g.multiplier = Math.min(8, 1 + Math.floor(g.combo / 3));
                g.score += 50 * g.multiplier;
                burst(gem.x, gem.y, gem.color, 14);
                const note = [440, 523, 659, 784, 880, 1047][Math.min(5, g.combo - 1)];
                playSound(note, 'sine', 0.13, 0.22);
              }
            }
            g.gems = g.gems.filter(gem => !gem.collected && gem.y < H + 20);

            // Combo timer
            if (g.comboTimer > 0) {
              g.comboTimer -= dt;
              if (g.comboTimer <= 0) { g.combo = 0; g.multiplier = 1; }
            }

            // Speed & distance
            g.distance += g.speed * dt * 0.1;
            g.speed = Math.min(22, 4 + g.distance * 0.0045);
            g.score += Math.floor(g.speed * dt * 0.28);

            // Car trail particles
            if (Math.random() < 0.55) {
              g.particles.push({
                x: g.carX + (Math.random() - 0.5) * 9,
                y: CAR_Y + 18,
                vx: (Math.random() - 0.5) * 1.5,
                vy: g.speed * 0.28 + Math.random() * 2,
                life: 0.75,
                decay: 0.045,
                color: `hsl(${195 + Math.random() * 65}, 100%, 68%)`,
                r: Math.random() * 2.5 + 1,
              });
            }

            // Off-road collision
            if (g.invincible <= 0) {
              const seg = getRoadAtY(CAR_Y);
              if (seg && (g.carX < seg.cx - seg.w / 2 + 4 || g.carX > seg.cx + seg.w / 2 - 4)) {
                g.lives--;
                g.combo = 0; g.multiplier = 1; g.comboTimer = 0;
                g.invincible = 160;
                g.flashTimer = 22;
                g.carX = seg.cx;
                burst(g.carX, CAR_Y, '#ff3333', 22);
                playSound(55, 'sawtooth', 0.5, 0.55);
                if (g.lives <= 0) {
                  g.phase = 'gameover';
                  g.highScore = Math.max(g.score, g.highScore);
                  localStorage.setItem('neonDrift_highScore', g.highScore.toString());
                  setUi({ phase: 'gameover', score: g.score, highScore: g.highScore, lives: 0, multiplier: 1, speed: 0 });
                } else {
                  setUi(prev => ({ ...prev, lives: g.lives, multiplier: 1 }));
                }
              }
            }

            if (g.invincible > 0) g.invincible -= dt;
            if (g.flashTimer > 0) g.flashTimer -= dt;

            // Update particles
            for (const p of g.particles) {
              p.x += p.vx * dt; p.y += p.vy * dt;
              p.vy += 0.09 * dt; p.life -= p.decay * dt;
            }
            g.particles = g.particles.filter(p => p.life > 0);

            // Periodic UI refresh
            g.uiTimer += dt;
            if (g.uiTimer > 7) {
              g.uiTimer = 0;
              setUi(prev => ({
                ...prev,
                score: g.score,
                speed: Math.round(g.speed * 15),
                multiplier: g.multiplier,
              }));
            }
          }

          // Title slow-scroll background effect
          if (g.phase === 'title') {
            g.scrollOffset += 1.5 * dt;
            if (g.scrollOffset >= SEG_H) { g.scrollOffset -= SEG_H; genNewSeg(); }
          }

          // ── Draw background ───────────────────────────────────────
          const bg = ctx.createLinearGradient(0, 0, 0, H);
          bg.addColorStop(0, '#020006');
          bg.addColorStop(1, '#0e001e');
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, W, H);

          // Stars
          for (const s of stars) {
            ctx.globalAlpha = s.b;
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(
              (s.x + g.scrollOffset * 0.14) % W,
              (s.y + g.scrollOffset * 0.07) % H,
              1.5, 1.5
            );
          }
          ctx.globalAlpha = 1;

          // ── Draw road ─────────────────────────────────────────────
          const segs = g.roadSegs;

          for (let i = 0; i < NUM_SEGS - 1; i++) {
            const y1 = segY(i);
            const y2 = segY(i + 1);
            if (y2 < -SEG_H || y1 > H + SEG_H) continue;

            const tw = segs[i].w / 2;
            const bw = segs[i + 1].w / 2;
            const tcx = segs[i].cx;
            const bcx = segs[i + 1].cx;

            // Alternating stripes for motion
            const stripe = (i + Math.floor(g.scrollOffset / SEG_H)) % 6 < 3;
            ctx.beginPath();
            ctx.moveTo(tcx - tw, y1);
            ctx.lineTo(tcx + tw, y1);
            ctx.lineTo(bcx + bw, y2);
            ctx.lineTo(bcx - bw, y2);
            ctx.closePath();
            ctx.fillStyle = stripe ? 'rgba(18, 2, 50, 0.97)' : 'rgba(28, 6, 72, 0.97)';
            ctx.fill();

            // Centre dashes
            if (stripe) {
              ctx.strokeStyle = 'rgba(255, 230, 50, 0.3)';
              ctx.lineWidth = 1.5;
              ctx.beginPath();
              ctx.moveTo(tcx, y1);
              ctx.lineTo(bcx, y2);
              ctx.stroke();
            }
          }

          // Road edge glow — left (cyan)
          ctx.shadowBlur = 14;
          ctx.lineWidth = 2.8;
          ctx.beginPath();
          let edgeStarted = false;
          for (let i = 0; i < NUM_SEGS; i++) {
            const y = segY(i);
            if (y < -SEG_H || y > H + SEG_H) { edgeStarted = false; continue; }
            const x = segs[i].cx - segs[i].w / 2;
            if (!edgeStarted) { ctx.moveTo(x, y); edgeStarted = true; }
            else ctx.lineTo(x, y);
          }
          ctx.strokeStyle = '#00ffff';
          ctx.shadowColor = '#00ffff';
          ctx.stroke();

          // Road edge glow — right (magenta)
          ctx.beginPath();
          edgeStarted = false;
          for (let i = 0; i < NUM_SEGS; i++) {
            const y = segY(i);
            if (y < -SEG_H || y > H + SEG_H) { edgeStarted = false; continue; }
            const x = segs[i].cx + segs[i].w / 2;
            if (!edgeStarted) { ctx.moveTo(x, y); edgeStarted = true; }
            else ctx.lineTo(x, y);
          }
          ctx.strokeStyle = '#ff00cc';
          ctx.shadowColor = '#ff00cc';
          ctx.stroke();
          ctx.shadowBlur = 0;

          // ── Draw gems ─────────────────────────────────────────────
          for (const gem of g.gems) {
            if (gem.collected) continue;
            const pulse = Math.sin(gem.pulse) * 0.5 + 0.5;
            ctx.save();
            ctx.translate(gem.x, gem.y);
            ctx.rotate(gem.pulse * 0.6);
            ctx.shadowBlur = 12 + pulse * 10;
            ctx.shadowColor = gem.color;
            ctx.fillStyle = gem.color;
            ctx.beginPath();
            ctx.moveTo(0, -11);
            ctx.lineTo(8, 0);
            ctx.lineTo(0, 11);
            ctx.lineTo(-8, 0);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }

          // ── Draw particles ────────────────────────────────────────
          for (const p of g.particles) {
            ctx.globalAlpha = p.life;
            ctx.shadowBlur = 7;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          ctx.shadowBlur = 0;

          // ── Draw car ──────────────────────────────────────────────
          if (g.phase === 'playing' || g.phase === 'gameover') {
            const blink = g.invincible > 0 && Math.floor(g.invincible / 5) % 2 === 0;
            if (!blink) {
              ctx.save();
              ctx.translate(g.carX, CAR_Y);
              ctx.rotate(g.steerDir * 0.22);

              const CW = 16, CL = 24;

              // Engine glow
              const eg = ctx.createRadialGradient(0, CL, 0, 0, CL, 22);
              eg.addColorStop(0, 'rgba(0, 180, 255, 0.88)');
              eg.addColorStop(1, 'rgba(0, 180, 255, 0)');
              ctx.fillStyle = eg;
              ctx.beginPath();
              ctx.ellipse(0, CL, CW * 0.45, 22, 0, 0, Math.PI * 2);
              ctx.fill();

              // Body
              ctx.shadowBlur = 20;
              ctx.shadowColor = '#ee22ff';
              ctx.fillStyle = '#cc22ee';
              ctx.beginPath();
              ctx.moveTo(0, -CL);
              ctx.lineTo(CW * 0.82, -CL * 0.18);
              ctx.lineTo(CW * 0.92, CL * 0.42);
              ctx.lineTo(CW * 0.52, CL);
              ctx.lineTo(-CW * 0.52, CL);
              ctx.lineTo(-CW * 0.92, CL * 0.42);
              ctx.lineTo(-CW * 0.82, -CL * 0.18);
              ctx.closePath();
              ctx.fill();

              // Windshield
              ctx.shadowBlur = 0;
              ctx.fillStyle = 'rgba(0, 230, 255, 0.78)';
              ctx.beginPath();
              ctx.moveTo(0, -CL * 0.87);
              ctx.lineTo(CW * 0.56, -CL * 0.08);
              ctx.lineTo(-CW * 0.56, -CL * 0.08);
              ctx.closePath();
              ctx.fill();

              ctx.restore();
            }
          }

          // ── Speed lines at high speed ─────────────────────────────
          if (g.phase === 'playing' && g.speed > 11) {
            const alpha = Math.min(0.35, (g.speed - 11) / 28);
            ctx.strokeStyle = `rgba(130, 0, 255, ${alpha})`;
            ctx.lineWidth = 1;
            for (let i = 0; i < 14; i++) {
              const lx = ((i * 139 + g.distance * 4) % W);
              const ly = ((i * 97 + g.distance * 6) % H);
              ctx.beginPath();
              ctx.moveTo(lx, ly);
              ctx.lineTo(lx, ly + g.speed * 2.2);
              ctx.stroke();
            }
          }

          // ── Crash flash ───────────────────────────────────────────
          if (g.flashTimer > 0) {
            ctx.fillStyle = `rgba(255, 20, 20, ${(g.flashTimer / 22) * 0.42})`;
            ctx.fillRect(0, 0, W, H);
          }
        };

        frameId = requestAnimationFrame(loop);

        return () => {
          cancelAnimationFrame(frameId);
          window.removeEventListener('keydown', onKeyDown);
          window.removeEventListener('keyup', onKeyUp);
          window.removeEventListener('pointerdown', onPointerDown);
          window.removeEventListener('pointerup', onPointerUp);
          window.removeEventListener('touchmove', onTouchMove);
        };
      }, []);

      const { phase, score, highScore, lives, multiplier, speed } = ui;

      return (
        <div style={{ position: 'relative', width: '100vw', height: '100vh', overflow: 'hidden' }}>
          <canvas ref={canvasRef} style={{ display: 'block' }} />

          {/* HUD */}
          {phase === 'playing' && (
            <div style={{
              position: 'absolute', top: 12, left: 0, right: 0,
              display: 'flex', justifyContent: 'space-between', padding: '0 18px',
              pointerEvents: 'none',
            }}>
              <div>
                <div style={{ color: '#00ffff', fontSize: 11, letterSpacing: 3, textShadow: '0 0 6px #00ffff' }}>SCORE</div>
                <div style={{ color: '#fff', fontSize: 28, fontWeight: 'bold', textShadow: '0 0 14px #ff44ff' }}>
                  {score.toLocaleString()}
                </div>
                {multiplier > 1 && (
                  <div style={{ color: '#ffff44', fontSize: 14, textShadow: '0 0 8px #ffff44', marginTop: 2 }}>
                    ×{multiplier} COMBO
                  </div>
                )}
              </div>
              <div style={{ textAlign: 'center' }}>
                <div style={{ color: '#ff44ff', fontSize: 11, letterSpacing: 3 }}>SPEED</div>
                <div style={{ color: '#fff', fontSize: 22, textShadow: '0 0 8px #ff44ff' }}>{speed} km/h</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ color: '#aaa', fontSize: 11, letterSpacing: 2 }}>LIVES</div>
                <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 5, marginTop: 3 }}>
                  {[0, 1, 2].map(i => (
                    <div key={i} style={{
                      width: 13, height: 13, borderRadius: '50%',
                      background: i < lives ? '#ff44ff' : '#1a1a2e',
                      boxShadow: i < lives ? '0 0 8px #ff44ff' : 'none',
                    }} />
                  ))}
                </div>
                <div style={{ color: '#444', fontSize: 11, marginTop: 4 }}>BEST {highScore.toLocaleString()}</div>
              </div>
            </div>
          )}

          {/* Mobile steer hints */}
          {phase === 'playing' && (
            <div style={{
              position: 'absolute', bottom: 18, left: 0, right: 0,
              display: 'flex', justifyContent: 'space-between', padding: '0 28px',
              pointerEvents: 'none', opacity: 0.22,
            }}>
              <span style={{ color: '#00ffff', fontSize: 40 }}>◄</span>
              <span style={{ color: '#ff00cc', fontSize: 40 }}>►</span>
            </div>
          )}

          {/* Title screen */}
          {phase === 'title' && (
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              background: 'rgba(0,0,0,0.62)',
            }}>
              <div style={{
                fontSize: 'clamp(42px, 10vw, 76px)', fontWeight: 900, letterSpacing: 7,
                color: '#ff44ff', textShadow: '0 0 28px #ff44ff, 0 0 55px #cc00ff',
                marginBottom: 10,
              }}>NEON DRIFT</div>
              <div style={{
                color: '#00ffff', fontSize: 'clamp(13px, 3vw, 19px)', letterSpacing: 2,
                textShadow: '0 0 8px #00ffff', marginBottom: 48, textAlign: 'center', padding: '0 20px',
              }}>
                Stay on the road · Collect gems · Chain combos · Survive the speed
              </div>
              <div style={{
                border: '2px solid #00ffff', padding: '13px 52px',
                color: '#00ffff', fontSize: 18, letterSpacing: 4,
                textShadow: '0 0 10px #00ffff', boxShadow: '0 0 22px rgba(0,255,255,0.3)',
                cursor: 'pointer',
              }}>
                START RACE
              </div>
              <div style={{ color: '#444', fontSize: 13, marginTop: 28, textAlign: 'center', padding: '0 20px' }}>
                ← → or A / D to steer · tap left / right on mobile
              </div>
              {highScore > 0 && (
                <div style={{ color: '#ff44ff', fontSize: 14, marginTop: 12, textShadow: '0 0 8px #ff44ff' }}>
                  BEST: {highScore.toLocaleString()}
                </div>
              )}
            </div>
          )}

          {/* Game over screen */}
          {phase === 'gameover' && (
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              background: 'rgba(0,0,0,0.72)',
            }}>
              <div style={{
                fontSize: 'clamp(38px, 9vw, 64px)', fontWeight: 900,
                color: '#ff3333', textShadow: '0 0 28px #ff3333', marginBottom: 20,
              }}>WIPEOUT!</div>
              <div style={{ color: '#00ffff', fontSize: 20, marginBottom: 8 }}>
                SCORE: <span style={{ color: '#fff', fontWeight: 'bold' }}>{score.toLocaleString()}</span>
              </div>
              <div style={{ color: '#ff44ff', fontSize: 16, marginBottom: 46, textShadow: '0 0 6px #ff44ff' }}>
                BEST: {highScore.toLocaleString()}
              </div>
              <div style={{
                border: '2px solid #00ffff', padding: '13px 52px',
                color: '#00ffff', fontSize: 18, letterSpacing: 4,
                textShadow: '0 0 10px #00ffff', boxShadow: '0 0 22px rgba(0,255,255,0.3)',
                cursor: 'pointer',
              }}>
                RACE AGAIN
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NeonDrift />);
  </script>
</body>
</html>
