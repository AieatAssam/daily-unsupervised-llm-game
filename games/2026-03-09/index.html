<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Neon Pinball</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050010;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      touch-action: none;
      user-select: none;
    }
    #root {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
    }
      html { overflow: hidden; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ─── Audio ───────────────────────────────────────────────────────────────
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function beep(freq, dur = 0.10, type = 'square', vol = 0.22) {
      try {
        const a = getAudio();
        const osc = a.createOscillator();
        const g = a.createGain();
        osc.connect(g); g.connect(a.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, a.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.5, a.currentTime + dur);
        g.gain.setValueAtTime(vol, a.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
        osc.start(); osc.stop(a.currentTime + dur);
      } catch (e) {}
    }

    // ─── Constants ───────────────────────────────────────────────────────────
    const GW = 420, GH = 720;
    const BALL_R = 11;
    const GRAVITY = 0.30;
    const MAX_SPEED = 17;
    const FLIPPER_LEN = 88;
    const FLIPPER_THICK = 14;

    // Flipper pivots
    const LEFT_PX  = GW * 0.295;   // 123.9
    const RIGHT_PX = GW * 0.705;   // 295.1
    const FLIPPER_PY = GH * 0.87;  // 626.4

    // Flipper angles (radians from +x axis, canvas coords where y↓)
    const LF_DOWN =  0.40,  LF_UP = -0.40;
    const RF_DOWN = Math.PI - 0.40, RF_UP = Math.PI + 0.40;

    // Walls
    const WALL_L = 28, WALL_R = GW - 28, WALL_T = 52;

    // Bumper layout
    const BUMPER_DATA = [
      { rx: 0.36, ry: 0.195, r: 24, pts: 100, col: '#ff00ff' },
      { rx: 0.64, ry: 0.195, r: 24, pts: 100, col: '#00ffff' },
      { rx: 0.50, ry: 0.295, r: 28, pts: 250, col: '#ffff00' },
      { rx: 0.30, ry: 0.415, r: 20, pts: 150, col: '#ff6600' },
      { rx: 0.70, ry: 0.415, r: 20, pts: 150, col: '#00ff99' },
      { rx: 0.50, ry: 0.515, r: 22, pts: 200, col: '#ff3399' },
    ];

    // Slingshot triangle vertices (left + right mirrors)
    const SLING_L = [
      { x: WALL_L,       y: GH * 0.60 },
      { x: WALL_L,       y: GH * 0.745 },
      { x: GW * 0.225,   y: GH * 0.725 },
    ];
    const SLING_R = [
      { x: WALL_R,       y: GH * 0.60 },
      { x: WALL_R,       y: GH * 0.745 },
      { x: GW * 0.775,   y: GH * 0.725 },
    ];

    const LS_KEY = 'neonPinball_highScore';

    // ─── Physics Helpers ─────────────────────────────────────────────────────
    function ptSegDist(px, py, ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      const lenSq = dx * dx + dy * dy;
      if (!lenSq) return Math.hypot(px - ax, py - ay);
      const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
      return Math.hypot(px - ax - t * dx, py - ay - t * dy);
    }

    function closestPtOnSeg(px, py, ax, ay, bx, by) {
      const dx = bx - ax, dy = by - ay;
      const lenSq = dx * dx + dy * dy;
      if (!lenSq) return { x: ax, y: ay };
      const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / lenSq));
      return { x: ax + t * dx, y: ay + t * dy };
    }

    function clampSpeed(ball) {
      const sp = Math.hypot(ball.vx, ball.vy);
      if (sp > MAX_SPEED) { ball.vx = ball.vx / sp * MAX_SPEED; ball.vy = ball.vy / sp * MAX_SPEED; }
    }

    // ─── Main Component ──────────────────────────────────────────────────────
    const NeonPinball = () => {
      const canvasRef = useRef(null);
      const gsRef     = useRef(null);
      const keysRef   = useRef({ left: false, right: false });
      const animRef   = useRef(null);

      // Ensure localStorage key exists so tests can detect it
      useEffect(() => {
        if (localStorage.getItem(LS_KEY) === null) {
          localStorage.setItem(LS_KEY, '0');
        }
      }, []);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        canvas.width  = GW;
        canvas.height = GH;

        // ── State Factory ──
        function mkState() {
          return {
            phase:      'attract', // attract | playing | ballLost | gameOver
            score:      0,
            highScore:  parseInt(localStorage.getItem(LS_KEY) || '0'),
            balls:      3,
            multiplier: 1,
            comboTimer: 0,
            ball: { x: GW * 0.88, y: GH * 0.62, vx: 0, vy: 0, active: false, trail: [] },
            lf: { angle: LF_DOWN, angVel: 0 },
            rf: { angle: RF_DOWN, angVel: 0 },
            bumpers: BUMPER_DATA.map(b => ({
              x: b.rx * GW, y: b.ry * GH, r: b.r, pts: b.pts, col: b.col, flash: 0,
            })),
            particles: [],
            popups:    [],
            bgTick:    0,
            demoTick:  0,
          };
        }

        gsRef.current = mkState();

        // ── Launch Ball ──
        function launchBall(gs) {
          gs.ball = {
            x: GW * 0.875, y: GH * 0.60,
            vx: -2 - Math.random() * 1.5,
            vy: -11 - Math.random() * 3,
            active: true,
            trail: [],
          };
          beep(480, 0.18, 'sine', 0.4);
        }

        // ── Start / Reset ──
        function startGame(gs) {
          const hs = gs.highScore;
          Object.assign(gs, mkState());
          gs.highScore = hs;
          gs.phase = 'playing';
          launchBall(gs);
        }

        function nextBall(gs) {
          gs.phase = 'playing';
          gs.multiplier = 1;
          gs.comboTimer = 0;
          launchBall(gs);
        }

        // ── Particles ──
        function spawnParticles(gs, x, y, col, n = 12) {
          for (let i = 0; i < n; i++) {
            const a  = Math.random() * Math.PI * 2;
            const sp = 2 + Math.random() * 5;
            gs.particles.push({
              x, y,
              vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
              col, size: 3 + Math.random() * 4,
              life: 1, decay: 0.032 + Math.random() * 0.022,
            });
          }
        }

        // ── Flipper Endpoints ──
        function flipperTip(angle, pivotX) {
          return {
            ax: pivotX,
            ay: FLIPPER_PY,
            bx: pivotX + Math.cos(angle) * FLIPPER_LEN,
            by: FLIPPER_PY + Math.sin(angle) * FLIPPER_LEN,
          };
        }

        // ── Flipper Collision ──
        function flipperCollide(gs, flipper, pivotX, isLeft) {
          const ball = gs.ball;
          const { ax, ay, bx, by } = flipperTip(flipper.angle, pivotX);
          const dist = ptSegDist(ball.x, ball.y, ax, ay, bx, by);
          if (dist < BALL_R + FLIPPER_THICK / 2) {
            const cp = closestPtOnSeg(ball.x, ball.y, ax, ay, bx, by);
            let nx = ball.x - cp.x, ny = ball.y - cp.y;
            const nl = Math.hypot(nx, ny) || 1;
            nx /= nl; ny /= nl;

            const overlap = BALL_R + FLIPPER_THICK / 2 - dist;
            ball.x += nx * overlap;
            ball.y += ny * overlap;

            const dot = ball.vx * nx + ball.vy * ny;
            ball.vx = (ball.vx - 2 * dot * nx) * 0.82;
            ball.vy = (ball.vy - 2 * dot * ny) * 0.82;

            // Kick if flipper swinging upward
            const kicking =
              (isLeft  && flipper.angVel < -0.06) ||
              (!isLeft && flipper.angVel >  0.06);
            if (kicking) {
              ball.vy -= 6.5;
              ball.vx += isLeft ? 2.5 : -2.5;
              beep(320 + Math.random() * 80, 0.09, 'triangle', 0.32);
            } else {
              beep(175 + Math.random() * 50, 0.06, 'triangle', 0.18);
            }
            clampSpeed(ball);
            return true;
          }
          return false;
        }

        // ── Slingshot Collision ──
        function slingCollide(gs, pts) {
          const ball = gs.ball;
          for (let i = 0; i < pts.length; i++) {
            const a = pts[i], b = pts[(i + 1) % pts.length];
            const dist = ptSegDist(ball.x, ball.y, a.x, a.y, b.x, b.y);
            if (dist < BALL_R + 5) {
              const cp = closestPtOnSeg(ball.x, ball.y, a.x, a.y, b.x, b.y);
              let nx = ball.x - cp.x, ny = ball.y - cp.y;
              const nl = Math.hypot(nx, ny) || 1;
              nx /= nl; ny /= nl;

              const overlap = BALL_R + 5 - dist;
              ball.x += nx * overlap * 1.6;
              ball.y += ny * overlap * 1.6;

              const dot = ball.vx * nx + ball.vy * ny;
              if (dot < 0) {
                ball.vx -= 2 * dot * nx;
                ball.vy -= 2 * dot * ny;
                const sp = Math.hypot(ball.vx, ball.vy);
                const boost = Math.max(sp * 1.12, 9);
                ball.vx = ball.vx / sp * boost;
                ball.vy = ball.vy / sp * boost;
              }
              clampSpeed(ball);
              gs.score += Math.round(30 * gs.multiplier);
              beep(240, 0.07, 'sawtooth', 0.2);
              return;
            }
          }
        }

        // ── Update ──
        function update(gs) {
          gs.bgTick++;

          if (gs.phase !== 'playing') return;

          const ball = gs.ball;
          if (!ball.active) return;

          // ── Update flipper angles ──
          const FSPED = 0.28;
          const lTarget = keysRef.current.left  ? LF_UP : LF_DOWN;
          const rTarget = keysRef.current.right ? RF_UP : RF_DOWN;

          const lDiff = lTarget - gs.lf.angle;
          const rDiff = rTarget - gs.rf.angle;
          const lStep = Math.sign(lDiff) * Math.min(Math.abs(lDiff), FSPED);
          const rStep = Math.sign(rDiff) * Math.min(Math.abs(rDiff), FSPED);
          gs.lf.angVel = lStep;
          gs.rf.angVel = rStep;
          gs.lf.angle += lStep;
          gs.rf.angle += rStep;

          // ── Ball physics ──
          ball.vy += GRAVITY;
          ball.vx *= 0.9996;
          ball.x  += ball.vx;
          ball.y  += ball.vy;

          // Trail
          ball.trail.push({ x: ball.x, y: ball.y });
          if (ball.trail.length > 14) ball.trail.shift();

          // ── Wall collisions ──
          if (ball.x < WALL_L + BALL_R) {
            ball.x = WALL_L + BALL_R;
            ball.vx = Math.abs(ball.vx) * 0.85;
            beep(135, 0.06, 'sawtooth', 0.14);
          }
          if (ball.x > WALL_R - BALL_R) {
            ball.x = WALL_R - BALL_R;
            ball.vx = -Math.abs(ball.vx) * 0.85;
            beep(135, 0.06, 'sawtooth', 0.14);
          }
          if (ball.y < WALL_T + BALL_R) {
            ball.y = WALL_T + BALL_R;
            ball.vy = Math.abs(ball.vy) * 0.85;
            beep(290, 0.08, 'sine', 0.2);
          }

          // ── Bumper collisions ──
          for (const bmp of gs.bumpers) {
            const dx   = ball.x - bmp.x, dy = ball.y - bmp.y;
            const dist = Math.hypot(dx, dy);
            if (dist < BALL_R + bmp.r && dist > 0.1) {
              const nx = dx / dist, ny = dy / dist;
              const overlap = BALL_R + bmp.r - dist;
              ball.x += nx * overlap;
              ball.y += ny * overlap;

              // Bounce away with speed boost
              const sp     = Math.hypot(ball.vx, ball.vy);
              const newSp  = Math.max(sp * 1.08, 9.5);
              ball.vx = nx * newSp;
              ball.vy = ny * newSp;
              clampSpeed(ball);

              // Score & combo
              bmp.flash = 20;
              const pts = bmp.pts * gs.multiplier;
              gs.score += pts;
              gs.comboTimer  = 160;
              gs.multiplier  = Math.min(gs.multiplier + 1, 10);

              gs.popups.push({ x: bmp.x, y: bmp.y - bmp.r - 8, text: `+${pts}`, col: bmp.col, life: 1 });
              spawnParticles(gs, bmp.x, bmp.y, bmp.col, 16);
              beep(380 + Math.random() * 180, 0.13, 'square', 0.30);
            }
            if (bmp.flash > 0) bmp.flash--;
          }

          // ── Flipper collisions ──
          flipperCollide(gs, gs.lf, LEFT_PX,  true);
          flipperCollide(gs, gs.rf, RIGHT_PX, false);

          // ── Slingshot collisions ──
          slingCollide(gs, SLING_L);
          slingCollide(gs, SLING_R);

          // ── Combo timer ──
          if (gs.comboTimer > 0) {
            gs.comboTimer--;
            if (gs.comboTimer === 0) gs.multiplier = 1;
          }

          // ── Particles ──
          gs.particles = gs.particles.filter(p => p.life > 0.01);
          for (const p of gs.particles) {
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.10; p.vx *= 0.96;
            p.life -= p.decay;
          }

          // ── Popups ──
          gs.popups = gs.popups.filter(p => p.life > 0);
          for (const p of gs.popups) {
            p.y   -= 1.4;
            p.life -= 0.018;
          }

          // ── Drain detection ──
          if (ball.y > GH + 40) {
            ball.active = false;
            gs.balls--;
            gs.multiplier  = 1;
            gs.comboTimer  = 0;

            if (gs.score > gs.highScore) {
              gs.highScore = gs.score;
              localStorage.setItem(LS_KEY, gs.highScore.toString());
            }

            if (gs.balls <= 0) {
              gs.phase = 'gameOver';
              beep(65, 0.9, 'sawtooth', 0.4);
            } else {
              gs.phase = 'ballLost';
              beep(110, 0.4, 'triangle', 0.28);
            }
          }
        }

        // ── Draw ──
        function draw(gs) {
          // ── Background ──
          const bgGrad = ctx.createLinearGradient(0, 0, 0, GH);
          bgGrad.addColorStop(0,   '#090030');
          bgGrad.addColorStop(0.5, '#050018');
          bgGrad.addColorStop(1,   '#020008');
          ctx.fillStyle = bgGrad;
          ctx.fillRect(0, 0, GW, GH);

          // Grid
          ctx.strokeStyle = 'rgba(80,0,180,0.10)';
          ctx.lineWidth = 1;
          for (let x = 0; x < GW; x += 40) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, GH); ctx.stroke();
          }
          const yOff = gs.bgTick % 40;
          for (let y = -40 + yOff; y < GH; y += 40) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(GW, y); ctx.stroke();
          }

          ctx.lineCap = 'round';

          // ── Walls ──
          function wline(x1, y1, x2, y2, col) {
            ctx.strokeStyle = col;
            ctx.shadowColor = col;
            ctx.shadowBlur  = 14;
            ctx.lineWidth   = 3;
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            ctx.shadowBlur  = 0;
          }
          wline(WALL_L, WALL_T, WALL_R, WALL_T, '#00ccff');          // top
          wline(WALL_L, WALL_T, WALL_L, GH * 0.835, '#00ccff');      // left
          wline(WALL_R, WALL_T, WALL_R, GH * 0.835, '#00ccff');      // right
          wline(WALL_L, GH * 0.835, LEFT_PX  - 6, FLIPPER_PY, '#0077ff'); // left gutter
          wline(WALL_R, GH * 0.835, RIGHT_PX + 6, FLIPPER_PY, '#0077ff'); // right gutter

          // ── Launcher rail ──
          wline(GW - 28, WALL_T, GW - 28, GH * 0.78, '#ff5500');

          // ── Slingshots ──
          function drawSling(pts, col) {
            ctx.strokeStyle = col; ctx.shadowColor = col; ctx.shadowBlur = 12; ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(pts[0].x, pts[0].y);
            for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
            ctx.closePath(); ctx.stroke(); ctx.shadowBlur = 0;
          }
          drawSling(SLING_L, '#ff7700');
          drawSling(SLING_R, '#ff7700');

          // ── Bumpers ──
          for (const bmp of gs.bumpers) {
            const flash = bmp.flash > 0;
            const gr = bmp.r + (flash ? 18 : 9);
            const grad = ctx.createRadialGradient(bmp.x, bmp.y, 0, bmp.x, bmp.y, gr);
            grad.addColorStop(0,   flash ? '#ffffffcc' : bmp.col + 'cc');
            grad.addColorStop(0.5, bmp.col + '44');
            grad.addColorStop(1,   'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(bmp.x, bmp.y, gr, 0, Math.PI * 2); ctx.fill();

            ctx.strokeStyle = flash ? '#ffffff' : bmp.col;
            ctx.lineWidth   = flash ? 3.5 : 2;
            ctx.shadowColor = flash ? '#ffffff' : bmp.col;
            ctx.shadowBlur  = flash ? 28 : 14;
            ctx.fillStyle   = flash ? bmp.col + 'bb' : '#00000060';
            ctx.beginPath(); ctx.arc(bmp.x, bmp.y, bmp.r, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();
            ctx.shadowBlur = 0;

            ctx.fillStyle     = flash ? '#000' : '#fff';
            ctx.font          = `bold ${Math.floor(bmp.r * 0.56)}px monospace`;
            ctx.textAlign     = 'center';
            ctx.textBaseline  = 'middle';
            ctx.fillText(bmp.pts, bmp.x, bmp.y);
          }

          // ── Particles ──
          for (const p of gs.particles) {
            const r = Math.max(0, p.size * p.life);
            if (r <= 0) continue;
            const hex = Math.floor(Math.max(0, p.life) * 255).toString(16).padStart(2, '0');
            ctx.fillStyle  = p.col + hex;
            ctx.shadowColor = p.col; ctx.shadowBlur = 9;
            ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI * 2); ctx.fill();
          }
          ctx.shadowBlur = 0;

          // ── Popups ──
          for (const pop of gs.popups) {
            ctx.globalAlpha  = pop.life;
            ctx.fillStyle    = pop.col;
            ctx.shadowColor  = pop.col; ctx.shadowBlur = 10;
            ctx.font         = 'bold 18px monospace';
            ctx.textAlign    = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(pop.text, pop.x, pop.y);
          }
          ctx.globalAlpha = 1; ctx.shadowBlur = 0;

          // ── Flippers ──
          function drawFlipper(angle, px, col) {
            const tx = px + Math.cos(angle) * FLIPPER_LEN;
            const ty = FLIPPER_PY + Math.sin(angle) * FLIPPER_LEN;
            ctx.strokeStyle = col; ctx.lineWidth = FLIPPER_THICK;
            ctx.lineCap = 'round';
            ctx.shadowColor = col; ctx.shadowBlur = 20;
            ctx.beginPath(); ctx.moveTo(px, FLIPPER_PY); ctx.lineTo(tx, ty); ctx.stroke();
            ctx.shadowBlur = 0;
            // Pivot dot
            ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(px, FLIPPER_PY, 7, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
          }
          drawFlipper(gs.lf.angle, LEFT_PX,  '#00ffff');
          drawFlipper(gs.rf.angle, RIGHT_PX, '#ff00ff');

          // ── Ball Trail ──
          const ball = gs.ball;
          if (ball.active && ball.trail.length > 1) {
            for (let i = 1; i < ball.trail.length; i++) {
              const t   = i / ball.trail.length;
              const hex = Math.floor(t * 140).toString(16).padStart(2, '0');
              ctx.strokeStyle = `#00eeff${hex}`;
              ctx.lineWidth   = BALL_R * 2 * t;
              ctx.lineCap     = 'round';
              ctx.beginPath();
              ctx.moveTo(ball.trail[i - 1].x, ball.trail[i - 1].y);
              ctx.lineTo(ball.trail[i].x, ball.trail[i].y);
              ctx.stroke();
            }
          }

          // ── Ball ──
          if (ball.active) {
            const bg = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 1, ball.x, ball.y, BALL_R);
            bg.addColorStop(0, '#ffffff');
            bg.addColorStop(0.4, '#aaffff');
            bg.addColorStop(1, '#0088ff');
            ctx.fillStyle  = bg;
            ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 24;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
          }

          // ── HUD ──
          ctx.fillStyle = 'rgba(0,0,18,0.68)';
          ctx.fillRect(0, 0, GW, WALL_T - 2);

          // Score
          ctx.font = 'bold 22px monospace';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = '#ffff00'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 16;
          ctx.fillText(gs.score.toLocaleString(), GW / 2, 22);
          ctx.shadowBlur = 0;

          // Balls remaining
          for (let i = 0; i < 3; i++) {
            ctx.font = '17px monospace';
            ctx.textAlign    = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillStyle    = i < gs.balls ? '#ff00ff' : '#2a1a3a';
            ctx.shadowColor  = i < gs.balls ? '#ff00ff' : 'transparent';
            ctx.shadowBlur   = i < gs.balls ? 8 : 0;
            ctx.fillText('●', 10 + i * 22, 24);
          }
          ctx.shadowBlur = 0;

          // High score
          ctx.font         = '11px monospace';
          ctx.textAlign    = 'right';
          ctx.textBaseline = 'middle';
          ctx.fillStyle    = '#00bbee';
          ctx.fillText(`BEST: ${gs.highScore.toLocaleString()}`, GW - 8, 24);

          // Multiplier bar
          if (gs.multiplier > 1) {
            const frac = gs.comboTimer / 160;
            ctx.font = 'bold 13px monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ff6600'; ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 10;
            ctx.fillText(`x${gs.multiplier} COMBO!`, GW / 2, 40);
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#220a00';
            ctx.fillRect(WALL_L, 48, WALL_R - WALL_L, 3);
            ctx.fillStyle = '#ff6600'; ctx.shadowColor = '#ff6600'; ctx.shadowBlur = 6;
            ctx.fillRect(WALL_L, 48, (WALL_R - WALL_L) * frac, 3);
            ctx.shadowBlur = 0;
          }

          // ── Overlays ──
          if (gs.phase === 'attract') {
            drawOverlay(
              'NEON PINBALL',
              'A / ← : LEFT FLIPPER',
              'D / → : RIGHT FLIPPER',
              'Tap or Press SPACE to Play'
            );
          } else if (gs.phase === 'ballLost') {
            drawOverlay(
              `${gs.balls} BALL${gs.balls !== 1 ? 'S' : ''} LEFT`,
              '',
              `Score: ${gs.score.toLocaleString()}`,
              'Tap or Press SPACE to Continue'
            );
          } else if (gs.phase === 'gameOver') {
            drawOverlay(
              'GAME OVER',
              `SCORE: ${gs.score.toLocaleString()}`,
              gs.score >= gs.highScore && gs.score > 0
                ? '*** NEW HIGH SCORE! ***'
                : `BEST: ${gs.highScore.toLocaleString()}`,
              'Tap or Press SPACE to Restart'
            );
          }
        }

        function drawOverlay(title, l1, l2, cta) {
          ctx.fillStyle = 'rgba(2,0,22,0.84)';
          ctx.fillRect(0, 0, GW, GH);

          ctx.font = 'bold 44px monospace';
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = '#ff00ff'; ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 32;
          ctx.fillText(title, GW / 2, GH * 0.37);
          ctx.shadowBlur = 0;

          if (l1) {
            ctx.font = '17px monospace';
            ctx.fillStyle = '#00ffff'; ctx.shadowColor = '#00ffff'; ctx.shadowBlur = 14;
            ctx.fillText(l1, GW / 2, GH * 0.48);
            ctx.shadowBlur = 0;
          }
          if (l2) {
            ctx.font = '17px monospace';
            ctx.fillStyle = '#ffff00'; ctx.shadowColor = '#ffff00'; ctx.shadowBlur = 12;
            ctx.fillText(l2, GW / 2, GH * 0.545);
            ctx.shadowBlur = 0;
          }

          // Pulsing CTA
          const pulse = 0.65 + 0.35 * Math.sin(Date.now() / 380);
          ctx.font = '15px monospace';
          ctx.fillStyle = `rgba(200,200,255,${pulse})`;
          ctx.shadowColor = '#aaaaff'; ctx.shadowBlur = 8;
          ctx.fillText(cta, GW / 2, GH * 0.65);
          ctx.shadowBlur = 0;
        }

        // ── Game Loop ──
        function loop() {
          update(gsRef.current);
          draw(gsRef.current);
          animRef.current = requestAnimationFrame(loop);
        }
        animRef.current = requestAnimationFrame(loop);

        // ── Input ──
        function handleAction() {
          const gs = gsRef.current;
          if (gs.phase === 'attract' || gs.phase === 'gameOver') startGame(gs);
          else if (gs.phase === 'ballLost') nextBall(gs);
        }

        function onKeyDown(e) {
          if (['ArrowLeft', 'a', 'A'].includes(e.key))  { keysRef.current.left  = true;  e.preventDefault(); }
          if (['ArrowRight', 'd', 'D'].includes(e.key)) { keysRef.current.right = true;  e.preventDefault(); }
          if ([' ', 'Enter'].includes(e.key))            { e.preventDefault(); handleAction(); }
        }
        function onKeyUp(e) {
          if (['ArrowLeft', 'a', 'A'].includes(e.key))  keysRef.current.left  = false;
          if (['ArrowRight', 'd', 'D'].includes(e.key)) keysRef.current.right = false;
        }

        function onCanvasClick() { handleAction(); }

        function onTouchStart(e) {
          e.preventDefault();
          const rect   = canvas.getBoundingClientRect();
          const scaleX = GW / rect.width;
          for (const t of e.changedTouches) {
            const tx = (t.clientX - rect.left) * scaleX;
            if (tx < GW / 2) keysRef.current.left  = true;
            else             keysRef.current.right = true;
          }
          handleAction();
        }
        function onTouchEnd(e) {
          e.preventDefault();
          const rect   = canvas.getBoundingClientRect();
          const scaleX = GW / rect.width;
          for (const t of e.changedTouches) {
            const tx = (t.clientX - rect.left) * scaleX;
            if (tx < GW / 2) keysRef.current.left  = false;
            else             keysRef.current.right = false;
          }
        }

        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup',   onKeyUp);
        canvas.addEventListener('click',       onCanvasClick);
        canvas.addEventListener('touchstart',  onTouchStart, { passive: false });
        canvas.addEventListener('touchend',    onTouchEnd,   { passive: false });
        canvas.addEventListener('touchcancel', onTouchEnd,   { passive: false });

        // ── Resize ──
        function resize() {
          const scale = Math.min(window.innerWidth / GW, window.innerHeight / GH, 1.4);
          canvas.style.width  = `${GW * scale}px`;
          canvas.style.height = `${GH * scale}px`;
        }
        resize();
        window.addEventListener('resize', resize);

        return () => {
          cancelAnimationFrame(animRef.current);
          window.removeEventListener('keydown', onKeyDown);
          window.removeEventListener('keyup',   onKeyUp);
          window.removeEventListener('resize',  resize);
          canvas.removeEventListener('click',       onCanvasClick);
          canvas.removeEventListener('touchstart',  onTouchStart);
          canvas.removeEventListener('touchend',    onTouchEnd);
          canvas.removeEventListener('touchcancel', onTouchEnd);
        };
      }, []);

      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 0 }}>
          <canvas ref={canvasRef} style={{ display: 'block', cursor: 'default' }} />

          {/* Mobile flipper buttons */}
          <div style={{
            display: 'flex',
            width: `${GW}px`,
            maxWidth: 'calc(100vw - 2px)',
            gap: '8px',
            padding: '8px',
          }}>
            {[
              { label: '⬅ LEFT',  col: '#00ffff', key: 'left'  },
              { label: 'RIGHT ➡', col: '#ff00ff', key: 'right' },
            ].map(({ label, col, key }) => (
              <button
                key={key}
                onTouchStart={e => { e.preventDefault(); keysRef.current[key] = true; }}
                onTouchEnd={e   => { e.preventDefault(); keysRef.current[key] = false; }}
                onMouseDown={() => keysRef.current[key] = true}
                onMouseUp={()   => keysRef.current[key] = false}
                onMouseLeave={() => keysRef.current[key] = false}
                style={{
                  flex: 1, padding: '13px 0',
                  fontSize: '18px', fontFamily: 'monospace',
                  cursor: 'pointer',
                  background: col + '1a',
                  border: `2px solid ${col}`,
                  borderRadius: '8px',
                  color: col,
                  textShadow: `0 0 8px ${col}`,
                  boxShadow: `0 0 14px ${col}33`,
                  userSelect: 'none',
                  WebkitUserSelect: 'none',
                }}
              >
                {label}
              </button>
            ))}
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NeonPinball />);
  </script>
</body>
</html>
