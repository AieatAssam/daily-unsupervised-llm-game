<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hue Forge</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1a0a2e, #2d0b3d, #0b2d2a, #3d1b0b, #1a0a2e);
    background-size: 400% 400%;
    animation: bgShift 20s ease infinite;
    color: #fff;
    touch-action: none;
    user-select: none;
  }
  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  #root { width: 100vw; height: 100vh; display: flex; }
  .app { display: flex; flex-direction: column; width: 100%; height: 100%; padding: 10px; gap: 8px; }
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 14px;
    flex-wrap: wrap;
    gap: 8px;
    z-index: 5;
  }
  .hud-block { display: flex; flex-direction: column; align-items: center; min-width: 56px; }
  .hud-label { font-size: 10px; letter-spacing: 2px; color: #ffd23b; text-transform: uppercase; opacity: 0.85; }
  .hud-value { font-size: 22px; font-weight: bold; color: #fff; text-shadow: 0 0 8px #ff3bd6, 0 0 16px #ff3bd6; }
  .hud-value.gold { text-shadow: 0 0 8px #ffd23b, 0 0 16px #ffd23b; color: #ffe9a8; }
  .lives { font-size: 18px; letter-spacing: 3px; }
  .life-full { color: #ffd23b; text-shadow: 0 0 8px #ffd23b; }
  .life-empty { color: #3a3050; }
  .game-area {
    position: relative;
    flex: 1;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(255,59,214,0.2), inset 0 0 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(255,210,59,0.2);
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .particles-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .play-wrap {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 14px 10px;
    z-index: 2;
  }
  .target-panel { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .target-label { font-size: 11px; letter-spacing: 3px; color: #aef; opacity: 0.8; }
  .target-swatch {
    width: clamp(54px, 12vw, 86px);
    height: clamp(54px, 12vw, 86px);
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.7);
    transition: background 0.2s ease;
    animation: swatchPulse 1.6s ease-in-out infinite;
  }
  @keyframes swatchPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
  .target-name { font-size: clamp(14px, 3vw, 20px); font-weight: 900; letter-spacing: 2px; }
  .recipe-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .recipe-label { font-size: 10px; letter-spacing: 2px; color: #8fd9ff; opacity: 0.8; margin-right: 2px; }
  .recipe-chip {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.6);
    box-shadow: 0 0 8px rgba(255,255,255,0.4);
  }
  .recipe-plus { font-size: 14px; font-weight: bold; color: #fff; opacity: 0.7; }
  .timer-track {
    width: clamp(140px, 40vw, 260px);
    height: 8px;
    border-radius: 6px;
    background: rgba(255,255,255,0.12);
    margin-top: 8px;
    overflow: hidden;
  }
  .timer-fill { height: 100%; width: 100%; background: #3bffa0; border-radius: 6px; transition: background 0.2s linear; }
  .forge { display: flex; align-items: center; gap: 14px; padding: 10px; border-radius: 20px; transition: box-shadow 0.2s ease; }
  .forge.forge-success { box-shadow: 0 0 40px 10px rgba(80,255,160,0.5); }
  .forge.forge-fail { box-shadow: 0 0 40px 10px rgba(255,60,60,0.5); }
  .forge.shake { animation: forgeShake 0.4s ease; }
  @keyframes forgeShake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-10px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(4px); }
  }
  .slot {
    width: clamp(58px, 14vw, 96px);
    height: clamp(58px, 14vw, 96px);
    border-radius: 50%;
    border: 3px dashed rgba(255,255,255,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 0.15s ease, border 0.2s ease;
    background: rgba(255,255,255,0.03);
  }
  .slot.filled { border: 3px solid rgba(255,255,255,0.8); cursor: pointer; }
  .slot:hover { transform: scale(1.05); }
  .slot:active { transform: scale(0.95); }
  .slot-plus { font-size: 26px; color: rgba(255,255,255,0.3); font-weight: 300; }
  .forge-icon { font-size: clamp(20px, 4vw, 30px); opacity: 0.6; }
  .orb-tray {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    max-width: 90%;
    padding: 6px;
  }
  .orb {
    width: clamp(40px, 9vw, 60px);
    height: clamp(40px, 9vw, 60px);
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid rgba(255,255,255,0.5);
    transition: transform 0.12s ease;
  }
  .orb:hover { transform: scale(1.1) translateY(-4px); }
  .orb:active { transform: scale(0.9); }
  .orb-tray.locked .orb { pointer-events: none; opacity: 0.6; }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: radial-gradient(circle at 50% 40%, rgba(40,10,40,0.88), rgba(5,5,15,0.96));
    z-index: 10;
    padding: 20px;
    animation: fadeIn 0.4s ease;
    overflow-y: auto;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .title {
    font-size: clamp(30px, 8vw, 60px);
    font-weight: 900;
    letter-spacing: 4px;
    margin: 0;
    background: linear-gradient(90deg, #ffd23b, #ff3bd6, #3bfff0, #ffd23b);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: hueSlide 4s linear infinite;
    text-shadow: 0 0 30px rgba(255,80,200,0.3);
  }
  @keyframes hueSlide { 0% { background-position: 0% 50%; } 100% { background-position: 300% 50%; } }
  .subtitle {
    font-size: clamp(12px, 2.6vw, 16px);
    color: #cde;
    margin: 10px 0 22px;
    letter-spacing: 0.5px;
    max-width: 480px;
    line-height: 1.7;
  }
  .swatch-tag {
    display: inline-block;
    width: 14px; height: 14px;
    border-radius: 50%;
    vertical-align: middle;
    margin: 0 2px;
    box-shadow: 0 0 6px currentColor;
  }
  .btn {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 16px 48px;
    border-radius: 50px;
    border: 2px solid #ffd23b;
    background: rgba(255,210,59,0.08);
    color: #ffd23b;
    cursor: pointer;
    text-shadow: 0 0 10px #ffd23b;
    box-shadow: 0 0 20px rgba(255,210,59,0.4), inset 0 0 20px rgba(255,210,59,0.1);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .btn:hover { transform: scale(1.06); background: rgba(255,210,59,0.18); }
  .btn:active { transform: scale(0.97); }
  .final-score {
    font-size: clamp(40px, 11vw, 76px);
    font-weight: 900;
    color: #ffd23b;
    text-shadow: 0 0 20px #ffd23b, 0 0 40px #ff3bd6;
    margin: 6px 0;
  }
  .stat-row { display: flex; gap: 28px; margin: 14px 0 24px; flex-wrap: wrap; justify-content: center; }
  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-label { font-size: 11px; letter-spacing: 2px; color: #8fd9ff; text-transform: uppercase; }
  .stat-value { font-size: 24px; font-weight: bold; color: #fff; }
  .new-high {
    color: #ffd23b;
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 0 0 12px #ffd23b;
    animation: pulse 0.8s ease infinite;
    margin-bottom: 8px;
  }
  @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
  .announce {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(18px, 4.6vw, 32px);
    font-weight: 900;
    letter-spacing: 3px;
    z-index: 8;
    pointer-events: none;
    animation: announceAnim 1.4s ease forwards;
    white-space: nowrap;
  }
  @keyframes announceAnim {
    0% { opacity: 0; transform: translateX(-50%) translateY(-20px) scale(0.7); }
    20% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.1); }
    35% { transform: translateX(-50%) translateY(0) scale(1); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.95); }
  }
  .controls-hint { text-align: center; font-size: 11px; color: #ffd23b; opacity: 0.7; padding: 4px 0 0; letter-spacing: 1px; }
  @media (max-width: 600px) {
    .hud-block { min-width: 46px; }
    .hud-value { font-size: 15px; }
    .lives { font-size: 14px; }
    .recipe-label { display: none; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------- color data ---------- */
const COLORS = {
  red:     { hex: '#ff3b5c', name: 'Red' },
  yellow:  { hex: '#ffe066', name: 'Yellow' },
  blue:    { hex: '#3bb5ff', name: 'Blue' },
  orange:  { hex: '#ff9a3b', name: 'Orange' },
  green:   { hex: '#3bffa0', name: 'Green' },
  purple:  { hex: '#b53bff', name: 'Purple' },
  gold:    { hex: '#ffd23b', name: 'Gold' },
  teal:    { hex: '#3bfff0', name: 'Teal' },
  indigo:  { hex: '#6a3bff', name: 'Indigo' },
  magenta: { hex: '#ff3bd6', name: 'Magenta' },
  lime:    { hex: '#c8ff3b', name: 'Lime' },
};
const BASE_IDS = ['red', 'yellow', 'blue'];
const UNLOCK_QUEUE = [
  { threshold: 3, id: 'orange' },
  { threshold: 6, id: 'green' },
  { threshold: 9, id: 'purple' },
  { threshold: 12, id: 'gold' },
  { threshold: 16, id: 'teal' },
  { threshold: 20, id: 'indigo' },
  { threshold: 24, id: 'magenta' },
  { threshold: 28, id: 'lime' },
];
const RULES = [
  { a: 'red', b: 'yellow', result: 'orange' },
  { a: 'yellow', b: 'blue', result: 'green' },
  { a: 'red', b: 'blue', result: 'purple' },
  { a: 'orange', b: 'yellow', result: 'gold' },
  { a: 'green', b: 'blue', result: 'teal' },
  { a: 'purple', b: 'blue', result: 'indigo' },
  { a: 'purple', b: 'red', result: 'magenta' },
  { a: 'green', b: 'yellow', result: 'lime' },
];
const START_LIVES = 3;
const MAX_COMBO = 6;
const HIGH_SCORE_KEY = 'hueForgeHighScore';

function unlockedIdsFor(count) {
  const ids = [...BASE_IDS];
  for (const u of UNLOCK_QUEUE) if (count >= u.threshold) ids.push(u.id);
  return ids;
}
function roundTimeFor(count) { return Math.max(4, 9 - count * 0.22); }
function decoyCountFor(count) { return Math.min(7, 2 + Math.floor(count / 4)); }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
let roundCounter = 0;
function generateRound(correctCount, lastTargetId) {
  roundCounter++;
  const unlocked = unlockedIdsFor(correctCount);
  let pool = RULES.filter(r => unlocked.includes(r.a) && unlocked.includes(r.b));
  if (pool.length > 1 && lastTargetId) {
    const filtered = pool.filter(r => r.result !== lastTargetId);
    if (filtered.length) pool = filtered;
  }
  const rule = pool[Math.floor(Math.random() * pool.length)];
  const decoyCount = decoyCountFor(correctCount);
  const colorIds = [rule.a, rule.b];
  for (let i = 0; i < decoyCount; i++) colorIds.push(unlocked[Math.floor(Math.random() * unlocked.length)]);
  const orbs = shuffle(colorIds).map((colorId, i) => ({ id: `r${roundCounter}-${i}`, colorId }));
  return {
    id: roundCounter,
    target: { id: rule.result, ...COLORS[rule.result] },
    recipe: [rule.a, rule.b],
    orbs,
    timeLimit: roundTimeFor(correctCount),
  };
}

/* ---------- audio ---------- */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur, type, vol, ramp) {
  try {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (ramp) osc.frequency.exponentialRampToValueAtTime(ramp, ctx.currentTime + dur);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (e) { /* audio unavailable */ }
}
function noiseBurst(dur, vol, filterFreq) {
  try {
    const ctx = ensureAudio();
    const bufferSize = Math.max(1, Math.floor(ctx.sampleRate * dur));
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(filterFreq, ctx.currentTime);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    src.start();
  } catch (e) { /* audio unavailable */ }
}
function sndPick() { tone(540, 0.06, 'sine', 0.12, 760); }
function sndReturn() { tone(320, 0.07, 'sine', 0.1, 220); }
function sndBlend() { tone(220, 0.3, 'sine', 0.07, 520); }
function sndSuccess(combo) {
  tone(440 + combo * 40, 0.12, 'square', 0.16, 880 + combo * 60);
  setTimeout(() => tone(660 + combo * 40, 0.14, 'sine', 0.12, 1100), 90);
}
function sndFail() {
  noiseBurst(0.22, 0.18, 1200);
  tone(160, 0.25, 'sawtooth', 0.18, 70);
}
function sndLevelUp() {
  tone(523, 0.08, 'square', 0.14, 1046);
  setTimeout(() => tone(659, 0.1, 'square', 0.14, 1318), 80);
  setTimeout(() => tone(784, 0.12, 'square', 0.14, 1568), 160);
}
function sndStart() {
  tone(330, 0.1, 'sine', 0.15, 660);
  setTimeout(() => tone(440, 0.12, 'sine', 0.15, 880), 100);
}
function sndGameOver() {
  tone(440, 0.2, 'sawtooth', 0.2, 220);
  setTimeout(() => tone(330, 0.2, 'sawtooth', 0.2, 165), 180);
  setTimeout(() => tone(220, 0.3, 'sawtooth', 0.2, 110), 360);
}

/* ---------- particles ---------- */
function hexToRgb(hex) {
  const v = parseInt(hex.slice(1), 16);
  return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
}
function spawnSuccessParticles(game, x, y, hex) {
  for (let i = 0; i < 32; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 80 + Math.random() * 260;
    game.particles.push({
      x, y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1, decay: 0.9 + Math.random() * 0.8,
      color: Math.random() < 0.7 ? hex : '#ffffff',
      size: 2 + Math.random() * 4,
    });
  }
}
function spawnFailParticles(game, x, y) {
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 40 + Math.random() * 100;
    game.particles.push({
      x, y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 20,
      life: 1, decay: 0.7 + Math.random() * 0.6,
      color: Math.random() < 0.6 ? '#666677' : '#332b3b',
      size: 3 + Math.random() * 4,
      gravity: -10,
    });
  }
}
function spawnEmber(game, w, h) {
  game.particles.push({
    x: Math.random() * w, y: h + 10,
    vx: (Math.random() - 0.5) * 12, vy: -(20 + Math.random() * 30),
    life: 1, decay: 0.18 + Math.random() * 0.18,
    color: Math.random() < 0.5 ? '#ff9a3b' : '#ffd23b',
    size: 1.5 + Math.random() * 2,
    ember: true,
  });
}
function updateParticles(game, dt) {
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += (p.gravity !== undefined ? p.gravity : 90) * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
}
function drawParticles(ctx, canvas, game) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const p of game.particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, p.size * (p.ember ? 1 : p.life)), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

/* ---------- game object ---------- */
function createGame() {
  return {
    score: 0, lives: START_LIVES, combo: 1, correctCount: 0,
    round: null, slotA: null, slotB: null, tray: [], evaluating: false,
    timeLeft: 0, timeLimit: 0, timeoutHandled: false,
    particles: [], emberTimer: 0,
    over: false,
  };
}
function newRound(game) {
  game.round = generateRound(game.correctCount, game.round ? game.round.target.id : null);
  game.slotA = null;
  game.slotB = null;
  game.tray = game.round.orbs;
  game.evaluating = false;
  game.timeLeft = game.round.timeLimit;
  game.timeLimit = game.round.timeLimit;
  game.timeoutHandled = false;
}

/* ---------- main app ---------- */
function App() {
  const gameRef = useRef(createGame());
  const canvasRef = useRef(null);
  const gameAreaRef = useRef(null);
  const forgeRef = useRef(null);
  const timerFillRef = useRef(null);
  const rafRef = useRef(null);
  const announceIdRef = useRef(0);

  const [screen, setScreen] = useState('start');
  const [ui, setUi] = useState({
    score: 0, lives: START_LIVES, combo: 1, level: 1,
    round: null, slotA: null, slotB: null, tray: [], evaluating: false, flash: null,
  });
  const [highScore, setHighScore] = useState(() => Number(localStorage.getItem(HIGH_SCORE_KEY)) || 0);
  const [finalScore, setFinalScore] = useState(0);
  const [isNewBest, setIsNewBest] = useState(false);
  const [announce, setAnnounce] = useState(null);
  const [shakeId, setShakeId] = useState(0);

  useEffect(() => {
    if (localStorage.getItem(HIGH_SCORE_KEY) === null) localStorage.setItem(HIGH_SCORE_KEY, '0');
  }, []);

  const triggerAnnounce = useCallback((text, color) => {
    announceIdRef.current++;
    setAnnounce({ text, color, id: announceIdRef.current });
  }, []);

  function syncUi(game, flash) {
    setUi({
      score: Math.floor(game.score),
      lives: game.lives,
      combo: game.combo,
      level: 1 + Math.floor(game.correctCount / 4),
      round: game.round,
      slotA: game.slotA,
      slotB: game.slotB,
      tray: game.tray.slice(),
      evaluating: game.evaluating,
      flash: flash || null,
    });
  }

  function doGameOver(game) {
    game.over = true;
    sndGameOver();
    const score = Math.floor(game.score);
    setFinalScore(score);
    const prevBest = Number(localStorage.getItem(HIGH_SCORE_KEY)) || 0;
    if (score > prevBest) {
      localStorage.setItem(HIGH_SCORE_KEY, String(score));
      setHighScore(score);
      setIsNewBest(true);
    } else {
      setIsNewBest(false);
    }
    setScreen('gameover');
  }

  function spawnAtForgeCenter(spawnFn) {
    const game = gameRef.current;
    const canvas = canvasRef.current;
    const forge = forgeRef.current;
    if (!canvas || !forge) return;
    const canvasRect = canvas.getBoundingClientRect();
    const forgeRect = forge.getBoundingClientRect();
    const dpr = canvasRect.width > 0 ? canvas.width / canvasRect.width : 1;
    const x = (forgeRect.left + forgeRect.width / 2 - canvasRect.left) * dpr;
    const y = (forgeRect.top + forgeRect.height / 2 - canvasRect.top) * dpr;
    spawnFn(game, x, y);
  }

  function doEvaluate() {
    const game = gameRef.current;
    if (game.over || !game.slotA || !game.slotB) return;
    const a = game.slotA.colorId, b = game.slotB.colorId;
    const rule = RULES.find(r => (r.a === a && r.b === b) || (r.a === b && r.b === a));
    const resultId = rule ? rule.result : null;
    const success = resultId === game.round.target.id;

    if (success) {
      const timeFrac = game.timeLimit > 0 ? Math.max(0, game.timeLeft / game.timeLimit) : 0;
      const speedBonus = Math.round(80 * timeFrac);
      const newCombo = Math.min(MAX_COMBO, game.combo + 1);
      const gained = (120 + speedBonus) * newCombo;
      game.score += gained;
      game.combo = newCombo;
      game.correctCount += 1;
      spawnAtForgeCenter((g, x, y) => spawnSuccessParticles(g, x, y, game.round.target.hex));
      sndSuccess(newCombo);
      if (newCombo === 3) triggerAnnounce('FUSION x3!', '#ffd23b');
      else if (newCombo === MAX_COMBO) triggerAnnounce('MAX FUSION!', '#ff3bd6');
      if (game.correctCount % 4 === 0) {
        setTimeout(() => sndLevelUp(), 150);
        triggerAnnounce('LEVEL ' + (1 + Math.floor(game.correctCount / 4)), '#3bfff0');
      }
    } else {
      game.combo = 1;
      game.lives -= 1;
      spawnAtForgeCenter((g, x, y) => spawnFailParticles(g, x, y));
      sndFail();
      setShakeId(s => s + 1);
    }

    game.slotA = null;
    game.slotB = null;
    syncUi(game, { type: success ? 'success' : 'fail' });

    if (game.lives <= 0) {
      doGameOver(game);
      return;
    }
    setTimeout(() => {
      if (gameRef.current.over) return;
      newRound(gameRef.current);
      syncUi(gameRef.current, null);
    }, 320);
  }

  function handleTimeout() {
    const game = gameRef.current;
    if (game.over || game.evaluating) return;
    game.timeoutHandled = true;
    game.evaluating = true;
    game.slotA = null;
    game.slotB = null;
    game.combo = 1;
    game.lives -= 1;
    spawnAtForgeCenter((g, x, y) => spawnFailParticles(g, x, y));
    sndFail();
    setShakeId(s => s + 1);
    syncUi(game, { type: 'fail' });
    if (game.lives <= 0) {
      doGameOver(game);
      return;
    }
    setTimeout(() => {
      if (gameRef.current.over) return;
      newRound(gameRef.current);
      syncUi(gameRef.current, null);
    }, 320);
  }
  const handleTimeoutRef = useRef(handleTimeout);
  handleTimeoutRef.current = handleTimeout;

  const handleOrbClick = useCallback((orbId) => {
    const game = gameRef.current;
    if (game.over || game.evaluating || screen !== 'playing') return;
    const idx = game.tray.findIndex(o => o.id === orbId);
    if (idx === -1) return;
    const orb = game.tray[idx];
    game.tray = game.tray.filter(o => o.id !== orbId);
    if (!game.slotA) {
      game.slotA = orb;
      sndPick();
    } else if (!game.slotB) {
      game.slotB = orb;
      sndPick();
    } else {
      game.tray = [...game.tray, orb];
      return;
    }
    if (game.slotA && game.slotB) {
      game.evaluating = true;
      sndBlend();
      syncUi(game, null);
      setTimeout(() => doEvaluate(), 380);
    } else {
      syncUi(game, null);
    }
  }, [screen]);

  const handleSlotClick = useCallback((which) => {
    const game = gameRef.current;
    if (game.over || game.evaluating || screen !== 'playing') return;
    if (which === 'A' && game.slotA) {
      game.tray = [...game.tray, game.slotA];
      game.slotA = null;
      sndReturn();
      syncUi(game, null);
    } else if (which === 'B' && game.slotB) {
      game.tray = [...game.tray, game.slotB];
      game.slotB = null;
      sndReturn();
      syncUi(game, null);
    }
  }, [screen]);

  useEffect(() => {
    if (screen !== 'playing') return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    }
    resize();
    window.addEventListener('resize', resize);

    let last = performance.now();
    let active = true;

    function loop(now) {
      if (!active) return;
      const dt = Math.min(0.05, (now - last) / 1000);
      last = now;
      const game = gameRef.current;
      if (game && !game.over) {
        if (!game.evaluating && !game.timeoutHandled && game.timeLimit > 0) {
          game.timeLeft = Math.max(0, game.timeLeft - dt);
          if (game.timeLeft <= 0) handleTimeoutRef.current();
        }
        if (timerFillRef.current && game.timeLimit > 0) {
          const frac = Math.max(0, game.timeLeft / game.timeLimit);
          timerFillRef.current.style.width = (frac * 100) + '%';
          timerFillRef.current.style.background = frac > 0.5 ? '#3bffa0' : frac > 0.25 ? '#ffd23b' : '#ff3b5c';
        }
        game.emberTimer -= dt;
        if (game.emberTimer <= 0) {
          game.emberTimer = 0.25;
          spawnEmber(game, canvas.width, canvas.height);
        }
        updateParticles(game, dt);
      }
      drawParticles(ctx, canvas, game);
      rafRef.current = requestAnimationFrame(loop);
    }
    rafRef.current = requestAnimationFrame(loop);
    return () => {
      active = false;
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener('resize', resize);
    };
  }, [screen]);

  function startGame() {
    ensureAudio();
    const game = createGame();
    gameRef.current = game;
    newRound(game);
    setAnnounce(null);
    setIsNewBest(false);
    syncUi(game, null);
    setScreen('playing');
    sndStart();
  }

  return (
    <div className="app">
      <div className="hud">
        <div className="hud-block">
          <div className="hud-label">Score</div>
          <div className="hud-value">{ui.score}</div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Best</div>
          <div className="hud-value gold">{Math.max(highScore, ui.score)}</div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Lives</div>
          <div className="lives">
            {Array.from({ length: START_LIVES }).map((_, i) => (
              <span key={i} className={i < ui.lives ? 'life-full' : 'life-empty'}>&#11042;</span>
            ))}
          </div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Level</div>
          <div className="hud-value">{ui.level}</div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Combo</div>
          <div className="hud-value" style={{ color: ui.combo > 1 ? '#ffd23b' : '#fff', textShadow: ui.combo > 1 ? '0 0 8px #ffd23b, 0 0 16px #ffd23b' : '0 0 8px #ff3bd6, 0 0 16px #ff3bd6' }}>
            &times;{ui.combo}
          </div>
        </div>
      </div>

      <div className="game-area" ref={gameAreaRef}>
        <canvas ref={canvasRef} className="particles-canvas"></canvas>

        {screen === 'playing' && ui.round && (
          <div className="play-wrap">
            <div className="target-panel">
              <div className="target-label">TARGET</div>
              <div className="target-swatch" style={{ background: ui.round.target.hex, boxShadow: `0 0 30px ${ui.round.target.hex}, 0 0 60px ${ui.round.target.hex}` }}></div>
              <div className="target-name" style={{ color: ui.round.target.hex, textShadow: `0 0 10px ${ui.round.target.hex}` }}>{ui.round.target.name}</div>
              <div className="recipe-row">
                <span className="recipe-label">RECIPE</span>
                <span className="recipe-chip" style={{ background: COLORS[ui.round.recipe[0]].hex }}></span>
                <span className="recipe-plus">+</span>
                <span className="recipe-chip" style={{ background: COLORS[ui.round.recipe[1]].hex }}></span>
              </div>
              <div className="timer-track"><div className="timer-fill" ref={timerFillRef}></div></div>
            </div>

            <div key={shakeId} className={`forge ${ui.flash ? 'forge-' + ui.flash.type : ''} ${shakeId ? 'shake' : ''}`} ref={forgeRef}>
              <div
                className={`slot ${ui.slotA ? 'filled' : ''}`}
                onClick={() => handleSlotClick('A')}
                style={ui.slotA ? { background: COLORS[ui.slotA.colorId].hex, boxShadow: `0 0 26px ${COLORS[ui.slotA.colorId].hex}` } : {}}
              >
                {!ui.slotA && <span className="slot-plus">+</span>}
              </div>
              <div className="forge-icon">&#9879;</div>
              <div
                className={`slot ${ui.slotB ? 'filled' : ''}`}
                onClick={() => handleSlotClick('B')}
                style={ui.slotB ? { background: COLORS[ui.slotB.colorId].hex, boxShadow: `0 0 26px ${COLORS[ui.slotB.colorId].hex}` } : {}}
              >
                {!ui.slotB && <span className="slot-plus">+</span>}
              </div>
            </div>

            <div className={`orb-tray ${ui.evaluating ? 'locked' : ''}`}>
              {ui.tray.map((orb, i) => (
                <div
                  key={orb.id}
                  className="orb"
                  style={{ background: COLORS[orb.colorId].hex, boxShadow: `0 0 18px ${COLORS[orb.colorId].hex}`, animationDelay: `${(i % 5) * 0.15}s` }}
                  onClick={() => handleOrbClick(orb.id)}
                ></div>
              ))}
            </div>
          </div>
        )}

        {announce && (
          <div key={announce.id} className="announce" style={{ color: announce.color, textShadow: `0 0 16px ${announce.color}` }}>
            {announce.text}
          </div>
        )}

        {screen === 'start' && (
          <div className="overlay">
            <h1 className="title">HUE FORGE</h1>
            <p className="subtitle">
              Click an orb to drop it into the forge, then click a second orb to blend them.<br/>
              Match the <span style={{ color: '#ffd23b' }}>TARGET</span> color using the <span style={{ color: '#3bfff0' }}>RECIPE</span> swatches shown above the forge.<br/>
              Chain correct fusions for combo multipliers before time runs out &mdash; wrong blends or timeouts cost a life!
            </p>
            <button className="btn" onClick={startGame}>START</button>
            <div className="controls-hint">Click / Tap orbs &middot; Click a filled slot to take an orb back</div>
          </div>
        )}

        {screen === 'gameover' && (
          <div className="overlay">
            <h1 className="title">FORGE COLD</h1>
            {isNewBest && <div className="new-high">NEW BEST!</div>}
            <div className="final-score">{finalScore}</div>
            <div className="stat-row">
              <div className="stat"><div className="stat-label">Best</div><div className="stat-value">{highScore}</div></div>
              <div className="stat"><div className="stat-label">Level Reached</div><div className="stat-value">{ui.level}</div></div>
            </div>
            <button className="btn" onClick={startGame}>RETRY</button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
