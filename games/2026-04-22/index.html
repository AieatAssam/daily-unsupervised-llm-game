<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Slide</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #040010; overflow: hidden; font-family: 'Courier New', monospace; user-select: none; touch-action: none; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef } = React;

    const LS_KEY = 'neonSlideHighScore';
    const N = 3;
    const GOAL = [1, 2, 3, 4, 5, 6, 7, 8, 0];

    // Neon colors for tiles 1-8
    const TC = [null, '#00ffcc', '#ff44ff', '#ffaa00', '#44ff88', '#9944ff', '#ff4466', '#44aaff', '#ffff44'];
    const TR = TC.map(c => c ? `${parseInt(c.slice(1,3),16)},${parseInt(c.slice(3,5),16)},${parseInt(c.slice(5,7),16)}` : null);

    // в”Ђв”Ђ Audio в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    let _ac = null;
    const ac = () => { if (!_ac) try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} return _ac; };
    function beep(f, t, d, v, fe) {
      try {
        const c = ac(); if (!c) return;
        const o = c.createOscillator(), g = c.createGain();
        o.connect(g); g.connect(c.destination);
        o.type = t; o.frequency.setValueAtTime(f, c.currentTime);
        if (fe) o.frequency.exponentialRampToValueAtTime(fe, c.currentTime + d);
        g.gain.setValueAtTime(v, c.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
        o.start(); o.stop(c.currentTime + d);
      } catch(e) {}
    }
    const sndSlide  = () => beep(500, 'sine', 0.05, 0.1, 460);
    const sndSolve  = () => [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => beep(f, 'triangle', 0.18, 0.22), i * 70));
    const sndFail   = () => beep(160, 'sawtooth', 0.2, 0.3, 100);
    const sndOver   = () => beep(80, 'sawtooth', 1.2, 0.5, 40);
    const sndLevel  = () => beep(880, 'sine', 0.3, 0.2, 1760);

    // в”Ђв”Ђ Puzzle helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    const nbrs = (i) => {
      const r = Math.floor(i / N), c = i % N, ns = [];
      if (r > 0) ns.push(i - N); if (r < N - 1) ns.push(i + N);
      if (c > 0) ns.push(i - 1); if (c < N - 1) ns.push(i + 1);
      return ns;
    };
    const isSolved = (t) => t.every((v, i) => v === GOAL[i]);
    const mkPuzzle = (moves) => {
      let t = [...GOAL], prev = -1;
      for (let i = 0; i < moves; i++) {
        const e = t.indexOf(0), ns = nbrs(e).filter(n => n !== prev);
        const p = ns[Math.floor(Math.random() * ns.length)];
        [t[e], t[p]] = [t[p], t[e]]; prev = p;
      }
      if (isSolved(t)) return mkPuzzle(moves); // re-shuffle if accidentally solved
      return t;
    };
    const doSlide = (t, i) => {
      const nt = [...t], e = nt.indexOf(0);
      [nt[e], nt[i]] = [nt[i], nt[e]];
      return nt;
    };

    // в”Ђв”Ђ Component в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
    function NeonSlide() {
      const cvs = useRef(null);
      const gs  = useRef(null);

      const W  = Math.min(window.innerWidth,  520);
      const H  = Math.min(window.innerHeight, 720);
      const GS = Math.min(W * 0.84, H * 0.56);
      const TS = GS / N;
      const GX = (W - GS) / 2;
      const GY = H * 0.26;

      // в”Ђв”Ђ State factory в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      function initState(level = 1, score = 0, combo = 0, lives = 3) {
        const moves = 10 + level * 5;
        const tl = Math.max(30, 90 - (level - 1) * 6);
        gs.current = {
          phase: 'playing',
          tiles: mkPuzzle(moves),
          level, score, combo, lives,
          timeLeft: tl, timeMax: tl,
          moveCount: 0,
          particles: [],
          flash: 0,
          advancing: false,
        };
      }

      // в”Ђв”Ђ Particles в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      function burst(x, y, color, n) {
        for (let i = 0; i < n; i++) {
          const a = (Math.PI * 2 * i / n) + Math.random() * 0.5;
          const s = 2 + Math.random() * 3;
          gs.current.particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 1, color, size: 2 + Math.random() * 2 });
        }
      }

      // в”Ђв”Ђ Input в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      function handleTap(cx, cy) {
        const g = gs.current;
        if (!g || g.phase === 'start' || g.phase === 'over') { initState(); return; }
        if (g.phase !== 'playing' || g.flash > 0.5 || g.advancing) return;

        const col = Math.floor((cx - GX) / TS);
        const row = Math.floor((cy - GY) / TS);
        if (col < 0 || col >= N || row < 0 || row >= N) return;

        const idx = row * N + col;
        const e = g.tiles.indexOf(0);
        if (!nbrs(e).includes(idx)) return;

        const val = g.tiles[idx];
        g.tiles = doSlide(g.tiles, idx);
        g.moveCount++;
        sndSlide();

        // tiny burst at the now-empty slot
        const ne = g.tiles.indexOf(0);
        burst(GX + (ne % N) * TS + TS / 2, GY + Math.floor(ne / N) * TS + TS / 2, TC[val], 4);

        if (isSolved(g.tiles)) {
          g.flash = 1;
          g.combo++;
          const pts = 1000 + Math.floor(g.timeLeft * 12) + g.combo * 400 + Math.max(0, (15 - g.moveCount) * 40) + g.level * 150;
          g.score += pts;
          for (let i = 0; i < N * N; i++) {
            const pc = i % N, pr = Math.floor(i / N);
            burst(GX + pc * TS + TS / 2, GY + pr * TS + TS / 2, TC[GOAL[i]], 7);
          }
          sndSolve();
          g.advancing = true;
          setTimeout(() => {
            if (!gs.current || gs.current.phase !== 'playing') return;
            const lv = g.level + 1;
            const mv = 10 + lv * 5, tl = Math.max(30, 90 - (lv - 1) * 6);
            g.tiles = mkPuzzle(mv);
            g.level = lv; g.timeLeft = tl; g.timeMax = tl;
            g.moveCount = 0; g.flash = 0; g.advancing = false;
            sndLevel();
          }, 1100);
        }
      }

      // в”Ђв”Ђ Draw helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      function drawStart(ctx, time) {
        const pulse = 0.9 + Math.sin(time * 1.8) * 0.1;
        ctx.save();
        ctx.translate(W / 2, H * 0.27);
        ctx.scale(pulse, pulse);
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `bold ${H * 0.1}px 'Courier New',monospace`;
        ctx.fillStyle = '#00ffcc'; ctx.shadowBlur = 28; ctx.shadowColor = '#00ffcc';
        ctx.fillText('NEON', 0, 0);
        ctx.fillStyle = '#ff44ff'; ctx.shadowColor = '#ff44ff';
        ctx.fillText('SLIDE', 0, H * 0.11);
        ctx.restore(); ctx.shadowBlur = 0;

        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `${H * 0.026}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(180,180,255,0.85)';
        ctx.fillText('Slide tiles into order 1вЂ“8', W / 2, H * 0.53);
        ctx.fillText('Race against the clock!', W / 2, H * 0.585);

        ctx.font = `${H * 0.021}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(120,120,200,0.65)';
        ctx.fillText('Tap a tile next to the gap to slide it', W / 2, H * 0.645);

        const ba = 0.7 + Math.sin(time * 3) * 0.3;
        ctx.font = `bold ${H * 0.04}px 'Courier New',monospace`;
        ctx.fillStyle = `rgba(0,255,200,${ba})`;
        ctx.shadowBlur = 15; ctx.shadowColor = '#00ffcc';
        ctx.fillText('[ TAP TO START ]', W / 2, H * 0.745);
        ctx.shadowBlur = 0;

        const best = parseInt(localStorage.getItem(LS_KEY) || '0');
        if (best > 0) {
          ctx.font = `${H * 0.024}px 'Courier New',monospace`;
          ctx.fillStyle = 'rgba(255,220,100,0.7)';
          ctx.fillText(`BEST: ${best}`, W / 2, H * 0.84);
        }
      }

      function drawOver(ctx) {
        const g = gs.current;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `bold ${H * 0.07}px 'Courier New',monospace`;
        ctx.fillStyle = '#ff4466'; ctx.shadowBlur = 22; ctx.shadowColor = '#ff4466';
        ctx.fillText('GAME OVER', W / 2, H * 0.3);
        ctx.shadowBlur = 0;

        ctx.font = `${H * 0.04}px 'Courier New',monospace`;
        ctx.fillStyle = '#00ffcc'; ctx.shadowBlur = 8; ctx.shadowColor = '#00ffcc';
        ctx.fillText(`SCORE: ${g.score}`, W / 2, H * 0.43);
        ctx.shadowBlur = 0;

        const best = parseInt(localStorage.getItem(LS_KEY) || '0');
        if (g.score >= best && g.score > 0) {
          ctx.font = `bold ${H * 0.028}px 'Courier New',monospace`;
          ctx.fillStyle = '#ffff44'; ctx.shadowBlur = 10; ctx.shadowColor = '#ffff44';
          ctx.fillText('NEW HIGH SCORE!', W / 2, H * 0.51);
          ctx.shadowBlur = 0;
        }
        ctx.font = `${H * 0.028}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(255,220,100,0.85)';
        ctx.fillText(`BEST: ${best}`, W / 2, H * 0.565);

        const ba = 0.7 + Math.sin(performance.now() / 333) * 0.3;
        ctx.font = `bold ${H * 0.034}px 'Courier New',monospace`;
        ctx.fillStyle = `rgba(0,255,200,${ba})`; ctx.shadowBlur = 10; ctx.shadowColor = '#00ffcc';
        ctx.fillText('[ TAP TO RESTART ]', W / 2, H * 0.67);
        ctx.shadowBlur = 0;
      }

      function drawGame(ctx, time) {
        const g = gs.current;
        const { tiles, particles, flash, timeLeft, timeMax, score, combo, level, lives, moveCount } = g;

        // Timer bar
        const bw = W * 0.84, bx = (W - bw) / 2, by = H * 0.1;
        const tf = Math.max(0, timeLeft / timeMax);
        const tc = tf > 0.4 ? '#00ffcc' : tf > 0.2 ? '#ffaa00' : '#ff2244';
        ctx.fillStyle = 'rgba(255,255,255,0.07)';
        ctx.fillRect(bx, by, bw, 9);
        ctx.fillStyle = tc; ctx.shadowBlur = 9; ctx.shadowColor = tc;
        ctx.fillRect(bx, by, bw * tf, 9);
        ctx.shadowBlur = 0;

        // Time digits
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `bold ${H * 0.036}px 'Courier New',monospace`;
        ctx.fillStyle = tc; ctx.shadowBlur = 6; ctx.shadowColor = tc;
        ctx.fillText(Math.ceil(timeLeft) + 's', W / 2, H * 0.073);
        ctx.shadowBlur = 0;

        // Score
        ctx.textAlign = 'left';
        ctx.font = `${H * 0.027}px 'Courier New',monospace`;
        ctx.fillStyle = '#00ffcc'; ctx.shadowBlur = 6; ctx.shadowColor = '#00ffcc';
        ctx.fillText('SCORE ' + score, bx, H * 0.06);
        ctx.shadowBlur = 0;

        // Lives
        for (let i = 0; i < 3; i++) {
          ctx.globalAlpha = i < lives ? 1 : 0.18;
          ctx.textAlign = 'right';
          ctx.fillStyle = '#ff4466'; ctx.shadowBlur = i < lives ? 7 : 0; ctx.shadowColor = '#ff4466';
          ctx.fillText('в™¦', bx + bw - i * H * 0.038, H * 0.06);
        }
        ctx.globalAlpha = 1; ctx.shadowBlur = 0;

        // Combo badge
        if (combo > 0) {
          ctx.textAlign = 'center';
          ctx.font = `bold ${H * 0.025}px 'Courier New',monospace`;
          ctx.fillStyle = '#ffff44'; ctx.shadowBlur = 8; ctx.shadowColor = '#ffff44';
          ctx.fillText(`Г—${combo} COMBO`, W / 2, H * 0.195);
          ctx.shadowBlur = 0;
        }

        // Level label
        ctx.textAlign = 'center';
        ctx.font = `${H * 0.02}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(150,150,255,0.5)';
        ctx.fillText(`LEVEL ${level}`, W / 2, H * 0.21);

        // Grid outer glow border
        const glowClr = flash > 0 ? `rgba(255,220,0,${0.5 + flash * 0.5})` : `rgba(0,180,255,${0.28 + Math.sin(time) * 0.08})`;
        ctx.strokeStyle = glowClr;
        ctx.lineWidth = 2;
        ctx.shadowBlur = flash > 0 ? 22 * flash : 12;
        ctx.shadowColor = flash > 0 ? 'rgba(255,220,0,0.6)' : 'rgba(0,180,255,0.4)';
        ctx.strokeRect(GX - 4, GY - 4, GS + 8, GS + 8);
        ctx.shadowBlur = 0;

        // Tiles
        for (let i = 0; i < N * N; i++) {
          const val = tiles[i];
          const c = i % N, r = Math.floor(i / N);
          const tx = GX + c * TS, ty2 = GY + r * TS;
          const P = 5;

          if (val === 0) {
            ctx.fillStyle = 'rgba(0,0,20,0.55)';
            ctx.fillRect(tx + P, ty2 + P, TS - P * 2, TS - P * 2);
            ctx.setLineDash([5, 5]);
            ctx.strokeStyle = 'rgba(0,80,200,0.22)'; ctx.lineWidth = 1;
            ctx.strokeRect(tx + P, ty2 + P, TS - P * 2, TS - P * 2);
            ctx.setLineDash([]);
            continue;
          }

          const clr = TC[val], rgb = TR[val];
          const inPlace = GOAL[i] === val;

          ctx.fillStyle = `rgba(${rgb},${inPlace ? 0.28 : 0.1})`;
          ctx.fillRect(tx + P, ty2 + P, TS - P * 2, TS - P * 2);

          ctx.strokeStyle = inPlace ? clr : `rgba(${rgb},0.6)`;
          ctx.lineWidth = inPlace ? 2.5 : 1.5;
          ctx.shadowBlur = inPlace ? 14 : 5; ctx.shadowColor = clr;
          ctx.strokeRect(tx + P, ty2 + P, TS - P * 2, TS - P * 2);
          ctx.shadowBlur = 0;

          ctx.font = `bold ${TS * 0.38}px 'Courier New',monospace`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = inPlace ? clr : `rgba(${rgb},0.88)`;
          ctx.shadowBlur = inPlace ? 10 : 4; ctx.shadowColor = clr;
          ctx.fillText(String(val), tx + TS / 2, ty2 + TS / 2);
          ctx.shadowBlur = 0;
        }

        // Particles
        for (const p of particles) {
          ctx.globalAlpha = Math.max(0, p.life);
          ctx.fillStyle = p.color; ctx.shadowBlur = 7; ctx.shadowColor = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * Math.max(0.1, p.life), 0, Math.PI * 2);
          ctx.fill(); ctx.shadowBlur = 0;
        }
        ctx.globalAlpha = 1;

        // Move count
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.font = `${H * 0.018}px 'Courier New',monospace`;
        ctx.fillStyle = 'rgba(120,140,220,0.42)';
        ctx.fillText(`MOVES: ${moveCount}`, W / 2, GY + GS + H * 0.052);

        // SOLVED! overlay
        if (flash > 0.05) {
          ctx.globalAlpha = Math.min(1, flash);
          ctx.font = `bold ${H * 0.072}px 'Courier New',monospace`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = '#ffff00'; ctx.shadowBlur = 28; ctx.shadowColor = '#ffaa00';
          ctx.fillText('SOLVED!', W / 2, GY + GS / 2);
          ctx.shadowBlur = 0; ctx.globalAlpha = 1;
        }
      }

      // в”Ђв”Ђ Main draw в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      function drawFrame(ctx, time) {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = '#040010';
        ctx.fillRect(0, 0, W, H);

        // Radial bg glow
        const rg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, W * 0.7);
        rg.addColorStop(0, 'rgba(0,20,60,0.35)');
        rg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = rg; ctx.fillRect(0, 0, W, H);

        const g = gs.current;
        if (!g)               { drawStart(ctx, time); return; }
        if (g.phase === 'over') { drawOver(ctx);        return; }
        drawGame(ctx, time);
      }

      // в”Ђв”Ђ Game loop в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
      useEffect(() => {
        const canvas = cvs.current; if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let t0 = null, raf = null;

        function loop(ts) {
          const time = ts / 1000;
          if (!t0) t0 = ts;
          const dt = Math.min((ts - t0) / 1000, 0.05);
          t0 = ts;

          const g = gs.current;
          if (g && g.phase === 'playing') {
            if (!g.advancing) g.timeLeft -= dt;

            // Update particles
            for (const p of g.particles) {
              p.x += p.vx; p.y += p.vy;
              p.vx *= 0.93; p.vy = p.vy * 0.93 + 0.09;
              p.life -= dt * 1.6;
            }
            g.particles = g.particles.filter(p => p.life > 0);

            // Flash decay
            if (g.flash > 0) g.flash = Math.max(0, g.flash - dt * 1.6);

            // Timeout
            if (g.timeLeft <= 0 && !g.advancing) {
              g.timeLeft = 0;
              g.lives--;
              sndFail();
              if (g.lives <= 0) {
                g.phase = 'over';
                const best = parseInt(localStorage.getItem(LS_KEY) || '0');
                if (g.score > best) localStorage.setItem(LS_KEY, String(g.score));
                sndOver();
              } else {
                const mv = 10 + g.level * 5, tl = Math.max(30, 90 - (g.level - 1) * 6);
                g.tiles = mkPuzzle(mv);
                g.timeLeft = tl; g.timeMax = tl; g.moveCount = 0; g.combo = 0;
              }
            }
          }

          drawFrame(ctx, time);
          raf = requestAnimationFrame(loop);
        }

        raf = requestAnimationFrame(loop);
        return () => { if (raf) cancelAnimationFrame(raf); };
      }, []);

      function onDown(e) {
        const r = cvs.current.getBoundingClientRect();
        handleTap(e.clientX - r.left, e.clientY - r.top);
      }
      function onTouch(e) {
        e.preventDefault();
        const r = cvs.current.getBoundingClientRect();
        const t = e.touches[0];
        handleTap(t.clientX - r.left, t.clientY - r.top);
      }

      return (
        <canvas
          ref={cvs}
          width={W}
          height={H}
          onMouseDown={onDown}
          onTouchStart={onTouch}
          style={{ cursor: 'pointer', display: 'block', margin: '0 auto' }}
        />
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<NeonSlide />);
  </script>
</body>
</html>
