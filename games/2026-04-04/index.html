<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orbit Frenzy</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #04000e; display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
    canvas { display: block; cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    try {
      localStorage.setItem('orbitFrenzyHighScore',
        localStorage.getItem('orbitFrenzyHighScore') || '0');
    } catch(e) {}
  </script>
  <script type="text/babel">
    const { useEffect, useRef } = React;

    /* ─── Layout ─── */
    const GW = 800, GH = 480;
    const CX = GW / 2, CY = GH / 2;
    const INNER_R   = 88;   // inner orbit radius
    const OUTER_R   = 170;  // outer orbit radius
    const PLAYER_VR = 11;   // visual radius of player dot
    const HIT_ARC   = 14;   // collision arc-length tolerance (pixels)
    const HS_KEY    = 'orbitFrenzyHighScore';

    /* ─── Audio ─── */
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      }
      return audioCtx;
    }
    function beep(freq, type, dur, vol = 0.25) {
      const ctx = getAudio(); if (!ctx) return;
      try {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = type; osc.frequency.value = freq;
        g.gain.setValueAtTime(vol, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(); osc.stop(ctx.currentTime + dur);
      } catch(e) {}
    }

    /* ─── Particles ─── */
    function burst(arr, x, y, n, hue, spd = 5) {
      for (let i = 0; i < n; i++) {
        const a = (Math.PI * 2 * i) / n + Math.random() * 0.4;
        const s = Math.random() * spd + 1.5;
        arr.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s,
                   life: 1, hue: hue + Math.random()*50-25, size: Math.random()*4+2 });
      }
    }

    /* ─── Fresh state ─── */
    function freshState() {
      return {
        phase: 'start',
        score: 0, combo: 0,
        highScore: parseInt(localStorage.getItem(HS_KEY) || '0'),

        /* player */
        orbit:    'outer',        // 'inner' | 'outer'
        angle:    -Math.PI / 2,   // top position
        angSpeed: 0.022,          // radians/frame (increases over time)

        /* hazards: rotating spoke arms */
        spokes: [
          // start with one full spoke, rotating opposite to player
          { angle: Math.PI / 2, speed: -0.030, type: 'full', hue: 45, phase: 0, activeOrbit: 'outer' }
        ],

        /* collectibles */
        gems: [],

        /* cosmetic */
        particles: [],
        trail: [],
        stars: Array.from({ length: 90 }, () => ({
          x: Math.random()*GW, y: Math.random()*GH,
          r: Math.random()*1.5+0.3, a: Math.random()*0.5+0.15
        })),

        /* timers */
        elapsed: 0, frame: 0,
        gemTimer:   180,  // frames until next gem
        spokeLevel: 1,    // current max spoke count
        ringPulse:  0,    // flash on orbit switch
        shake: 0, dyingTimer: 0,
      };
    }

    /* ─── Main game component ─── */
    const Game = () => {
      const canvasRef = useRef(null);
      const stRef     = useRef(freshState());
      const rafRef    = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx    = canvas.getContext('2d');

        /* resize */
        function resize() {
          const scale = Math.min(window.innerWidth / GW, window.innerHeight / GH);
          canvas.style.width  = `${GW * scale}px`;
          canvas.style.height = `${GH * scale}px`;
        }
        resize();
        window.addEventListener('resize', resize);

        /* input */
        function handleInput() {
          const s = stRef.current;
          if (s.phase === 'start' || s.phase === 'over') {
            stRef.current = freshState();
            stRef.current.phase = 'playing';
            beep(330, 'square', 0.2, 0.3);
            return;
          }
          if (s.phase === 'playing') {
            /* switch orbit */
            s.orbit = s.orbit === 'inner' ? 'outer' : 'inner';
            s.ringPulse = 1.0;
            const r  = s.orbit === 'inner' ? INNER_R : OUTER_R;
            const px = CX + Math.cos(s.angle) * r;
            const py = CY + Math.sin(s.angle) * r;
            burst(s.particles, px, py, 12, s.orbit === 'inner' ? 185 : 295, 4);
            beep(s.orbit === 'inner' ? 660 : 440, 'sine', 0.1, 0.22);
          }
        }
        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); handleInput(); }, { passive: false });
        window.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); handleInput(); } });

        /* draw helpers */
        function glow(color, blur) { ctx.shadowColor = color; ctx.shadowBlur = blur; }
        function noglow()          { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }

        /* normalise angle difference to [0, π] */
        function angDiff(a, b) {
          let d = Math.abs(((a - b) % (Math.PI*2) + Math.PI*2) % (Math.PI*2));
          return Math.min(d, Math.PI*2 - d);
        }

        /* ── main loop ── */
        let lastT = 0;
        function loop(ts) {
          rafRef.current = requestAnimationFrame(loop);
          const dt = Math.min(ts - lastT, 50); lastT = ts;
          const s  = stRef.current;
          s.frame++;

          /* ═══ UPDATE ═══ */
          if (s.phase === 'playing') {
            s.elapsed += dt / 1000;

            /* ramp player speed */
            s.angSpeed = 0.022 + Math.floor(s.elapsed / 15) * 0.0015;

            /* advance player angle */
            s.angle += s.angSpeed;

            /* update trail */
            const pR = s.orbit === 'inner' ? INNER_R : OUTER_R;
            const px = CX + Math.cos(s.angle) * pR;
            const py = CY + Math.sin(s.angle) * pR;
            s.trail.push({ x: px, y: py, orbit: s.orbit });
            if (s.trail.length > 22) s.trail.shift();

            /* advance spokes */
            s.spokes.forEach(sp => {
              sp.angle += sp.speed;
              if (sp.type === 'full') {
                sp.phase = (sp.phase || 0) + 1;
                if (sp.phase % 90 === 0) sp.activeOrbit = sp.activeOrbit === 'inner' ? 'outer' : 'inner';
              }
            });

            /* escalate: add more spokes */
            const targetCount = Math.min(5, 1 + Math.floor(s.elapsed / 14));
            if (s.spokes.length < targetCount) {
              const typeRoll = Math.random();
              const type = typeRoll < 0.35 ? 'inner' : typeRoll < 0.70 ? 'outer' : 'full';
              const hues = { inner: 185, outer: 295, full: 45 };
              // alternate rotation direction for variety
              const dir  = s.spokes.length % 2 === 0 ? -1 : 1;
              s.spokes.push({
                angle: Math.random() * Math.PI * 2,
                speed: dir * (0.022 + Math.random() * 0.018),
                type, hue: hues[type],
                ...(type === 'full' ? { phase: 0, activeOrbit: Math.random() < 0.5 ? 'inner' : 'outer' } : {}),
              });
            }

            /* spawn gems */
            s.gemTimer--;
            if (s.gemTimer <= 0) {
              const gemOrbit = Math.random() < 0.5 ? 'inner' : 'outer';
              const gemAngle = Math.random() * Math.PI * 2;
              const gemR = gemOrbit === 'inner' ? INNER_R : OUTER_R;
              s.gems.push({
                orbit: gemOrbit, angle: gemAngle, pulse: 0,
                x: CX + Math.cos(gemAngle) * gemR,
                y: CY + Math.sin(gemAngle) * gemR,
                hue: Math.random() * 360, alive: true, alpha: 1,
              });
              s.gemTimer = 90 + Math.random() * 120;
              if (s.gems.length > 7) s.gems.splice(0, 1);  // drop oldest
            }
            s.gems.forEach(g => { g.pulse += 0.09; });

            /* collect gems */
            for (const g of s.gems) {
              if (!g.alive || g.orbit !== s.orbit) continue;
              const arc = pR * angDiff(g.angle, s.angle);
              if (arc < HIT_ARC + 9) {
                g.alive = false;
                s.combo++;
                s.score += s.combo * 50;
                burst(s.particles, g.x, g.y, 16, g.hue, 5);
                beep(450 + s.combo * 80, 'sine', 0.15, 0.28);
              }
            }

            /* collision with spokes */
            outerSpoke:
            for (const sp of s.spokes) {
              /* check if player's orbit is in this spoke's radial range */
              let inRange = false;
              if (sp.type === 'full' && s.orbit === sp.activeOrbit) inRange = true;
              if (sp.type === 'inner' && s.orbit === 'inner') inRange = true;
              if (sp.type === 'outer' && s.orbit === 'outer') inRange = true;
              if (!inRange) continue;

              /* check angular proximity */
              const arc = pR * angDiff(sp.angle, s.angle);
              if (arc < HIT_ARC) { triggerDeath(s); break outerSpoke; }
            }

            /* score = max(gem-based, time-based) */
            s.score = Math.max(s.score, Math.floor(s.elapsed * 10));
            if (s.score > s.highScore) {
              s.highScore = s.score;
              localStorage.setItem(HS_KEY, s.highScore.toString());
            }
          }

          if (s.phase === 'dying') {
            s.dyingTimer -= dt;
            if (s.dyingTimer <= 0) s.phase = 'over';
          }

          /* update particles & fade */
          s.particles = s.particles.filter(p => {
            p.x += p.vx; p.y += p.vy; p.vx *= 0.93; p.vy *= 0.93; p.life -= 0.028; return p.life > 0;
          });
          s.gems = s.gems.filter(g => { if (!g.alive) g.alpha -= 0.06; return g.alpha > 0; });
          if (s.shake > 0)     s.shake     -= 1.5;
          if (s.ringPulse > 0) s.ringPulse -= 0.06;

          /* ═══ DRAW ═══ */
          const ox = s.shake > 0 ? (Math.random()-0.5)*s.shake : 0;
          const oy = s.shake > 0 ? (Math.random()-0.5)*s.shake : 0;
          ctx.save();
          ctx.translate(ox, oy);

          /* deep space background */
          const bg = ctx.createRadialGradient(CX, CY, 20, CX, CY, GH * 0.75);
          bg.addColorStop(0,   '#0d0025');
          bg.addColorStop(0.5, '#07001a');
          bg.addColorStop(1,   '#020008');
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, GW, GH);

          /* nebula wisps */
          const neb = ctx.createRadialGradient(CX, CY, OUTER_R*1.1, CX, CY, OUTER_R*2.2);
          neb.addColorStop(0,   'rgba(80,0,140,0.08)');
          neb.addColorStop(0.5, 'rgba(0,60,160,0.05)');
          neb.addColorStop(1,   'rgba(0,0,0,0)');
          ctx.fillStyle = neb;
          ctx.fillRect(0, 0, GW, GH);

          /* stars */
          s.stars.forEach(st => {
            ctx.beginPath();
            ctx.arc(st.x, st.y, st.r, 0, Math.PI*2);
            ctx.fillStyle = `rgba(255,255,255,${st.a})`;
            ctx.fill();
          });

          /* ── orbit rings ── */
          const innerActive = s.orbit === 'inner';
          const outerActive = s.orbit === 'outer';
          const iPulse  = innerActive ? 0.55 + Math.max(0, s.ringPulse) * 0.45 : 0.22;
          const oPulse  = outerActive ? 0.55 + Math.max(0, s.ringPulse) * 0.45 : 0.22;

          /* inner ring — cyan */
          ctx.beginPath();
          ctx.arc(CX, CY, INNER_R, 0, Math.PI*2);
          ctx.strokeStyle = `rgba(0,210,255,${iPulse})`;
          ctx.lineWidth   = innerActive ? 2.5 : 1.2;
          glow('rgba(0,210,255,0.9)', 12);
          ctx.stroke(); noglow();

          /* outer ring — magenta */
          ctx.beginPath();
          ctx.arc(CX, CY, OUTER_R, 0, Math.PI*2);
          ctx.strokeStyle = `rgba(210,0,255,${oPulse})`;
          ctx.lineWidth   = outerActive ? 2.5 : 1.2;
          glow('rgba(210,0,255,0.9)', 12);
          ctx.stroke(); noglow();

          /* gap indicator (dashed between rings) */
          ctx.beginPath();
          ctx.arc(CX, CY, (INNER_R + OUTER_R) / 2, 0, Math.PI*2);
          ctx.setLineDash([6, 14]);
          ctx.strokeStyle = 'rgba(255,255,255,0.07)';
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.setLineDash([]);

          /* ── central star ── */
          const sp2 = 1 + Math.sin(s.frame * 0.06) * 0.25;
          glow('#ffcc00', 28 * sp2);
          const sg = ctx.createRadialGradient(CX, CY, 0, CX, CY, 22);
          sg.addColorStop(0, '#ffffff');
          sg.addColorStop(0.25, '#ffee88');
          sg.addColorStop(0.7,  '#ff8800');
          sg.addColorStop(1,    'transparent');
          ctx.fillStyle = sg;
          ctx.beginPath();
          ctx.arc(CX, CY, 22, 0, Math.PI*2);
          ctx.fill(); noglow();

          /* star corona rays */
          ctx.save();
          ctx.translate(CX, CY);
          ctx.rotate(s.frame * 0.008);
          for (let i = 0; i < 8; i++) {
            ctx.save();
            ctx.rotate((Math.PI*2 / 8) * i);
            const rayAlpha = 0.07 + Math.sin(s.frame * 0.04 + i) * 0.03;
            ctx.fillStyle = `rgba(255,210,100,${rayAlpha})`;
            ctx.beginPath();
            ctx.moveTo(0, -22);
            ctx.lineTo(4, -22-18);
            ctx.lineTo(0, -22-36);
            ctx.lineTo(-4, -22-18);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          }
          ctx.restore();

          /* ── spokes ── */
          s.spokes.forEach(sp => {
            if (sp.type === 'full') {
              /* Orange "full" spokes: two halves (inner + outer) — only the active half is dangerous.
                 Active half glows bright orange; inactive half is dim to signal it's safe. */
              const segments = [
                { r1: 24,          r2: INNER_R + 12, orbit: 'inner' },
                { r1: INNER_R + 22, r2: OUTER_R + 22, orbit: 'outer' },
              ];
              segments.forEach(seg => {
                const isActive = seg.orbit === sp.activeOrbit;
                const color  = isActive ? '#ffaa00' : '#664400';
                const gColor = isActive ? 'rgba(255,170,0,0.9)' : 'rgba(80,44,0,0.35)';
                const sx1 = CX + Math.cos(sp.angle) * seg.r1;
                const sy1 = CY + Math.sin(sp.angle) * seg.r1;
                const sx2 = CX + Math.cos(sp.angle) * seg.r2;
                const sy2 = CY + Math.sin(sp.angle) * seg.r2;

                glow(gColor, isActive ? 18 : 5);
                ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2);
                ctx.strokeStyle = color; ctx.lineWidth = isActive ? 5 : 2.5; ctx.stroke();
                if (isActive) {
                  ctx.beginPath(); ctx.moveTo(sx1, sy1); ctx.lineTo(sx2, sy2);
                  ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
                }
                noglow();
                /* endpoint dot only on active segment */
                if (isActive) {
                  ctx.beginPath(); ctx.arc(sx2, sy2, 5, 0, Math.PI*2);
                  glow(gColor, 10); ctx.fillStyle = color; ctx.fill(); noglow();
                }
              });
            } else {
              const spokeColors = { inner: '#00d0ff', outer: '#d000ff' };
              const glowColors  = { inner: 'rgba(0,200,255,0.9)', outer: 'rgba(200,0,255,0.9)' };
              const color  = spokeColors[sp.type];
              const gColor = glowColors[sp.type];

              let r1, r2;
              if (sp.type === 'inner') { r1 = 24; r2 = INNER_R + 20; }
              if (sp.type === 'outer') { r1 = INNER_R - 12; r2 = OUTER_R + 22; }

              const x1 = CX + Math.cos(sp.angle) * r1;
              const y1 = CY + Math.sin(sp.angle) * r1;
              const x2 = CX + Math.cos(sp.angle) * r2;
              const y2 = CY + Math.sin(sp.angle) * r2;

              glow(gColor, 18);
              ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
              ctx.strokeStyle = color; ctx.lineWidth = 5; ctx.stroke();

              ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);
              ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5; ctx.stroke();
              noglow();

              ctx.beginPath(); ctx.arc(x2, y2, 5, 0, Math.PI*2);
              glow(gColor, 10); ctx.fillStyle = color; ctx.fill(); noglow();
            }
          });

          /* ── gems ── */
          s.gems.forEach(g => {
            ctx.save();
            ctx.globalAlpha = g.alpha;
            const gPulse = 7 + Math.sin(g.pulse) * 3;
            glow(`hsl(${g.hue},100%,65%)`, gPulse + 10);
            ctx.fillStyle = `hsl(${g.hue},100%,70%)`;
            const gr = 9;
            ctx.beginPath();
            ctx.moveTo(g.x,         g.y - gr);
            ctx.lineTo(g.x + gr*0.7, g.y);
            ctx.lineTo(g.x,          g.y + gr);
            ctx.lineTo(g.x - gr*0.7, g.y);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = `hsl(${g.hue},100%,90%)`;
            ctx.lineWidth = 1;
            ctx.stroke();
            noglow();
            ctx.restore();
          });

          /* ── player trail ── */
          s.trail.forEach((t, i) => {
            const frac  = i / s.trail.length;
            const tHue  = t.orbit === 'inner' ? 185 : 295;
            ctx.beginPath();
            ctx.arc(t.x, t.y, 4 * frac, 0, Math.PI*2);
            ctx.fillStyle = `hsla(${tHue},100%,70%,${frac * 0.6})`;
            ctx.fill();
          });

          /* ── player ── */
          if (s.phase === 'playing') {
            const pr   = s.orbit === 'inner' ? INNER_R : OUTER_R;
            const ppx  = CX + Math.cos(s.angle) * pr;
            const ppy  = CY + Math.sin(s.angle) * pr;
            const pHue = s.orbit === 'inner' ? 185 : 295;

            /* outer ring glow */
            glow(`hsl(${pHue},100%,65%)`, 22);
            ctx.beginPath();
            ctx.arc(ppx, ppy, PLAYER_VR + 4, 0, Math.PI*2);
            ctx.fillStyle = `hsla(${pHue},100%,65%,0.2)`;
            ctx.fill();

            /* core */
            ctx.beginPath();
            ctx.arc(ppx, ppy, PLAYER_VR, 0, Math.PI*2);
            ctx.fillStyle = `hsl(${pHue},100%,75%)`;
            ctx.fill();
            ctx.strokeStyle = 'rgba(255,255,255,0.85)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            noglow();

            /* velocity dot in center */
            ctx.beginPath();
            ctx.arc(ppx, ppy, 4, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fill();
          }

          /* ── particles ── */
          s.particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
            ctx.fillStyle = `hsla(${p.hue},100%,65%,${p.life})`;
            ctx.fill();
          });

          /* ── HUD (playing) ── */
          if (s.phase === 'playing') {
            /* score */
            ctx.font = 'bold 28px monospace';
            ctx.textAlign = 'center';
            glow('rgba(255,255,255,0.8)', 10);
            ctx.fillStyle = '#fff';
            ctx.fillText(s.score, GW / 2, 45);
            noglow();

            /* combo */
            if (s.combo >= 2) {
              ctx.font = 'bold 16px monospace';
              const ch = (s.frame * 7) % 360;
              glow(`hsl(${ch},100%,60%)`, 10);
              ctx.fillStyle = `hsl(${ch},100%,75%)`;
              ctx.fillText(`×${s.combo} COMBO`, GW / 2, 65);
              noglow();
            }

            /* corner info */
            ctx.textAlign = 'left';
            ctx.font = '13px monospace';
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.fillText(`BEST ${s.highScore}`, 10, 22);

            /* orbit label */
            const labelHue = s.orbit === 'inner' ? 185 : 295;
            ctx.fillStyle = `hsl(${labelHue},100%,70%)`;
            ctx.fillText(`● ${s.orbit.toUpperCase()} ORBIT`, 10, 40);

            /* spoke legend (top right) */
            ctx.textAlign = 'right';
            ctx.font = '11px monospace';
            ctx.fillStyle = '#00d0ff';
            ctx.fillText('■ CYAN  = inner only', GW - 10, 18);
            ctx.fillStyle = '#d000ff';
            ctx.fillText('■ PURPLE = outer only', GW - 10, 32);
            ctx.fillStyle = '#ffaa00';
            ctx.fillText('■ ORANGE = bright half = danger!', GW - 10, 46);
            ctx.textAlign = 'left';
          }

          /* ── START SCREEN ── */
          if (s.phase === 'start') {
            /* dim overlay */
            ctx.fillStyle = 'rgba(0,0,0,0.45)';
            ctx.fillRect(0, 0, GW, GH);

            ctx.textAlign = 'center';
            ctx.font = 'bold 68px monospace';
            glow('#00ccff', 32);
            ctx.fillStyle = '#00ccff';
            ctx.fillText('ORBIT', GW/2, GH/2 - 80);
            glow('#cc00ff', 32);
            ctx.fillStyle = '#cc00ff';
            ctx.fillText('FRENZY', GW/2, GH/2 - 10);
            noglow();

            ctx.font = '16px monospace';
            ctx.fillStyle = 'rgba(255,255,255,0.75)';
            ctx.fillText('Orbit the star on two rings — click to switch!', GW/2, GH/2 + 42);
            ctx.fillText('Dodge rotating spokes · Collect gems for combos', GW/2, GH/2 + 64);

            /* legend */
            ctx.font = '13px monospace';
            ctx.fillStyle = '#00d0ff';   ctx.fillText('CYAN spokes: inner ring danger',  GW/2, GH/2 + 92);
            ctx.fillStyle = '#d000ff';   ctx.fillText('PURPLE spokes: outer ring danger', GW/2, GH/2 + 110);
            ctx.fillStyle = '#ffaa00';   ctx.fillText('ORANGE spokes: bright half = danger — switch to dodge!', GW/2, GH/2 + 128);

            /* pulse prompt */
            const pulse = 0.6 + Math.sin(Date.now() / 450) * 0.4;
            ctx.globalAlpha = pulse;
            ctx.font = 'bold 22px monospace';
            glow('#ffff00', 16);
            ctx.fillStyle = '#ffff00';
            ctx.fillText('CLICK / TAP / SPACE TO START', GW/2, GH/2 + 162);
            ctx.globalAlpha = 1; noglow();

            if (s.highScore > 0) {
              ctx.font = '15px monospace';
              ctx.fillStyle = 'rgba(255,215,0,0.7)';
              ctx.fillText(`Best Score: ${s.highScore}`, GW/2, GH/2 + 192);
            }
            ctx.textAlign = 'left';
          }

          /* ── GAME OVER SCREEN ── */
          if (s.phase === 'over') {
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0, 0, GW, GH);

            ctx.textAlign = 'center';
            ctx.font = 'bold 52px monospace';
            glow('#ff3333', 25);
            ctx.fillStyle = '#ff5555';
            ctx.fillText('GAME OVER', GW/2, GH/2 - 45);
            noglow();
            ctx.font = 'bold 28px monospace';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(`Score: ${s.score}`, GW/2, GH/2 + 8);
            ctx.font = '20px monospace';
            ctx.fillStyle = '#ffd700';
            ctx.fillText(`Best: ${s.highScore}`, GW/2, GH/2 + 42);
            const p2 = 0.6 + Math.sin(Date.now() / 400) * 0.4;
            ctx.globalAlpha = p2;
            ctx.font = 'bold 22px monospace';
            glow('#00ffff', 12);
            ctx.fillStyle = '#00ffff';
            ctx.fillText('CLICK TO PLAY AGAIN', GW/2, GH/2 + 88);
            ctx.globalAlpha = 1; noglow();
            ctx.textAlign = 'left';
          }

          ctx.restore(); // un-shake
        }

        function triggerDeath(s) {
          if (s.phase !== 'playing') return;
          s.phase     = 'dying';
          s.dyingTimer = 1300;
          s.shake     = 16;
          const pr = s.orbit === 'inner' ? INNER_R : OUTER_R;
          const px = CX + Math.cos(s.angle) * pr;
          const py = CY + Math.sin(s.angle) * pr;
          burst(s.particles, px, py, 36, 20, 8);
          beep(110, 'sawtooth', 0.65, 0.45);
          if (s.score > s.highScore) {
            s.highScore = s.score;
            localStorage.setItem(HS_KEY, s.highScore.toString());
          }
        }

        rafRef.current = requestAnimationFrame(loop);

        return () => {
          window.removeEventListener('resize', resize);
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
        };
      }, []);

      return <canvas ref={canvasRef} width={GW} height={GH} id="game-canvas" />;
    };

    localStorage.setItem(HS_KEY, localStorage.getItem(HS_KEY) || '0');
    ReactDOM.render(<Game />, document.getElementById('root'));
  </script>
</body>
</html>
