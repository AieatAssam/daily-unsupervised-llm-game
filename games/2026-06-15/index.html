<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Critical Mass</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; width: 100%; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1a0030, #001a3a, #3a1400, #2a0030, #00261a);
    background-size: 400% 400%;
    animation: bgShift 18s ease infinite;
    color: #fff;
    touch-action: none;
    user-select: none;
  }
  @keyframes bgShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  #root { width: 100vw; height: 100vh; display: flex; }
  .app {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: 100%;
    padding: 10px;
    gap: 8px;
  }
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 14px;
    flex-wrap: wrap;
    gap: 8px;
    z-index: 5;
  }
  .hud-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 60px;
  }
  .hud-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #8fd9ff;
    text-transform: uppercase;
    opacity: 0.8;
  }
  .hud-value {
    font-size: 22px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 8px #00eaff, 0 0 16px #00eaff;
    transition: color 0.2s ease;
  }
  .hud-value.gold { text-shadow: 0 0 8px #ffd700, 0 0 16px #ffd700; color: #ffe9a8; }
  .cores { font-size: 18px; letter-spacing: 3px; }
  .core-full { color: #00eaff; text-shadow: 0 0 8px #00eaff; }
  .core-empty { color: #333; }
  .game-area {
    position: relative;
    flex: 1;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(0,234,255,0.25), inset 0 0 60px rgba(0,0,0,0.6);
    border: 1px solid rgba(0,234,255,0.2);
    min-height: 0;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    background: radial-gradient(circle at 50% 40%, rgba(40,5,30,0.85), rgba(5,5,15,0.95));
    z-index: 10;
    padding: 20px;
    animation: fadeIn 0.4s ease;
    overflow-y: auto;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .title {
    font-size: clamp(30px, 8vw, 64px);
    font-weight: 900;
    letter-spacing: 5px;
    margin: 0;
    background: linear-gradient(90deg, #00eaff, #ff3030, #ffd700, #00eaff);
    background-size: 300% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: hueSlide 4s linear infinite;
    text-shadow: 0 0 30px rgba(255,80,30,0.4);
  }
  @keyframes hueSlide {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }
  .subtitle {
    font-size: clamp(12px, 2.6vw, 16px);
    color: #aef;
    margin: 10px 0 22px;
    letter-spacing: 0.5px;
    max-width: 480px;
    line-height: 1.7;
  }
  .key-tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 6px;
    font-weight: bold;
    margin: 0 2px;
    background: rgba(0,234,255,0.18);
    color: #00eaff;
  }
  .vent-tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 6px;
    font-weight: bold;
    margin: 0 2px;
    background: rgba(255,140,0,0.18);
    color: #ff9020;
  }
  .gold-tag {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 6px;
    font-weight: bold;
    margin: 0 2px;
    background: rgba(255,215,0,0.18);
    color: #ffd700;
  }
  .btn {
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 3px;
    padding: 16px 48px;
    border-radius: 50px;
    border: 2px solid #00eaff;
    background: rgba(0,234,255,0.08);
    color: #00eaff;
    cursor: pointer;
    text-shadow: 0 0 10px #00eaff;
    box-shadow: 0 0 20px rgba(0,234,255,0.4), inset 0 0 20px rgba(0,234,255,0.1);
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .btn:hover { transform: scale(1.06); background: rgba(0,234,255,0.18); }
  .btn:active { transform: scale(0.97); }
  .final-score {
    font-size: clamp(40px, 11vw, 80px);
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 20px #ffd700, 0 0 40px #ff3030;
    margin: 6px 0;
  }
  .stat-row {
    display: flex;
    gap: 28px;
    margin: 14px 0 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .stat-label { font-size: 11px; letter-spacing: 2px; color: #8fd9ff; text-transform: uppercase; }
  .stat-value { font-size: 24px; font-weight: bold; color: #fff; }
  .new-high {
    color: #ffd700;
    font-weight: bold;
    letter-spacing: 2px;
    text-shadow: 0 0 12px #ffd700;
    animation: pulse 0.8s ease infinite;
    margin-bottom: 8px;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }
  .announce {
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    font-size: clamp(20px, 5vw, 36px);
    font-weight: 900;
    letter-spacing: 4px;
    z-index: 8;
    pointer-events: none;
    animation: announceAnim 1.4s ease forwards;
    white-space: nowrap;
  }
  @keyframes announceAnim {
    0% { opacity: 0; transform: translateX(-50%) translateY(-20px) scale(0.7); }
    20% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.1); }
    35% { transform: translateX(-50%) translateY(0) scale(1); }
    75% { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) translateY(10px) scale(0.95); }
  }
  .controls-hint {
    text-align: center;
    font-size: 11px;
    color: #6cf;
    opacity: 0.7;
    padding: 4px 0 0;
    letter-spacing: 1px;
  }
  .controls-row {
    display: flex;
    gap: 12px;
  }
  .ctrl-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 14px 8px;
    border-radius: 16px;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 3px;
    cursor: pointer;
    border: 2px solid;
    transition: transform 0.08s ease, opacity 0.15s ease;
    user-select: none;
    background: none;
    font-family: inherit;
  }
  .ctrl-btn:active { transform: scale(0.95); }
  .ctrl-btn.charge {
    background: rgba(0,234,255,0.1);
    border-color: #00eaff;
    color: #00eaff;
    text-shadow: 0 0 10px #00eaff;
    box-shadow: 0 0 20px rgba(0,234,255,0.3), inset 0 0 20px rgba(0,234,255,0.08);
  }
  .ctrl-btn.vent {
    background: rgba(255,140,0,0.1);
    border-color: #ff9020;
    color: #ff9020;
    text-shadow: 0 0 10px #ff9020;
    box-shadow: 0 0 20px rgba(255,140,0,0.3), inset 0 0 20px rgba(255,140,0,0.08);
  }
  .ctrl-btn.cooling { opacity: 0.35; }
  .ctrl-btn:disabled { opacity: 0.2; cursor: default; }
  .ctrl-icon { font-size: 24px; }
  @media (max-width: 600px) {
    .hud-block { min-width: 48px; }
    .hud-value { font-size: 16px; }
    .cores { font-size: 14px; }
    .ctrl-btn { font-size: 13px; padding: 12px 4px; }
    .ctrl-icon { font-size: 20px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------- constants ---------- */
const START_LIVES = 3;
const INITIAL_ENERGY = 50;
const INITIAL_HEAT = 30;
const CHARGE_AMOUNT = 16;
const CHARGE_HEAT_BASE = 9;
const CHARGE_HEAT_PER_LEVEL = 0.6;
const VENT_AMOUNT = 17;
const VENT_ENERGY_COST = 3;
const CHARGE_COOLDOWN = 0.22;
const VENT_COOLDOWN = 0.22;
const HEAT_DECAY_BASE = 5;
const HEAT_DECAY_PER_LEVEL = 0.15;
const ENERGY_DECAY_BASE = 3.2;
const ENERGY_DECAY_PER_LEVEL = 0.12;
const LEVEL_UP_INTERVAL = 18;
const COMBO_TICK_INTERVAL = 1.1;
const MAX_MULTIPLIER = 6;
const SCORE_RATE = 1.4;
const SWEET_WIDTH_START = 38;
const SWEET_WIDTH_MIN = 14;
const SWEET_WIDTH_STEP = 2.5;
const HIGH_SCORE_KEY = 'criticalMassHighScore';

const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

/* ---------- audio ---------- */
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function tone(freq, dur, type, vol, ramp) {
  try {
    const ctx = ensureAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    if (ramp) osc.frequency.exponentialRampToValueAtTime(ramp, ctx.currentTime + dur);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (e) { /* audio unavailable */ }
}
function noiseBurst(dur, vol, filterFreq) {
  try {
    const ctx = ensureAudio();
    const bufferSize = Math.max(1, Math.floor(ctx.sampleRate * dur));
    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufferSize);
    const src = ctx.createBufferSource();
    src.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.setValueAtTime(filterFreq, ctx.currentTime);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    src.start();
  } catch (e) { /* audio unavailable */ }
}
function sndCharge() { tone(280, 0.1, 'square', 0.14, 620); }
function sndVent() { noiseBurst(0.25, 0.18, 1800); tone(380, 0.15, 'sine', 0.06, 180); }
function sndComboUp(mult) { tone(440 + mult * 70, 0.12, 'square', 0.16, 880 + mult * 100); }
function sndOverload() {
  noiseBurst(0.4, 0.3, 800);
  tone(140, 0.4, 'sawtooth', 0.2, 50);
}
function sndLevelUp() {
  tone(523, 0.08, 'square', 0.14, 1046);
  setTimeout(() => tone(659, 0.1, 'square', 0.14, 1318), 80);
  setTimeout(() => tone(784, 0.12, 'square', 0.14, 1568), 160);
}
function sndStart() {
  tone(330, 0.1, 'sine', 0.15, 660);
  setTimeout(() => tone(440, 0.12, 'sine', 0.15, 880), 100);
}
function sndGameOver() {
  tone(440, 0.2, 'sawtooth', 0.2, 220);
  setTimeout(() => tone(330, 0.2, 'sawtooth', 0.2, 165), 180);
  setTimeout(() => tone(220, 0.3, 'sawtooth', 0.2, 110), 360);
}

/* ---------- particles ---------- */
function spawnChargeParticles(game) {
  const { cx, cy, ringRadius } = game;
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = ringRadius * (1.3 + Math.random() * 0.5);
    const x = cx + Math.cos(angle) * dist;
    const y = cy + Math.sin(angle) * dist;
    const dx = cx - x, dy = cy - y;
    const d = Math.hypot(dx, dy) || 1;
    const speed = 180 + Math.random() * 120;
    game.particles.push({
      x, y,
      vx: dx / d * speed, vy: dy / d * speed,
      life: 1, decay: 1.4 + Math.random() * 0.8,
      color: Math.random() < 0.5 ? '#00eaff' : '#b388ff',
      size: 2 + Math.random() * 3,
    });
  }
}
function spawnVentParticles(game) {
  const { cx, cy, ringRadius } = game;
  for (let i = 0; i < 14; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = ringRadius * (0.5 + Math.random() * 0.4);
    const x = cx + Math.cos(angle) * dist;
    const y = cy + Math.sin(angle) * dist;
    const speed = 100 + Math.random() * 160;
    game.particles.push({
      x, y,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 30,
      life: 1, decay: 1.8 + Math.random() * 1.2,
      color: Math.random() < 0.6 ? '#ff9020' : '#ffe0b0',
      size: 3 + Math.random() * 4,
    });
  }
}
function spawnComboSparkle(game) {
  const { cx, cy, ringRadius, heat } = game;
  const angle = -Math.PI / 2 + (heat / 100) * Math.PI * 2;
  for (let i = 0; i < 8; i++) {
    const a = angle + (Math.random() - 0.5) * 0.6;
    const x = cx + Math.cos(a) * ringRadius;
    const y = cy + Math.sin(a) * ringRadius;
    game.particles.push({
      x, y,
      vx: Math.cos(a) * 60, vy: Math.sin(a) * 60 - 20,
      life: 1, decay: 1.0 + Math.random() * 0.6,
      color: '#ffd700',
      size: 2 + Math.random() * 2,
    });
  }
}
function spawnExplosion(game) {
  const { cx, cy } = game;
  const palette = ['#ff3030', '#ff9020', '#ffd700', '#ff6060'];
  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 100 + Math.random() * 300;
    game.particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: 1, decay: 0.8 + Math.random() * 0.8,
      color: palette[Math.floor(Math.random() * palette.length)],
      size: 3 + Math.random() * 5,
    });
  }
}
function updateParticles(game, dt) {
  for (let i = game.particles.length - 1; i >= 0; i--) {
    const p = game.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 60 * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) game.particles.splice(i, 1);
  }
  for (let i = game.popups.length - 1; i >= 0; i--) {
    const pu = game.popups[i];
    pu.life -= dt * 0.9;
    if (pu.life <= 0) game.popups.splice(i, 1);
  }
}

/* ---------- game state ---------- */
function createGame() {
  return {
    energy: INITIAL_ENERGY,
    heat: INITIAL_HEAT,
    score: 0,
    lives: START_LIVES,
    level: 1,
    multiplier: 1,
    comboTimer: 0,
    sweetMin: 50 - SWEET_WIDTH_START / 2,
    sweetMax: 50 + SWEET_WIDTH_START / 2,
    survivalTime: 0,
    levelTimer: 0,
    chargeCooldown: 0,
    ventCooldown: 0,
    particles: [],
    popups: [],
    shakeTime: 0,
    shakeMag: 0,
    cx: 100, cy: 100, ringRadius: 80,
    frame: 0,
    over: false,
  };
}

function doCharge(game, cb) {
  if (game.over || game.chargeCooldown > 0) return;
  game.chargeCooldown = CHARGE_COOLDOWN;
  game.energy = clamp(game.energy + CHARGE_AMOUNT, 0, 100);
  game.heat = clamp(game.heat + CHARGE_HEAT_BASE + (game.level - 1) * CHARGE_HEAT_PER_LEVEL, 0, 100);
  spawnChargeParticles(game);
  cb.onCharge();
}
function doVent(game, cb) {
  if (game.over || game.ventCooldown > 0) return;
  game.ventCooldown = VENT_COOLDOWN;
  game.heat = clamp(game.heat - VENT_AMOUNT, 0, 100);
  game.energy = clamp(game.energy - VENT_ENERGY_COST, 0, 100);
  spawnVentParticles(game);
  cb.onVent();
}

function updateGame(game, dt, canvas, cb) {
  if (game.over) return;
  game.frame++;
  game.cx = canvas.width / 2;
  game.cy = canvas.height / 2;
  game.ringRadius = Math.min(canvas.width, canvas.height) * 0.34;

  game.survivalTime += dt;
  game.levelTimer += dt;
  game.chargeCooldown = Math.max(0, game.chargeCooldown - dt);
  game.ventCooldown = Math.max(0, game.ventCooldown - dt);

  if (game.levelTimer >= LEVEL_UP_INTERVAL) {
    game.levelTimer = 0;
    game.level++;
    const width = Math.max(SWEET_WIDTH_MIN, SWEET_WIDTH_START - (game.level - 1) * SWEET_WIDTH_STEP);
    game.sweetMin = 50 - width / 2;
    game.sweetMax = 50 + width / 2;
    cb.onLevelUp(game.level);
  }

  const heatDecay = Math.max(1.5, HEAT_DECAY_BASE - (game.level - 1) * HEAT_DECAY_PER_LEVEL);
  const energyDecay = ENERGY_DECAY_BASE + (game.level - 1) * ENERGY_DECAY_PER_LEVEL;
  game.heat = clamp(game.heat - heatDecay * dt, 0, 100);
  game.energy = clamp(game.energy - energyDecay * dt, 0, 100);

  const inSweet = game.heat >= game.sweetMin && game.heat <= game.sweetMax;
  if (inSweet) {
    game.comboTimer += dt;
    if (game.comboTimer >= COMBO_TICK_INTERVAL) {
      game.comboTimer -= COMBO_TICK_INTERVAL;
      if (game.multiplier < MAX_MULTIPLIER) {
        game.multiplier++;
        spawnComboSparkle(game);
        cb.onComboUp(game.multiplier);
      }
    }
  } else {
    if (game.multiplier > 1) cb.onComboLost();
    game.multiplier = 1;
    game.comboTimer = 0;
  }

  game.score += game.energy * game.multiplier * SCORE_RATE * dt;

  if (game.heat >= 100) {
    game.lives--;
    game.heat = 50;
    game.energy = clamp(game.energy - 30, 0, 100);
    game.multiplier = 1;
    game.comboTimer = 0;
    game.shakeTime = 0.5;
    game.shakeMag = 22;
    spawnExplosion(game);
    if (game.lives <= 0) {
      game.over = true;
      cb.onGameOver(Math.floor(game.score));
    } else {
      cb.onOverload(game.lives);
    }
  }

  if (game.shakeTime > 0) game.shakeTime = Math.max(0, game.shakeTime - dt);
  updateParticles(game, dt);
}

/* ---------- rendering ---------- */
function draw(ctx, canvas, game) {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  if (!game) return;

  ctx.save();
  if (game.shakeTime > 0) {
    const mag = game.shakeMag * (game.shakeTime / 0.5);
    ctx.translate((Math.random() - 0.5) * mag, (Math.random() - 0.5) * mag);
  }

  const cx = w / 2, cy = h / 2;
  const ringRadius = Math.min(w, h) * 0.34;
  const ringWidth = Math.max(6, ringRadius * 0.09);
  const energyFrac = game.energy / 100;

  // ambient glow
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, ringRadius * 1.7);
  grad.addColorStop(0, `rgba(90,40,170,${0.22 + 0.25 * energyFrac})`);
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // background ring track
  ctx.lineWidth = ringWidth;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.arc(cx, cy, ringRadius, 0, Math.PI * 2);
  ctx.stroke();

  // sweet zone band
  const a0 = -Math.PI / 2 + (game.sweetMin / 100) * Math.PI * 2;
  const a1 = -Math.PI / 2 + (game.sweetMax / 100) * Math.PI * 2;
  ctx.lineWidth = ringWidth * 1.3;
  ctx.strokeStyle = 'rgba(80,255,160,0.28)';
  ctx.shadowColor = '#50ffa0';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(cx, cy, ringRadius, a0, a1);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // heat ring progress
  const heatAngle = -Math.PI / 2 + (game.heat / 100) * Math.PI * 2;
  let heatColor;
  if (game.heat < game.sweetMin) heatColor = '#00c8ff';
  else if (game.heat <= game.sweetMax) heatColor = '#50ff90';
  else if (game.heat < 90) heatColor = '#ff9020';
  else heatColor = '#ff3030';
  ctx.lineWidth = ringWidth;
  ctx.lineCap = 'round';
  ctx.strokeStyle = heatColor;
  ctx.shadowColor = heatColor;
  ctx.shadowBlur = game.heat >= 90 ? 24 + Math.sin(game.frame * 0.3) * 8 : 14;
  ctx.beginPath();
  if (game.heat > 0.3) ctx.arc(cx, cy, ringRadius, -Math.PI / 2, heatAngle);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.lineCap = 'butt';

  // core
  const coreBase = ringRadius * 0.32;
  const coreRadius = coreBase + energyFrac * ringRadius * 0.4;
  const hue = (game.frame * 0.6) % 360;
  const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreRadius);
  coreGrad.addColorStop(0, `hsl(${hue}, 100%, 75%)`);
  coreGrad.addColorStop(0.5, `hsl(${(hue + 60) % 360}, 100%, 55%)`);
  coreGrad.addColorStop(1, `hsl(${(hue + 180) % 360}, 100%, 30%)`);
  ctx.shadowColor = `hsl(${hue},100%,60%)`;
  ctx.shadowBlur = 25 + energyFrac * 25;
  ctx.fillStyle = coreGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, coreRadius, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // labels
  ctx.textAlign = 'center';
  ctx.fillStyle = heatColor;
  ctx.font = `bold ${Math.max(11, Math.round(ringRadius * 0.13))}px Segoe UI, Arial, sans-serif`;
  ctx.fillText('HEAT ' + Math.round(game.heat) + '%', cx, cy - ringRadius - ringWidth * 1.6);

  ctx.fillStyle = '#cdeaff';
  ctx.font = `bold ${Math.max(10, Math.round(ringRadius * 0.11))}px Segoe UI, Arial, sans-serif`;
  ctx.fillText('ENERGY', cx, cy + coreRadius + ringRadius * 0.2);
  ctx.fillStyle = '#fff';
  ctx.font = `900 ${Math.max(14, Math.round(ringRadius * 0.18))}px Segoe UI, Arial, sans-serif`;
  ctx.fillText(Math.round(game.energy) + '%', cx, cy + coreRadius + ringRadius * 0.44);

  if (game.multiplier > 1) {
    ctx.fillStyle = '#ffd700';
    ctx.shadowColor = '#ffd700';
    ctx.shadowBlur = 14;
    ctx.font = `900 ${Math.max(16, Math.round(ringRadius * 0.22))}px Segoe UI, Arial, sans-serif`;
    ctx.fillText('×' + game.multiplier, cx, cy - coreRadius - ringRadius * 0.15);
    ctx.shadowBlur = 0;
  }

  // particles
  for (const p of game.particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

/* ---------- main app ---------- */
function App() {
  const canvasRef = useRef(null);
  const gameRef = useRef(null);
  const rafRef = useRef(null);
  const lastTimeRef = useRef(0);
  const hudFrameRef = useRef(0);
  const announceIdRef = useRef(0);

  const [screen, setScreen] = useState('start');
  const [hud, setHud] = useState({ score: 0, energy: INITIAL_ENERGY, heat: INITIAL_HEAT, lives: START_LIVES, level: 1, multiplier: 1 });
  const [highScore, setHighScore] = useState(() => Number(localStorage.getItem(HIGH_SCORE_KEY)) || 0);
  const [finalScore, setFinalScore] = useState(0);
  const [isNewBest, setIsNewBest] = useState(false);
  const [chargeReady, setChargeReady] = useState(true);
  const [ventReady, setVentReady] = useState(true);
  const [announce, setAnnounce] = useState(null);

  useEffect(() => {
    if (localStorage.getItem(HIGH_SCORE_KEY) === null) {
      localStorage.setItem(HIGH_SCORE_KEY, '0');
    }
  }, []);

  const triggerAnnounce = useCallback((text, color) => {
    announceIdRef.current++;
    setAnnounce({ text, color, id: announceIdRef.current });
  }, []);

  const callbacksRef = useRef({});
  callbacksRef.current = {
    onLevelUp: (level) => { sndLevelUp(); triggerAnnounce(`LEVEL ${level}`, '#00eaff'); },
    onComboUp: (mult) => { sndComboUp(mult); if (mult === MAX_MULTIPLIER) triggerAnnounce('MAX COMBO!', '#ffd700'); },
    onComboLost: () => {},
    onCharge: () => sndCharge(),
    onVent: () => sndVent(),
    onOverload: (livesLeft) => { sndOverload(); triggerAnnounce('MELTDOWN!', '#ff3030'); },
    onGameOver: (score) => {
      sndOverload();
      setTimeout(() => sndGameOver(), 200);
      setFinalScore(score);
      const prevBest = Number(localStorage.getItem(HIGH_SCORE_KEY)) || 0;
      if (score > prevBest) {
        localStorage.setItem(HIGH_SCORE_KEY, String(score));
        setHighScore(score);
        setIsNewBest(true);
      } else {
        setIsNewBest(false);
      }
      setScreen('gameover');
    },
  };

  useEffect(() => {
    if (screen !== 'playing') return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');

    function resize() {
      const rect = canvas.parentElement.getBoundingClientRect();
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.max(1, Math.floor(rect.width * dpr));
      canvas.height = Math.max(1, Math.floor(rect.height * dpr));
    }
    resize();
    window.addEventListener('resize', resize);

    lastTimeRef.current = performance.now();
    let active = true;

    function loop(now) {
      if (!active) return;
      const dt = Math.min(0.05, (now - lastTimeRef.current) / 1000);
      lastTimeRef.current = now;
      const game = gameRef.current;
      if (game && !game.over) {
        updateGame(game, dt, canvas, callbacksRef.current);
        hudFrameRef.current++;
        if (hudFrameRef.current % 2 === 0) {
          setHud({
            score: Math.floor(game.score),
            energy: game.energy,
            heat: game.heat,
            lives: game.lives,
            level: game.level,
            multiplier: game.multiplier,
          });
          setChargeReady(game.chargeCooldown <= 0);
          setVentReady(game.ventCooldown <= 0);
        }
      }
      draw(ctx, canvas, game);
      rafRef.current = requestAnimationFrame(loop);
    }
    rafRef.current = requestAnimationFrame(loop);
    return () => {
      active = false;
      cancelAnimationFrame(rafRef.current);
      window.removeEventListener('resize', resize);
    };
  }, [screen]);

  const handleCharge = useCallback(() => {
    const game = gameRef.current;
    if (!game || game.over) return;
    doCharge(game, callbacksRef.current);
  }, []);
  const handleVent = useCallback(() => {
    const game = gameRef.current;
    if (!game || game.over) return;
    doVent(game, callbacksRef.current);
  }, []);

  useEffect(() => {
    if (screen !== 'playing') return;
    function onKeyDown(e) {
      if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') {
        e.preventDefault();
        handleCharge();
      } else if (e.code === 'ArrowDown' || e.code === 'KeyS') {
        e.preventDefault();
        handleVent();
      }
    }
    window.addEventListener('keydown', onKeyDown);
    return () => window.removeEventListener('keydown', onKeyDown);
  }, [screen, handleCharge, handleVent]);

  function startGame() {
    ensureAudio();
    gameRef.current = createGame();
    hudFrameRef.current = 0;
    setHud({ score: 0, energy: INITIAL_ENERGY, heat: INITIAL_HEAT, lives: START_LIVES, level: 1, multiplier: 1 });
    setAnnounce(null);
    setIsNewBest(false);
    setScreen('playing');
    sndStart();
  }

  return (
    <div className="app">
      <div className="hud">
        <div className="hud-block">
          <div className="hud-label">Score</div>
          <div className="hud-value">{hud.score}</div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Best</div>
          <div className="hud-value gold">{Math.max(highScore, hud.score)}</div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Cores</div>
          <div className="cores">
            {Array.from({ length: START_LIVES }).map((_, i) => (
              <span key={i} className={i < hud.lives ? 'core-full' : 'core-empty'}>&#11044;</span>
            ))}
          </div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Level</div>
          <div className="hud-value">{hud.level}</div>
        </div>
        <div className="hud-block">
          <div className="hud-label">Combo</div>
          <div className="hud-value" style={{ color: hud.multiplier > 1 ? '#ffd700' : '#fff', textShadow: hud.multiplier > 1 ? '0 0 8px #ffd700, 0 0 16px #ffd700' : '0 0 8px #00eaff, 0 0 16px #00eaff' }}>
            &times;{hud.multiplier}
          </div>
        </div>
      </div>

      <div className="game-area">
        <canvas ref={canvasRef}></canvas>

        {announce && (
          <div key={announce.id} className="announce" style={{ color: announce.color, textShadow: `0 0 16px ${announce.color}` }}>
            {announce.text}
          </div>
        )}

        {screen === 'start' && (
          <div className="overlay">
            <h1 className="title">CRITICAL MASS</h1>
            <p className="subtitle">
              Keep the Heat ring inside the <span style={{ color: '#50ff90' }}>green ZONE</span> to build combo multipliers.<br/>
              <span className="key-tag">CHARGE</span> raises Energy (your score rate) but also raises Heat.<br/>
              <span className="vent-tag">VENT</span> cools Heat down, but costs Energy.<br/>
              Let the ring hit 100% and the reactor goes critical &mdash; lose all 3 cores and it's game over!
            </p>
            <button className="btn" onClick={startGame}>START</button>
            <div className="controls-hint">&uarr; / W / Space = Charge &nbsp;&middot;&nbsp; &darr; / S = Vent &nbsp;&middot;&nbsp; or use the buttons below</div>
          </div>
        )}

        {screen === 'gameover' && (
          <div className="overlay">
            <h1 className="title">MELTDOWN</h1>
            {isNewBest && <div className="new-high">NEW BEST!</div>}
            <div className="final-score">{finalScore}</div>
            <div className="stat-row">
              <div className="stat"><div className="stat-label">Best</div><div className="stat-value">{highScore}</div></div>
              <div className="stat"><div className="stat-label">Level Reached</div><div className="stat-value">{hud.level}</div></div>
            </div>
            <button className="btn" onClick={startGame}>RETRY</button>
          </div>
        )}
      </div>

      <div className="controls-row">
        <button
          className={`ctrl-btn charge ${chargeReady ? '' : 'cooling'}`}
          onClick={handleCharge}
          disabled={screen !== 'playing'}
        >
          <span className="ctrl-icon">&#9889;</span>
          <span>CHARGE</span>
        </button>
        <button
          className={`ctrl-btn vent ${ventReady ? '' : 'cooling'}`}
          onClick={handleVent}
          disabled={screen !== 'playing'}
        >
          <span className="ctrl-icon">&#128168;</span>
          <span>VENT</span>
        </button>
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
