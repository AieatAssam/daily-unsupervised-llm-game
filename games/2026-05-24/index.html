<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blast Zone</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0015;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }
    #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const CELL = 52;
    const COLS = 13;
    const ROWS = 11;
    // Wall layout: 1=indestructible, 2=destructible brick, 0=empty
    function makeGrid(level) {
      const grid = [];
      for (let r = 0; r < ROWS; r++) {
        grid[r] = [];
        for (let c = 0; c < COLS; c++) {
          if (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1) { grid[r][c] = 1; }
          else if (r % 2 === 0 && c % 2 === 0) { grid[r][c] = 1; }
          else {
            // keep corners clear for player spawn
            const safe = (r<=2&&c<=2)||(r<=2&&c>=COLS-3)||(r>=ROWS-3&&c<=2);
            grid[r][c] = (!safe && Math.random() < 0.35 + level*0.03) ? 2 : 0;
          }
        }
      }
      return grid;
    }

    function spawnEnemies(level, grid) {
      const count = 2 + level;
      const enemies = [];
      let id = 0;
      while (enemies.length < count) {
        const r = 3 + Math.floor(Math.random() * (ROWS-5));
        const c = 5 + Math.floor(Math.random() * (COLS-8));
        if (grid[r][c] === 0) {
          enemies.push({ id: id++, r, c, dir: Math.floor(Math.random()*4), moveTimer: 0, speed: 600 - level*40, alive: true });
        }
      }
      return enemies;
    }

    const DIRS = [{dr:-1,dc:0},{dr:1,dc:0},{dr:0,dc:-1},{dr:0,dc:1}];

    // Web Audio
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function playTone(freq, dur, type='square', vol=0.15) {
      try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(); osc.stop(ctx.currentTime + dur);
      } catch(e) {}
    }
    function playBomb() { playTone(80, 0.5, 'sawtooth', 0.2); playTone(160, 0.3, 'square', 0.1); }
    function playExplosion() {
      playTone(200, 0.4, 'sawtooth', 0.25);
      playTone(100, 0.6, 'sawtooth', 0.2);
    }
    function playDeath() { playTone(440, 0.1, 'square', 0.2); playTone(220, 0.3, 'sawtooth', 0.2); }
    function playCollect() { playTone(880, 0.15, 'sine', 0.15); }
    function playLevelUp() {
      [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.2, 'sine', 0.2), i*100));
    }

    const COLORS = {
      empty: 'transparent',
      wall: '#1a0a3a',
      brick: '#3a1a6a',
      player: '#00ffee',
      enemy: '#ff2266',
      bomb: '#ffaa00',
      explosion: '#ff6600',
      powerup: '#ffff00',
    };

    const POWERUP_TYPES = ['range', 'bombs', 'speed'];

    function BlastZone() {
      const canvasRef = useRef(null);
      const stateRef = useRef(null);
      const animRef = useRef(null);
      const lastTimeRef = useRef(0);
      const keysRef = useRef({});
      const [overlay, setOverlay] = useState('start'); // 'start'|'playing'|'dead'|'levelup'|'win'
      const [score, setScore] = useState(0);
      const [lives, setLives] = useState(3);
      const [level, setLevel] = useState(1);
      const [combo, setCombo] = useState(0);
      const [highScore, setHighScore] = useState(() => parseInt(localStorage.getItem('blastZoneHighScore') || '0'));

      function initState(lvl) {
        const grid = makeGrid(lvl);
        const enemies = spawnEnemies(lvl, grid);
        // powerups hidden in bricks
        const powerups = [];
        for (let r = 1; r < ROWS-1; r++) {
          for (let c = 1; c < COLS-1; c++) {
            if (grid[r][c] === 2 && Math.random() < 0.2) {
              powerups.push({ r, c, type: POWERUP_TYPES[Math.floor(Math.random()*3)], hidden: true });
            }
          }
        }
        return {
          grid,
          player: { r: 1, c: 1, bombRange: 2, maxBombs: 1, speed: 180, moveTimer: 0, alive: true, invincible: 0 },
          enemies,
          bombs: [],
          explosions: [],
          powerups,
          particles: [],
        };
      }

      const scoreRef = useRef(0);
      const livesRef = useRef(3);
      const levelRef = useRef(1);
      const comboRef = useRef(0);
      const comboTimerRef = useRef(0);

      function startGame() {
        scoreRef.current = 0;
        livesRef.current = 3;
        levelRef.current = 1;
        comboRef.current = 0;
        comboTimerRef.current = 0;
        stateRef.current = initState(1);
        // ensure localStorage key exists
        if (!localStorage.getItem('blastZoneHighScore')) {
          localStorage.setItem('blastZoneHighScore', '0');
        }
        setScore(0); setLives(3); setLevel(1); setCombo(0);
        setOverlay('playing');
      }

      function addParticles(gs, r, c, color, count = 8) {
        for (let i = 0; i < count; i++) {
          const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
          gs.particles.push({
            x: c * CELL + CELL/2, y: r * CELL + CELL/2,
            vx: Math.cos(angle) * (2 + Math.random() * 4),
            vy: Math.sin(angle) * (2 + Math.random() * 4),
            life: 1, color, size: 4 + Math.random() * 6,
          });
        }
      }

      function placeBomb(gs) {
        const p = gs.player;
        if (!p.alive) return;
        const activeBombs = gs.bombs.filter(b => !b.exploded).length;
        if (activeBombs >= p.maxBombs) return;
        if (gs.bombs.some(b => !b.exploded && b.r === p.r && b.c === p.c)) return;
        gs.bombs.push({ r: p.r, c: p.c, timer: 2500, range: p.bombRange, exploded: false });
        playBomb();
      }

      function triggerExplosion(gs, bomb) {
        bomb.exploded = true;
        playExplosion();
        const cells = [{ r: bomb.r, c: bomb.c }];
        for (const {dr, dc} of DIRS) {
          for (let dist = 1; dist <= bomb.range; dist++) {
            const nr = bomb.r + dr * dist;
            const nc = bomb.c + dc * dist;
            if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) break;
            if (gs.grid[nr][nc] === 1) break;
            cells.push({ r: nr, c: nc });
            if (gs.grid[nr][nc] === 2) {
              gs.grid[nr][nc] = 0;
              // reveal powerup
              const pu = gs.powerups.find(p => p.r === nr && p.c === nc && p.hidden);
              if (pu) pu.hidden = false;
              break;
            }
          }
        }
        gs.explosions.push({ cells, timer: 700 });
        // chain other bombs
        for (const bomb2 of gs.bombs) {
          if (!bomb2.exploded && cells.some(cell => cell.r === bomb2.r && cell.c === bomb2.c)) {
            bomb2.timer = 1;
          }
        }
        // add explosion particles
        for (const cell of cells) {
          addParticles(gs, cell.r, cell.c, '#ff6600', 4);
        }
      }

      const drawFrame = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas || !stateRef.current) return;
        const ctx = canvas.getContext('2d');
        const gs = stateRef.current;
        const W = canvas.width, H = canvas.height;
        const offsetX = (W - COLS * CELL) / 2;
        const offsetY = (H - ROWS * CELL) / 2;

        ctx.clearRect(0, 0, W, H);
        // background
        const bg = ctx.createLinearGradient(0, 0, W, H);
        bg.addColorStop(0, '#0a0015');
        bg.addColorStop(0.5, '#0d001a');
        bg.addColorStop(1, '#050010');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.translate(offsetX, offsetY);

        // grid
        for (let r = 0; r < ROWS; r++) {
          for (let c = 0; c < COLS; c++) {
            const x = c * CELL, y = r * CELL;
            const cell = gs.grid[r][c];
            if (cell === 1) {
              // indestructible wall
              ctx.fillStyle = '#0f0528';
              ctx.fillRect(x, y, CELL, CELL);
              ctx.fillStyle = '#1a0a3a';
              ctx.fillRect(x+2, y+2, CELL-4, CELL-4);
              ctx.strokeStyle = '#2a0a5a';
              ctx.lineWidth = 1;
              ctx.strokeRect(x+2, y+2, CELL-4, CELL-4);
            } else if (cell === 2) {
              // destructible brick
              ctx.fillStyle = '#1a0030';
              ctx.fillRect(x, y, CELL, CELL);
              ctx.fillStyle = '#3a1060';
              ctx.fillRect(x+3, y+3, CELL-6, CELL-6);
              ctx.strokeStyle = '#6622aa';
              ctx.lineWidth = 1.5;
              ctx.strokeRect(x+3, y+3, CELL-6, CELL-6);
              // brick pattern
              ctx.fillStyle = '#4a1580';
              ctx.fillRect(x+8, y+10, CELL-16, 4);
              ctx.fillRect(x+8, y+CELL-14, CELL-16, 4);
            } else {
              ctx.fillStyle = '#080012';
              ctx.fillRect(x, y, CELL, CELL);
              ctx.strokeStyle = '#110022';
              ctx.lineWidth = 0.5;
              ctx.strokeRect(x, y, CELL, CELL);
            }
          }
        }

        // powerups
        for (const pu of gs.powerups) {
          if (pu.hidden) continue;
          const x = pu.c * CELL + CELL/2, y = pu.r * CELL + CELL/2;
          const pulse = 0.8 + 0.2 * Math.sin(Date.now() / 300);
          const color = pu.type === 'range' ? '#ff4488' : pu.type === 'bombs' ? '#44ffaa' : '#ffdd00';
          ctx.save();
          ctx.shadowBlur = 12;
          ctx.shadowColor = color;
          ctx.fillStyle = color;
          ctx.beginPath();
          ctx.arc(x, y, 10 * pulse, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#000';
          ctx.font = 'bold 12px Courier New';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(pu.type === 'range' ? 'R' : pu.type === 'bombs' ? 'B' : 'S', x, y);
          ctx.restore();
        }

        // bombs
        for (const bomb of gs.bombs) {
          if (bomb.exploded) continue;
          const x = bomb.c * CELL + CELL/2, y = bomb.r * CELL + CELL/2;
          const frac = bomb.timer / 2500;
          const pulse = 0.7 + 0.3 * Math.sin(Date.now() / (100 + frac * 200));
          ctx.save();
          ctx.shadowBlur = 15;
          ctx.shadowColor = '#ffaa00';
          ctx.fillStyle = `hsl(${30 + (1-frac)*20}, 100%, ${50 + (1-frac)*20}%)`;
          ctx.beginPath();
          ctx.arc(x, y, 14 * pulse, 0, Math.PI * 2);
          ctx.fill();
          // fuse
          ctx.strokeStyle = '#ffee44';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(x+5, y-12);
          ctx.quadraticCurveTo(x+15, y-22, x+8, y-30);
          ctx.stroke();
          ctx.restore();
        }

        // explosions
        for (const exp of gs.explosions) {
          const alpha = exp.timer / 700;
          for (const { r, c } of exp.cells) {
            const x = c * CELL, y = r * CELL;
            ctx.save();
            ctx.globalAlpha = alpha;
            const grad = ctx.createRadialGradient(x+CELL/2, y+CELL/2, 0, x+CELL/2, y+CELL/2, CELL/2);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(0.3, '#ffee00');
            grad.addColorStop(0.7, '#ff4400');
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.fillRect(x, y, CELL, CELL);
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#ff6600';
            ctx.restore();
          }
        }

        // enemies
        for (const enemy of gs.enemies) {
          if (!enemy.alive) continue;
          const x = enemy.c * CELL + CELL/2, y = enemy.r * CELL + CELL/2;
          const pulse = 0.9 + 0.1 * Math.sin(Date.now() / 200 + enemy.id);
          ctx.save();
          ctx.shadowBlur = 12;
          ctx.shadowColor = '#ff2266';
          ctx.fillStyle = '#ff2266';
          ctx.beginPath();
          ctx.arc(x, y, 14 * pulse, 0, Math.PI * 2);
          ctx.fill();
          // eyes
          ctx.fillStyle = '#fff';
          ctx.beginPath(); ctx.arc(x-5, y-3, 4, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(x+5, y-3, 4, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = '#000';
          ctx.beginPath(); ctx.arc(x-4, y-3, 2, 0, Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(x+6, y-3, 2, 0, Math.PI*2); ctx.fill();
          ctx.restore();
        }

        // player
        const p = gs.player;
        if (p.alive) {
          const blink = p.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0;
          if (!blink) {
            const px = p.c * CELL + CELL/2, py = p.r * CELL + CELL/2;
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ffee';
            ctx.fillStyle = '#00ffee';
            // body
            ctx.beginPath();
            ctx.arc(px, py, 16, 0, Math.PI * 2);
            ctx.fill();
            // inner
            ctx.fillStyle = '#003344';
            ctx.beginPath();
            ctx.arc(px, py, 10, 0, Math.PI * 2);
            ctx.fill();
            // cross symbol
            ctx.fillStyle = '#00ffee';
            ctx.fillRect(px-6, py-2, 12, 4);
            ctx.fillRect(px-2, py-6, 4, 12);
            ctx.restore();
          }
        }

        // particles
        for (const pt of gs.particles) {
          ctx.save();
          ctx.globalAlpha = pt.life;
          ctx.fillStyle = pt.color;
          ctx.shadowBlur = 6;
          ctx.shadowColor = pt.color;
          ctx.beginPath();
          ctx.arc(pt.x, pt.y, pt.size * pt.life, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        ctx.restore();
      }, []);

      useEffect(() => {
        if (overlay !== 'playing') return;

        const handleKey = (e) => {
          keysRef.current[e.code] = e.type === 'keydown';
          if (e.type === 'keydown' && (e.code === 'Space' || e.code === 'KeyZ' || e.code === 'KeyX')) {
            e.preventDefault();
            if (stateRef.current) placeBomb(stateRef.current);
          }
          if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space','KeyW','KeyA','KeyS','KeyD'].includes(e.code)) {
            e.preventDefault();
          }
        };
        window.addEventListener('keydown', handleKey);
        window.addEventListener('keyup', handleKey);

        let lastMove = 0;
        let lastEnemyMove = 0;

        const tick = (ts) => {
          if (overlay !== 'playing') return;
          const dt = ts - lastTimeRef.current;
          lastTimeRef.current = ts;
          const gs = stateRef.current;
          if (!gs) { animRef.current = requestAnimationFrame(tick); return; }

          const p = gs.player;

          // player movement
          if (p.alive && ts - lastMove > p.speed) {
            let dr = 0, dc = 0;
            if (keysRef.current['ArrowUp'] || keysRef.current['KeyW']) dr = -1;
            else if (keysRef.current['ArrowDown'] || keysRef.current['KeyS']) dr = 1;
            else if (keysRef.current['ArrowLeft'] || keysRef.current['KeyA']) dc = -1;
            else if (keysRef.current['ArrowRight'] || keysRef.current['KeyD']) dc = 1;
            if (dr !== 0 || dc !== 0) {
              const nr = p.r + dr, nc = p.c + dc;
              if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS &&
                  gs.grid[nr][nc] === 0 &&
                  !gs.bombs.some(b => !b.exploded && b.r === nr && b.c === nc)) {
                p.r = nr; p.c = nc;
                lastMove = ts;
              }
            }
          }

          // powerup pickup
          const puIdx = gs.powerups.findIndex(pu => !pu.hidden && pu.r === p.r && pu.c === p.c);
          if (puIdx !== -1) {
            const pu = gs.powerups[puIdx];
            if (pu.type === 'range') p.bombRange = Math.min(p.bombRange + 1, 5);
            else if (pu.type === 'bombs') p.maxBombs = Math.min(p.maxBombs + 1, 5);
            else if (pu.type === 'speed') p.speed = Math.max(p.speed - 25, 80);
            gs.powerups.splice(puIdx, 1);
            playCollect();
            addParticles(gs, p.r, p.c, '#ffff00', 10);
            scoreRef.current += 50;
            setScore(scoreRef.current);
          }

          // enemy movement
          if (ts - lastEnemyMove > 0) {
            for (const enemy of gs.enemies) {
              if (!enemy.alive) continue;
              enemy.moveTimer -= dt;
              if (enemy.moveTimer <= 0) {
                enemy.moveTimer = enemy.speed;
                // try current dir, else pick random
                let moved = false;
                for (let attempt = 0; attempt < 4; attempt++) {
                  const { dr, dc } = DIRS[enemy.dir];
                  const nr = enemy.r + dr, nc = enemy.c + dc;
                  if (nr > 0 && nr < ROWS-1 && nc > 0 && nc < COLS-1 &&
                      gs.grid[nr][nc] === 0 &&
                      !gs.bombs.some(b => !b.exploded && b.r === nr && b.c === nc)) {
                    enemy.r = nr; enemy.c = nc;
                    moved = true;
                    if (Math.random() < 0.3) enemy.dir = Math.floor(Math.random() * 4);
                    break;
                  } else {
                    enemy.dir = Math.floor(Math.random() * 4);
                  }
                }
              }
            }
            lastEnemyMove = ts;
          }

          // bomb timers
          for (const bomb of gs.bombs) {
            if (!bomb.exploded) {
              bomb.timer -= dt;
              if (bomb.timer <= 0) triggerExplosion(gs, bomb);
            }
          }

          // explosion timers + kill enemies/player
          for (const exp of gs.explosions) {
            exp.timer -= dt;
            for (const { r, c } of exp.cells) {
              // kill enemies
              for (const enemy of gs.enemies) {
                if (enemy.alive && enemy.r === r && enemy.c === c) {
                  enemy.alive = false;
                  addParticles(gs, r, c, '#ff2266', 12);
                  comboRef.current++;
                  comboTimerRef.current = 2000;
                  const pts = 100 * comboRef.current;
                  scoreRef.current += pts;
                  setScore(scoreRef.current);
                  setCombo(comboRef.current);
                  playDeath();
                }
              }
              // kill player
              if (p.alive && p.invincible <= 0 && p.r === r && p.c === c) {
                livesRef.current--;
                setLives(livesRef.current);
                if (livesRef.current <= 0) {
                  p.alive = false;
                  if (scoreRef.current > highScore) {
                    setHighScore(scoreRef.current);
                    localStorage.setItem('blastZoneHighScore', scoreRef.current);
                  }
                  setTimeout(() => setOverlay('dead'), 800);
                } else {
                  p.invincible = 2500;
                  // reset position
                  p.r = 1; p.c = 1;
                }
                playExplosion();
              }
            }
          }

          // invincibility
          if (p.invincible > 0) p.invincible -= dt;

          // combo timer
          if (comboTimerRef.current > 0) {
            comboTimerRef.current -= dt;
            if (comboTimerRef.current <= 0) { comboRef.current = 0; setCombo(0); }
          }

          // clean up
          gs.bombs = gs.bombs.filter(b => !b.exploded || gs.explosions.some(e => e.cells.some(c2 => c2.r === b.r && c2.c === b.c)));
          gs.explosions = gs.explosions.filter(e => e.timer > 0);

          // update particles
          for (const pt of gs.particles) {
            pt.x += pt.vx; pt.y += pt.vy;
            pt.vy += 0.15;
            pt.life -= 0.03;
          }
          gs.particles = gs.particles.filter(p => p.life > 0);

          // check level clear
          if (gs.enemies.every(e => !e.alive)) {
            const bonus = 500 * levelRef.current;
            scoreRef.current += bonus;
            setScore(scoreRef.current);
            playLevelUp();
            if (levelRef.current >= 5) {
              if (scoreRef.current > highScore) {
                setHighScore(scoreRef.current);
                localStorage.setItem('blastZoneHighScore', scoreRef.current);
              }
              setTimeout(() => setOverlay('win'), 800);
            } else {
              levelRef.current++;
              setLevel(levelRef.current);
              stateRef.current = initState(levelRef.current);
              setTimeout(() => {}, 100);
            }
          }

          drawFrame();
          animRef.current = requestAnimationFrame(tick);
        };

        animRef.current = requestAnimationFrame(tick);
        return () => {
          cancelAnimationFrame(animRef.current);
          window.removeEventListener('keydown', handleKey);
          window.removeEventListener('keyup', handleKey);
        };
      }, [overlay]);

      // mobile controls
      const handleMobileDir = (dr, dc) => {
        if (!stateRef.current) return;
        const gs = stateRef.current;
        const p = gs.player;
        if (!p.alive) return;
        const nr = p.r + dr, nc = p.c + dc;
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS &&
            gs.grid[nr][nc] === 0 &&
            !gs.bombs.some(b => !b.exploded && b.r === nr && b.c === nc)) {
          p.r = nr; p.c = nc;
        }
      };

      const W = Math.min(window.innerWidth, COLS * CELL + 20);
      const H = Math.min(window.innerHeight - 160, ROWS * CELL + 20);

      return (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', width:'100vw', height:'100vh', position:'relative' }}>
          {/* HUD */}
          <div style={{
            display:'flex', justifyContent:'space-between', alignItems:'center',
            width: Math.min(window.innerWidth, COLS * CELL + 40),
            padding:'8px 16px', color:'#00ffee',
            fontFamily:'Courier New', fontSize:'14px', letterSpacing:'1px',
          }}>
            <div>
              <span style={{color:'#888'}}>SCORE </span>
              <span style={{color:'#ffee00', fontSize:'18px', fontWeight:'bold'}}>{score}</span>
            </div>
            <div style={{textAlign:'center'}}>
              <span style={{color:'#ff88aa', fontSize:'20px'}}>{'♥'.repeat(Math.max(0,lives))}{'♡'.repeat(Math.max(0,3-lives))}</span>
            </div>
            <div style={{textAlign:'right'}}>
              <span style={{color:'#888'}}>LV </span>
              <span style={{color:'#aa88ff', fontSize:'18px', fontWeight:'bold'}}>{level}</span>
              {combo > 1 && <span style={{color:'#ff4488', marginLeft:8}}>x{combo} COMBO!</span>}
            </div>
          </div>

          {/* Canvas */}
          <div style={{ position:'relative' }}>
            <canvas
              ref={canvasRef}
              width={COLS * CELL}
              height={ROWS * CELL}
              style={{ display:'block', border:'1px solid #2a0a5a', boxShadow:'0 0 30px #4400aa55' }}
            />

            {/* Overlays */}
            {overlay === 'start' && (
              <div style={{
                position:'absolute', top:0, left:0, right:0, bottom:0,
                background:'rgba(10,0,21,0.92)',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                color:'#fff',
              }}>
                <div style={{ fontSize:'42px', fontWeight:'bold', color:'#00ffee',
                  textShadow:'0 0 20px #00ffee, 0 0 40px #00ffee', marginBottom:8,
                  fontFamily:'Courier New', letterSpacing:'4px' }}>BLAST ZONE</div>
                <div style={{ color:'#aa88ff', marginBottom:20, letterSpacing:'2px', fontSize:'13px' }}>
                  PLACE BOMBS · CHAIN KILLS · CLEAR THE ZONE
                </div>
                <div style={{ color:'#888', fontSize:'12px', marginBottom:6, textAlign:'center', maxWidth:360, lineHeight:'1.8' }}>
                  Arrow Keys / WASD to move<br/>
                  Space / Z to place bomb<br/>
                  Collect <span style={{color:'#ff4488'}}>R</span>=Range  <span style={{color:'#44ffaa'}}>B</span>=+Bomb  <span style={{color:'#ffdd00'}}>S</span>=Speed
                </div>
                <div style={{ color:'#ffee00', fontSize:'12px', marginBottom:24 }}>
                  Best: {highScore}
                </div>
                <button onClick={startGame} style={{
                  background:'linear-gradient(135deg,#00ccdd,#aa44ff)',
                  border:'none', color:'#fff', padding:'14px 40px',
                  fontSize:'18px', fontWeight:'bold', cursor:'pointer',
                  borderRadius:'4px', letterSpacing:'2px',
                  boxShadow:'0 0 20px #00ffee88',
                }}>START GAME</button>
              </div>
            )}

            {overlay === 'dead' && (
              <div style={{
                position:'absolute', top:0, left:0, right:0, bottom:0,
                background:'rgba(10,0,21,0.92)',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                color:'#fff',
              }}>
                <div style={{ fontSize:'38px', fontWeight:'bold', color:'#ff2266',
                  textShadow:'0 0 20px #ff2266', marginBottom:8, fontFamily:'Courier New' }}>BLASTED!</div>
                <div style={{ color:'#ffee00', fontSize:'22px', marginBottom:4 }}>Score: {score}</div>
                <div style={{ color:'#888', fontSize:'14px', marginBottom:20 }}>Best: {highScore}</div>
                <button onClick={startGame} style={{
                  background:'linear-gradient(135deg,#ff2266,#aa44ff)',
                  border:'none', color:'#fff', padding:'12px 36px',
                  fontSize:'16px', fontWeight:'bold', cursor:'pointer',
                  borderRadius:'4px', letterSpacing:'2px',
                }}>TRY AGAIN</button>
              </div>
            )}

            {overlay === 'win' && (
              <div style={{
                position:'absolute', top:0, left:0, right:0, bottom:0,
                background:'rgba(10,0,21,0.92)',
                display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
                color:'#fff',
              }}>
                <div style={{ fontSize:'38px', fontWeight:'bold', color:'#ffee00',
                  textShadow:'0 0 20px #ffee00', marginBottom:8, fontFamily:'Courier New' }}>ZONE CLEARED!</div>
                <div style={{ color:'#00ffee', fontSize:'22px', marginBottom:4 }}>Score: {score}</div>
                <div style={{ color:'#888', fontSize:'14px', marginBottom:20 }}>Best: {highScore}</div>
                <button onClick={startGame} style={{
                  background:'linear-gradient(135deg,#ffee00,#ff6600)',
                  border:'none', color:'#000', padding:'12px 36px',
                  fontSize:'16px', fontWeight:'bold', cursor:'pointer',
                  borderRadius:'4px', letterSpacing:'2px',
                }}>PLAY AGAIN</button>
              </div>
            )}
          </div>

          {/* Mobile D-Pad + Bomb button */}
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', marginTop:8, gap:4 }}>
            <button onTouchStart={()=>handleMobileDir(-1,0)} onClick={()=>handleMobileDir(-1,0)}
              style={btnStyle}>▲</button>
            <div style={{ display:'flex', gap:4 }}>
              <button onTouchStart={()=>handleMobileDir(0,-1)} onClick={()=>handleMobileDir(0,-1)}
                style={btnStyle}>◀</button>
              <button
                onTouchStart={(e)=>{e.preventDefault();if(stateRef.current)placeBomb(stateRef.current);}}
                onClick={()=>{if(stateRef.current)placeBomb(stateRef.current);}}
                style={{...btnStyle, background:'#ff880033', color:'#ff8800', fontSize:'11px', width:44, height:44}}>
                BOMB
              </button>
              <button onTouchStart={()=>handleMobileDir(0,1)} onClick={()=>handleMobileDir(0,1)}
                style={btnStyle}>▶</button>
            </div>
            <button onTouchStart={()=>handleMobileDir(1,0)} onClick={()=>handleMobileDir(1,0)}
              style={btnStyle}>▼</button>
          </div>
        </div>
      );
    }

    const btnStyle = {
      width: 44, height: 44,
      background: '#ffffff11',
      border: '1px solid #ffffff33',
      color: '#00ffee',
      fontSize: '18px',
      cursor: 'pointer',
      borderRadius: '6px',
      fontFamily: 'Courier New',
      touchAction: 'manipulation',
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<BlastZone />);
  </script>
</body>
</html>
