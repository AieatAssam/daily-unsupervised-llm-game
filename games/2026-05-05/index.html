<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whip Rush</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060010; overflow: hidden; font-family: 'Courier New', monospace; user-select: none; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    let audioCtx = null;
    const getAudio = () => {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    };

    const playTone = (freq, type, dur, vol) => {
      try {
        const ctx = getAudio();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.4, ctx.currentTime + dur);
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start();
        osc.stop(ctx.currentTime + dur);
      } catch(e) {}
    };

    const sfx = {
      reverse: () => playTone(220, 'square', 0.06, 0.25),
      hit: () => { playTone(380, 'sawtooth', 0.12, 0.4); playTone(700, 'sine', 0.08, 0.2); },
      miss: () => { playTone(120, 'sawtooth', 0.35, 0.5); playTone(80, 'sine', 0.5, 0.35); },
      combo: (n) => playTone(440 + n * 80, 'sine', 0.18, 0.3),
      levelup: () => { playTone(880, 'sine', 0.1, 0.4); playTone(1100, 'sine', 0.15, 0.3); },
    };

    const ENEMY_DEFS = [
      { color: '#ff3366', glow: '#ff0044', pts: 10, r: 13, spd: 1.0, shape: 'circle' },
      { color: '#ffaa00', glow: '#ff8800', pts: 25, r: 11, spd: 1.4, shape: 'square' },
      { color: '#cc44ff', glow: '#aa00ff', pts: 50, r: 9,  spd: 1.8, shape: 'triangle' },
    ];

    const LS_KEY = 'whipRush_highScore';

    const WhipRush = () => {
      const canvasRef = useRef(null);
      const stateRef = useRef(null);
      const rafRef = useRef(null);
      const [ui, setUi] = useState({
        phase: 'start', score: 0, lives: 3, combo: 0, level: 1,
        highScore: parseInt(localStorage.getItem(LS_KEY) || '0'),
      });

      const syncUi = () => {
        const s = stateRef.current;
        if (!s) return;
        setUi({
          phase: s.phase,
          score: s.score,
          lives: s.lives,
          combo: s.combo,
          level: s.level,
          highScore: parseInt(localStorage.getItem(LS_KEY) || '0'),
        });
      };

      const initState = (canvas) => {
        const W = canvas.width, H = canvas.height;
        const cx = W / 2, cy = H / 2;
        const orbitR = Math.min(W, H) * 0.22;
        return {
          phase: 'playing',
          cx, cy, orbitR,
          angle: 0,
          dir: 1,
          ballX: cx + orbitR, ballY: cy,
          trail: [],
          enemies: [],
          particles: [],
          floats: [],
          score: 0, lives: 3, combo: 0, level: 1,
          spawnTimer: 0, spawnInterval: 85,
          angleSpeed: 0.045, baseEnemySpd: 1.4,
          flashTimer: 0, reverseFlash: 0,
          frame: 0,
          deathTimer: 0,
        };
      };

      const spawnEnemy = (s, W, H) => {
        const angle = Math.random() * Math.PI * 2;
        const edgeDist = Math.min(W, H) * 0.54;
        let typeIdx = 0;
        if (s.level >= 3 && Math.random() < 0.3) typeIdx = 1;
        if (s.level >= 6 && Math.random() < 0.15) typeIdx = 2;
        const def = ENEMY_DEFS[typeIdx];
        s.enemies.push({
          x: s.cx + Math.cos(angle) * edgeDist,
          y: s.cy + Math.sin(angle) * edgeDist,
          spd: (s.baseEnemySpd + Math.random() * 0.4) * def.spd,
          rot: Math.random() * Math.PI * 2,
          id: Math.random(),
          ...def,
        });
      };

      const burst = (s, x, y, color, count) => {
        for (let i = 0; i < count; i++) {
          const a = Math.random() * Math.PI * 2;
          const v = 2 + Math.random() * 6;
          s.particles.push({
            x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
            color, life: 1, decay: 0.018 + Math.random() * 0.025,
            size: 2 + Math.random() * 5,
          });
        }
      };

      const handleInput = useCallback(() => {
        const s = stateRef.current;
        if (!s) return;
        if (s.phase === 'start' || s.phase === 'gameover') {
          const canvas = canvasRef.current;
          if (!canvas) return;
          stateRef.current = initState(canvas);
          syncUi();
          return;
        }
        if (s.phase !== 'playing') return;
        s.dir *= -1;
        s.reverseFlash = 10;
        sfx.reverse();
      }, []);

      useEffect(() => {
        // Ensure localStorage key exists for tests
        if (!localStorage.getItem(LS_KEY)) localStorage.setItem(LS_KEY, '0');

        const onKey = (e) => {
          if (['Space', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.code)) {
            e.preventDefault();
            handleInput();
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [handleInput]);

      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
          const s = stateRef.current;
          if (s && s.phase === 'playing') {
            s.cx = canvas.width / 2;
            s.cy = canvas.height / 2;
            s.orbitR = Math.min(canvas.width, canvas.height) * 0.22;
          }
        };
        resize();
        window.addEventListener('resize', resize);

        const loop = () => {
          const ctx = canvas.getContext('2d');
          const W = canvas.width, H = canvas.height;
          const s = stateRef.current;

          // Background with radial glow
          ctx.fillStyle = '#060010';
          ctx.fillRect(0, 0, W, H);

          // Subtle grid
          ctx.strokeStyle = 'rgba(60, 0, 120, 0.18)';
          ctx.lineWidth = 1;
          const gs = 55;
          for (let x = gs / 2; x < W; x += gs) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
          }
          for (let y = gs / 2; y < H; y += gs) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
          }

          if (!s || s.phase === 'start' || s.phase === 'gameover') {
            rafRef.current = requestAnimationFrame(loop);
            return;
          }

          s.frame++;

          if (s.phase === 'playing') {
            // Update ball position
            s.angle += s.angleSpeed * s.dir;
            s.ballX = s.cx + Math.cos(s.angle) * s.orbitR;
            s.ballY = s.cy + Math.sin(s.angle) * s.orbitR;

            // Trail
            s.trail.push({ x: s.ballX, y: s.ballY, dir: s.dir });
            if (s.trail.length > 22) s.trail.shift();

            // Spawn enemies
            s.spawnTimer++;
            if (s.spawnTimer >= s.spawnInterval) {
              s.spawnTimer = 0;
              spawnEnemy(s, W, H);
              if (s.level >= 5) spawnEnemy(s, W, H);
            }

            // Update enemies
            for (let i = s.enemies.length - 1; i >= 0; i--) {
              const e = s.enemies[i];
              const dx = s.cx - e.x, dy = s.cy - e.y;
              const dist = Math.sqrt(dx * dx + dy * dy);
              if (dist > 1) {
                e.x += (dx / dist) * e.spd;
                e.y += (dy / dist) * e.spd;
              }
              e.rot += 0.05;

              // Ball collision
              const bdx = s.ballX - e.x, bdy = s.ballY - e.y;
              if (Math.sqrt(bdx * bdx + bdy * bdy) < e.r + 13) {
                s.combo++;
                const pts = e.pts * Math.max(1, Math.floor(s.combo / 3) + 1);
                s.score += pts;
                s.flashTimer = 6;
                burst(s, e.x, e.y, e.color, 18);
                s.floats.push({ x: e.x, y: e.y - 10, text: `+${pts}`, life: 1.2, color: e.color });
                sfx.hit();
                if (s.combo > 0 && s.combo % 5 === 0) sfx.combo(s.combo / 5);
                const newLevel = Math.floor(s.score / 600) + 1;
                if (newLevel > s.level) {
                  s.level = newLevel;
                  s.angleSpeed = 0.045 + s.level * 0.003;
                  s.baseEnemySpd = 1.4 + s.level * 0.18;
                  s.spawnInterval = Math.max(38, 85 - s.level * 5);
                  sfx.levelup();
                  s.floats.push({ x: s.cx, y: s.cy - s.orbitR - 20, text: `LEVEL ${s.level}!`, life: 2, color: '#00ffff' });
                }
                s.enemies.splice(i, 1);
                syncUi();
                continue;
              }

              // Enemy breached center
              if (dist < s.orbitR * 0.22) {
                s.enemies.splice(i, 1);
                s.lives--;
                s.combo = 0;
                burst(s, s.cx, s.cy, '#ff0044', 24);
                sfx.miss();
                if (s.lives <= 0) {
                  s.phase = 'dead';
                  s.deathTimer = 110;
                  const hs = parseInt(localStorage.getItem(LS_KEY) || '0');
                  if (s.score > hs) localStorage.setItem(LS_KEY, String(s.score));
                }
                syncUi();
              }
            }
          } else if (s.phase === 'dead') {
            s.deathTimer--;
            if (s.deathTimer <= 0) {
              s.phase = 'gameover';
              syncUi();
            }
          }

          // Update particles
          for (let i = s.particles.length - 1; i >= 0; i--) {
            const p = s.particles[i];
            p.x += p.vx; p.y += p.vy;
            p.vx *= 0.91; p.vy *= 0.91;
            p.life -= p.decay;
            if (p.life <= 0) s.particles.splice(i, 1);
          }

          // Update floats
          for (let i = s.floats.length - 1; i >= 0; i--) {
            const f = s.floats[i];
            f.y -= 1.4; f.life -= 0.018;
            if (f.life <= 0) s.floats.splice(i, 1);
          }

          if (s.flashTimer > 0) s.flashTimer--;
          if (s.reverseFlash > 0) s.reverseFlash--;

          // === DRAW ===

          // Danger zone glow near center
          const dzR = s.orbitR * 0.22;
          const dzGrad = ctx.createRadialGradient(s.cx, s.cy, 0, s.cx, s.cy, dzR * 3.5);
          dzGrad.addColorStop(0, 'rgba(255,0,60,0.08)');
          dzGrad.addColorStop(1, 'transparent');
          ctx.fillStyle = dzGrad;
          ctx.fillRect(0, 0, W, H);

          // Orbit ring
          ctx.beginPath();
          ctx.arc(s.cx, s.cy, s.orbitR, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(80,200,255,${0.12 + (s.reverseFlash / 10) * 0.45})`;
          ctx.lineWidth = 1.5;
          ctx.setLineDash([8, 6]);
          ctx.stroke();
          ctx.setLineDash([]);

          // Tether
          const tc = s.dir > 0 ? '0,255,255' : '255,80,220';
          const tetherGrad = ctx.createLinearGradient(s.cx, s.cy, s.ballX, s.ballY);
          tetherGrad.addColorStop(0, 'rgba(120,80,255,0.15)');
          tetherGrad.addColorStop(1, `rgba(${tc},0.9)`);
          ctx.beginPath();
          ctx.moveTo(s.cx, s.cy);
          ctx.lineTo(s.ballX, s.ballY);
          ctx.strokeStyle = tetherGrad;
          ctx.lineWidth = 2.5;
          ctx.stroke();

          // Trail
          for (let i = 0; i < s.trail.length; i++) {
            const t = s.trail[i];
            const prog = i / s.trail.length;
            const tDir = t.dir > 0 ? '0,255,255' : '255,80,220';
            ctx.beginPath();
            ctx.arc(t.x, t.y, prog * 10, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${tDir},${prog * 0.5})`;
            ctx.fill();
          }

          // Central hub
          const hubPulse = 0.85 + 0.15 * Math.sin(s.frame * 0.09);
          const hubR = 20 * hubPulse;
          ctx.save();
          ctx.shadowBlur = 30;
          ctx.shadowColor = '#8844ff';
          const hubGrad = ctx.createRadialGradient(s.cx, s.cy, 0, s.cx, s.cy, hubR);
          hubGrad.addColorStop(0, '#ffffff');
          hubGrad.addColorStop(0.35, '#cc88ff');
          hubGrad.addColorStop(0.7, '#6600cc');
          hubGrad.addColorStop(1, 'transparent');
          ctx.beginPath();
          ctx.arc(s.cx, s.cy, hubR, 0, Math.PI * 2);
          ctx.fillStyle = hubGrad;
          ctx.fill();
          ctx.restore();

          // Enemies
          for (const e of s.enemies) {
            ctx.save();
            ctx.shadowBlur = 18;
            ctx.shadowColor = e.glow;
            ctx.fillStyle = e.color;
            ctx.translate(e.x, e.y);
            if (e.shape === 'circle') {
              ctx.beginPath();
              ctx.arc(0, 0, e.r, 0, Math.PI * 2);
              ctx.fill();
              ctx.strokeStyle = 'rgba(255,255,255,0.4)';
              ctx.lineWidth = 1.5;
              ctx.stroke();
            } else if (e.shape === 'square') {
              ctx.rotate(e.rot);
              const hw = e.r * 0.9;
              ctx.fillRect(-hw, -hw, hw * 2, hw * 2);
              ctx.strokeStyle = 'rgba(255,255,255,0.4)';
              ctx.lineWidth = 1.5;
              ctx.strokeRect(-hw, -hw, hw * 2, hw * 2);
            } else {
              ctx.rotate(e.rot);
              ctx.beginPath();
              ctx.moveTo(0, -e.r);
              ctx.lineTo(e.r * 0.866, e.r * 0.5);
              ctx.lineTo(-e.r * 0.866, e.r * 0.5);
              ctx.closePath();
              ctx.fill();
              ctx.strokeStyle = 'rgba(255,255,255,0.4)';
              ctx.lineWidth = 1.5;
              ctx.stroke();
            }
            ctx.restore();
          }

          // Orbiting ball
          const ballColor = s.dir > 0 ? '#00ffff' : '#ff50dc';
          const ballGlow = s.dir > 0 ? '#00aaff' : '#cc00aa';
          ctx.save();
          ctx.shadowBlur = 30;
          ctx.shadowColor = ballGlow;
          const ballGrad = ctx.createRadialGradient(s.ballX, s.ballY, 0, s.ballX, s.ballY, 15);
          ballGrad.addColorStop(0, '#ffffff');
          ballGrad.addColorStop(0.35, ballColor);
          ballGrad.addColorStop(1, 'transparent');
          ctx.beginPath();
          ctx.arc(s.ballX, s.ballY, 15, 0, Math.PI * 2);
          ctx.fillStyle = ballGrad;
          ctx.fill();
          ctx.restore();

          // Flash on hit
          if (s.flashTimer > 0) {
            ctx.fillStyle = `rgba(255,255,255,${(s.flashTimer / 6) * 0.07})`;
            ctx.fillRect(0, 0, W, H);
          }

          // Particles
          for (const p of s.particles) {
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.shadowBlur = 8;
            ctx.shadowColor = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * Math.max(0, p.life), 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          ctx.shadowBlur = 0;

          // Floating score texts
          for (const f of s.floats) {
            ctx.globalAlpha = Math.min(1, f.life);
            ctx.font = `bold ${f.text.startsWith('LEVEL') ? 22 : 18}px Courier New`;
            ctx.textAlign = 'center';
            ctx.fillStyle = f.color;
            ctx.shadowBlur = 12;
            ctx.shadowColor = f.color;
            ctx.fillText(f.text, f.x, f.y);
          }
          ctx.globalAlpha = 1;
          ctx.shadowBlur = 0;

          // Direction label under orbit ring
          if (s.phase === 'playing') {
            ctx.font = '12px Courier New';
            ctx.fillStyle = s.dir > 0 ? 'rgba(0,255,255,0.5)' : 'rgba(255,80,220,0.5)';
            ctx.textAlign = 'center';
            ctx.fillText(s.dir > 0 ? '↺ CLOCKWISE' : '↻ COUNTER-CW', s.cx, s.cy + s.orbitR + 22);
          }

          rafRef.current = requestAnimationFrame(loop);
        };

        loop();
        return () => {
          cancelAnimationFrame(rafRef.current);
          window.removeEventListener('resize', resize);
        };
      }, []);

      const ballColor = ui.phase === 'playing'
        ? (stateRef.current && stateRef.current.dir > 0 ? '#00ffff' : '#ff50dc')
        : '#00ffff';

      return (
        <div
          style={{ position: 'relative', width: '100vw', height: '100vh', touchAction: 'none' }}
          onClick={handleInput}
          onTouchStart={(e) => { e.preventDefault(); handleInput(); }}
        >
          <canvas ref={canvasRef} style={{ position: 'absolute', top: 0, left: 0 }} />

          {/* HUD */}
          {(ui.phase === 'playing' || ui.phase === 'dead') && (
            <div style={{
              position: 'absolute', top: 0, left: 0, right: 0,
              padding: '14px 22px', display: 'flex',
              justifyContent: 'space-between', alignItems: 'flex-start',
              pointerEvents: 'none',
            }}>
              <div>
                <div style={{ color: '#00ffff', fontSize: 30, fontWeight: 'bold', textShadow: '0 0 12px #00ffff' }}>
                  {ui.score.toLocaleString()}
                </div>
                <div style={{ color: '#556', fontSize: 12 }}>SCORE</div>
                {ui.combo > 2 && (
                  <div style={{
                    color: '#ffaa00', fontSize: 15, fontWeight: 'bold',
                    textShadow: '0 0 10px #ffaa00', marginTop: 4,
                  }}>
                    {ui.combo}× COMBO!
                  </div>
                )}
              </div>
              <div style={{ textAlign: 'center' }}>
                <div style={{ color: '#aa55ff', fontSize: 20, fontWeight: 'bold', textShadow: '0 0 10px #aa55ff' }}>
                  LVL {ui.level}
                </div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ color: '#ff4466', fontSize: 22 }}>
                  {'♥'.repeat(ui.lives)}{'♡'.repeat(3 - ui.lives)}
                </div>
                <div style={{ color: '#556', fontSize: 12 }}>
                  BEST {ui.highScore.toLocaleString()}
                </div>
              </div>
            </div>
          )}

          {/* Control hint */}
          {ui.phase === 'playing' && (
            <div style={{
              position: 'absolute', bottom: 18, left: '50%', transform: 'translateX(-50%)',
              color: 'rgba(130,110,180,0.5)', fontSize: 12, textAlign: 'center',
              pointerEvents: 'none',
            }}>
              CLICK · TAP · SPACE to reverse orbit
            </div>
          )}

          {/* Start screen */}
          {ui.phase === 'start' && (
            <div style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center',
              background: 'rgba(6,0,16,0.88)',
            }}>
              <div style={{
                fontSize: 58, fontWeight: 'bold', color: '#00ffff',
                textShadow: '0 0 30px #00ffff, 0 0 60px #0088ff', marginBottom: 6,
              }}>
                WHIP RUSH
              </div>
              <div style={{ color: '#aa55ff', fontSize: 17, textShadow: '0 0 10px #aa55ff', marginBottom: 36 }}>
                Smash enemies with your orbiting neon ball!
              </div>
              <div style={{ color: '#668', fontSize: 14, marginBottom: 6, textAlign: 'center', maxWidth: 300 }}>
                Click / Tap / Space to <span style={{ color: '#00ffff' }}>reverse orbit direction</span>
              </div>
              <div style={{ color: '#668', fontSize: 14, marginBottom: 36, textAlign: 'center', maxWidth: 300 }}>
                Hit enemies with the ball — don't let them reach the center!
              </div>
              {ui.highScore > 0 && (
                <div style={{ color: '#ffaa00', fontSize: 16, marginBottom: 24, textShadow: '0 0 8px #ffaa00' }}>
                  BEST: {ui.highScore.toLocaleString()}
                </div>
              )}
              <div style={{
                background: 'linear-gradient(135deg, #0088ff, #00ffcc)',
                color: '#000', fontSize: 22, fontWeight: 'bold',
                padding: '14px 52px', borderRadius: 4, cursor: 'pointer',
                boxShadow: '0 0 30px rgba(0,200,255,0.5)',
              }}>
                TAP TO PLAY
              </div>
              <div style={{ color: '#446', fontSize: 12, marginTop: 24 }}>
                ● Red circles  ■ Gold squares  ▲ Purple triangles
              </div>
            </div>
          )}

          {/* Game over */}
          {ui.phase === 'gameover' && (
            <div style={{
              position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
              alignItems: 'center', justifyContent: 'center',
              background: 'rgba(6,0,16,0.92)',
            }}>
              <div style={{
                fontSize: 50, fontWeight: 'bold', color: '#ff3366',
                textShadow: '0 0 20px #ff3366', marginBottom: 18,
              }}>
                GAME OVER
              </div>
              <div style={{ color: '#00ffff', fontSize: 36, fontWeight: 'bold', textShadow: '0 0 15px #00ffff', marginBottom: 4 }}>
                {ui.score.toLocaleString()}
              </div>
              <div style={{ color: '#556', fontSize: 13, marginBottom: 16 }}>SCORE</div>
              <div style={{ color: '#ffaa00', fontSize: 18, textShadow: '0 0 10px #ffaa00', marginBottom: 40 }}>
                BEST: {ui.highScore.toLocaleString()}
              </div>
              <div style={{
                background: 'linear-gradient(135deg, #ff3366, #ff8800)',
                color: '#fff', fontSize: 22, fontWeight: 'bold',
                padding: '14px 52px', borderRadius: 4, cursor: 'pointer',
                boxShadow: '0 0 30px rgba(255,50,100,0.5)',
              }}>
                TAP TO RETRY
              </div>
            </div>
          )}
        </div>
      );
    };

    // Initialize localStorage synchronously so tests can detect it immediately
    if (!localStorage.getItem('whipRushHighScore')) localStorage.setItem('whipRushHighScore', '0');

    ReactDOM.render(<WhipRush />, document.getElementById('root'));
  </script>
</body>
</html>
