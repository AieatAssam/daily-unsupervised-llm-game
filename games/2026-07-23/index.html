<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ring Rush</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    touch-action: none;
    user-select: none;
  }
  #game-canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 24px;
    pointer-events: none;
    z-index: 10;
  }
  .score-block {
    text-align: center;
  }
  .score-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(180,180,255,0.7);
    text-transform: uppercase;
  }
  .score-value {
    font-size: 36px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 20px #a78bfa, 0 0 40px #7c3aed;
    line-height: 1.1;
  }
  .hi-value {
    font-size: 22px;
    color: #fbbf24;
    text-shadow: 0 0 15px #f59e0b;
  }
  #combo-display {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 20;
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #combo-display.show {
    opacity: 1;
  }
  #combo-text {
    font-size: 48px;
    font-weight: bold;
    color: #fff;
    text-shadow: 0 0 30px #f59e0b, 0 0 60px #f59e0b;
  }
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, rgba(15,0,40,0.95) 0%, rgba(0,0,0,0.98) 100%);
    z-index: 100;
  }
  #overlay h1 {
    font-size: clamp(40px, 8vw, 72px);
    font-weight: 900;
    letter-spacing: 4px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    margin-bottom: 8px;
  }
  #overlay .tagline {
    font-size: clamp(13px, 2.5vw, 18px);
    color: rgba(180,180,255,0.8);
    letter-spacing: 2px;
    margin-bottom: 40px;
  }
  #overlay .controls-info {
    font-size: clamp(12px, 2vw, 15px);
    color: rgba(160,160,220,0.7);
    text-align: center;
    margin-bottom: 32px;
    line-height: 2;
  }
  #start-btn {
    padding: 16px 48px;
    font-size: clamp(16px, 3vw, 22px);
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #7c3aed, #2563eb);
    border: 2px solid rgba(167,139,250,0.6);
    border-radius: 50px;
    color: #fff;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 30px rgba(124,58,237,0.5), 0 0 60px rgba(124,58,237,0.2);
  }
  #start-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 50px rgba(124,58,237,0.8), 0 0 100px rgba(124,58,237,0.3);
  }
  #game-over-score {
    font-size: clamp(20px, 4vw, 32px);
    color: #a78bfa;
    margin-bottom: 8px;
  }
  #game-over-hi {
    font-size: clamp(14px, 2.5vw, 20px);
    color: #fbbf24;
    margin-bottom: 40px;
  }
  #ring-indicator {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    pointer-events: none;
    z-index: 10;
  }
  .ring-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    transition: all 0.2s;
  }
  .ring-dot.active {
    border-color: #fff;
    box-shadow: 0 0 12px currentColor;
  }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<div id="ui">
  <div class="score-block">
    <div class="score-label">Score</div>
    <div class="score-value" id="score-display">0</div>
  </div>
  <div class="score-block">
    <div class="score-label">Best</div>
    <div class="hi-value" id="hi-display">0</div>
  </div>
</div>

<div id="combo-display">
  <div id="combo-text"></div>
</div>

<div id="ring-indicator">
  <div class="ring-dot" id="dot-0" style="color:#34d399"></div>
  <div class="ring-dot" id="dot-1" style="color:#60a5fa"></div>
  <div class="ring-dot" id="dot-2" style="color:#a78bfa"></div>
</div>

<div id="overlay">
  <h1>RING RUSH</h1>
  <div class="tagline">Orbit. Collect. Survive.</div>
  <div class="controls-info">
    <b>Click / Tap / Space</b> — jump to next orbit ring<br>
    Collect neon gems · Dodge neon asteroids
  </div>
  <div id="game-over-score" style="display:none"></div>
  <div id="game-over-hi" style="display:none"></div>
  <button id="start-btn">LAUNCH</button>
</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');

let W, H, CX, CY;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  CX = W / 2;
  CY = H / 2;
}
resize();
window.addEventListener('resize', resize);

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playTone(freq, type, duration, gain = 0.3, detune = 0) {
  try {
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    osc.detune.value = detune;
    gainNode.gain.setValueAtTime(gain, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

function playCollect(combo) {
  const base = 440 + Math.min(combo * 40, 400);
  playTone(base, 'sine', 0.15, 0.25);
  playTone(base * 1.5, 'sine', 0.1, 0.15, 5);
}

function playJump() {
  playTone(300, 'square', 0.08, 0.15);
  playTone(500, 'sine', 0.1, 0.1);
}

function playDie() {
  playTone(200, 'sawtooth', 0.3, 0.3);
  setTimeout(() => playTone(100, 'sawtooth', 0.4, 0.4), 100);
  setTimeout(() => playTone(60, 'sawtooth', 0.5, 0.5), 250);
}

// Ring colors
const RING_COLORS = [
  { main: '#34d399', glow: '#10b981', dark: '#065f46' },
  { main: '#60a5fa', glow: '#3b82f6', dark: '#1e3a8a' },
  { main: '#a78bfa', glow: '#7c3aed', dark: '#3b0764' },
];

// Game state
let state = 'title';
let score = 0;
let hiScore = parseInt(localStorage.getItem('ringRushHi') || '0');
let combo = 0;
let comboTimer = 0;

// Ship
let shipAngle = -Math.PI / 2; // top
let shipRing = 1; // 0=inner, 1=mid, 2=outer
let shipSpeed = 1.2; // radians per second (base)
let jumpCooldown = 0;

// Gems and asteroids
let gems = [];
let asteroids = [];
let particles = [];
let stars = [];

// Ring radii (set after resize)
let ringRadii = [];

function getRingRadius(ringIdx) {
  const minDim = Math.min(W, H);
  const base = minDim * 0.18;
  const step = minDim * 0.13;
  return base + ringIdx * step;
}

function getPos(angle, ringIdx) {
  const r = getRingRadius(ringIdx);
  return { x: CX + Math.cos(angle) * r, y: CY + Math.sin(angle) * r };
}

// Spawn timing
let gemTimer = 0;
let asteroidTimer = 0;
let difficulty = 1;
let diffTimer = 0;

function spawnGem() {
  const ring = Math.floor(Math.random() * 3);
  const angle = Math.random() * Math.PI * 2;
  gems.push({
    ring,
    angle,
    life: 4.5,
    maxLife: 4.5,
    pulse: Math.random() * Math.PI * 2,
    value: ring + 1,
  });
}

function spawnAsteroid() {
  const ring = Math.floor(Math.random() * 3);
  const angle = Math.random() * Math.PI * 2;
  const spd = (0.8 + Math.random() * 0.6 + difficulty * 0.1) * (Math.random() < 0.5 ? 1 : -1);
  asteroids.push({
    ring,
    angle,
    speed: spd,
    size: 10 + Math.random() * 8,
    rot: 0,
    rotSpeed: (Math.random() - 0.5) * 3,
    warnTimer: 1.0,
  });
}

function emitParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 60 + Math.random() * 140;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      color,
      life: 0.5 + Math.random() * 0.4,
      maxLife: 0.9,
      size: 2 + Math.random() * 4,
    });
  }
}

function emitRingShift(ring) {
  const c = RING_COLORS[ring];
  const r = getRingRadius(ring);
  for (let i = 0; i < 16; i++) {
    const a = (i / 16) * Math.PI * 2;
    const x = CX + Math.cos(a) * r;
    const y = CY + Math.sin(a) * r;
    const speed = 30 + Math.random() * 50;
    const dir = a + (Math.random() - 0.5) * 1;
    particles.push({
      x, y,
      vx: Math.cos(dir) * speed,
      vy: Math.sin(dir) * speed,
      color: c.main,
      life: 0.4 + Math.random() * 0.3,
      maxLife: 0.7,
      size: 1.5 + Math.random() * 2.5,
    });
  }
}

function generateStars() {
  stars = [];
  for (let i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * 2000 - 1000,
      y: Math.random() * 2000 - 1000,
      r: 0.5 + Math.random() * 1.5,
      twinkle: Math.random() * Math.PI * 2,
    });
  }
}
generateStars();

function resetGame() {
  score = 0;
  combo = 0;
  comboTimer = 0;
  shipAngle = -Math.PI / 2;
  shipRing = 1;
  shipSpeed = 1.2;
  jumpCooldown = 0;
  gems = [];
  asteroids = [];
  particles = [];
  gemTimer = 0;
  asteroidTimer = 0;
  difficulty = 1;
  diffTimer = 0;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('hi-display').textContent = hiScore;
  updateRingDots();
}

function updateRingDots() {
  for (let i = 0; i < 3; i++) {
    const dot = document.getElementById(`dot-${i}`);
    dot.classList.toggle('active', i === shipRing);
  }
}

let lastTime = 0;

function update(dt) {
  if (state !== 'playing') return;

  diffTimer += dt;
  if (diffTimer > 8) {
    diffTimer -= 8;
    difficulty = Math.min(difficulty + 0.15, 4);
    shipSpeed = Math.min(1.2 + (difficulty - 1) * 0.2, 2.2);
  }

  // Move ship
  shipAngle += shipSpeed * dt;
  if (shipAngle > Math.PI * 2) shipAngle -= Math.PI * 2;

  if (jumpCooldown > 0) jumpCooldown -= dt;
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) {
      combo = 0;
      hideCombo();
    }
  }

  // Spawn gems
  gemTimer -= dt;
  if (gemTimer <= 0) {
    spawnGem();
    if (gems.length < 4 && Math.random() < 0.4) spawnGem();
    gemTimer = Math.max(1.2 - difficulty * 0.1, 0.5);
  }

  // Spawn asteroids
  asteroidTimer -= dt;
  if (asteroidTimer <= 0) {
    spawnAsteroid();
    if (difficulty > 2 && Math.random() < 0.4) spawnAsteroid();
    asteroidTimer = Math.max(2.5 - difficulty * 0.18, 0.9);
  }

  // Update gems
  gems = gems.filter(g => {
    g.life -= dt;
    g.pulse += dt * 3;
    return g.life > 0;
  });

  // Update asteroids
  for (const a of asteroids) {
    a.angle += a.speed * dt;
    a.rot += a.rotSpeed * dt;
    if (a.warnTimer > 0) a.warnTimer -= dt;
  }

  // Collect gems
  const shipPos = getPos(shipAngle, shipRing);
  gems = gems.filter(g => {
    if (g.ring !== shipRing) return true;
    const gPos = getPos(g.angle, g.ring);
    const dx = shipPos.x - gPos.x;
    const dy = shipPos.y - gPos.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const collectR = getRingRadius(0) * 0.22;
    if (dist < collectR) {
      combo++;
      comboTimer = 2.0;
      const pts = g.value * Math.max(1, combo);
      score += pts;
      document.getElementById('score-display').textContent = score;
      playCollect(combo);
      emitParticles(gPos.x, gPos.y, RING_COLORS[g.ring].main, 15);
      if (combo >= 3) showCombo(combo);
      return false;
    }
    return true;
  });

  // Collision with asteroids
  for (const a of asteroids) {
    if (a.ring !== shipRing) continue;
    const aPos = getPos(a.angle, a.ring);
    const dx = shipPos.x - aPos.x;
    const dy = shipPos.y - aPos.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < a.size + 12) {
      // Die
      playDie();
      emitParticles(shipPos.x, shipPos.y, RING_COLORS[shipRing].main, 40);
      for (let i = 0; i < 3; i++) {
        emitParticles(aPos.x, aPos.y, '#ff4444', 20);
      }
      endGame();
      return;
    }
  }

  // Update particles
  particles = particles.filter(p => {
    p.life -= dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.95;
    p.vy *= 0.95;
    return p.life > 0;
  });
}

let comboTimeout;
function showCombo(n) {
  const el = document.getElementById('combo-display');
  const txt = document.getElementById('combo-text');
  const labels = ['', '', '', '3x COMBO!', '4x HOT!', '5x BLAZING!', '6x INFERNO!', '7x GODLIKE!', '8x UNSTOPPABLE!'];
  txt.textContent = labels[Math.min(n, labels.length - 1)] || `${n}x INSANE!`;
  el.classList.add('show');
  clearTimeout(comboTimeout);
  comboTimeout = setTimeout(() => el.classList.remove('show'), 800);
}

function hideCombo() {
  document.getElementById('combo-display').classList.remove('show');
}

function endGame() {
  state = 'gameover';
  if (score > hiScore) {
    hiScore = score;
    localStorage.setItem('ringRushHi', hiScore);
    localStorage.setItem('ringRushScore', hiScore);
  }
  const overlay = document.getElementById('overlay');
  document.getElementById('game-over-score').textContent = `Score: ${score}`;
  document.getElementById('game-over-score').style.display = 'block';
  document.getElementById('game-over-hi').textContent = `Best: ${hiScore}`;
  document.getElementById('game-over-hi').style.display = 'block';
  document.getElementById('start-btn').textContent = 'RETRY';
  overlay.style.display = 'flex';
}

function drawRings(t) {
  for (let i = 2; i >= 0; i--) {
    const r = getRingRadius(i);
    const c = RING_COLORS[i];
    const isActive = i === shipRing;
    const alpha = isActive ? 0.9 : 0.35;

    ctx.beginPath();
    ctx.arc(CX, CY, r, 0, Math.PI * 2);
    ctx.strokeStyle = isActive ? c.main : c.dark;
    ctx.lineWidth = isActive ? 2.5 : 1.5;
    ctx.globalAlpha = alpha;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Glow
    if (isActive) {
      ctx.beginPath();
      ctx.arc(CX, CY, r, 0, Math.PI * 2);
      const grd = ctx.createRadialGradient(CX, CY, r - 8, CX, CY, r + 8);
      grd.addColorStop(0, 'transparent');
      grd.addColorStop(0.5, c.glow + '44');
      grd.addColorStop(1, 'transparent');
      ctx.strokeStyle = grd;
      ctx.lineWidth = 16;
      ctx.globalAlpha = 0.6 + 0.15 * Math.sin(t * 2 + i);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
}

function drawStar(x, y, size, color, rotation) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);
  ctx.beginPath();
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    const r = i % 2 === 0 ? size : size * 0.4;
    if (i === 0) ctx.moveTo(Math.cos(a) * r, Math.sin(a) * r);
    else ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

function draw(t) {
  ctx.clearRect(0, 0, W, H);

  // Background gradient
  const bg = ctx.createRadialGradient(CX, CY, 0, CX, CY, Math.max(W, H) * 0.7);
  bg.addColorStop(0, '#0d0520');
  bg.addColorStop(0.5, '#060010');
  bg.addColorStop(1, '#000000');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    const tw = 0.5 + 0.5 * Math.sin(s.twinkle + t * 0.8);
    ctx.globalAlpha = tw * 0.7;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(CX + s.x * (W / 1800), CY + s.y * (H / 1800), s.r * tw, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Center core
  const coreGrd = ctx.createRadialGradient(CX, CY, 0, CX, CY, 50 + 8 * Math.sin(t * 2));
  coreGrd.addColorStop(0, '#ffffff');
  coreGrd.addColorStop(0.2, '#c4b5fd');
  coreGrd.addColorStop(0.5, '#7c3aed44');
  coreGrd.addColorStop(1, 'transparent');
  ctx.fillStyle = coreGrd;
  ctx.beginPath();
  ctx.arc(CX, CY, 50 + 8 * Math.sin(t * 2), 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(CX, CY, 10, 0, Math.PI * 2);
  ctx.fill();

  if (state === 'playing' || state === 'gameover') {
    drawRings(t);

    // Draw gems
    gems.forEach(g => {
      const pos = getPos(g.angle, g.ring);
      const c = RING_COLORS[g.ring];
      const fadeAlpha = Math.min(g.life / 1.0, 1.0);
      const pulse = 1 + 0.2 * Math.sin(g.pulse);
      const sz = 8 * pulse;

      ctx.globalAlpha = fadeAlpha;
      ctx.shadowBlur = 20 * fadeAlpha;
      ctx.shadowColor = c.glow;
      drawStar(pos.x, pos.y, sz, c.main, t + g.angle);
      ctx.shadowBlur = 0;

      // Ring glow
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, sz * 2, 0, Math.PI * 2);
      const gGrd = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, sz * 2);
      gGrd.addColorStop(0, c.main + '55');
      gGrd.addColorStop(1, 'transparent');
      ctx.fillStyle = gGrd;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Draw asteroids
    asteroids.forEach(a => {
      const pos = getPos(a.angle, a.ring);
      const warnAlpha = a.warnTimer > 0 ? 0.5 + 0.5 * Math.sin(t * 12) : 1;

      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.rotate(a.rot);
      ctx.globalAlpha = warnAlpha;

      ctx.shadowBlur = 15;
      ctx.shadowColor = '#ff4444';
      ctx.fillStyle = a.warnTimer > 0 ? '#ff8866' : '#ff4444';
      ctx.beginPath();
      const spikes = 6;
      for (let i = 0; i < spikes * 2; i++) {
        const angle = (i / (spikes * 2)) * Math.PI * 2;
        const r = i % 2 === 0 ? a.size : a.size * 0.55;
        if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
        else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
      }
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
    });

    // Draw ship
    if (state === 'playing') {
      const sp = getPos(shipAngle, shipRing);
      const c = RING_COLORS[shipRing];

      ctx.save();
      ctx.translate(sp.x, sp.y);
      ctx.rotate(shipAngle + Math.PI / 2);

      // Engine trail
      ctx.shadowBlur = 20;
      ctx.shadowColor = c.glow;
      ctx.fillStyle = c.main;

      // Ship body
      ctx.beginPath();
      ctx.moveTo(0, -14);
      ctx.lineTo(8, 8);
      ctx.lineTo(0, 4);
      ctx.lineTo(-8, 8);
      ctx.closePath();
      ctx.fillStyle = '#fff';
      ctx.fill();

      // Ship glow
      ctx.beginPath();
      ctx.moveTo(0, -14);
      ctx.lineTo(8, 8);
      ctx.lineTo(0, 4);
      ctx.lineTo(-8, 8);
      ctx.closePath();
      ctx.strokeStyle = c.main;
      ctx.lineWidth = 2;
      ctx.shadowColor = c.glow;
      ctx.shadowBlur = 25;
      ctx.stroke();

      // Engine flame
      const flameH = 8 + 6 * Math.sin(t * 15);
      const flameGrd = ctx.createLinearGradient(0, 4, 0, 4 + flameH);
      flameGrd.addColorStop(0, c.main);
      flameGrd.addColorStop(1, 'transparent');
      ctx.beginPath();
      ctx.moveTo(-4, 4);
      ctx.lineTo(0, 4 + flameH);
      ctx.lineTo(4, 4);
      ctx.closePath();
      ctx.fillStyle = flameGrd;
      ctx.shadowBlur = 15;
      ctx.shadowColor = c.glow;
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.restore();
    }

    // Draw particles
    particles.forEach(p => {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 6;
      ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    });
  }
}

function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  const t = ts / 1000;

  update(dt);
  draw(t);

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => {
  lastTime = ts;
  requestAnimationFrame(loop);
});

// Input
function jump() {
  if (state !== 'playing') return;
  if (jumpCooldown > 0) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const prevRing = shipRing;
  shipRing = (shipRing + 1) % 3;
  jumpCooldown = 0.12;
  playJump();
  emitRingShift(shipRing);
  updateRingDots();
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    jump();
  }
});

canvas.addEventListener('click', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  jump();
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  jump();
}, { passive: false });

document.getElementById('start-btn').addEventListener('click', e => {
  e.stopPropagation();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  resetGame();
  state = 'playing';
  document.getElementById('overlay').style.display = 'none';
  updateRingDots();
  document.getElementById('hi-display').textContent = hiScore;
});
</script>
</body>
</html>
