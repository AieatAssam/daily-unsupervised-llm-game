<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chroma Shift</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050010; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const COLORS = [
      { name: 'CYAN',    hex: '#00ffff', rgb: '0,255,255',   key: '1' },
      { name: 'PINK',    hex: '#ff00ff', rgb: '255,0,255',   key: '2' },
      { name: 'YELLOW',  hex: '#ffff00', rgb: '255,255,0',   key: '3' },
      { name: 'GREEN',   hex: '#00ff88', rgb: '0,255,136',   key: '4' },
    ];
    const ICONS = ['●', '◆', '▲', '■'];
    const HS_KEY = 'chromaShift_highScore';

    function makeParticles(x, y, color, n) {
      const out = [];
      for (let i = 0; i < n; i++) {
        const a = (Math.PI * 2 * i) / n + Math.random() * 0.4;
        const s = 2 + Math.random() * 6;
        out.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, color, life: 1, size: 2 + Math.random() * 5 });
      }
      return out;
    }

    function playTone(actx, type) {
      if (!actx) return;
      try {
        const o = actx.createOscillator();
        const g = actx.createGain();
        o.connect(g); g.connect(actx.destination);
        const t = actx.currentTime;
        if (type === 'match') {
          o.type = 'sine';
          o.frequency.setValueAtTime(523, t);
          o.frequency.exponentialRampToValueAtTime(1047, t + 0.12);
          g.gain.setValueAtTime(0.28, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
          o.start(t); o.stop(t + 0.2);
        } else if (type === 'combo') {
          o.type = 'sine';
          o.frequency.setValueAtTime(659, t);
          o.frequency.exponentialRampToValueAtTime(1319, t + 0.18);
          g.gain.setValueAtTime(0.35, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
          o.start(t); o.stop(t + 0.28);
        } else if (type === 'miss') {
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(220, t);
          o.frequency.exponentialRampToValueAtTime(55, t + 0.4);
          g.gain.setValueAtTime(0.35, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
          o.start(t); o.stop(t + 0.4);
        } else if (type === 'switch') {
          o.type = 'square';
          o.frequency.setValueAtTime(440, t);
          g.gain.setValueAtTime(0.08, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
          o.start(t); o.stop(t + 0.07);
        } else if (type === 'levelup') {
          o.type = 'sine';
          [0, 0.08, 0.16].forEach((dt, i) => {
            const f = [440, 554, 659][i];
            o.frequency.setValueAtTime(f, t + dt);
          });
          g.gain.setValueAtTime(0.3, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          o.start(t); o.stop(t + 0.35);
        }
      } catch (e) {}
    }

    const Game = () => {
      const canvasRef = useRef(null);
      const gsRef = useRef(null);
      const actxRef = useRef(null);
      const rafRef = useRef(null);
      const endGameRef = useRef(null);

      const [ui, setUi] = useState({
        phase: 'start',
        score: 0, combo: 0, lives: 3, playerColor: 0,
        highScore: parseInt(localStorage.getItem(HS_KEY) || '0'),
        isNewHigh: false,
      });

      const initAudio = useCallback(() => {
        if (!actxRef.current) {
          actxRef.current = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (actxRef.current.state === 'suspended') actxRef.current.resume();
      }, []);

      const endGame = useCallback(() => {
        const gs = gsRef.current;
        if (!gs) return;
        gs.running = false;
        const prev = parseInt(localStorage.getItem(HS_KEY) || '0');
        const isNew = gs.score > prev;
        if (isNew) localStorage.setItem(HS_KEY, String(gs.score));
        const hi = Math.max(gs.score, prev);
        setUi(p => ({ ...p, phase: 'gameover', score: gs.score, highScore: hi, isNewHigh: isNew }));
      }, []);

      endGameRef.current = endGame;

      const switchColor = useCallback((idx) => {
        const gs = gsRef.current;
        if (!gs || !gs.running) return;
        if (gs.playerColor === idx) return;
        gs.playerColor = idx;
        playTone(actxRef.current, 'switch');
        setUi(p => ({ ...p, playerColor: idx }));
      }, []);

      const startGame = useCallback(() => {
        initAudio();
        gsRef.current = {
          running: true,
          playerColor: 0,
          gates: [],
          particles: [],
          trail: [],
          score: 0, combo: 0, lives: 3,
          speed: 3.5,
          gatesCleared: 0,
          spawnTimer: 0,
          spawnInterval: 110,
          invincible: 0,
          bgOffset: 0,
          flashTimer: 0,
          comboPopup: null,
          level: 1,
        };
        setUi(p => ({ ...p, phase: 'playing', score: 0, combo: 0, lives: 3, playerColor: 0 }));
      }, [initAudio]);

      // Main game loop
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const resize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        resize();
        window.addEventListener('resize', resize);

        let prev = performance.now();

        const tick = (now) => {
          rafRef.current = requestAnimationFrame(tick);
          const dt = Math.min((now - prev) / 16.667, 3);
          prev = now;

          const ctx = canvas.getContext('2d');
          const W = canvas.width;
          const H = canvas.height;
          const gs = gsRef.current;

          // Background
          ctx.fillStyle = '#050010';
          ctx.fillRect(0, 0, W, H);

          // Scrolling grid
          const spd = gs ? gs.speed : 3.5;
          if (gs) gs.bgOffset = ((gs.bgOffset || 0) + spd * 0.4 * dt) % 60;
          const bgOff = gs ? gs.bgOffset : 0;
          ctx.strokeStyle = 'rgba(70,0,160,0.22)';
          ctx.lineWidth = 1;
          for (let x = -bgOff; x < W + 60; x += 60) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
          }
          for (let y = 0; y < H; y += 60) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
          }

          if (!gs || !gs.running) return;

          const PX = W * 0.14;
          const PY = H * 0.44;
          const PR = Math.min(22, W * 0.035);
          const pc = COLORS[gs.playerColor];

          // Spawn gate
          gs.spawnTimer += dt;
          if (gs.spawnTimer >= gs.spawnInterval) {
            gs.spawnTimer = 0;
            const cIdx = Math.floor(Math.random() * 4);
            const gH = Math.min(H * 0.38, 170);
            const gW = Math.min(56, W * 0.07);
            gs.gates.push({
              x: W + gW + 10,
              y: PY - gH / 2,
              w: gW, h: gH,
              colorIdx: cIdx,
              checked: false, scored: false, hit: false,
              pulse: 0,
            });
          }

          // Invincibility countdown
          if (gs.invincible > 0) gs.invincible -= dt;

          // Emit trail particles from behind orb
          if (Math.random() < 0.6 * dt) {
            gs.trail.push({
              x: PX - PR * 0.6,
              y: PY + (Math.random() - 0.5) * PR * 1.2,
              vx: -(1 + Math.random() * 2),
              vy: (Math.random() - 0.5) * 0.8,
              color: pc.hex,
              life: 1,
              size: 2 + Math.random() * 3,
            });
          }

          // Update trail
          gs.trail = gs.trail.filter(p => p.life > 0.01);
          for (const p of gs.trail) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.life -= 0.04 * dt;
            ctx.save();
            ctx.globalAlpha = p.life * 0.7;
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 6;
            ctx.shadowColor = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          // Update & draw gates
          gs.gates = gs.gates.filter(g => g.x + g.w > -30);
          for (const g of gs.gates) {
            g.x -= gs.speed * dt;
            g.pulse = (g.pulse || 0) + 0.08 * dt;

            const gc = COLORS[g.colorIdx];
            const overlapsX = g.x <= PX + PR * 1.2 && g.x + g.w >= PX - PR * 1.2;

            // Collision check (once per gate)
            if (overlapsX && !g.checked) {
              g.checked = true;
              if (g.colorIdx === gs.playerColor) {
                g.scored = true;
                gs.combo++;
                const pts = 10 + (gs.combo - 1) * 5;
                gs.score += pts;
                gs.gatesCleared++;

                // Level up every 8 gates
                if (gs.gatesCleared % 8 === 0) {
                  gs.speed = Math.min(gs.speed + 0.45, 13);
                  gs.spawnInterval = Math.max(46, gs.spawnInterval - 5);
                  gs.level++;
                  playTone(actxRef.current, 'levelup');
                } else {
                  playTone(actxRef.current, gs.combo >= 5 ? 'combo' : 'match');
                }

                gs.particles.push(...makeParticles(PX, PY, gc.hex, 28));
                if (gs.combo >= 3) {
                  gs.comboPopup = { text: `×${gs.combo}`, x: PX + 10, y: PY - 55, timer: 55 };
                }
                setUi(p => ({ ...p, score: gs.score, combo: gs.combo }));
              } else if (gs.invincible <= 0) {
                g.hit = true;
                gs.combo = 0;
                gs.lives--;
                gs.invincible = 85;
                gs.flashTimer = 16;
                gs.particles.push(...makeParticles(PX, PY, '#ff3344', 40));
                playTone(actxRef.current, 'miss');
                setUi(p => ({ ...p, lives: gs.lives, combo: 0 }));
                if (gs.lives <= 0) endGameRef.current();
              }
              // if invincible + wrong color: skip gate silently (checked = true)
            }

            // Draw gate
            const fade = g.hit ? 0.18 : (g.scored ? 0.35 : 1);
            const pulseMag = Math.sin(g.pulse) * 0.15 + 0.85;

            ctx.save();
            ctx.globalAlpha = fade;
            ctx.shadowBlur = 28 * pulseMag;
            ctx.shadowColor = gc.hex;

            // Filled interior
            ctx.fillStyle = `rgba(${gc.rgb},0.12)`;
            ctx.fillRect(g.x, g.y, g.w, g.h);

            // Border
            ctx.strokeStyle = gc.hex;
            ctx.lineWidth = 3;
            ctx.strokeRect(g.x, g.y, g.w, g.h);

            // Center label (first letter)
            ctx.shadowBlur = 0;
            ctx.fillStyle = gc.hex;
            ctx.font = `bold 12px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(gc.name[0], g.x + g.w / 2, g.y + g.h / 2);

            ctx.restore();
          }

          // Update & draw burst particles
          gs.particles = gs.particles.filter(p => p.life > 0.01);
          for (const p of gs.particles) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
            p.vy += 0.12 * dt;
            p.life -= 0.026 * dt;
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, Math.max(0.5, p.size * Math.sqrt(p.life)), 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          // Draw player orb (blink when invincible)
          const blink = gs.invincible > 0 && Math.floor(gs.invincible / 5) % 2 === 0;
          if (!blink) {
            ctx.save();
            ctx.shadowBlur = 55;
            ctx.shadowColor = pc.hex;
            ctx.fillStyle = pc.hex;
            ctx.beginPath();
            ctx.arc(PX, PY, PR, 0, Math.PI * 2);
            ctx.fill();
            // Inner bright core
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(PX, PY, PR * 0.38, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }

          // Danger flash overlay
          if (gs.flashTimer > 0) {
            ctx.fillStyle = `rgba(255,0,30,${gs.flashTimer * 0.022})`;
            ctx.fillRect(0, 0, W, H);
            gs.flashTimer -= dt;
          }

          // Combo popup
          if (gs.comboPopup) {
            gs.comboPopup.timer -= dt;
            gs.comboPopup.y -= 0.55 * dt;
            if (gs.comboPopup.timer <= 0) {
              gs.comboPopup = null;
            } else {
              const a = Math.min(1, gs.comboPopup.timer / 20);
              ctx.save();
              ctx.globalAlpha = a;
              ctx.fillStyle = '#ffff00';
              ctx.shadowBlur = 22;
              ctx.shadowColor = '#ffff00';
              ctx.font = 'bold 30px monospace';
              ctx.textAlign = 'center';
              ctx.textBaseline = 'middle';
              ctx.fillText(gs.comboPopup.text, gs.comboPopup.x, gs.comboPopup.y);
              ctx.restore();
            }
          }

          // Player lane dashed line
          ctx.save();
          ctx.strokeStyle = 'rgba(255,255,255,0.06)';
          ctx.lineWidth = 1;
          ctx.setLineDash([4, 10]);
          ctx.beginPath(); ctx.moveTo(PX, 0); ctx.lineTo(PX, H);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();

          // Speed level indicator (top right)
          ctx.save();
          ctx.fillStyle = 'rgba(255,255,255,0.25)';
          ctx.font = '11px monospace';
          ctx.textAlign = 'right';
          ctx.textBaseline = 'top';
          ctx.fillText(`LV ${gs.level}  SPD ${gs.speed.toFixed(1)}`, W - 14, 14);
          ctx.restore();
        };

        rafRef.current = requestAnimationFrame(tick);
        return () => {
          cancelAnimationFrame(rafRef.current);
          window.removeEventListener('resize', resize);
        };
      }, []);

      // Keyboard controls
      useEffect(() => {
        const onKey = (e) => {
          const gs = gsRef.current;
          if ((e.key === ' ' || e.key === 'Enter') && (!gs || !gs.running)) {
            initAudio(); startGame(); return;
          }
          if (!gs || !gs.running) return;
          const map = { '1': 0, '2': 1, '3': 2, '4': 3 };
          if (e.key in map) { e.preventDefault(); switchColor(map[e.key]); return; }
          // Arrow up/down to cycle
          if (e.key === 'ArrowUp' || e.key === 'w') {
            e.preventDefault();
            switchColor((gs.playerColor + 3) % 4);
          }
          if (e.key === 'ArrowDown' || e.key === 's') {
            e.preventDefault();
            switchColor((gs.playerColor + 1) % 4);
          }
          if (e.key === 'ArrowLeft' || e.key === 'a') {
            e.preventDefault();
            switchColor((gs.playerColor + 3) % 4);
          }
          if (e.key === 'ArrowRight' || e.key === 'd') {
            e.preventDefault();
            switchColor((gs.playerColor + 1) % 4);
          }
        };
        window.addEventListener('keydown', onKey);
        return () => window.removeEventListener('keydown', onKey);
      }, [startGame, switchColor, initAudio]);

      const { phase, score, combo, lives, playerColor, highScore, isNewHigh } = ui;

      return (
        <div style={{ position: 'relative', width: '100vw', height: '100vh', overflow: 'hidden' }}>
          <canvas ref={canvasRef} onClick={() => { if (phase !== 'playing') { initAudio(); startGame(); } }} />

          {/* Playing HUD */}
          {phase === 'playing' && (
            <>
              <div style={{
                position: 'absolute', top: 12, left: 0, right: 0,
                display: 'flex', justifyContent: 'space-between', alignItems: 'center',
                padding: '0 18px', fontFamily: 'monospace', pointerEvents: 'none',
              }}>
                <span style={{ color: '#fff', fontSize: 17, textShadow: '0 0 8px #ffffff88' }}>
                  SCORE <span style={{ color: '#ffff00', textShadow: '0 0 12px #ffff0099' }}>{score}</span>
                </span>
                <div style={{ display: 'flex', gap: 7 }}>
                  {[0, 1, 2].map(i => (
                    <div key={i} style={{
                      width: 15, height: 15, borderRadius: '50%',
                      background: i < lives ? '#ff4455' : '#222',
                      boxShadow: i < lives ? '0 0 10px #ff4455' : 'none',
                      transition: 'background 0.2s',
                    }} />
                  ))}
                </div>
                <span style={{
                  color: combo > 1 ? '#ffff00' : 'transparent',
                  fontSize: 15, fontFamily: 'monospace',
                  textShadow: '0 0 14px #ffff00',
                  transition: 'color 0.15s',
                }}>
                  ×{combo} COMBO
                </span>
              </div>

              {/* Color switch buttons */}
              <div style={{
                position: 'absolute', bottom: 18, left: 0, right: 0,
                display: 'flex', justifyContent: 'center', gap: 14,
              }}>
                {COLORS.map((c, i) => (
                  <button
                    key={i}
                    onPointerDown={(e) => { e.preventDefault(); initAudio(); switchColor(i); }}
                    style={{
                      width: 68, height: 68, borderRadius: 10,
                      background: playerColor === i ? `rgba(${c.rgb},0.25)` : 'rgba(10,0,24,0.9)',
                      border: `2px solid ${c.hex}`,
                      color: c.hex,
                      fontFamily: 'monospace', fontWeight: 'bold',
                      cursor: 'pointer',
                      boxShadow: playerColor === i
                        ? `0 0 22px ${c.hex}, 0 0 44px ${c.hex}55, inset 0 0 16px ${c.hex}33`
                        : `0 0 5px ${c.hex}44`,
                      transform: playerColor === i ? 'scale(1.13)' : 'scale(1)',
                      transition: 'all 0.08s ease',
                      outline: 'none', userSelect: 'none',
                      display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 2,
                    }}
                  >
                    <span style={{ fontSize: 20, lineHeight: 1 }}>{ICONS[i]}</span>
                    <span style={{ fontSize: 11 }}>{c.name}</span>
                    <span style={{ fontSize: 10, opacity: 0.55 }}>[{c.key}]</span>
                  </button>
                ))}
              </div>
            </>
          )}

          {/* Start screen */}
          {phase === 'start' && (
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              gap: 18, background: 'rgba(5,0,16,0.88)', textAlign: 'center', padding: 28,
            }}>
              <h1 style={{
                fontSize: 'clamp(38px,9vw,68px)', fontFamily: 'monospace', fontWeight: 900, margin: 0,
                background: 'linear-gradient(90deg, #00ffff 0%, #ff00ff 34%, #ffff00 67%, #00ff88 100%)',
                WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
                filter: 'drop-shadow(0 0 24px #00ffff66)',
              }}>
                CHROMA SHIFT
              </h1>
              <p style={{ color: '#bbbbcc', fontFamily: 'monospace', fontSize: 16, margin: 0, maxWidth: 380 }}>
                Switch your orb's color to match each incoming gate before it hits you!
              </p>
              <div style={{ color: '#666', fontFamily: 'monospace', fontSize: 13, lineHeight: 2, margin: 0 }}>
                Press{' '}
                {COLORS.map((c, i) => (
                  <span key={i} style={{ color: c.hex }}> {i + 1}</span>
                ))}
                {' '}or tap buttons below<br />
                ↑ / ↓ arrows cycle through colors
              </div>
              {highScore > 0 && (
                <p style={{ color: '#ffff00', fontFamily: 'monospace', fontSize: 15, margin: 0, textShadow: '0 0 12px #ffff00' }}>
                  BEST: {highScore}
                </p>
              )}
              <button
                onClick={() => { initAudio(); startGame(); }}
                style={{
                  marginTop: 6, padding: '15px 50px', fontSize: 21,
                  fontFamily: 'monospace', fontWeight: 'bold',
                  background: 'rgba(0,255,255,0.08)',
                  border: '2px solid #00ffff', color: '#00ffff', borderRadius: 8,
                  cursor: 'pointer', boxShadow: '0 0 24px #00ffff44',
                  transition: 'box-shadow 0.15s',
                }}
                onMouseEnter={e => e.currentTarget.style.boxShadow = '0 0 48px #00ffff88'}
                onMouseLeave={e => e.currentTarget.style.boxShadow = '0 0 24px #00ffff44'}
              >
                PLAY
              </button>

              {/* Preview color buttons on start screen */}
              <div style={{ display: 'flex', gap: 12, marginTop: 4 }}>
                {COLORS.map((c, i) => (
                  <div key={i} style={{
                    width: 52, height: 52, borderRadius: 8,
                    border: `2px solid ${c.hex}`,
                    boxShadow: `0 0 10px ${c.hex}66`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: c.hex, fontFamily: 'monospace', fontSize: 20,
                  }}>
                    {ICONS[i]}
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Game over screen */}
          {phase === 'gameover' && (
            <div style={{
              position: 'absolute', inset: 0,
              display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              gap: 14, background: 'rgba(5,0,16,0.92)', textAlign: 'center', padding: 28,
            }}>
              <h2 style={{
                fontSize: 'clamp(34px,8vw,58px)', fontFamily: 'monospace', fontWeight: 900, margin: 0,
                color: '#ff3355', textShadow: '0 0 32px #ff3355',
              }}>
                GAME OVER
              </h2>
              <p style={{
                fontSize: 'clamp(28px,7vw,46px)', fontFamily: 'monospace', margin: 0,
                color: '#ffff00', textShadow: '0 0 22px #ffff00',
              }}>
                {score}
              </p>
              {isNewHigh && (
                <p style={{ color: '#00ff88', fontFamily: 'monospace', fontSize: 15, margin: 0, textShadow: '0 0 14px #00ff88' }}>
                  ★ NEW HIGH SCORE ★
                </p>
              )}
              <p style={{ color: '#444', fontFamily: 'monospace', fontSize: 13, margin: 0 }}>
                BEST: {highScore}
              </p>
              <button
                onClick={() => { initAudio(); startGame(); }}
                style={{
                  marginTop: 10, padding: '13px 42px', fontSize: 19,
                  fontFamily: 'monospace', fontWeight: 'bold',
                  background: 'rgba(255,51,85,0.1)',
                  border: '2px solid #ff3355', color: '#ff3355', borderRadius: 8,
                  cursor: 'pointer', boxShadow: '0 0 20px #ff335544',
                }}
              >
                RETRY
              </button>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Game />);
  </script>
</body>
</html>
