<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fuse Rush</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #030010; overflow: hidden; font-family: 'Courier New', monospace; user-select: none; touch-action: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const LS_KEY = 'fuseRushHighScore';
    const R = 42; // bomb radius px

    const COLORS = ['#00ffcc','#ff44ff','#ffaa00','#44ff88','#ff4488','#aa44ff','#44aaff','#ffff44'];

    // ── Audio ──────────────────────────────────────────────────────────────────
    let _ac = null;
    const getAC = () => { if (!_ac) try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} return _ac; };
    function tone(freq, type, dur, vol, endFreq) {
      try {
        const ctx = getAC(); if (!ctx) return;
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = type;
        o.frequency.setValueAtTime(freq, ctx.currentTime);
        if (endFreq) o.frequency.exponentialRampToValueAtTime(endFreq, ctx.currentTime + dur);
        g.gain.setValueAtTime(vol, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        o.start(); o.stop(ctx.currentTime + dur);
      } catch(e) {}
    }
    const sndDefuse = () => { tone(660,'sine',0.08,0.2); setTimeout(()=>tone(880,'sine',0.1,0.2),65); setTimeout(()=>tone(1320,'sine',0.12,0.25),130); };
    const sndBoom   = () => { tone(55,'sawtooth',0.7,0.5,28); setTimeout(()=>tone(80,'square',0.35,0.3,35),60); };
    const sndWrong  = () => { tone(140,'square',0.35,0.35,70); };
    const sndCombo  = (n) => { tone(880 + n*130,'triangle',0.18,0.35); };
    const sndLevel  = () => { tone(1100,'sine',0.5,0.3,2200); };
    const sndStart  = () => { [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',0.15,0.2),i*80)); };
    const sndTick   = () => { tone(900,'square',0.04,0.07); };

    function hexRGB(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }

    // ── Level parameters ───────────────────────────────────────────────────────
    function lvlParams(lvl) {
      return {
        maxBombs:      Math.min(2 + Math.floor((lvl-1)*0.85), 7),
        minFuse:       Math.max(2000, 7200 - (lvl-1)*380),
        maxFuse:       Math.max(3600, 10800 - (lvl-1)*430),
        spawnInterval: Math.max(800, 2900 - (lvl-1)*150),
        levelUpAt:     6 + lvl*2,
      };
    }

    // ── App ────────────────────────────────────────────────────────────────────
    function App() {
      const canvasRef  = useRef(null);
      const stateRef   = useRef(null);   // all mutable game state
      const rafRef     = useRef(null);
      const loopRef    = useRef(null);   // stable ref to game loop fn
      const [ui, setUi] = useState({
        phase: 'start', score: 0, lives: 3, combo: 0, level: 1,
        highScore: parseInt(localStorage.getItem(LS_KEY)||'0'),
      });

      function syncUi() {
        const s = stateRef.current;
        if (!s) return;
        setUi({ phase: s.phase, score: s.score, lives: s.lives, combo: s.combo, level: s.level, highScore: s.highScore });
      }

      function spawnBomb(s, canvas) {
        const p = lvlParams(s.level);
        const active = s.bombs.filter(b => !b.defused && !b.exploded);
        if (active.length >= p.maxBombs) return;
        const w = canvas.width, h = canvas.height;
        const margin = R + 20, topM = 72;
        let x, y, tries = 0;
        do {
          x = margin + Math.random() * (w - 2*margin);
          y = topM + margin + Math.random() * (h - topM - 2*margin - 10);
          tries++;
        } while (tries < 35 && active.some(b => Math.hypot(b.x-x, b.y-y) < R*2.9));
        const fuse = p.minFuse + Math.random()*(p.maxFuse - p.minFuse);
        const colorIdx = Math.floor(Math.random()*COLORS.length);
        s.bombs.push({ id: s.nextId++, x, y, fuse, timeLeft: fuse, colorIdx,
          defused: false, defuseTs: 0, exploded: false, explodeTs: 0 });
      }

      function handleHit(cx, cy) {
        const s = stateRef.current;
        if (!s || s.phase !== 'playing') return;
        const active = s.bombs.filter(b => !b.defused && !b.exploded);
        const hit = active.find(b => Math.hypot(b.x-cx, b.y-cy) <= R+10);
        if (!hit) return;

        const minTime = Math.min(...active.map(b => b.timeLeft));
        const tol = active.length <= 1 ? Infinity : 600;

        if (hit.timeLeft <= minTime + tol) {
          // Correct defusal
          hit.defused = true;
          s.combo++;
          s.defusedCount++;
          const mult = Math.min(s.combo, 8);
          const pts = (100 + Math.floor(hit.timeLeft/100)) * mult;
          s.score += pts;
          sndDefuse();
          if (s.combo >= 3) sndCombo(Math.min(s.combo-2, 6));
          // Particles
          for (let i = 0; i < 18; i++) {
            const a = Math.random()*Math.PI*2, spd = 2+Math.random()*6;
            s.particles.push({ x: hit.x, y: hit.y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
              life: 1, color: COLORS[hit.colorIdx], size: 3+Math.random()*4 });
          }
          const txt = s.combo >= 5 ? `×${mult} MEGA!` : s.combo >= 3 ? `×${mult} COMBO!` : 'DEFUSED!';
          s.msgs.push({ id: s.nextId++, x: hit.x, y: hit.y-55, text: txt,
            color: s.combo >= 3 ? '#ffaa00' : '#00ffcc', life: 1.5 });
          // Level up
          const p = lvlParams(s.level);
          if (s.defusedCount >= p.levelUpAt) {
            s.level++; s.defusedCount = 0; sndLevel();
            const canvas = canvasRef.current;
            s.msgs.push({ id: s.nextId++, x: canvas.width/2, y: canvas.height/2-40,
              text: `LEVEL ${s.level}!`, color: '#ffff00', life: 2, big: true });
          }
        } else {
          // Wrong order
          s.combo = 0; s.lives--;
          sndWrong();
          for (let i = 0; i < 14; i++) {
            const a = Math.random()*Math.PI*2, spd = 3+Math.random()*7;
            s.particles.push({ x: hit.x, y: hit.y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
              life: 1, color: '#ff3333', size: 4+Math.random()*5 });
          }
          s.msgs.push({ id: s.nextId++, x: cx, y: cy-45, text: 'WRONG ORDER!', color: '#ff3333', life: 1.5 });
          if (s.lives <= 0) {
            s.phase = 'gameover';
            if (s.score > s.highScore) { s.highScore = s.score; localStorage.setItem(LS_KEY, String(s.score)); }
            cancelAnimationFrame(rafRef.current);
            syncUi(); return;
          }
        }
        syncUi();
      }

      // ── Game loop ────────────────────────────────────────────────────────────
      loopRef.current = function gameLoop(ts) {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const s = stateRef.current;
        if (!s || s.phase !== 'playing') return;
        const ctx = canvas.getContext('2d');
        const w = canvas.width, h = canvas.height;

        const prev = s._prevTs ?? ts;
        const dt = Math.min(ts - prev, 50);
        s._prevTs = ts;

        // Update bomb timers
        let needSync = false;
        s.bombs.forEach(b => {
          if (b.defused || b.exploded) return;
          // Tick sound when crossing 2s mark
          const wasAbove2 = b.timeLeft > 2000;
          b.timeLeft -= dt;
          if (wasAbove2 && b.timeLeft <= 2000) sndTick();
          if (b.timeLeft <= 0) {
            b.timeLeft = 0; b.exploded = true; b.explodeTs = ts;
            s.lives--; s.combo = 0; needSync = true;
            sndBoom();
            for (let i = 0; i < 26; i++) {
              const a = Math.random()*Math.PI*2, spd = 3+Math.random()*9;
              s.particles.push({ x: b.x, y: b.y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd,
                life: 1, color: COLORS[b.colorIdx], size: 5+Math.random()*7 });
            }
            s.msgs.push({ id: s.nextId++, x: b.x, y: b.y-65, text: 'BOOM!', color: '#ff3333', life: 2, big: true });
            if (s.lives <= 0) {
              s.phase = 'gameover';
              if (s.score > s.highScore) { s.highScore = s.score; localStorage.setItem(LS_KEY, String(s.score)); }
              syncUi(); return;
            }
          }
        });

        // Mark defuse timestamps, clean up old bombs
        s.bombs.forEach(b => { if (b.defused && !b.defuseTs) b.defuseTs = ts; });
        s.bombs = s.bombs.filter(b => {
          if (b.defused && b.defuseTs && ts - b.defuseTs > 750) return false;
          if (b.exploded && ts - b.explodeTs > 1100) return false;
          return true;
        });

        // Spawn bombs
        const p = lvlParams(s.level);
        if (ts - s.lastSpawnTs > p.spawnInterval) { spawnBomb(s, canvas); s.lastSpawnTs = ts; }

        // Update particles
        s.particles = s.particles
          .map(p => ({ ...p, x: p.x+p.vx, y: p.y+p.vy, vy: p.vy+0.18, vx: p.vx*0.96, life: p.life-dt/700 }))
          .filter(p => p.life > 0);

        // Update messages
        s.msgs = s.msgs.map(m => ({ ...m, life: m.life-dt/1000 })).filter(m => m.life > 0);

        if (needSync) syncUi();

        // ── DRAW ─────────────────────────────────────────────────────────────

        // Background
        s.bgT = (s.bgT||0) + dt*0.0001;
        const bg = ctx.createRadialGradient(w*0.5+Math.cos(s.bgT)*w*0.2, h*0.5, 0, w*0.5, h*0.5, Math.max(w,h)*0.75);
        bg.addColorStop(0, '#0c0028'); bg.addColorStop(1, '#020010');
        ctx.fillStyle = bg; ctx.fillRect(0,0,w,h);

        // Grid
        ctx.strokeStyle = 'rgba(80,40,160,0.07)'; ctx.lineWidth = 1;
        for (let x = 0; x < w; x += 56) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
        for (let y = 0; y < h; y += 56) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }

        // Particles
        ctx.save();
        s.particles.forEach(p => {
          ctx.globalAlpha = Math.max(0, p.life*0.9);
          ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 7;
          ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.3, p.size*p.life), 0, Math.PI*2); ctx.fill();
        });
        ctx.restore();

        // Find bomb with min time (for highlighting)
        const active = s.bombs.filter(b => !b.defused && !b.exploded);
        const minId = active.length > 0 ? active.reduce((a,b) => a.timeLeft < b.timeLeft ? a : b).id : -1;

        // Bombs
        s.bombs.forEach(b => {
          const color = COLORS[b.colorIdx];
          const [cr,cg,cb2] = hexRGB(color);

          if (b.defused && b.defuseTs) {
            const age = ts - b.defuseTs, fade = Math.max(0, 1-age/750);
            ctx.save();
            ctx.globalAlpha = fade;
            ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = 40;
            ctx.beginPath(); ctx.arc(b.x, b.y, R*(1+(1-fade)*0.7), 0, Math.PI*2); ctx.fill();
            ctx.restore(); return;
          }
          if (b.exploded) {
            const age = ts - b.explodeTs, fade = Math.max(0, 1-age/1100);
            ctx.save();
            ctx.globalAlpha = fade;
            ctx.fillStyle = '#ff3333'; ctx.shadowColor = '#ff3333'; ctx.shadowBlur = 90*fade;
            ctx.beginPath(); ctx.arc(b.x, b.y, R*(1+age/280), 0, Math.PI*2); ctx.fill();
            ctx.restore(); return;
          }

          const frac = b.timeLeft / b.fuse;
          const urgent = b.timeLeft < 2100;
          const isMostUrgent = b.id === minId && active.length > 1;
          const pulse = urgent ? 1 + 0.07*Math.sin(ts*0.014) : 1;
          const er = R * pulse;

          ctx.save();

          // Outer glow
          const gr2 = ctx.createRadialGradient(b.x,b.y,er*0.2,b.x,b.y,er*2.4);
          const glowA = isMostUrgent ? 0.35 : urgent ? 0.22 : 0.14;
          gr2.addColorStop(0, `rgba(${cr},${cg},${cb2},${glowA})`);
          gr2.addColorStop(1, `rgba(${cr},${cg},${cb2},0)`);
          ctx.fillStyle = gr2; ctx.beginPath(); ctx.arc(b.x,b.y,er*2.4,0,Math.PI*2); ctx.fill();

          // Body
          ctx.fillStyle = `rgba(${cr},${cg},${cb2},0.13)`;
          ctx.strokeStyle = isMostUrgent ? '#ffffff' : color;
          ctx.lineWidth = isMostUrgent ? 2.5 : 1.8;
          ctx.shadowColor = isMostUrgent ? '#ffffff' : color;
          ctx.shadowBlur = isMostUrgent ? 22 : urgent ? 16 : 10;
          ctx.beginPath(); ctx.arc(b.x,b.y,er,0,Math.PI*2); ctx.fill(); ctx.stroke();

          // Countdown arc (depletes clockwise from top)
          const arcColor = urgent ? '#ff3333' : color;
          ctx.strokeStyle = arcColor; ctx.lineWidth = urgent ? 6 : 5;
          ctx.lineCap = 'round'; ctx.shadowColor = arcColor; ctx.shadowBlur = 14;
          ctx.beginPath(); ctx.arc(b.x,b.y,er-5,-Math.PI/2,-Math.PI/2+frac*Math.PI*2); ctx.stroke();

          // Timer text
          ctx.font = `bold ${Math.round(er*0.50)}px 'Courier New'`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillStyle = urgent ? '#ff3333' : '#ffffff';
          ctx.shadowColor = urgent ? '#ff3333' : color; ctx.shadowBlur = 9;
          ctx.fillText((b.timeLeft/1000).toFixed(1), b.x, b.y);

          // "CLICK ME" hint for most urgent when > 2 active
          if (isMostUrgent && !urgent) {
            ctx.font = `bold 9px 'Courier New'`;
            ctx.fillStyle = '#ffffff66';
            ctx.shadowBlur = 0;
            ctx.fillText('URGENT', b.x, b.y + er + 13);
          }

          ctx.restore();
        });

        // Flash messages
        ctx.save();
        s.msgs.forEach(m => {
          const alpha = Math.min(1, m.life);
          const drift = (1.5 - m.life) * -28;
          ctx.globalAlpha = alpha;
          ctx.font = m.big ? `bold 34px 'Courier New'` : `bold 19px 'Courier New'`;
          ctx.fillStyle = m.color; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.shadowColor = m.color; ctx.shadowBlur = 20;
          ctx.fillText(m.text, m.x, m.y + drift);
        });
        ctx.restore();

        if (s.phase === 'playing') rafRef.current = requestAnimationFrame(loopRef.current);
      };

      function startGame() {
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        stateRef.current = {
          phase: 'playing', bombs: [], particles: [], msgs: [],
          score: 0, lives: 3, combo: 0, level: 1, defusedCount: 0,
          nextId: 0, lastSpawnTs: -99999, bgT: 0,
          highScore: parseInt(localStorage.getItem(LS_KEY)||'0'),
          _prevTs: null,
        };
        // Ensure localStorage key exists from game start
        if (!localStorage.getItem(LS_KEY)) localStorage.setItem(LS_KEY, '0');
        setUi(u => ({ ...u, phase: 'playing', score: 0, lives: 3, combo: 0, level: 1,
          highScore: stateRef.current.highScore }));
        sndStart();
        rafRef.current = requestAnimationFrame(loopRef.current);
      }

      // Canvas resize
      useEffect(() => {
        const resize = () => {
          if (canvasRef.current) {
            canvasRef.current.width  = window.innerWidth;
            canvasRef.current.height = window.innerHeight;
          }
        };
        resize();
        window.addEventListener('resize', resize);
        return () => window.removeEventListener('resize', resize);
      }, []);

      // Canvas input
      useEffect(() => {
        const canvas = canvasRef.current; if (!canvas) return;
        const onClick = e => { const r=canvas.getBoundingClientRect(); handleHit(e.clientX-r.left, e.clientY-r.top); };
        const onTouch = e => { e.preventDefault(); const t=e.touches[0]; const r=canvas.getBoundingClientRect(); handleHit(t.clientX-r.left, t.clientY-r.top); };
        canvas.addEventListener('click', onClick);
        canvas.addEventListener('touchstart', onTouch, { passive: false });
        return () => { canvas.removeEventListener('click', onClick); canvas.removeEventListener('touchstart', onTouch); };
      }, []);

      // Draw static background when not playing
      useEffect(() => {
        if (ui.phase === 'playing') return;
        const canvas = canvasRef.current; if (!canvas) return;
        const ctx = canvas.getContext('2d');
        const w=canvas.width, h=canvas.height;
        const bg = ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,Math.max(w,h)*0.75);
        bg.addColorStop(0,'#0c0028'); bg.addColorStop(1,'#020010');
        ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);
        ctx.strokeStyle='rgba(80,40,160,0.07)'; ctx.lineWidth=1;
        for(let x=0;x<w;x+=56){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
        for(let y=0;y<h;y+=56){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
      }, [ui.phase]);

      useEffect(() => () => { if(rafRef.current) cancelAnimationFrame(rafRef.current); }, []);

      const { phase, score, highScore, lives, combo, level } = ui;
      const isNewHigh = phase === 'gameover' && score > 0 && score >= highScore;

      return (
        <div style={{ width:'100vw', height:'100vh', position:'relative', background:'#020010', overflow:'hidden' }}>
          <canvas ref={canvasRef} style={{ position:'absolute', top:0, left:0 }} />

          {/* HUD */}
          {phase === 'playing' && (
            <div style={{ position:'absolute', top:0, left:0, right:0, padding:'10px 18px',
              display:'flex', justifyContent:'space-between', alignItems:'center', zIndex:10,
              pointerEvents:'none', background:'linear-gradient(rgba(2,0,16,0.88),transparent)' }}>
              <div style={{ color:'#aa44ff', fontSize:13, fontWeight:'bold', textShadow:'0 0 8px #aa44ff', letterSpacing:2 }}>
                LV {level}
              </div>
              <div style={{ textAlign:'center' }}>
                <div style={{ color:'#fff', fontSize:24, fontWeight:'bold', textShadow:'0 0 15px #00ffcc' }}>
                  {score.toLocaleString()}
                </div>
                {combo >= 2 && (
                  <div style={{ color:'#ffaa00', fontSize:11, textShadow:'0 0 6px #ffaa00', letterSpacing:1 }}>
                    ×{Math.min(combo,8)} COMBO
                  </div>
                )}
              </div>
              <div style={{ display:'flex', gap:4 }}>
                {[0,1,2].map(i => (
                  <span key={i} style={{ fontSize:18, opacity: i<lives?1:0.15,
                    filter: i<lives?'drop-shadow(0 0 5px #ff4488)':'none' }}>💜</span>
                ))}
              </div>
            </div>
          )}

          {/* Start Screen */}
          {phase === 'start' && (
            <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
              alignItems:'center', justifyContent:'center', gap:14,
              background:'rgba(2,0,16,0.55)' }}>
              <div style={{ color:'#aa44ff', fontSize:11, letterSpacing:8, textShadow:'0 0 10px #aa44ff' }}>
                EMERGENCY DEFUSAL
              </div>
              <div style={{ fontSize:'clamp(44px,12vw,80px)', fontWeight:'bold', color:'#fff', lineHeight:0.95,
                textShadow:'0 0 30px #ff44ff, 0 0 70px #ff44ff44', textAlign:'center' }}>
                FUSE<br/>RUSH
              </div>
              <div style={{ color:'#999', fontSize:'clamp(12px,3vw,15px)', textAlign:'center',
                maxWidth:340, lineHeight:1.75, padding:'0 24px' }}>
                Bombs are ticking — click them in order of{' '}
                <span style={{ color:'#ff3333', fontWeight:'bold' }}>shortest fuse first</span>.<br/>
                Wrong order or a bomb exploding costs a life!<br/>
                Chain defusals for combo multipliers.
              </div>
              {highScore > 0 && (
                <div style={{ color:'#444', fontSize:12, letterSpacing:2 }}>BEST: {highScore.toLocaleString()}</div>
              )}
              <button onClick={startGame} style={{
                marginTop:18, padding:'13px 48px', background:'transparent',
                border:'2px solid #00ffcc', color:'#00ffcc', fontSize:18, fontWeight:'bold',
                cursor:'pointer', letterSpacing:4, fontFamily:'Courier New',
                textShadow:'0 0 10px #00ffcc', boxShadow:'0 0 24px #00ffcc33', borderRadius:4,
              }}>START</button>
            </div>
          )}

          {/* Game Over Screen */}
          {phase === 'gameover' && (
            <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column',
              alignItems:'center', justifyContent:'center', gap:14,
              background:'rgba(2,0,16,0.78)' }}>
              <div style={{ fontSize:'clamp(32px,8vw,56px)', fontWeight:'bold', color:'#ff3333',
                textShadow:'0 0 30px #ff3333, 0 0 70px #ff333344' }}>
                GAME OVER
              </div>
              <div style={{ fontSize:'clamp(28px,7vw,48px)', color:'#fff', textShadow:'0 0 20px #fff' }}>
                {score.toLocaleString()}
              </div>
              {isNewHigh && (
                <div style={{ color:'#ffaa00', fontSize:16, textShadow:'0 0 12px #ffaa00', letterSpacing:2 }}>
                  ★ NEW HIGH SCORE ★
                </div>
              )}
              <div style={{ color:'#444', fontSize:13, letterSpacing:2 }}>BEST: {highScore.toLocaleString()}</div>
              <button onClick={startGame} style={{
                marginTop:18, padding:'13px 48px', background:'transparent',
                border:'2px solid #ff44ff', color:'#ff44ff', fontSize:18, fontWeight:'bold',
                cursor:'pointer', letterSpacing:4, fontFamily:'Courier New',
                textShadow:'0 0 10px #ff44ff', boxShadow:'0 0 24px #ff44ff33', borderRadius:4,
              }}>RETRY</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
