<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ricochet Rush</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    canvas { display: block; }
    #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef } = React;

    const COLORS = ['#00ffff', '#ff00ff', '#ffff00', '#00ff88', '#ff6600', '#ff0088'];

    const W = Math.min(window.innerWidth, 480);
    const H = window.innerWidth < 480
      ? Math.min(window.innerHeight, window.innerHeight)
      : Math.min(window.innerHeight, 700);

    function initAudio() {
      try {
        const actx = new (window.AudioContext || window.webkitAudioContext)();
        function beep(freq, dur, type = 'sine', vol = 0.25) {
          const o = actx.createOscillator();
          const g = actx.createGain();
          o.type = type;
          o.frequency.value = freq;
          g.gain.setValueAtTime(vol, actx.currentTime);
          g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
          o.connect(g); g.connect(actx.destination);
          o.start(); o.stop(actx.currentTime + dur);
        }
        return {
          shoot() { beep(280, 0.07, 'square', 0.18); },
          hit()   { beep(660, 0.12); setTimeout(() => beep(880, 0.1, 'sine', 0.12), 40); },
          bounce(){ beep(180, 0.04, 'sawtooth', 0.08); },
          combo(n){ [380,560,740,920].slice(0,Math.min(n,4)).forEach((f,i) => setTimeout(() => beep(f,0.12),i*65)); },
          gameover(){ [300,250,200,150].forEach((f,i) => setTimeout(() => beep(f,0.2,'sawtooth',0.2),i*120)); },
          resume() { if (actx.state === 'suspended') actx.resume(); },
        };
      } catch(e) {
        return { shoot(){}, hit(){}, bounce(){}, combo(){}, gameover(){}, resume(){} };
      }
    }

    function makeTarget() {
      return {
        x: 55 + Math.random() * (W - 110),
        y: 55 + Math.random() * (H * 0.55),
        r: 18 + Math.random() * 9,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        vx: (Math.random() - 0.5) * 1.1,
        vy: (Math.random() - 0.5) * 1.1,
        pulse: Math.random() * Math.PI * 2,
        flash: 0,
      };
    }

    function spawnParticles(x, y, color) {
      return Array.from({ length: 14 }, () => ({
        x, y, color,
        vx: (Math.random() - 0.5) * 11,
        vy: (Math.random() - 0.5) * 11,
        life: 1,
        size: 2 + Math.random() * 4,
      }));
    }

    const Game = () => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        canvas.width = W;
        canvas.height = H;

        let audio = null;

        const gs = {
          phase: 'start',
          score: 0,
          highScore: parseInt(localStorage.getItem('ricochet_highScore') || '0'),
          combo: 0,
          comboTimer: 0,
          timeLeft: 90,
          bullets: [],
          targets: [],
          particles: [],
          scorePopups: [],
          wallFlashes: [],
          mouseX: W / 2,
          mouseY: H / 3,
          bgHue: 220,
          lastTime: 0,
          animId: null,
        };

        function resetGame() {
          gs.phase = 'playing';
          gs.score = 0;
          gs.combo = 0;
          gs.comboTimer = 0;
          gs.timeLeft = 90;
          gs.bullets = [];
          gs.targets = Array.from({ length: 6 }, () => makeTarget());
          gs.particles = [];
          gs.scorePopups = [];
          gs.wallFlashes = [];
          // Write initial value so localStorage key exists from game start
          localStorage.setItem('ricochet_highScore', gs.highScore.toString());
        }

        function fireBullet(mx, my) {
          if (gs.phase !== 'playing') return;
          const cx = W / 2, cy = H - 52;
          if (my >= cy - 10) return; // only fire upward
          if (gs.bullets.length >= 3) return;
          const dx = mx - cx, dy = my - cy;
          const len = Math.sqrt(dx * dx + dy * dy) || 1;
          const speed = 10;
          gs.bullets.push({
            x: cx, y: cy,
            vx: (dx / len) * speed,
            vy: (dy / len) * speed,
            bounces: 0,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            trail: [],
          });
          if (audio) audio.shoot();
        }

        function getPos(e) {
          const rect = canvas.getBoundingClientRect();
          const sx = W / rect.width, sy = H / rect.height;
          if (e.touches && e.touches.length > 0) {
            return {
              x: (e.touches[0].clientX - rect.left) * sx,
              y: (e.touches[0].clientY - rect.top) * sy,
            };
          }
          return {
            x: (e.clientX - rect.left) * sx,
            y: (e.clientY - rect.top) * sy,
          };
        }

        function handleMove(e) {
          const p = getPos(e);
          gs.mouseX = p.x; gs.mouseY = p.y;
        }

        function handlePress(e) {
          if (!audio) audio = initAudio();
          audio.resume();
          const p = getPos(e);
          gs.mouseX = p.x; gs.mouseY = p.y;
          if (gs.phase === 'start' || gs.phase === 'gameover') {
            resetGame();
          } else if (gs.phase === 'playing') {
            fireBullet(p.x, p.y);
          }
        }

        canvas.addEventListener('mousemove', handleMove);
        canvas.addEventListener('mousedown', handlePress);
        canvas.addEventListener('touchmove', handleMove, { passive: true });
        canvas.addEventListener('touchstart', handlePress, { passive: true });

        // ─── UPDATE ───────────────────────────────────────────────
        function update(dt) {
          gs.bgHue = (gs.bgHue + dt * 14) % 360;
          if (gs.phase !== 'playing') return;

          gs.timeLeft -= dt;
          if (gs.timeLeft <= 0) {
            gs.timeLeft = 0;
            gs.phase = 'gameover';
            if (gs.score > gs.highScore) {
              gs.highScore = gs.score;
              localStorage.setItem('ricochet_highScore', gs.highScore.toString());
            }
            if (audio) audio.gameover();
            return;
          }

          if (gs.combo > 0) {
            gs.comboTimer -= dt;
            if (gs.comboTimer <= 0) gs.combo = 0;
          }

          // Targets drift faster as time runs out
          const speedMult = 1 + (90 - gs.timeLeft) / 90 * 0.9;
          for (const t of gs.targets) {
            t.x += t.vx * speedMult;
            t.y += t.vy * speedMult;
            t.pulse += dt * 3;
            if (t.flash > 0) t.flash -= dt * 4;
            if (t.x - t.r < 0) { t.vx = Math.abs(t.vx); t.x = t.r; }
            if (t.x + t.r > W) { t.vx = -Math.abs(t.vx); t.x = W - t.r; }
            if (t.y - t.r < 0) { t.vy = Math.abs(t.vy); t.y = t.r; }
            if (t.y + t.r > H * 0.68) { t.vy = -Math.abs(t.vy); t.y = H * 0.68 - t.r; }
          }

          // Bullets
          gs.bullets = gs.bullets.filter(b => {
            b.trail.push({ x: b.x, y: b.y });
            if (b.trail.length > 18) b.trail.shift();
            b.x += b.vx; b.y += b.vy;

            if (b.x < 6) {
              b.x = 6; b.vx = Math.abs(b.vx); b.bounces++;
              gs.wallFlashes.push({ x: 0, y: b.y, side: 'L', life: 1 });
              if (audio) audio.bounce();
            }
            if (b.x > W - 6) {
              b.x = W - 6; b.vx = -Math.abs(b.vx); b.bounces++;
              gs.wallFlashes.push({ x: W, y: b.y, side: 'R', life: 1 });
              if (audio) audio.bounce();
            }
            if (b.y < 6) {
              b.y = 6; b.vy = Math.abs(b.vy); b.bounces++;
              gs.wallFlashes.push({ x: b.x, y: 0, side: 'T', life: 1 });
              if (audio) audio.bounce();
            }
            if (b.bounces > 4 || b.y > H + 20) return false;

            // Collision with targets
            for (let i = 0; i < gs.targets.length; i++) {
              const t = gs.targets[i];
              const dx = b.x - t.x, dy = b.y - t.y;
              if (dx * dx + dy * dy < (t.r + 7) * (t.r + 7)) {
                gs.combo++;
                gs.comboTimer = 2.5;
                const pts = 100 * gs.combo;
                gs.score += pts;
                gs.particles.push(...spawnParticles(t.x, t.y, t.color));
                gs.scorePopups.push({ x: t.x, y: t.y - t.r, text: `+${pts}`, color: t.color, life: 1, vy: -1.2 });
                if (audio) {
                  if (gs.combo >= 3) audio.combo(gs.combo);
                  else audio.hit();
                }
                gs.targets[i] = makeTarget();
                return false;
              }
            }
            return true;
          });

          // Wall flashes
          gs.wallFlashes = gs.wallFlashes.filter(f => { f.life -= dt * 5; return f.life > 0; });

          // Particles
          gs.particles = gs.particles.filter(p => {
            p.x += p.vx; p.y += p.vy; p.vx *= 0.91; p.vy *= 0.91;
            p.life -= dt * 2.2; return p.life > 0;
          });

          // Score popups
          gs.scorePopups = gs.scorePopups.filter(p => {
            p.y += p.vy; p.life -= dt * 1.8; return p.life > 0;
          });
        }

        // ─── DRAW ─────────────────────────────────────────────────
        function draw(ts) {
          // Background
          const bg = ctx.createRadialGradient(W/2, H*0.4, 0, W/2, H*0.4, W * 0.9);
          bg.addColorStop(0, `hsl(${gs.bgHue}, 65%, 8%)`);
          bg.addColorStop(1, `hsl(${(gs.bgHue + 50) % 360}, 80%, 3%)`);
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, W, H);

          // Subtle grid
          ctx.strokeStyle = 'rgba(255,255,255,0.022)';
          ctx.lineWidth = 1;
          for (let x = 0; x < W; x += 48) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
          }
          for (let y = 0; y < H; y += 48) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
          }

          if (gs.phase === 'start') { drawStart(ts); return; }

          drawPlayfield(ts);
          drawHUD(ts);
          if (gs.phase === 'gameover') drawGameOver(ts);
        }

        function drawPlayfield(ts) {
          // Danger zone
          ctx.save();
          ctx.setLineDash([10, 10]);
          ctx.strokeStyle = 'rgba(255,60,60,0.25)';
          ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(0, H * 0.68); ctx.lineTo(W, H * 0.68); ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();

          // Wall flashes
          for (const f of gs.wallFlashes) {
            ctx.save();
            ctx.globalAlpha = f.life * 0.7;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ffff';
            if (f.side === 'L') {
              const g = ctx.createLinearGradient(0, f.y, 35, f.y);
              g.addColorStop(0, '#00ffff'); g.addColorStop(1, 'transparent');
              ctx.fillStyle = g;
              ctx.fillRect(0, f.y - 50, 35, 100);
            } else if (f.side === 'R') {
              const g = ctx.createLinearGradient(W, f.y, W - 35, f.y);
              g.addColorStop(0, '#00ffff'); g.addColorStop(1, 'transparent');
              ctx.fillStyle = g;
              ctx.fillRect(W - 35, f.y - 50, 35, 100);
            } else {
              const g = ctx.createLinearGradient(f.x, 0, f.x, 35);
              g.addColorStop(0, '#00ffff'); g.addColorStop(1, 'transparent');
              ctx.fillStyle = g;
              ctx.fillRect(f.x - 50, 0, 100, 35);
            }
            ctx.restore();
          }

          // Targets
          for (const t of gs.targets) {
            const pulse = Math.sin(t.pulse) * 0.15 + 0.85;
            const r = t.r * pulse * (1 + t.flash * 0.3);
            ctx.save();
            ctx.shadowBlur = 18 + Math.sin(t.pulse) * 5;
            ctx.shadowColor = t.color;
            // Outer aura ring
            ctx.beginPath();
            ctx.arc(t.x, t.y, r + 9, 0, Math.PI * 2);
            ctx.strokeStyle = t.color + '40';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            // Body
            ctx.beginPath();
            ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
            const tg = ctx.createRadialGradient(t.x - r*0.3, t.y - r*0.3, 0, t.x, t.y, r);
            tg.addColorStop(0, '#ffffffdd');
            tg.addColorStop(0.45, t.color);
            tg.addColorStop(1, t.color + '55');
            ctx.fillStyle = tg;
            ctx.fill();
            // Edge ring
            ctx.beginPath();
            ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            // Crosshair
            ctx.strokeStyle = 'rgba(0,0,0,0.35)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(t.x - 11, t.y); ctx.lineTo(t.x + 11, t.y);
            ctx.moveTo(t.x, t.y - 11); ctx.lineTo(t.x, t.y + 11);
            ctx.stroke();
            ctx.restore();
          }

          // Bullet trails + bullets
          for (const b of gs.bullets) {
            for (let i = 1; i < b.trail.length; i++) {
              const a = i / b.trail.length;
              ctx.beginPath();
              ctx.moveTo(b.trail[i-1].x, b.trail[i-1].y);
              ctx.lineTo(b.trail[i].x, b.trail[i].y);
              ctx.strokeStyle = b.color + Math.floor(a * 190).toString(16).padStart(2, '0');
              ctx.lineWidth = a * 5;
              ctx.lineCap = 'round';
              ctx.stroke();
            }
            ctx.save();
            ctx.shadowBlur = 22;
            ctx.shadowColor = b.color;
            ctx.beginPath();
            ctx.arc(b.x, b.y, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
            ctx.fillStyle = b.color;
            ctx.fill();
            ctx.restore();
          }

          // Particles
          for (const p of gs.particles) {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.shadowBlur = 8;
            ctx.shadowColor = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            ctx.restore();
          }

          // Score popups
          for (const p of gs.scorePopups) {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.shadowBlur = 12;
            ctx.shadowColor = p.color;
            ctx.fillStyle = p.color;
            ctx.font = `bold ${Math.floor(W * 0.048)}px 'Courier New', monospace`;
            ctx.textAlign = 'center';
            ctx.fillText(p.text, p.x, p.y);
            ctx.restore();
          }

          // Cannon
          const cx = W / 2, cy = H - 52;
          const angle = Math.atan2(gs.mouseY - cy, gs.mouseX - cx);
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(angle + Math.PI / 2);
          ctx.shadowBlur = 28;
          ctx.shadowColor = '#00ffff';
          // Base glow circle
          const cg = ctx.createRadialGradient(-5, -5, 0, 0, 0, 22);
          cg.addColorStop(0, '#ffffff');
          cg.addColorStop(0.45, '#00ffff');
          cg.addColorStop(1, '#005577');
          ctx.beginPath();
          ctx.arc(0, 0, 22, 0, Math.PI * 2);
          ctx.fillStyle = cg;
          ctx.fill();
          ctx.strokeStyle = '#00ffff';
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Barrel
          ctx.fillStyle = '#00ffff';
          ctx.shadowColor = '#00ffff';
          ctx.shadowBlur = 15;
          ctx.beginPath();
          ctx.rect(-6, -34, 12, 28);
          ctx.fill();
          // Barrel tip
          ctx.beginPath();
          ctx.arc(0, -32, 6, 0, Math.PI * 2);
          ctx.fillStyle = '#ffffff';
          ctx.fill();
          ctx.restore();

          // Aim line (dotted guide)
          if (gs.mouseY < cy - 10) {
            ctx.save();
            ctx.globalAlpha = 0.12;
            ctx.setLineDash([6, 10]);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            const aimAngle = Math.atan2(gs.mouseY - cy, gs.mouseX - cx);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(aimAngle) * 300, cy + Math.sin(aimAngle) * 300);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
          }
        }

        function drawHUD(ts) {
          ctx.save();
          // Score
          ctx.shadowBlur = 18;
          ctx.shadowColor = '#00ffff';
          ctx.fillStyle = '#00ffff';
          ctx.font = `bold ${Math.floor(W * 0.065)}px 'Courier New', monospace`;
          ctx.textAlign = 'left';
          ctx.fillText(gs.score.toLocaleString(), 16, 52);
          ctx.fillStyle = '#ffff0099';
          ctx.shadowColor = '#ffff00';
          ctx.font = `${Math.floor(W * 0.028)}px 'Courier New', monospace`;
          ctx.fillText(`BEST ${gs.highScore}`, 16, 76);

          // Timer
          const tColor = gs.timeLeft < 15 ? '#ff4444' : gs.timeLeft < 30 ? '#ffaa00' : '#00ff88';
          ctx.shadowColor = tColor;
          ctx.fillStyle = tColor;
          ctx.font = `bold ${Math.floor(W * 0.065)}px 'Courier New', monospace`;
          ctx.textAlign = 'right';
          ctx.fillText(`${Math.ceil(gs.timeLeft)}`, W - 16, 52);
          ctx.font = `${Math.floor(W * 0.026)}px 'Courier New', monospace`;
          ctx.fillStyle = tColor + 'aa';
          ctx.fillText('SEC', W - 16, 73);

          // Timer bar
          const bx = 16, by = H - 76, bw = W - 32, bh = 5;
          ctx.fillStyle = 'rgba(255,255,255,0.07)';
          ctx.fillRect(bx, by, bw, bh);
          ctx.shadowBlur = 8; ctx.shadowColor = tColor;
          ctx.fillStyle = tColor;
          ctx.fillRect(bx, by, bw * Math.max(0, gs.timeLeft / 90), bh);

          // Last 3s flash
          if (gs.timeLeft > 0 && gs.timeLeft < 3) {
            ctx.globalAlpha = Math.sin(ts / 80) * 0.25 + 0.1;
            ctx.fillStyle = '#ff0000';
            ctx.fillRect(0, 0, W, H);
            ctx.globalAlpha = 1;
          }

          // Combo banner
          if (gs.combo >= 2 && gs.comboTimer > 0) {
            const p = 0.7 + Math.sin(ts / 75) * 0.3;
            ctx.globalAlpha = p;
            ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 20;
            ctx.fillStyle = '#ff00ff';
            ctx.font = `bold ${Math.floor(W * 0.068)}px 'Courier New', monospace`;
            ctx.textAlign = 'center';
            ctx.fillText(`×${gs.combo} COMBO!`, W / 2, 62);
            ctx.globalAlpha = 1;
          }

          // Hint (first 5 sec)
          if (gs.timeLeft > 85) {
            ctx.globalAlpha = (gs.timeLeft - 85) / 5;
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff'; ctx.shadowBlur = 8;
            ctx.font = `${Math.floor(W * 0.03)}px 'Courier New', monospace`;
            ctx.textAlign = 'center';
            ctx.fillText('Aim above cannon · Bullets bounce off walls!', W / 2, H - 88);
            ctx.globalAlpha = 1;
          }
          ctx.restore();
        }

        function drawStart(ts) {
          ctx.save();
          ctx.textAlign = 'center';
          const pulse = 0.7 + Math.sin(ts / 600) * 0.3;

          ctx.shadowBlur = 45;
          ctx.shadowColor = '#00ffff';
          ctx.fillStyle = '#00ffff';
          ctx.font = `bold ${Math.floor(W * 0.14)}px 'Courier New', monospace`;
          ctx.fillText('RICO', W / 2, H * 0.27);

          ctx.shadowColor = '#ff00ff';
          ctx.fillStyle = '#ff00ff';
          ctx.font = `bold ${Math.floor(W * 0.11)}px 'Courier New', monospace`;
          ctx.fillText('CHET', W / 2, H * 0.27 + W * 0.14);

          ctx.shadowColor = '#ffff00';
          ctx.fillStyle = '#ffff00';
          ctx.font = `bold ${Math.floor(W * 0.09)}px 'Courier New', monospace`;
          ctx.fillText('RUSH', W / 2, H * 0.27 + W * 0.26);

          ctx.shadowBlur = 10;
          ctx.shadowColor = '#ffffff';
          ctx.fillStyle = 'rgba(255,255,255,0.65)';
          ctx.font = `${Math.floor(W * 0.033)}px 'Courier New', monospace`;
          ctx.fillText('Fire bullets · Bounce off walls', W / 2, H * 0.64);
          ctx.fillText('Hit glowing targets · Chain combos!', W / 2, H * 0.70);

          ctx.fillStyle = `rgba(0,255,255,${pulse})`;
          ctx.shadowColor = '#00ffff';
          ctx.shadowBlur = 18;
          ctx.font = `bold ${Math.floor(W * 0.052)}px 'Courier New', monospace`;
          ctx.fillText('TAP TO PLAY', W / 2, H * 0.82);

          if (gs.highScore > 0) {
            ctx.fillStyle = '#ffff00';
            ctx.shadowColor = '#ffff00';
            ctx.font = `${Math.floor(W * 0.038)}px 'Courier New', monospace`;
            ctx.fillText(`BEST: ${gs.highScore}`, W / 2, H * 0.90);
          }
          ctx.restore();
        }

        function drawGameOver(ts) {
          ctx.save();
          ctx.fillStyle = 'rgba(0,0,0,0.78)';
          ctx.fillRect(0, 0, W, H);
          ctx.textAlign = 'center';
          const newBest = gs.score > 0 && gs.score >= gs.highScore;

          ctx.shadowBlur = 38;
          ctx.shadowColor = '#ff4444';
          ctx.fillStyle = '#ff4444';
          ctx.font = `bold ${Math.floor(W * 0.11)}px 'Courier New', monospace`;
          ctx.fillText('GAME OVER', W / 2, H * 0.34);

          ctx.shadowColor = '#00ffff';
          ctx.fillStyle = '#00ffff';
          ctx.font = `bold ${Math.floor(W * 0.07)}px 'Courier New', monospace`;
          ctx.fillText(`SCORE: ${gs.score.toLocaleString()}`, W / 2, H * 0.47);

          if (newBest) {
            const p = 0.55 + Math.sin(ts / 200) * 0.45;
            ctx.globalAlpha = p;
            ctx.shadowColor = '#ffff00';
            ctx.fillStyle = '#ffff00';
            ctx.font = `bold ${Math.floor(W * 0.055)}px 'Courier New', monospace`;
            ctx.fillText('✦ NEW BEST! ✦', W / 2, H * 0.57);
            ctx.globalAlpha = 1;
          } else {
            ctx.fillStyle = '#77777788';
            ctx.shadowBlur = 4;
            ctx.font = `${Math.floor(W * 0.036)}px 'Courier New', monospace`;
            ctx.fillText(`BEST: ${gs.highScore}`, W / 2, H * 0.57);
          }

          const p2 = 0.65 + Math.sin(ts / 480) * 0.35;
          ctx.globalAlpha = p2;
          ctx.shadowColor = '#00ffff';
          ctx.fillStyle = '#00ffff';
          ctx.shadowBlur = 16;
          ctx.font = `bold ${Math.floor(W * 0.048)}px 'Courier New', monospace`;
          ctx.fillText('TAP TO PLAY AGAIN', W / 2, H * 0.72);
          ctx.restore();
        }

        // ─── LOOP ─────────────────────────────────────────────────
        function loop(ts) {
          if (!gs.lastTime) gs.lastTime = ts;
          const dt = Math.min((ts - gs.lastTime) / 1000, 0.05);
          gs.lastTime = ts;
          update(dt);
          draw(ts);
          gs.animId = requestAnimationFrame(loop);
        }

        gs.animId = requestAnimationFrame(loop);

        return () => {
          cancelAnimationFrame(gs.animId);
          canvas.removeEventListener('mousemove', handleMove);
          canvas.removeEventListener('mousedown', handlePress);
          canvas.removeEventListener('touchmove', handleMove);
          canvas.removeEventListener('touchstart', handlePress);
        };
      }, []);

      return (
        <canvas
          ref={canvasRef}
          style={{ cursor: 'crosshair', touchAction: 'none', display: 'block' }}
        />
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<Game />);
  </script>
</body>
</html>
