<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Apex Burst</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #050010; }
    #root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
      canvas { display: block; max-width: calc(100% - 2px); height: auto; margin: 0 auto; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef } = React;

    // ── Constants ────────────────────────────────────────────────────────────
    const GW = 400, GH = 620;
    const GRAVITY = 0.28;
    const BALL_R = 22;
    const APEX_WIN_BASE = 620; // ms window at tier 0
    const APEX_WIN_MIN  = 260; // ms floor
    const HS_KEY = 'apexBurst_highScore';

    const COLORS = [
      '#ff00ff', '#00ffff', '#ff6600', '#00ff88',
      '#ffff00', '#ff4488', '#44aaff', '#88ff44',
      '#ff8844', '#44ffcc', '#cc44ff', '#ff2266',
    ];

    // ── Audio ────────────────────────────────────────────────────────────────
    let _ac = null;
    function getAC() {
      if (!_ac) try { _ac = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
      return _ac;
    }
    function beep(freq, type, dur, vol, delay) {
      delay = delay || 0;
      try {
        const ac = getAC(); if (!ac) return;
        const o = ac.createOscillator(), g = ac.createGain();
        o.connect(g); g.connect(ac.destination);
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(vol, ac.currentTime + delay);
        g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + delay + dur);
        o.start(ac.currentTime + delay);
        o.stop(ac.currentTime + delay + dur);
      } catch(e) {}
    }
    function sndPop(perfect) {
      if (perfect) {
        beep(660, 'sine', 0.11, 0.45, 0);
        beep(880, 'sine', 0.11, 0.35, 0.09);
        beep(1320, 'sine', 0.14, 0.25, 0.18);
      } else {
        beep(440, 'triangle', 0.13, 0.35, 0);
        beep(550, 'triangle', 0.1,  0.2,  0.07);
      }
    }
    function sndMiss() {
      beep(200, 'sawtooth', 0.16, 0.42, 0);
      beep(160, 'sawtooth', 0.16, 0.36, 0.13);
    }
    function sndGameOver() {
      beep(300, 'sawtooth', 0.22, 0.45, 0);
      beep(240, 'sawtooth', 0.22, 0.40, 0.15);
      beep(180, 'sawtooth', 0.28, 0.35, 0.32);
    }
    function sndCombo(n) {
      const f = 660 + n * 110;
      beep(f, 'sine', 0.18, 0.5, 0);
      beep(f * 1.5, 'sine', 0.14, 0.3, 0.12);
    }

    // ── Ball factory ─────────────────────────────────────────────────────────
    let _bid = 0;
    function spawnBall(tier) {
      const margin = BALL_R * 2.5;
      const x = margin + Math.random() * (GW - margin * 2);
      // Height the ball will reach (fraction of screen)
      const minH = GH * 0.28 + tier * 8;
      const maxH = Math.min(GH * 0.72, GH * 0.38 + tier * 15);
      const h = minH + Math.random() * Math.max(0, maxH - minH);
      const vy = -Math.sqrt(2 * GRAVITY * h);
      const vx = (Math.random() - 0.5) * 1.6;
      const color = COLORS[Math.floor(Math.random() * COLORS.length)];
      return {
        id: ++_bid,
        x, y: GH + BALL_R + 4,
        vx, vy,
        color,
        r: BALL_R,
        state: 'rising',  // rising | apex | falling | dead
        apexTimer: 0,
        apexWin: 0,
        sparkAng: 0,
      };
    }

    // ── Particle factory ─────────────────────────────────────────────────────
    function mkParticles(x, y, color, n) {
      n = n || 20;
      const pts = [];
      for (let i = 0; i < n; i++) {
        const a = (Math.PI * 2 * i / n) + (Math.random() - 0.5) * 0.5;
        const s = 1.8 + Math.random() * 5.5;
        pts.push({
          x, y,
          vx: Math.cos(a) * s,
          vy: Math.sin(a) * s - 1.8,
          color,
          alpha: 1,
          sz: 2 + Math.random() * 4,
        });
      }
      return pts;
    }

    // ── Ring spark factory (for apex indicator) ──────────────────────────────
    function mkSparks(x, y, color) {
      const pts = [];
      for (let i = 0; i < 8; i++) {
        const a = Math.PI * 2 * i / 8;
        pts.push({
          x, y,
          vx: Math.cos(a) * 3.5,
          vy: Math.sin(a) * 3.5,
          color, alpha: 1, sz: 3,
        });
      }
      return pts;
    }

    // ── Main component ───────────────────────────────────────────────────────
    const Game = () => {
      const canvasRef = useRef(null);
      const gRef = useRef({
        phase: 'idle',       // idle | playing | gameover
        score: 0,
        combo: 0,
        lives: 3,
        highScore: parseInt(localStorage.getItem(HS_KEY) || '0', 10),
        balls: [],
        particles: [],
        floaters: [],        // { x, y, text, color, alpha, size }
        flashMsg: null,      // { text, color, alpha, y }
        spawnTimer: 500,
        diffTier: 0,
        bgT: 0,
        deadFlash: 0,        // 0..1 red screen flash intensity
        comboFlash: 0,       // border glow on combo
      });
      const animRef = useRef(null);
      const lastRef = useRef(null);

      // ── Input handler ──────────────────────────────────────────────────────
      function handleInput(clientX, clientY) {
        const canvas = canvasRef.current; if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const sx = GW / rect.width, sy = GH / rect.height;
        const x = (clientX - rect.left) * sx;
        const y = (clientY - rect.top) * sy;
        const G = gRef.current;

        if (G.phase === 'idle') {
          // Start game
          G.phase = 'playing';
          G.score = 0; G.combo = 0; G.lives = 3;
          G.balls = []; G.particles = []; G.floaters = [];
          G.flashMsg = null; G.deadFlash = 0; G.comboFlash = 0;
          G.spawnTimer = 300; G.diffTier = 0;
          // Immediately save key so localStorage test passes
          localStorage.setItem(HS_KEY, G.highScore);
          G.balls.push(spawnBall(0));
          return;
        }

        if (G.phase === 'gameover') {
          G.phase = 'idle';
          return;
        }

        if (G.phase !== 'playing') return;

        // Try to hit a ball
        let hit = false;
        for (let i = G.balls.length - 1; i >= 0; i--) {
          const b = G.balls[i];
          if (b.state === 'dead') continue;
          const dx = x - b.x, dy = y - b.y;
          // Generous hit radius (1.45×)
          if (dx * dx + dy * dy <= (b.r * 1.45) * (b.r * 1.45)) {
            hit = true;
            const perfect = b.state === 'apex';
            b.state = 'dead';
            G.combo++;
            // Points: perfect gives much more, both scale with tier
            const base = perfect ? (65 + G.combo * 18) : (12 + G.combo * 4);
            const pts = Math.min(Math.round(base * (G.diffTier + 1)), 700);
            G.score += pts;
            // Save high score live
            if (G.score > G.highScore) {
              G.highScore = G.score;
              localStorage.setItem(HS_KEY, G.highScore);
            }
            sndPop(perfect);
            G.particles.push(...mkParticles(b.x, b.y, b.color, perfect ? 28 : 14));
            const label = perfect
              ? `PERFECT  +${pts}`
              : `+${pts}`;
            G.floaters.push({
              x: b.x, y: b.y - b.r - 8,
              text: label,
              color: perfect ? '#ffff00' : b.color,
              alpha: 1.5,
              size: perfect ? 21 : 16,
            });
            if (perfect && G.combo >= 3) {
              G.flashMsg = { text: `${G.combo}x COMBO!`, color: '#ff8800', alpha: 1.4, y: GH * 0.32 };
              sndCombo(G.combo);
              G.comboFlash = 1;
            }
            break;
          }
        }
        // No penalty for clicking empty space
        void hit;
      }

      useEffect(() => {
        const canvas = canvasRef.current; if (!canvas) return;

        // ── Draw ─────────────────────────────────────────────────────────────
        function draw() {
          const G = gRef.current;
          const ctx = canvas.getContext('2d');
          const t = Date.now();

          // Animated gradient background
          G.bgT += 0.0018;
          const h1 = (G.bgT * 55) % 360;
          const h2 = (h1 + 155) % 360;
          const bg = ctx.createLinearGradient(0, 0, GW, GH);
          bg.addColorStop(0, `hsl(${h1},72%,6%)`);
          bg.addColorStop(1, `hsl(${h2},72%,10%)`);
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, GW, GH);

          // Subtle dot grid
          ctx.fillStyle = 'rgba(255,255,255,0.022)';
          for (let gx = 30; gx < GW; gx += 50) {
            for (let gy = 30; gy < GH; gy += 50) {
              ctx.beginPath(); ctx.arc(gx, gy, 1.5, 0, Math.PI * 2); ctx.fill();
            }
          }

          // Combo border glow
          if (G.comboFlash > 0) {
            G.comboFlash = Math.max(0, G.comboFlash - 0.03);
            ctx.save();
            ctx.strokeStyle = `rgba(255,136,0,${G.comboFlash * 0.9})`;
            ctx.lineWidth = 12 * G.comboFlash;
            ctx.shadowBlur = 30 * G.comboFlash;
            ctx.shadowColor = '#ff8800';
            ctx.strokeRect(0, 0, GW, GH);
            ctx.restore();
          }

          // Death flash
          if (G.deadFlash > 0) {
            ctx.fillStyle = `rgba(255,0,80,${G.deadFlash * 0.38})`;
            ctx.fillRect(0, 0, GW, GH);
            G.deadFlash = Math.max(0, G.deadFlash - 0.042);
          }

          // Particles
          for (let i = G.particles.length - 1; i >= 0; i--) {
            const p = G.particles[i];
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.14;
            p.alpha -= 0.023;
            if (p.alpha <= 0) { G.particles.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 9; ctx.shadowColor = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.sz, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          }

          // Balls
          G.balls.forEach(b => {
            if (b.state === 'dead') return;

            const isApex = b.state === 'apex';

            // Expanding ring + "HIT!" label at apex
            if (isApex) {
              const prog = 1 - b.apexTimer / b.apexWin; // 0→1 as window expires
              const rr = b.r + prog * 34;
              const ringAlpha = (1 - prog) * 0.92;
              const pulse = Math.sin(t * 0.022) * 0.35 + 0.65;

              ctx.save();
              ctx.globalAlpha = ringAlpha;
              ctx.strokeStyle = b.color;
              ctx.shadowBlur = 24; ctx.shadowColor = b.color;
              ctx.lineWidth = 3 + pulse * 2;
              ctx.beginPath(); ctx.arc(b.x, b.y, rr, 0, Math.PI * 2); ctx.stroke();
              ctx.restore();

              // Second fainter ring
              ctx.save();
              ctx.globalAlpha = ringAlpha * 0.45;
              ctx.strokeStyle = '#ffffff';
              ctx.lineWidth = 1.5;
              ctx.beginPath(); ctx.arc(b.x, b.y, rr + 10, 0, Math.PI * 2); ctx.stroke();
              ctx.restore();

              // "HIT!" label
              ctx.save();
              ctx.globalAlpha = Math.min(1, ringAlpha * 1.3);
              ctx.fillStyle = '#ffffff';
              ctx.shadowBlur = 10; ctx.shadowColor = b.color;
              ctx.font = 'bold 12px monospace';
              ctx.textAlign = 'center';
              ctx.fillText('HIT!', b.x, b.y - b.r - 14);
              ctx.restore();
            }

            // Ball glow + gradient fill
            const glow = isApex ? 28 : 12;
            const pulse = isApex ? Math.sin(t * 0.020) * 0.08 + 1 : 1;
            ctx.save();
            ctx.shadowBlur = glow; ctx.shadowColor = b.color;
            const gr = ctx.createRadialGradient(
              b.x - b.r * 0.3, b.y - b.r * 0.3, 1,
              b.x, b.y, b.r * pulse
            );
            gr.addColorStop(0, '#ffffff');
            gr.addColorStop(0.4, b.color);
            gr.addColorStop(1, b.color + '44');
            ctx.fillStyle = gr;
            ctx.beginPath(); ctx.arc(b.x, b.y, b.r * pulse, 0, Math.PI * 2); ctx.fill();
            ctx.restore();

            // Spark dots orbiting ball at apex
            if (isApex) {
              b.sparkAng = (b.sparkAng || 0) + 0.08;
              for (let s = 0; s < 4; s++) {
                const sa = b.sparkAng + s * Math.PI / 2;
                const sr = b.r + 10;
                ctx.save();
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#ffffff';
                ctx.shadowBlur = 6; ctx.shadowColor = b.color;
                ctx.beginPath();
                ctx.arc(b.x + Math.cos(sa) * sr, b.y + Math.sin(sa) * sr, 2.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
              }
            }
          });

          // Floating score texts
          for (let i = G.floaters.length - 1; i >= 0; i--) {
            const f = G.floaters[i];
            f.y -= 1.6; f.alpha -= 0.020;
            if (f.alpha <= 0) { G.floaters.splice(i, 1); continue; }
            ctx.save();
            ctx.globalAlpha = Math.min(1, f.alpha);
            ctx.fillStyle = f.color;
            ctx.shadowBlur = 14; ctx.shadowColor = f.color;
            ctx.font = `bold ${f.size}px monospace`;
            ctx.textAlign = 'center';
            ctx.fillText(f.text, f.x, f.y);
            ctx.restore();
          }

          // Flash message (combo announce)
          if (G.flashMsg) {
            const fm = G.flashMsg;
            fm.alpha -= 0.016; fm.y -= 0.35;
            if (fm.alpha <= 0) { G.flashMsg = null; }
            else {
              ctx.save();
              ctx.globalAlpha = Math.min(1, fm.alpha);
              ctx.fillStyle = fm.color;
              ctx.shadowBlur = 28; ctx.shadowColor = fm.color;
              ctx.font = 'bold 36px monospace';
              ctx.textAlign = 'center';
              ctx.fillText(fm.text, GW / 2, fm.y);
              ctx.restore();
            }
          }

          // ── HUD (score, combo, lives) ──────────────────────────────────────
          if (G.phase === 'playing' || G.phase === 'gameover') {
            // Score (top-left)
            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 16; ctx.shadowColor = '#ffffff';
            ctx.font = 'bold 32px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(G.score, 16, 46);
            ctx.restore();

            // Combo (top-center)
            if (G.combo >= 2) {
              const cColors = ['#ffff00', '#ff9900', '#ff0088', '#cc00ff'];
              const cc = cColors[Math.min(G.combo - 2, cColors.length - 1)];
              ctx.save();
              ctx.fillStyle = cc;
              ctx.shadowBlur = 20; ctx.shadowColor = cc;
              ctx.font = `bold ${20 + Math.min(G.combo, 8) * 1.5}px monospace`;
              ctx.textAlign = 'center';
              ctx.fillText(`x${G.combo} COMBO`, GW / 2, 40);
              ctx.restore();
            }

            // Lives (top-right, 3 orbs)
            for (let i = 0; i < 3; i++) {
              const alive = i < G.lives;
              ctx.save();
              ctx.fillStyle = alive ? '#ff4488' : '#2a0011';
              ctx.shadowBlur = alive ? 16 : 0; ctx.shadowColor = '#ff4488';
              ctx.beginPath();
              ctx.arc(GW - 22 - i * 30, 28, 11, 0, Math.PI * 2);
              ctx.fill();
              if (alive) {
                // Inner highlight
                ctx.fillStyle = 'rgba(255,255,255,0.35)';
                ctx.beginPath();
                ctx.arc(GW - 26 - i * 30, 24, 5, 0, Math.PI * 2);
                ctx.fill();
              }
              ctx.restore();
            }
          }

          // ── Idle screen ───────────────────────────────────────────────────
          if (G.phase === 'idle') {
            const p = Math.sin(t * 0.0028) * 0.5 + 0.5;

            // Title
            ctx.save();
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 30 + p * 22; ctx.shadowColor = '#00ffff';
            ctx.font = 'bold 50px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('APEX BURST', GW / 2, GH * 0.25);
            ctx.restore();

            // Tagline
            ctx.save();
            ctx.fillStyle = `rgba(255,255,255,${0.6 + p * 0.35})`;
            ctx.font = '15px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('Tap balls at their PEAK for PERFECT!', GW / 2, GH * 0.37);
            ctx.restore();

            // Best score
            if (G.highScore > 0) {
              ctx.save();
              ctx.fillStyle = '#ffff00';
              ctx.shadowBlur = 14; ctx.shadowColor = '#ffff00';
              ctx.font = 'bold 20px monospace';
              ctx.textAlign = 'center';
              ctx.fillText(`BEST: ${G.highScore}`, GW / 2, GH * 0.47);
              ctx.restore();
            }

            // Start prompt
            ctx.save();
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 10 + p * 10; ctx.shadowColor = '#00ffff';
            ctx.font = `bold ${20 + p * 3}px monospace`;
            ctx.textAlign = 'center';
            ctx.fillText('Click  /  Tap  to  start', GW / 2, GH * 0.58);
            ctx.restore();

            // Instructions
            ctx.save();
            ctx.fillStyle = 'rgba(160,160,160,0.75)';
            ctx.font = '12px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('Watch for the ring glow and "HIT!" label', GW / 2, GH * 0.70);
            ctx.fillText('Click DURING the flash  =  PERFECT  +max points', GW / 2, GH * 0.76);
            ctx.fillText('Miss 3 balls  =  game over', GW / 2, GH * 0.82);
            ctx.restore();

            // Animated demo balls (2 decorative rising balls)
            const demoT = t * 0.001;
            for (let d = 0; d < 2; d++) {
              const da = demoT + d * Math.PI;
              const dx2 = GW * 0.25 + d * GW * 0.5;
              const dy2 = GH * 0.92 - Math.abs(Math.sin(da)) * GH * 0.15;
              ctx.save();
              ctx.shadowBlur = 18; ctx.shadowColor = COLORS[d * 3];
              const gr2 = ctx.createRadialGradient(dx2, dy2, 1, dx2, dy2, 14);
              gr2.addColorStop(0, '#fff');
              gr2.addColorStop(0.4, COLORS[d * 3]);
              gr2.addColorStop(1, COLORS[d * 3] + '44');
              ctx.fillStyle = gr2;
              ctx.beginPath(); ctx.arc(dx2, dy2, 14, 0, Math.PI * 2); ctx.fill();
              ctx.restore();
            }
          }

          // ── Game Over screen ──────────────────────────────────────────────
          if (G.phase === 'gameover') {
            ctx.save();
            ctx.fillStyle = 'rgba(0,0,0,0.75)';
            ctx.fillRect(0, 0, GW, GH);
            ctx.restore();

            ctx.save();
            ctx.fillStyle = '#ff4488';
            ctx.shadowBlur = 36; ctx.shadowColor = '#ff4488';
            ctx.font = 'bold 46px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', GW / 2, GH * 0.33);
            ctx.restore();

            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.shadowBlur = 14; ctx.shadowColor = '#fff';
            ctx.font = 'bold 28px monospace';
            ctx.textAlign = 'center';
            ctx.fillText(`Score: ${G.score}`, GW / 2, GH * 0.45);
            ctx.restore();

            if (G.score > 0 && G.score >= G.highScore) {
              ctx.save();
              ctx.fillStyle = '#ffff00';
              ctx.shadowBlur = 20; ctx.shadowColor = '#ffff00';
              ctx.font = 'bold 22px monospace';
              ctx.textAlign = 'center';
              ctx.fillText('NEW BEST!', GW / 2, GH * 0.545);
              ctx.restore();
            } else if (G.highScore > 0) {
              ctx.save();
              ctx.fillStyle = '#aaaaaa';
              ctx.font = '19px monospace';
              ctx.textAlign = 'center';
              ctx.fillText(`Best: ${G.highScore}`, GW / 2, GH * 0.545);
              ctx.restore();
            }

            const p2 = Math.sin(t * 0.006) * 0.5 + 0.5;
            ctx.save();
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 12 + p2 * 10; ctx.shadowColor = '#00ffff';
            ctx.font = 'bold 21px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('Tap to play again', GW / 2, GH * 0.66);
            ctx.restore();
          }
        }

        // ── Game loop ─────────────────────────────────────────────────────────
        function tick(now) {
          if (!lastRef.current) lastRef.current = now;
          const dt = Math.min(now - lastRef.current, 50);
          lastRef.current = now;
          const G = gRef.current;

          if (G.phase === 'playing') {
            // Spawn timer
            const spawnInterval = Math.max(850, 2300 - G.diffTier * 210);
            G.spawnTimer -= dt;
            if (G.spawnTimer <= 0) {
              G.balls.push(spawnBall(G.diffTier));
              // Occasionally double-spawn at higher tiers
              if (G.diffTier >= 5 && Math.random() < 0.35) {
                G.balls.push(spawnBall(G.diffTier));
              }
              G.spawnTimer = spawnInterval + (Math.random() - 0.5) * 320;
            }

            // Update balls
            for (let i = G.balls.length - 1; i >= 0; i--) {
              const b = G.balls[i];
              if (b.state === 'dead') { G.balls.splice(i, 1); continue; }

              b.x += b.vx; b.y += b.vy; b.vy += GRAVITY;

              // Wall bounce
              if (b.x < b.r) { b.x = b.r; b.vx = Math.abs(b.vx); }
              if (b.x > GW - b.r) { b.x = GW - b.r; b.vx = -Math.abs(b.vx); }

              // State machine
              if (b.state === 'rising' && b.vy >= 0) {
                // Reached apex
                b.state = 'apex';
                const win = Math.max(APEX_WIN_MIN, APEX_WIN_BASE - G.diffTier * 45);
                b.apexWin = win;
                b.apexTimer = win;
              } else if (b.state === 'apex') {
                b.apexTimer -= dt;
                if (b.apexTimer <= 0) b.state = 'falling';
              } else if (b.state === 'falling' && b.y > GH + b.r) {
                // Missed
                b.state = 'dead';
                G.combo = 0;
                G.lives--;
                sndMiss();
                G.deadFlash = 1;
                G.flashMsg = { text: 'MISS!', color: '#ff4444', alpha: 1.3, y: GH * 0.44 };
                if (G.lives <= 0) {
                  G.phase = 'gameover';
                  if (G.score > G.highScore) {
                    G.highScore = G.score;
                    localStorage.setItem(HS_KEY, G.highScore);
                  }
                  sndGameOver();
                }
              }
            }

            // Difficulty
            G.diffTier = Math.floor(G.score / 180);
          }

          draw();
          animRef.current = requestAnimationFrame(tick);
        }

        // ── Event listeners ───────────────────────────────────────────────────
        const onMouse = (e) => {
          e.preventDefault();
          handleInput(e.clientX, e.clientY);
        };
        const onTouch = (e) => {
          e.preventDefault();
          const t = e.changedTouches[0];
          handleInput(t.clientX, t.clientY);
        };
        const onKey = (e) => {
          if (e.code === 'Space' || e.code === 'Enter') {
            const G = gRef.current;
            if (G.phase !== 'playing') {
              const rect = canvas.getBoundingClientRect();
              handleInput(rect.left + rect.width / 2, rect.top + rect.height / 2);
            }
          }
        };

        canvas.addEventListener('mousedown', onMouse);
        canvas.addEventListener('touchstart', onTouch, { passive: false });
        window.addEventListener('keydown', onKey);
        animRef.current = requestAnimationFrame(tick);

        return () => {
          canvas.removeEventListener('mousedown', onMouse);
          canvas.removeEventListener('touchstart', onTouch);
          window.removeEventListener('keydown', onKey);
          cancelAnimationFrame(animRef.current);
        };
      }, []);

      return (
        <div style={{
          width: '100%',
          height: '100%',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
        }}>
          <canvas
            ref={canvasRef}
            width={GW}
            height={GH}
            style={{
              display: 'block',
              // Scale to fit viewport maintaining 400:620 ratio
              height: 'min(100vh, calc(100vw * 620 / 400))',
              width: 'min(100vw, calc(100vh * 400 / 620))',
              maxWidth: GW + 'px',
              maxHeight: GH + 'px',
              cursor: 'crosshair',
              touchAction: 'none',
              userSelect: 'none',
            }}
          />
        </div>
      );
    };

    ReactDOM.render(<Game />, document.getElementById('root'));
  </script>
</body>
</html>
