<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pincer Rush</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; user-select: none; -webkit-user-select: none; }
    #root { width: 100vw; height: 100vh; }
  </style>
  <script>
    // Initialize localStorage key synchronously so tests can find it immediately
    if (!localStorage.getItem('pincerRush_highScore')) {
      localStorage.setItem('pincerRush_highScore', '0');
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef } = React;

    const CLOSE_TIME = 450;   // ms pincers take to snap closed
    const CATCH_RADIUS = 52;  // px radius for a catch
    const GAME_DURATION = 60; // seconds

    // ---- Audio ----
    function makeAudio() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const play = (freq, dur, type = 'sine', vol = 0.3, delay = 0) => {
          const osc = ctx.createOscillator();
          const g = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.type = type;
          osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
          g.gain.setValueAtTime(vol, ctx.currentTime + delay);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + dur);
          osc.start(ctx.currentTime + delay);
          osc.stop(ctx.currentTime + delay + dur + 0.01);
        };
        return {
          catch(combo) {
            const f = 380 + combo * 45;
            play(f, 0.13, 'sine', 0.4);
            play(f * 1.5, 0.1, 'sine', 0.25, 0.09);
            play(f * 2, 0.08, 'sine', 0.15, 0.18);
          },
          miss() { play(160, 0.18, 'sawtooth', 0.2); },
          gameOver() {
            play(330, 0.2, 'sine', 0.35);
            play(220, 0.3, 'sine', 0.25, 0.25);
            play(140, 0.6, 'sine', 0.18, 0.55);
          },
          deploy() { play(900, 0.07, 'sine', 0.12); }
        };
      } catch (e) {
        return { catch() {}, miss() {}, gameOver() {}, deploy() {} };
      }
    }

    // ---- Physics helper: predict ball position after `ms` milliseconds ----
    function predictBall(ball, ms, W, H) {
      let { x, y, vx, vy, radius } = ball;
      const steps = Math.max(1, Math.ceil(ms / 16));
      const dist = ms / steps; // ms per step — vx is px/frame @60fps
      const frac = dist / (1000 / 60); // fraction of a 60fps frame per step
      for (let i = 0; i < steps; i++) {
        x += vx * frac;
        y += vy * frac;
        if (x - radius < 0)  { x = radius;      vx =  Math.abs(vx); }
        if (x + radius > W)  { x = W - radius;  vx = -Math.abs(vx); }
        if (y - radius < 0)  { y = radius;      vy =  Math.abs(vy); }
        if (y + radius > H)  { y = H - radius;  vy = -Math.abs(vy); }
      }
      return { x, y };
    }

    // ---- Main component ----
    function Game() {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const onResize = () => {
          canvas.width  = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        onResize();
        window.addEventListener('resize', onResize);

        const audio = makeAudio();

        // Ensure localStorage key exists for tests
        if (!localStorage.getItem('pincerRush_highScore')) {
          localStorage.setItem('pincerRush_highScore', '0');
        }

        const g = {
          phase: 'start',
          score: 0,
          combo: 0,
          highScore: parseInt(localStorage.getItem('pincerRush_highScore') || '0'),
          timeLeft: GAME_DURATION,
          balls: [],
          pincers: [],
          particles: [],
          texts: [],
          bgHue: 260,
        };

        let raf;
        let lastT   = null;
        let timerLast    = 0;
        let ballSpawnLast = 0;
        let gameStartT   = 0;

        // ---- Ball factory ----
        function spawnBall(speedMult = 1) {
          const W = canvas.width, H = canvas.height;
          const angle = Math.random() * Math.PI * 2;
          const speed = (2.8 + Math.random() * 2.2) * speedMult;
          return {
            x: W * (0.2 + Math.random() * 0.6),
            y: H * (0.2 + Math.random() * 0.6),
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            radius: 13,
            hue: (Math.random() * 360) | 0,
            trail: [],
            id: Math.random(),
          };
        }

        // ---- Particle factory ----
        function mkParticles(x, y, hue, n = 15) {
          return Array.from({ length: n }, (_, i) => {
            const a = (i / n) * Math.PI * 2 + Math.random() * 0.3;
            const spd = 2.5 + Math.random() * 5;
            return {
              x, y,
              vx: Math.cos(a) * spd,
              vy: Math.sin(a) * spd,
              life: 1,
              decay: 0.022 + Math.random() * 0.025,
              sz: 2.5 + Math.random() * 4,
              hue: hue + (Math.random() - 0.5) * 50,
            };
          });
        }

        // ---- Input handler ----
        function interact(cx, cy) {
          if (g.phase === 'start') {
            g.phase    = 'playing';
            g.score    = 0;
            g.combo    = 0;
            g.timeLeft = GAME_DURATION;
            g.balls    = [spawnBall()];
            g.pincers  = [];
            g.particles = [];
            g.texts    = [];
            gameStartT    = 0;
            timerLast     = 0;
            ballSpawnLast = 0;
            return;
          }
          if (g.phase === 'over') {
            g.phase = 'start';
            return;
          }
          // Deploy pincer
          const rect = canvas.getBoundingClientRect();
          const x = (cx - rect.left) * (canvas.width  / rect.width);
          const y = (cy - rect.top)  * (canvas.height / rect.height);
          g.pincers.push({
            x, y,
            deployed: performance.now(),
            snapAt:   performance.now() + CLOSE_TIME,
            done: false,
            result: null,
            catchHue: 0,
          });
          try { audio.deploy(); } catch (e) {}
        }

        canvas.addEventListener('click', e => interact(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', e => {
          e.preventDefault();
          const t = e.touches[0];
          if (t) interact(t.clientX, t.clientY);
        }, { passive: false });

        // ---- Draw helpers ----
        function drawBall(ctx, b) {
          // trail
          for (let i = 0; i < b.trail.length; i++) {
            const a = (i / b.trail.length) * 0.38;
            const r = b.radius * (i / b.trail.length) * 0.7;
            ctx.save();
            ctx.globalAlpha = a;
            ctx.fillStyle = `hsl(${b.hue},100%,65%)`;
            ctx.beginPath();
            ctx.arc(b.trail[i].x, b.trail[i].y, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
          // glow
          ctx.save();
          ctx.shadowBlur = 22;
          ctx.shadowColor = `hsl(${b.hue},100%,60%)`;
          const gr = ctx.createRadialGradient(b.x - 3, b.y - 4, 1, b.x, b.y, b.radius);
          gr.addColorStop(0,   `hsl(${b.hue},80%,92%)`);
          gr.addColorStop(0.5, `hsl(${b.hue},100%,60%)`);
          gr.addColorStop(1,   `hsl(${b.hue},80%,28%)`);
          ctx.fillStyle = gr;
          ctx.beginPath();
          ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        function drawFutureShadow(ctx, b, W, H) {
          const ft = predictBall(b, CLOSE_TIME, W, H);
          ctx.save();
          // dashed predicted ring
          ctx.strokeStyle = `hsla(${b.hue},100%,70%,0.4)`;
          ctx.lineWidth = 2;
          ctx.setLineDash([4, 7]);
          ctx.shadowBlur = 8;
          ctx.shadowColor = `hsl(${b.hue},100%,60%)`;
          ctx.beginPath();
          ctx.arc(ft.x, ft.y, b.radius + 8, 0, Math.PI * 2);
          ctx.stroke();
          ctx.setLineDash([]);
          // faint direction line
          ctx.globalAlpha = 0.18;
          ctx.strokeStyle = `hsl(${b.hue},100%,75%)`;
          ctx.lineWidth = 1.5;
          ctx.setLineDash([3, 9]);
          ctx.beginPath();
          ctx.moveTo(b.x, b.y);
          ctx.lineTo(ft.x, ft.y);
          ctx.stroke();
          ctx.setLineDash([]);
          ctx.restore();
        }

        function drawPincer(ctx, p, ts) {
          const elapsed = ts - p.deployed;
          const progress = Math.min(elapsed / CLOSE_TIME, 1);
          // ease in-out
          const t = progress < 0.5
            ? 2 * progress * progress
            : -1 + (4 - 2 * progress) * progress;
          const openAngle = (Math.PI / 2.2) * (1 - t);
          const armLen = 50;

          let alpha = 1;
          let color;
          if (!p.done) {
            color = `hsl(${170 + progress * 80},100%,75%)`;
          } else if (p.result === 'catch') {
            const ft = Math.min((ts - p.snapAt) / 700, 1);
            alpha = 1 - ft;
            color = `hsl(${p.catchHue},100%,78%)`;
          } else {
            const ft = Math.min((ts - p.snapAt) / 450, 1);
            alpha = 1 - ft;
            color = `hsl(0,100%,${60 - ft * 40}%)`;
          }

          ctx.save();
          ctx.globalAlpha = Math.max(0, alpha);
          ctx.strokeStyle = color;
          ctx.lineWidth = 3.5;
          ctx.lineCap = 'round';
          ctx.shadowBlur = 14;
          ctx.shadowColor = color;

          for (const side of [-1, 1]) {
            const a = side * openAngle - Math.PI / 2;
            const ex = p.x + Math.cos(a) * armLen;
            const ey = p.y + Math.sin(a) * armLen;
            // main arm
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            ctx.lineTo(ex, ey);
            ctx.stroke();
            // claw prongs
            ctx.beginPath();
            ctx.moveTo(ex, ey);
            ctx.lineTo(ex + Math.cos(a + side * 0.55) * 14, ey + Math.sin(a + side * 0.55) * 14);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(ex, ey);
            ctx.lineTo(ex + Math.cos(a + side * 1.25) * 11, ey + Math.sin(a + side * 1.25) * 11);
            ctx.stroke();
          }

          // center dot
          ctx.fillStyle = color;
          ctx.shadowBlur = 20;
          ctx.beginPath();
          ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
          ctx.fill();

          // catch burst ring
          if (p.result === 'catch') {
            const burstT = Math.min((ts - p.snapAt) / 550, 1);
            ctx.globalAlpha = (1 - burstT) * 0.75 * alpha;
            ctx.strokeStyle = `hsl(${p.catchHue},100%,82%)`;
            ctx.lineWidth = 2.5;
            ctx.beginPath();
            ctx.arc(p.x, p.y, CATCH_RADIUS * (1 + burstT * 0.7), 0, Math.PI * 2);
            ctx.stroke();
          }
          ctx.restore();
        }

        function drawHUD(ctx, W) {
          const fs = Math.min(W * 0.04, 22);
          ctx.save();
          ctx.font = `bold ${fs}px "Courier New", monospace`;
          ctx.shadowBlur = 12;
          ctx.textAlign = 'left';
          ctx.shadowColor = '#0ff'; ctx.fillStyle = '#0ff';
          ctx.fillText(`SCORE: ${g.score}`, 16, 40);
          ctx.fillText(`BEST: ${g.highScore}`, 16, 40 + fs + 8);
          if (g.combo > 1) {
            ctx.shadowColor = '#f0f'; ctx.fillStyle = '#f0f';
            ctx.fillText(`COMBO ×${g.combo}`, 16, 40 + (fs + 8) * 2);
          }
          ctx.textAlign = 'right';
          const tc = g.timeLeft <= 10 ? '#f46' : '#0ff';
          ctx.shadowColor = tc; ctx.fillStyle = tc;
          ctx.font = `bold ${Math.min(W * 0.052, 30)}px "Courier New", monospace`;
          ctx.fillText(`${g.timeLeft}s`, W - 16, 42);
          ctx.font = `bold ${Math.min(W * 0.03, 17)}px "Courier New", monospace`;
          ctx.shadowColor = '#0fa'; ctx.fillStyle = '#0fa';
          ctx.fillText(`● ${g.balls.length} BALL${g.balls.length !== 1 ? 'S' : ''}`, W - 16, 42 + 26);
          ctx.restore();
        }

        function drawStart(ctx, W, H, ts) {
          const pulse = Math.sin(ts * 0.003) * 0.5 + 0.5;
          ctx.save();
          ctx.textAlign = 'center';
          const bigFs = Math.min(W * 0.13, 78);
          ctx.font = `bold ${bigFs}px "Courier New", monospace`;
          ctx.shadowBlur = 28 + pulse * 18;
          ctx.shadowColor = '#0ff';
          ctx.fillStyle = `hsl(${180 + pulse * 40},100%,${65 + pulse * 14}%)`;
          ctx.fillText('PINCER', W / 2, H * 0.28);
          ctx.fillStyle = `hsl(${270 + pulse * 30},100%,${65 + pulse * 14}%)`;
          ctx.fillText('RUSH', W / 2, H * 0.28 + bigFs + 8);

          const subFs = Math.min(W * 0.038, 21);
          ctx.font = `${subFs}px "Courier New", monospace`;
          ctx.shadowBlur = 8; ctx.shadowColor = '#0ff'; ctx.fillStyle = '#0ff';
          ctx.fillText('Set pincer traps for bouncing neon orbs!', W / 2, H * 0.54);
          ctx.fillText('Click where the orb WILL BE when pincers snap closed', W / 2, H * 0.60);

          ctx.font = `${Math.min(W * 0.033, 19)}px "Courier New", monospace`;
          ctx.shadowColor = '#ff0'; ctx.fillStyle = '#ff0';
          ctx.fillText(`High Score: ${g.highScore}`, W / 2, H * 0.69);

          ctx.font = `bold ${Math.min(W * 0.053, 31)}px "Courier New", monospace`;
          ctx.shadowBlur = 20 + pulse * 14;
          ctx.shadowColor = '#f0f'; ctx.fillStyle = `hsl(${300 + pulse * 28},100%,72%)`;
          ctx.fillText('CLICK / TAP TO START', W / 2, H * 0.82);
          ctx.restore();

          // animated demo ball
          const dX = W / 2 + Math.sin(ts * 0.0022) * W * 0.18;
          const dY = H * 0.44 + Math.cos(ts * 0.0028) * H * 0.055;
          const dHue = (ts * 0.15) % 360;
          ctx.save();
          ctx.shadowBlur = 22; ctx.shadowColor = `hsl(${dHue},100%,60%)`;
          const dg = ctx.createRadialGradient(dX - 3, dY - 4, 1, dX, dY, 13);
          dg.addColorStop(0, `hsl(${dHue},80%,92%)`);
          dg.addColorStop(1, `hsl(${dHue},100%,35%)`);
          ctx.fillStyle = dg;
          ctx.beginPath(); ctx.arc(dX, dY, 13, 0, Math.PI * 2); ctx.fill();
          ctx.restore();
        }

        function drawOver(ctx, W, H) {
          ctx.fillStyle = 'rgba(0,0,0,0.68)';
          ctx.fillRect(0, 0, W, H);
          ctx.save();
          ctx.textAlign = 'center';
          ctx.font = `bold ${Math.min(W * 0.1, 62)}px "Courier New", monospace`;
          ctx.shadowBlur = 30; ctx.shadowColor = '#f46'; ctx.fillStyle = '#f46';
          ctx.fillText("TIME'S UP!", W / 2, H * 0.35);
          ctx.font = `bold ${Math.min(W * 0.07, 42)}px "Courier New", monospace`;
          ctx.shadowColor = '#0ff'; ctx.fillStyle = '#0ff';
          ctx.fillText(`SCORE: ${g.score}`, W / 2, H * 0.50);
          if (g.score >= g.highScore && g.score > 0) {
            ctx.font = `bold ${Math.min(W * 0.05, 29)}px "Courier New", monospace`;
            ctx.shadowColor = '#ff0'; ctx.fillStyle = '#ff0';
            ctx.fillText('NEW HIGH SCORE!', W / 2, H * 0.60);
          } else {
            ctx.font = `${Math.min(W * 0.037, 21)}px "Courier New", monospace`;
            ctx.shadowColor = '#888'; ctx.fillStyle = '#aaa';
            ctx.fillText(`Best: ${g.highScore}`, W / 2, H * 0.60);
          }
          ctx.font = `bold ${Math.min(W * 0.05, 29)}px "Courier New", monospace`;
          ctx.shadowColor = '#f0f'; ctx.fillStyle = '#f0f';
          ctx.fillText('CLICK TO PLAY AGAIN', W / 2, H * 0.75);
          ctx.restore();
        }

        // ---- Main loop ----
        function frame(ts) {
          if (!lastT) lastT = ts;
          const dt = Math.min((ts - lastT) / 1000, 0.05);
          lastT = ts;

          const ctx = canvas.getContext('2d');
          const W = canvas.width, H = canvas.height;

          // animated background
          g.bgHue = (g.bgHue + 0.18) % 360;
          const gr = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H));
          gr.addColorStop(0, `hsl(${g.bgHue},65%,7%)`);
          gr.addColorStop(0.6, `hsl(${(g.bgHue + 70) % 360},55%,4%)`);
          gr.addColorStop(1, `hsl(${(g.bgHue + 140) % 360},45%,2%)`);
          ctx.fillStyle = gr;
          ctx.fillRect(0, 0, W, H);

          if (g.phase === 'start') {
            drawStart(ctx, W, H, ts);
            raf = requestAnimationFrame(frame);
            return;
          }

          // ---- Init game start ----
          if (g.phase === 'playing' && !gameStartT) {
            gameStartT    = ts;
            timerLast     = ts;
            ballSpawnLast = ts;
          }

          if (g.phase === 'playing') {
            // timer
            if (ts - timerLast >= 1000) {
              timerLast += 1000;
              g.timeLeft--;
              if (g.timeLeft <= 0) {
                g.timeLeft = 0;
                g.phase = 'over';
                if (g.score > g.highScore) {
                  g.highScore = g.score;
                  localStorage.setItem('pincerRush_highScore', g.score);
                }
                try { audio.gameOver(); } catch (e) {}
              }
            }

            // spawn more balls over time
            const elapsed = (ts - gameStartT) / 1000;
            const want = Math.min(5, 1 + Math.floor(elapsed / 11));
            if (g.balls.length < want && ts - ballSpawnLast > 2800) {
              g.balls.push(spawnBall(1 + elapsed * 0.012));
              ballSpawnLast = ts;
            }

            // update balls
            const boost = 1 + (GAME_DURATION - g.timeLeft) * 0.007;
            for (const b of g.balls) {
              b.trail.push({ x: b.x, y: b.y });
              if (b.trail.length > 18) b.trail.shift();
              b.x += b.vx * boost;
              b.y += b.vy * boost;
              if (b.x - b.radius < 0)  { b.x = b.radius;      b.vx =  Math.abs(b.vx); }
              if (b.x + b.radius > W)  { b.x = W - b.radius;  b.vx = -Math.abs(b.vx); }
              if (b.y - b.radius < 0)  { b.y = b.radius;      b.vy =  Math.abs(b.vy); }
              if (b.y + b.radius > H)  { b.y = H - b.radius;  b.vy = -Math.abs(b.vy); }
            }

            // snap pincers
            for (const p of g.pincers) {
              if (!p.done && ts >= p.snapAt) {
                p.done   = true;
                p.result = 'miss';
                for (const b of g.balls) {
                  if (Math.hypot(b.x - p.x, b.y - p.y) < CATCH_RADIUS) {
                    p.result   = 'catch';
                    p.catchHue = b.hue;
                    g.combo++;
                    const pts = 100 * g.combo;
                    g.score += pts;
                    // redirect ball
                    const spd = Math.hypot(b.vx, b.vy) * 1.1;
                    const a   = Math.random() * Math.PI * 2;
                    b.vx = Math.cos(a) * spd;
                    b.vy = Math.sin(a) * spd;
                    b.hue = (b.hue + 55) % 360;
                    g.particles.push(...mkParticles(p.x, p.y, p.catchHue));
                    g.texts.push({
                      x: p.x, y: p.y - 24,
                      txt: g.combo > 1 ? `×${g.combo}  +${pts}` : `+${pts}`,
                      life: 1,
                      hue: p.catchHue,
                    });
                    try { audio.catch(g.combo); } catch (e) {}
                    break;
                  }
                }
                if (p.result === 'miss') {
                  g.combo = 0;
                  try { audio.miss(); } catch (e) {}
                }
              }
            }
            // remove old pincers
            g.pincers = g.pincers.filter(p => !p.done || ts - p.snapAt < 750);

            // update particles
            for (const p of g.particles) {
              p.x += p.vx; p.y += p.vy;
              p.vx *= 0.93; p.vy *= 0.93;
              p.life -= p.decay;
            }
            g.particles = g.particles.filter(p => p.life > 0);

            // update texts
            for (const t of g.texts) { t.y -= 1.3; t.life -= 0.017; }
            g.texts = g.texts.filter(t => t.life > 0);
          }

          // ---- Draw ----
          // future shadows
          if (g.phase === 'playing') {
            for (const b of g.balls) drawFutureShadow(ctx, b, W, H);
          }

          // particles
          for (const p of g.particles) {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = `hsl(${p.hue},100%,70%)`;
            ctx.shadowBlur = 9; ctx.shadowColor = ctx.fillStyle;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.sz * p.life, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
          }

          // balls
          for (const b of g.balls) drawBall(ctx, b);

          // pincers
          for (const p of g.pincers) drawPincer(ctx, p, ts);

          // floating score texts
          for (const t of g.texts) {
            ctx.save();
            ctx.globalAlpha = t.life;
            ctx.textAlign = 'center';
            ctx.font = `bold ${Math.min(W * 0.044, 25)}px "Courier New", monospace`;
            ctx.shadowBlur = 14; ctx.shadowColor = `hsl(${t.hue},100%,70%)`;
            ctx.fillStyle = `hsl(${t.hue},100%,82%)`;
            ctx.fillText(t.txt, t.x, t.y);
            ctx.restore();
          }

          drawHUD(ctx, W);

          if (g.phase === 'over') drawOver(ctx, W, H);

          raf = requestAnimationFrame(frame);
        }

        raf = requestAnimationFrame(frame);

        return () => {
          cancelAnimationFrame(raf);
          window.removeEventListener('resize', onResize);
        };
      }, []);

      return <canvas ref={canvasRef} style={{ display: 'block', cursor: 'crosshair', width: '100vw', height: '100vh' }} />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Game />);
  </script>
</body>
</html>
