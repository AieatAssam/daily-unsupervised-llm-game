<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Surge Grid</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #02020f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      user-select: none;
    }
    #root { display: flex; justify-content: center; align-items: center; width: 100vw; height: 100vh; }
    canvas { display: block; max-width: 100vw; max-height: 100vh; cursor: crosshair; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef, useCallback } = React;

    const COLS = 7, ROWS = 7, CELL = 68;
    const GRID_X = 40, GRID_Y = 98;
    const CW = COLS * CELL + GRID_X * 2;   // 556
    const CH = ROWS * CELL + GRID_Y + 100;  // 674

    const MAX_CHARGES = 5;
    const CHARGE_REGEN_MS = 2200;
    const SPAWN_MS = 1100;
    const MOVE_MS = 2400;
    const GAME_SECS = 90;
    const OVERLOAD_LIMIT = 20;

    const COLORS = ['#00ffff','#ff44aa','#ffcc00','#44ff99','#cc66ff'];

    let audioCtx = null;
    function beep(freq, dur = 0.1, vol = 0.15, type = 'square') {
      try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.connect(g); g.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.value = freq;
        osc.frequency.exponentialRampToValueAtTime(freq * 0.6, audioCtx.currentTime + dur);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
      } catch(e) {}
    }

    function mkParticle(x, y, color) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1.5 + Math.random() * 4.5;
      return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        color, life: 1, decay: 0.018 + Math.random() * 0.025, size: 3 + Math.random() * 5 };
    }

    function Game() {
      const canvasRef = useRef(null);
      const state = useRef({
        grid: new Array(ROWS * COLS).fill(null),
        score: 0,
        hiScore: parseInt(localStorage.getItem('surgeGridHi') || '0'),
        combo: 0,
        comboTimer: 0,
        charges: MAX_CHARGES,
        chargeTimer: 0,
        timeLeft: GAME_SECS,
        spawnTimer: 0,
        moveTimer: 0,
        overloadDrainTimer: 0,
        phase: 'start',
        pulses: [],
        particles: [],
        floatTexts: [],
        overloadFlash: 0,
        lastTime: null,
        frame: 0,
        enemyId: 0,
        newBest: false,
        stars: Array.from({length: 70}, () => ({
          x: Math.random() * CW, y: Math.random() * CH,
          r: Math.random() * 1.5 + 0.3,
          phase: Math.random() * Math.PI * 2
        }))
      }).current;

      const rafRef = useRef(null);

      function startGame() {
        state.grid = new Array(ROWS * COLS).fill(null);
        state.score = 0;
        state.combo = 0;
        state.comboTimer = 0;
        state.charges = MAX_CHARGES;
        state.chargeTimer = 0;
        state.timeLeft = GAME_SECS;
        state.spawnTimer = 0;
        state.moveTimer = 0;
        state.overloadDrainTimer = 0;
        state.phase = 'play';
        state.pulses = [];
        state.particles = [];
        state.floatTexts = [];
        state.overloadFlash = 0;
        state.lastTime = null;
        state.newBest = false;
        // Ensure localStorage key is always present after first game start
        localStorage.setItem('surgeGridHi', state.hiScore);
      }

      const handleClick = useCallback((e) => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const rect = canvas.getBoundingClientRect();
        const scaleX = CW / rect.width;
        const scaleY = CH / rect.height;
        const mx = (e.clientX - rect.left) * scaleX;
        const my = (e.clientY - rect.top) * scaleY;

        if (state.phase === 'start' || state.phase === 'over') {
          startGame();
          beep(440, 0.15, 0.2, 'sine');
          return;
        }
        if (state.phase !== 'play') return;

        const col = Math.floor((mx - GRID_X) / CELL);
        const row = Math.floor((my - GRID_Y) / CELL);
        if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;
        if (state.charges <= 0) {
          beep(80, 0.2, 0.15, 'sawtooth');
          return;
        }

        state.charges--;
        state.chargeTimer = 0;

        // Destroy all enemies in row + column
        let killed = 0;
        const killPos = [];
        for (let c = 0; c < COLS; c++) {
          const idx = row * COLS + c;
          if (state.grid[idx]) {
            killPos.push({ x: GRID_X + c * CELL + CELL/2, y: GRID_Y + row * CELL + CELL/2, color: state.grid[idx].color });
            state.grid[idx] = null;
            killed++;
          }
        }
        for (let r = 0; r < ROWS; r++) {
          if (r === row) continue;
          const idx = r * COLS + col;
          if (state.grid[idx]) {
            killPos.push({ x: GRID_X + col * CELL + CELL/2, y: GRID_Y + r * CELL + CELL/2, color: state.grid[idx].color });
            state.grid[idx] = null;
            killed++;
          }
        }

        // Particles for each kill
        for (const kp of killPos) {
          for (let p = 0; p < 14; p++) state.particles.push(mkParticle(kp.x, kp.y, kp.color));
        }

        // Scoring
        const base = killed * killed * 50;
        let comboMult = 1;
        if (killed >= 3) {
          state.combo++;
          state.comboTimer = 0;
          comboMult = 1 + state.combo * 0.5;
          beep(660 + state.combo * 80, 0.18, 0.2, 'sine');
        } else if (killed > 0) {
          state.combo = Math.max(0, state.combo - 1);
          beep(350, 0.08, 0.12);
        } else {
          state.combo = 0;
          beep(110, 0.15, 0.1, 'sawtooth');
        }

        const pts = Math.floor(base * comboMult);
        state.score += pts;

        // Floating score text
        const fcx = GRID_X + col * CELL + CELL/2;
        const fcy = GRID_Y + row * CELL - 5;
        if (killed > 0) {
          const label = killed >= 5 ? `MEGA x${killed}! +${pts}` :
                        killed >= 3 ? `COMBO x${killed}! +${pts}` : `+${pts}`;
          const col2 = killed >= 5 ? '#ffcc00' : killed >= 3 ? '#ff88ff' : '#00ffff';
          state.floatTexts.push({ text: label, x: fcx, y: fcy, life: 1, color: col2, size: killed >= 3 ? 18 : 14 });
        }

        // Pulse visual
        state.pulses.push({ col, row, t: 0, dur: 600 });
      }, []);

      const handleTouch = useCallback((e) => {
        e.preventDefault();
        if (e.touches.length > 0) {
          handleClick({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
        }
      }, [handleClick]);

      useEffect(() => {
        const canvas = canvasRef.current;
        canvas.addEventListener('click', handleClick);
        canvas.addEventListener('touchstart', handleTouch, { passive: false });
        return () => {
          canvas.removeEventListener('click', handleClick);
          canvas.removeEventListener('touchstart', handleTouch);
        };
      }, [handleClick, handleTouch]);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');

        function frame(ts) {
          rafRef.current = requestAnimationFrame(frame);
          const dt = state.lastTime ? Math.min(ts - state.lastTime, 80) : 16;
          state.lastTime = ts;
          state.frame++;

          // ─── UPDATE ───
          if (state.phase === 'play') {
            state.timeLeft -= dt / 1000;
            if (state.timeLeft <= 0) {
              state.timeLeft = 0;
              state.phase = 'over';
              if (state.score > state.hiScore) {
                state.hiScore = state.score;
                state.newBest = true;
                localStorage.setItem('surgeGridHi', state.hiScore);
              }
              beep(150, 0.8, 0.25, 'sawtooth');
            }

            // Charge regen
            if (state.charges < MAX_CHARGES) {
              state.chargeTimer += dt;
              if (state.chargeTimer >= CHARGE_REGEN_MS) {
                state.charges++;
                state.chargeTimer -= CHARGE_REGEN_MS;
                beep(550, 0.06, 0.1, 'sine');
              }
            } else {
              state.chargeTimer = 0;
            }

            // Spawn enemies (accelerates over time)
            state.spawnTimer += dt;
            const elapsed = GAME_SECS - state.timeLeft;
            const spawnRate = Math.max(500, SPAWN_MS - Math.floor(elapsed / 12) * 80);
            if (state.spawnTimer >= spawnRate) {
              state.spawnTimer = 0;
              const empty = [];
              for (let i = 0; i < ROWS * COLS; i++) if (!state.grid[i]) empty.push(i);
              if (empty.length > 0) {
                const idx = empty[Math.floor(Math.random() * empty.length)];
                state.grid[idx] = { color: COLORS[Math.floor(Math.random() * COLORS.length)], id: state.enemyId++, age: 0 };
              }
            }

            // Move enemies
            state.moveTimer += dt;
            if (state.moveTimer >= MOVE_MS) {
              state.moveTimer -= MOVE_MS;
              const indices = state.grid.map((e, i) => e ? i : -1).filter(i => i >= 0);
              indices.sort(() => Math.random() - 0.5);
              const occupied = new Set(indices);
              for (const idx of indices) {
                if (Math.random() > 0.35) continue;
                const r = Math.floor(idx / COLS), c = idx % COLS;
                const dirs = [[0,1],[0,-1],[1,0],[-1,0]].filter(([dr,dc]) => {
                  const nr = r+dr, nc = c+dc;
                  return nr>=0 && nr<ROWS && nc>=0 && nc<COLS && !occupied.has(nr*COLS+nc);
                });
                if (dirs.length) {
                  const [dr,dc] = dirs[Math.floor(Math.random()*dirs.length)];
                  const ni = (r+dr)*COLS+(c+dc);
                  state.grid[ni] = state.grid[idx];
                  state.grid[idx] = null;
                  occupied.delete(idx);
                  occupied.add(ni);
                }
              }
            }

            // Enemy age
            for (let i = 0; i < state.grid.length; i++) if (state.grid[i]) state.grid[i].age += dt;

            // Overload
            const count = state.grid.filter(Boolean).length;
            if (count >= OVERLOAD_LIMIT) {
              state.overloadFlash = Math.min(1, state.overloadFlash + dt * 0.004);
              // Drain a charge every 3s while overloaded
              state.overloadDrainTimer += dt;
              if (state.overloadDrainTimer >= 3000) {
                state.overloadDrainTimer -= 3000;
                state.charges = Math.max(0, state.charges - 1);
                beep(100, 0.3, 0.2, 'sawtooth');
              }
            } else {
              state.overloadFlash = Math.max(0, state.overloadFlash - dt * 0.004);
              state.overloadDrainTimer = 0;
            }

            // Combo timeout
            if (state.combo > 0) {
              state.comboTimer += dt;
              if (state.comboTimer > 5000) { state.combo = 0; state.comboTimer = 0; }
            }

            // Pulses
            state.pulses = state.pulses.filter(p => { p.t += dt; return p.t < p.dur; });

            // Particles
            state.particles = state.particles.filter(p => {
              p.x += p.vx; p.y += p.vy; p.vy += 0.12;
              p.life -= p.decay;
              return p.life > 0;
            });

            // Float texts
            state.floatTexts = state.floatTexts.filter(ft => {
              ft.y -= 1.2; ft.life -= dt * 0.0018;
              return ft.life > 0;
            });
          }

          // ─── DRAW ───
          // Background gradient
          const bg = ctx.createLinearGradient(0, 0, CW, CH);
          const hue1 = 250 + Math.sin(ts * 0.0004) * 25;
          const hue2 = 200 + Math.cos(ts * 0.0003) * 20;
          bg.addColorStop(0, `hsl(${hue1},60%,4%)`);
          bg.addColorStop(1, `hsl(${hue2},55%,3%)`);
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, CW, CH);

          // Stars
          for (const s of state.stars) {
            s.phase += 0.015;
            const alpha = 0.2 + Math.sin(s.phase) * 0.25;
            ctx.fillStyle = `rgba(180,200,255,${Math.max(0,alpha)})`;
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
            ctx.fill();
          }

          // Overload red overlay
          if (state.overloadFlash > 0) {
            const pulse = Math.sin(ts * 0.012) * 0.5 + 0.5;
            ctx.fillStyle = `rgba(255,20,20,${state.overloadFlash * (0.08 + pulse * 0.06)})`;
            ctx.fillRect(0, 0, CW, CH);
          }

          // Grid lines
          ctx.strokeStyle = 'rgba(0,200,255,0.13)';
          ctx.lineWidth = 1;
          for (let r = 0; r <= ROWS; r++) {
            ctx.beginPath();
            ctx.moveTo(GRID_X, GRID_Y + r * CELL);
            ctx.lineTo(GRID_X + COLS * CELL, GRID_Y + r * CELL);
            ctx.stroke();
          }
          for (let c = 0; c <= COLS; c++) {
            ctx.beginPath();
            ctx.moveTo(GRID_X + c * CELL, GRID_Y);
            ctx.lineTo(GRID_X + c * CELL, GRID_Y + ROWS * CELL);
            ctx.stroke();
          }

          // Pulse animations
          for (const p of state.pulses) {
            const prog = p.t / p.dur;
            const alpha = (1 - prog);
            const px = GRID_X + p.col * CELL + CELL/2;
            const py = GRID_Y + p.row * CELL + CELL/2;

            // Row fill
            ctx.fillStyle = `rgba(0,220,255,${alpha * 0.28})`;
            ctx.fillRect(GRID_X, GRID_Y + p.row * CELL, COLS * CELL, CELL);
            // Col fill
            ctx.fillStyle = `rgba(200,80,255,${alpha * 0.28})`;
            ctx.fillRect(GRID_X + p.col * CELL, GRID_Y, CELL, ROWS * CELL);

            // Expanding beams from center
            ctx.shadowBlur = 20;
            const beamProg = Math.min(prog * 2, 1); // expand fast
            const hw = beamProg * COLS * CELL / 2;
            const hh = beamProg * ROWS * CELL / 2;

            ctx.strokeStyle = `rgba(100,230,255,${alpha})`;
            ctx.lineWidth = 2 + alpha * 2;
            ctx.shadowColor = '#00ffff';
            ctx.beginPath();
            ctx.moveTo(px - hw, py); ctx.lineTo(px + hw, py);
            ctx.stroke();
            ctx.strokeStyle = `rgba(200,100,255,${alpha})`;
            ctx.shadowColor = '#cc66ff';
            ctx.beginPath();
            ctx.moveTo(px, py - hh); ctx.lineTo(px, py + hh);
            ctx.stroke();

            // Center flash
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 30;
            ctx.fillStyle = `rgba(255,255,255,${alpha * 0.9})`;
            ctx.beginPath();
            ctx.arc(px, py, (1 - prog) * 18, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
          }

          // Enemies
          for (let i = 0; i < state.grid.length; i++) {
            const e = state.grid[i];
            if (!e) continue;
            const c = i % COLS, r = Math.floor(i / COLS);
            const cx = GRID_X + c * CELL + CELL/2;
            const cy = GRID_Y + r * CELL + CELL/2;
            const pulse = 0.88 + Math.sin(ts * 0.0025 + e.id * 1.37) * 0.12;
            const sz = CELL * 0.34 * pulse;
            const rot = ts * 0.0008 + e.id * 0.5;

            ctx.shadowBlur = 18;
            ctx.shadowColor = e.color;

            // Hexagon
            ctx.beginPath();
            for (let j = 0; j < 6; j++) {
              const a = (j / 6) * Math.PI * 2 + rot;
              j === 0 ? ctx.moveTo(cx + Math.cos(a)*sz, cy + Math.sin(a)*sz)
                       : ctx.lineTo(cx + Math.cos(a)*sz, cy + Math.sin(a)*sz);
            }
            ctx.closePath();
            ctx.fillStyle = e.color + '33';
            ctx.fill();
            ctx.strokeStyle = e.color;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Inner dot
            ctx.shadowBlur = 10;
            ctx.fillStyle = e.color + 'bb';
            ctx.beginPath();
            ctx.arc(cx, cy, sz * 0.3, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
          }

          // Particles
          ctx.shadowBlur = 8;
          for (const p of state.particles) {
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.shadowColor = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
            ctx.fill();
          }
          ctx.globalAlpha = 1;
          ctx.shadowBlur = 0;

          // Float texts
          for (const ft of state.floatTexts) {
            ctx.globalAlpha = ft.life;
            ctx.font = `bold ${ft.size}px Courier New`;
            ctx.fillStyle = ft.color;
            ctx.textAlign = 'center';
            ctx.shadowBlur = 12;
            ctx.shadowColor = ft.color;
            ctx.fillText(ft.text, ft.x, ft.y);
          }
          ctx.globalAlpha = 1;
          ctx.shadowBlur = 0;
          ctx.textAlign = 'left';

          // ─── HUD ───
          // Title
          ctx.font = 'bold 20px Courier New';
          ctx.fillStyle = '#00ffff';
          ctx.shadowBlur = 12;
          ctx.shadowColor = '#00ffff';
          ctx.fillText('SURGE GRID', GRID_X, 30);
          ctx.shadowBlur = 0;

          // Score
          ctx.font = 'bold 16px Courier New';
          ctx.fillStyle = '#ffffff';
          ctx.fillText(`SCORE: ${state.score.toLocaleString()}`, GRID_X, 52);
          ctx.font = '12px Courier New';
          ctx.fillStyle = '#667799';
          ctx.fillText(`BEST: ${state.hiScore.toLocaleString()}`, GRID_X, 70);

          // Timer
          const tLeft = Math.ceil(state.timeLeft);
          const timerFlash = state.timeLeft < 15 && Math.sin(ts * 0.018) > 0;
          ctx.textAlign = 'right';
          ctx.font = `bold 26px Courier New`;
          ctx.fillStyle = state.timeLeft < 15 ? (timerFlash ? '#ff6666' : '#ff2222') : '#ffffff';
          if (state.timeLeft < 15) { ctx.shadowBlur = 18; ctx.shadowColor = '#ff2222'; }
          ctx.fillText(state.phase === 'play' ? tLeft : '0', CW - GRID_X, 32);
          ctx.shadowBlur = 0;
          ctx.font = '11px Courier New';
          ctx.fillStyle = '#556677';
          ctx.fillText('SEC', CW - GRID_X, 47);
          ctx.textAlign = 'left';

          // Combo badge
          if (state.combo > 0) {
            const comboPulse = 0.9 + Math.sin(ts * 0.008) * 0.1;
            ctx.save();
            ctx.translate(CW/2, 60);
            ctx.scale(comboPulse, comboPulse);
            ctx.textAlign = 'center';
            ctx.font = `bold ${14 + Math.min(state.combo, 5)}px Courier New`;
            ctx.fillStyle = `hsl(${50 + state.combo*12},100%,65%)`;
            ctx.shadowBlur = 15;
            ctx.shadowColor = ctx.fillStyle;
            ctx.fillText(`x${state.combo + 1} STREAK`, 0, 0);
            ctx.restore();
            ctx.shadowBlur = 0;
          }

          // Overload warning
          if (state.overloadFlash > 0.25) {
            const warn = Math.sin(ts * 0.013) * 0.5 + 0.5;
            ctx.textAlign = 'center';
            ctx.font = 'bold 12px Courier New';
            ctx.fillStyle = `rgba(255,80,60,${0.6 + warn * 0.4})`;
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#ff2200';
            ctx.fillText('⚡ OVERLOAD — DRAINING CHARGES! ⚡', CW/2, GRID_Y - 14);
            ctx.shadowBlur = 0;
            ctx.textAlign = 'left';
          }

          // Charge bar
          const chargeY = GRID_Y + ROWS * CELL + 28;
          ctx.textAlign = 'center';
          ctx.font = '11px Courier New';
          ctx.fillStyle = '#445566';
          ctx.fillText('CHARGES', CW/2, chargeY - 8);
          const iconW = 28, gap = 10;
          const totalW = MAX_CHARGES * iconW + (MAX_CHARGES-1) * gap;
          const startX = (CW - totalW) / 2;
          for (let i = 0; i < MAX_CHARGES; i++) {
            const ix = startX + i * (iconW + gap) + iconW/2;
            const filled = i < state.charges;
            ctx.strokeStyle = filled ? '#00ccff' : '#223344';
            ctx.lineWidth = 2;
            ctx.fillStyle = filled ? 'rgba(0,200,255,0.25)' : 'rgba(0,0,0,0)';
            if (filled) { ctx.shadowBlur = 12; ctx.shadowColor = '#00ffff'; }
            ctx.beginPath();
            ctx.arc(ix, chargeY + 10, 11, 0, Math.PI*2);
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Regen arc for next charge
            if (i === state.charges && state.charges < MAX_CHARGES) {
              const prog = state.chargeTimer / CHARGE_REGEN_MS;
              ctx.strokeStyle = 'rgba(0,200,255,0.5)';
              ctx.lineWidth = 2;
              ctx.beginPath();
              ctx.arc(ix, chargeY + 10, 11, -Math.PI/2, -Math.PI/2 + prog * Math.PI * 2);
              ctx.stroke();
            }

            // Bolt icon inside filled
            if (filled) {
              ctx.fillStyle = '#00ffff';
              ctx.font = '13px serif';
              ctx.fillText('⚡', ix - 7, chargeY + 15);
            }
          }
          ctx.textAlign = 'left';

          // ─── OVERLAY SCREENS ───
          if (state.phase === 'start') {
            ctx.fillStyle = 'rgba(0,0,15,0.82)';
            ctx.fillRect(0, 0, CW, CH);

            ctx.textAlign = 'center';
            // Title glow
            ctx.font = 'bold 38px Courier New';
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#00ffff';
            ctx.fillText('SURGE GRID', CW/2, CH/2 - 90);
            ctx.shadowBlur = 0;

            ctx.font = '14px Courier New';
            ctx.fillStyle = '#8899bb';
            const lines = [
              'Click any grid cell to fire a CROSS PULSE',
              'Destroying ALL enemies in that row + column!',
              '',
              'Kill 3+ per pulse → COMBO STREAK',
              'Grid overloaded → Charges drain faster',
              'Survive 90 seconds · Beat your high score!'
            ];
            lines.forEach((l, i) => {
              ctx.fillStyle = l.includes('CROSS') || l.includes('COMBO') ? '#aaddff' : '#667799';
              if (l === '') return;
              ctx.fillText(l, CW/2, CH/2 - 35 + i * 22);
            });

            const blink = Math.sin(ts * 0.005) * 0.4 + 0.6;
            ctx.globalAlpha = blink;
            ctx.font = 'bold 19px Courier New';
            ctx.fillStyle = '#ffcc00';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffcc00';
            ctx.fillText('▶  CLICK TO START  ◀', CW/2, CH/2 + 95);
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            ctx.textAlign = 'left';
          }

          if (state.phase === 'over') {
            ctx.fillStyle = 'rgba(0,0,15,0.82)';
            ctx.fillRect(0, 0, CW, CH);

            ctx.textAlign = 'center';
            ctx.font = 'bold 30px Courier New';
            ctx.fillStyle = '#ff4466';
            ctx.shadowBlur = 25;
            ctx.shadowColor = '#ff4466';
            ctx.fillText('GAME OVER', CW/2, CH/2 - 70);
            ctx.shadowBlur = 0;

            ctx.font = 'bold 22px Courier New';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(`SCORE: ${state.score.toLocaleString()}`, CW/2, CH/2 - 25);

            if (state.newBest) {
              const bp = Math.sin(ts * 0.007) * 0.3 + 0.7;
              ctx.globalAlpha = bp;
              ctx.font = 'bold 18px Courier New';
              ctx.fillStyle = '#ffcc00';
              ctx.shadowBlur = 18;
              ctx.shadowColor = '#ffcc00';
              ctx.fillText('🏆  NEW HIGH SCORE!  🏆', CW/2, CH/2 + 15);
              ctx.shadowBlur = 0;
              ctx.globalAlpha = 1;
            } else {
              ctx.font = '14px Courier New';
              ctx.fillStyle = '#667799';
              ctx.fillText(`BEST: ${state.hiScore.toLocaleString()}`, CW/2, CH/2 + 15);
            }

            const blink = Math.sin(ts * 0.005) * 0.4 + 0.6;
            ctx.globalAlpha = blink;
            ctx.font = 'bold 17px Courier New';
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 12;
            ctx.shadowColor = '#00ffff';
            ctx.fillText('▶  CLICK TO PLAY AGAIN  ◀', CW/2, CH/2 + 65);
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
            ctx.textAlign = 'left';
          }
        }

        rafRef.current = requestAnimationFrame(frame);
        return () => cancelAnimationFrame(rafRef.current);
      }, []);

      return (
        <canvas
          ref={canvasRef}
          width={CW}
          height={CH}
          style={{ touchAction: 'none' }}
        />
      );
    }

    ReactDOM.render(<Game />, document.getElementById('root'));
  </script>
</body>
</html>
