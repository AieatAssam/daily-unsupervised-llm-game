<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Archer</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #050510;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useEffect, useRef, useCallback } = React;

    const W = 800, H = 600;
    const TARGET_X = 640, TARGET_Y = 300;
    const MAX_ARROWS = 12;

    // Rings: innermost first (highest points)
    const RINGS = [
      { r: 26,  pts: 10, fill: '#ffe000', glow: '#ffff44' },
      { r: 52,  pts: 8,  fill: '#ff3333', glow: '#ff6666' },
      { r: 84,  pts: 6,  fill: '#3355ff', glow: '#6688ff' },
      { r: 118, pts: 4,  fill: '#222222', glow: '#888888' },
      { r: 155, pts: 2,  fill: '#cccccc', glow: '#ffffff' },
    ];

    function makeAudio() {
      try {
        return new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) { return null; }
    }

    function playSound(ctx, type) {
      if (!ctx) return;
      try {
        const now = ctx.currentTime;
        if (type === 'charge') {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'sawtooth';
          o.frequency.value = 100;
          g.gain.setValueAtTime(0.04, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
          o.start(now); o.stop(now + 0.08);
        } else if (type === 'release') {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'sine';
          o.frequency.setValueAtTime(500, now);
          o.frequency.exponentialRampToValueAtTime(120, now + 0.35);
          g.gain.setValueAtTime(0.25, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
          o.start(now); o.stop(now + 0.35);
        } else if (type === 'hit') {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'triangle';
          o.frequency.setValueAtTime(440, now);
          g.gain.setValueAtTime(0.25, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
          o.start(now); o.stop(now + 0.4);
        } else if (type === 'bullseye') {
          [523, 659, 784, 1047].forEach((f, i) => {
            const o = ctx.createOscillator(), g = ctx.createGain();
            o.connect(g); g.connect(ctx.destination);
            o.type = 'sine';
            o.frequency.value = f;
            const t = now + i * 0.09;
            g.gain.setValueAtTime(0, t);
            g.gain.linearRampToValueAtTime(0.25, t + 0.04);
            g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
            o.start(t); o.stop(t + 0.3);
          });
        } else if (type === 'miss') {
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'sawtooth';
          o.frequency.setValueAtTime(220, now);
          o.frequency.exponentialRampToValueAtTime(80, now + 0.4);
          g.gain.setValueAtTime(0.18, now);
          g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
          o.start(now); o.stop(now + 0.4);
        }
      } catch(e) {}
    }

    function initGame() {
      return {
        phase: 'title',   // title | playing | shot_anim | gameover
        score: 0,
        combo: 0,
        arrowsFired: 0,
        highScore: parseInt(localStorage.getItem('neonArcher_highScore') || '0'),
        wind: 0,          // pixel lateral offset at target
        windLabel: '',
        charge: 0,        // 0..1 (capped internally)
        charging: false,
        lastChargeSound: 0,
        mouseX: W / 2,
        mouseY: H / 2,
        wobble: 0,        // current wobble offset (px)
        wobbleVel: 8,     // wobble speed direction
        arrow: null,      // { sx,sy,tx,ty,progress,hitX,hitY }
        particles: [],
        floats: [],       // { text,x,y,color,life,maxLife }
        bgT: 0,
        resultMsg: '',
        resultColor: '#fff',
        resultLife: 0,
      };
    }

    function newWind() {
      const options = [
        { val: -55, label: '← STRONG' },
        { val: -35, label: '← MODERATE' },
        { val: -18, label: '← LIGHT' },
        { val:   0, label: 'CALM' },
        { val:  18, label: 'LIGHT →' },
        { val:  35, label: 'MODERATE →' },
        { val:  55, label: 'STRONG →' },
      ];
      return options[Math.floor(Math.random() * options.length)];
    }

    const Game = () => {
      const canvasRef = useRef(null);
      const stRef = useRef(initGame());
      const audioRef = useRef(null);
      const rafRef = useRef(null);
      const lastTRef = useRef(0);

      const G = () => stRef.current;

      const getAudio = useCallback(() => {
        if (!audioRef.current) audioRef.current = makeAudio();
        return audioRef.current;
      }, []);

      // Ensure localStorage key exists on mount
      useEffect(() => {
        if (!localStorage.getItem('neonArcher_highScore')) {
          localStorage.setItem('neonArcher_highScore', '0');
        }
      }, []);

      const beginGame = useCallback(() => {
        const s = stRef.current;
        const w = newWind();
        Object.assign(s, {
          phase: 'playing',
          score: 0,
          combo: 0,
          arrowsFired: 0,
          wind: w.val,
          windLabel: w.label,
          charge: 0,
          charging: false,
          wobble: 0,
          wobbleVel: 8,
          arrow: null,
          particles: [],
          floats: [],
          resultMsg: '',
          resultLife: 0,
        });
      }, []);

      const nextRound = useCallback(() => {
        const s = G();
        const w = newWind();
        s.wind = w.val;
        s.windLabel = w.label;
        s.charge = 0;
        s.charging = false;
        s.wobble = 0;
        s.wobbleVel = 8;
        s.arrow = null;
        s.phase = 'playing';
      }, []);

      const endGame = useCallback(() => {
        const s = G();
        s.phase = 'gameover';
        if (s.score > s.highScore) {
          s.highScore = s.score;
          localStorage.setItem('neonArcher_highScore', String(s.score));
        }
      }, []);

      const scoreHit = useCallback((hitX, hitY) => {
        const s = G();
        const dx = hitX - TARGET_X;
        const dy = hitY - TARGET_Y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        let pts = 0, ringGlow = '#fff';
        for (const ring of RINGS) {
          if (dist <= ring.r) { pts = ring.pts; ringGlow = ring.glow; break; }
        }

        if (pts === 0) {
          s.combo = 0;
          playSound(audioRef.current, 'miss');
        } else {
          s.combo++;
          if (pts === 10) playSound(audioRef.current, 'bullseye');
          else playSound(audioRef.current, 'hit');
        }

        const comboMult = Math.max(1, s.combo);
        const total = pts * comboMult;
        s.score += total;
        s.arrowsFired++;

        // Floating text
        const label = pts === 0 ? 'MISS!'
          : pts === 10 ? (s.combo > 1 ? `BULLSEYE! ×${comboMult}` : 'BULLSEYE!')
          : (s.combo > 1 ? `+${total} ×${comboMult} COMBO` : `+${total}`);
        const col = pts === 10 ? '#ffff44' : pts > 0 ? '#00ffcc' : '#ff4444';

        s.floats.push({ text: label, x: hitX, y: hitY - 20, color: col, life: 2, maxLife: 2 });

        // Particles
        const count = pts === 10 ? 24 : pts > 0 ? 12 : 6;
        for (let i = 0; i < count; i++) {
          const a = Math.random() * Math.PI * 2;
          const spd = 2 + Math.random() * 5;
          s.particles.push({
            x: hitX, y: hitY,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 1,
            life: 0.8 + Math.random() * 0.6,
            maxLife: 1.4,
            color: ringGlow,
            size: 2 + Math.random() * 4,
          });
        }

        if (s.arrowsFired >= MAX_ARROWS) {
          setTimeout(endGame, 1800);
        } else {
          setTimeout(nextRound, 1600);
        }
      }, [endGame, nextRound]);

      const fireArrow = useCallback(() => {
        const s = G();
        if (s.phase !== 'playing' || s.arrow) return;
        const audio = getAudio();
        playSound(audio, 'release');

        // Arrow lands at sight position + wind effect (wind deflects in flight)
        const wobblePx = s.wobble;
        const targetHitX = s.mouseX + s.wind + wobblePx * 0.5;
        const targetHitY = s.mouseY + (Math.random() - 0.5) * 3;

        s.arrow = {
          sx: 130, sy: H / 2,
          tx: targetHitX, ty: targetHitY,
          hitX: targetHitX, hitY: targetHitY,
          progress: 0,
        };
        s.phase = 'shot_anim';
        s.charging = false;
        s.charge = 0;
      }, [getAudio]);

      // ============ DRAW ============
      const draw = useCallback((ctx, dt) => {
        const s = G();
        s.bgT += dt;

        // BG
        const bg = ctx.createLinearGradient(0, 0, 0, H);
        bg.addColorStop(0, '#040412');
        bg.addColorStop(1, '#0b1520');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, W, H);

        // Stars
        for (let i = 0; i < 60; i++) {
          const sx = (i * 131.1 + 17) % W;
          const sy = (i * 97.3 + 5) % (H * 0.65);
          const blink = 0.2 + 0.8 * Math.abs(Math.sin(s.bgT * 1.2 + i * 0.7));
          ctx.globalAlpha = blink * 0.55;
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(sx, sy, 1.5, 1.5);
        }
        ctx.globalAlpha = 1;

        // Ground
        const grd = ctx.createLinearGradient(0, H * 0.68, 0, H);
        grd.addColorStop(0, '#0b2418');
        grd.addColorStop(1, '#060f0a');
        ctx.fillStyle = grd;
        ctx.fillRect(0, H * 0.68, W, H * 0.32);

        // Ground glow line
        ctx.save();
        ctx.shadowColor = '#00ff66';
        ctx.shadowBlur = 10;
        ctx.strokeStyle = '#00cc44';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, H * 0.68);
        ctx.lineTo(W, H * 0.68);
        ctx.stroke();
        ctx.restore();

        // Grid lines on ground
        ctx.strokeStyle = 'rgba(0,200,80,0.1)';
        ctx.lineWidth = 1;
        for (let gx = 0; gx < W; gx += 80) {
          ctx.beginPath();
          ctx.moveTo(gx, H * 0.68);
          ctx.lineTo(gx + 30, H);
          ctx.stroke();
        }

        // ---- TARGET STAND ----
        const standBottom = H * 0.68;
        ctx.strokeStyle = '#445566';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(TARGET_X, standBottom);
        ctx.lineTo(TARGET_X, TARGET_Y + RINGS[RINGS.length - 1].r + 5);
        ctx.stroke();

        // ---- TARGET RINGS (outer→inner) ----
        for (let i = RINGS.length - 1; i >= 0; i--) {
          const ring = RINGS[i];
          ctx.save();
          ctx.shadowColor = ring.glow;
          ctx.shadowBlur = i === 0 ? 25 : 12;
          ctx.beginPath();
          ctx.arc(TARGET_X, TARGET_Y, ring.r, 0, Math.PI * 2);
          ctx.fillStyle = ring.fill;
          ctx.fill();
          ctx.strokeStyle = ring.glow;
          ctx.lineWidth = i === 0 ? 2 : 1;
          ctx.stroke();
          ctx.restore();
        }

        // Ring dividers
        for (const ring of RINGS) {
          ctx.save();
          ctx.strokeStyle = 'rgba(255,255,255,0.25)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.arc(TARGET_X, TARGET_Y, ring.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }

        // Target cross hairs
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(TARGET_X - RINGS[RINGS.length-1].r, TARGET_Y);
        ctx.lineTo(TARGET_X + RINGS[RINGS.length-1].r, TARGET_Y);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(TARGET_X, TARGET_Y - RINGS[RINGS.length-1].r);
        ctx.lineTo(TARGET_X, TARGET_Y + RINGS[RINGS.length-1].r);
        ctx.stroke();

        // ---- BOW (left side) ----
        const bowX = 100, bowY = H / 2;
        const bowPulse = s.charging ? Math.sin(s.bgT * 15) * 3 : 0;

        ctx.save();
        ctx.shadowColor = '#aa55ff';
        ctx.shadowBlur = 15 + (s.charging ? 10 : 0);
        ctx.strokeStyle = '#cc88ff';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(bowX, bowY, 55 + bowPulse, -Math.PI * 0.55, Math.PI * 0.55);
        ctx.stroke();
        ctx.restore();

        // Bowstring
        ctx.save();
        ctx.strokeStyle = s.charging ? '#ffcc44' : '#ccaa66';
        ctx.lineWidth = 1.5;
        const stretchX = s.charging ? -s.charge * 18 : 0;
        ctx.beginPath();
        ctx.moveTo(bowX, bowY - 45);
        ctx.lineTo(bowX + stretchX, bowY);
        ctx.lineTo(bowX, bowY + 45);
        ctx.stroke();
        ctx.restore();

        // Arrow on bow (if not shot)
        if (s.phase === 'playing') {
          ctx.save();
          ctx.shadowColor = '#ffdd88';
          ctx.shadowBlur = 8;
          ctx.strokeStyle = '#ccaa55';
          ctx.lineWidth = 2.5;
          const arrowStart = bowX + stretchX;
          ctx.beginPath();
          ctx.moveTo(arrowStart, bowY);
          ctx.lineTo(arrowStart + 75, bowY);
          ctx.stroke();
          // Arrowhead
          ctx.fillStyle = '#aaccee';
          ctx.beginPath();
          ctx.moveTo(arrowStart + 82, bowY);
          ctx.lineTo(arrowStart + 70, bowY - 5);
          ctx.lineTo(arrowStart + 70, bowY + 5);
          ctx.closePath();
          ctx.fill();
          // Fletching
          ctx.fillStyle = '#ff4466';
          ctx.fillRect(arrowStart, bowY - 4, 8, 3);
          ctx.fillRect(arrowStart, bowY + 1, 8, 3);
          ctx.restore();
        }

        // ---- CHARGE METER ----
        const meterX = 22, meterW = 18, meterH = 200;
        const meterY = H / 2 - meterH / 2;
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.beginPath();
        ctx.roundRect(meterX, meterY, meterW, meterH, 4);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.lineWidth = 1;
        ctx.stroke();

        if (s.phase === 'playing') {
          const fillH = Math.min(1, s.charge) * meterH;
          const mColor = s.charge >= 0.9 ? '#ff4444' : s.charge >= 0.6 ? '#ffaa00' : '#00ff88';
          ctx.save();
          ctx.shadowColor = mColor;
          ctx.shadowBlur = 12;
          ctx.fillStyle = mColor;
          ctx.beginPath();
          ctx.roundRect(meterX, meterY + meterH - fillH, meterW, fillH, [0, 0, 4, 4]);
          ctx.fill();
          ctx.restore();

          ctx.font = 'bold 9px monospace';
          ctx.textAlign = 'center';
          ctx.fillStyle = '#aaaaaa';
          ctx.fillText('PWR', meterX + meterW / 2, meterY - 6);

          if (s.charge >= 0.95) {
            ctx.save();
            ctx.shadowColor = '#ff4444';
            ctx.shadowBlur = 15;
            ctx.font = 'bold 10px monospace';
            ctx.fillStyle = '#ff4444';
            ctx.fillText('MAX!', meterX + meterW / 2, meterY + meterH + 14);
            ctx.restore();
          }
        }

        // ---- WIND INDICATOR (top center) ----
        const windCX = W / 2;
        const windCY = 48;

        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.beginPath();
        ctx.roundRect(windCX - 130, windCY - 22, 260, 44, 8);
        ctx.fill();
        ctx.strokeStyle = 'rgba(100,100,200,0.4)';
        ctx.lineWidth = 1;
        ctx.stroke();

        ctx.textAlign = 'center';
        ctx.font = 'bold 11px monospace';
        ctx.fillStyle = '#8888cc';
        ctx.fillText('WIND', windCX, windCY - 8);

        // Wind bar
        const windNorm = s.wind / 60; // -1..1
        const barLen = Math.abs(windNorm) * 90;
        const wCol = s.wind > 0 ? '#ff7744' : '#44aaff';
        if (barLen > 0) {
          ctx.save();
          ctx.shadowColor = wCol;
          ctx.shadowBlur = 8;
          ctx.fillStyle = wCol;
          if (s.wind > 0) {
            ctx.fillRect(windCX, windCY + 4, barLen, 9);
          } else {
            ctx.fillRect(windCX - barLen, windCY + 4, barLen, 9);
          }
          ctx.restore();
        }

        // Wind label
        ctx.font = '12px monospace';
        ctx.fillStyle = s.wind === 0 ? '#88ff88' : (s.wind > 0 ? '#ff8844' : '#44aaff');
        ctx.fillText(s.windLabel, windCX, windCY + 22);

        // ---- SIGHT / CROSSHAIR ----
        if (s.phase === 'playing') {
          const cx = s.mouseX + (s.charging ? s.wobble : 0);
          const cy = s.mouseY;
          const charged = s.charge;
          const sCol = charged > 0.9 ? '#ff4444' : charged > 0.5 ? '#ffcc00' : '#00ffcc';
          const sz = 22;

          ctx.save();
          ctx.shadowColor = sCol;
          ctx.shadowBlur = 12;
          ctx.strokeStyle = sCol;
          ctx.lineWidth = 1.5;
          // Cross
          ctx.beginPath();
          ctx.moveTo(cx - sz, cy); ctx.lineTo(cx - 6, cy);
          ctx.moveTo(cx + 6, cy); ctx.lineTo(cx + sz, cy);
          ctx.moveTo(cx, cy - sz); ctx.lineTo(cx, cy - 6);
          ctx.moveTo(cx, cy + 6); ctx.lineTo(cx, cy + sz);
          ctx.stroke();
          // Circle
          ctx.beginPath();
          ctx.arc(cx, cy, 6, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();

          // Wind compensation ghost crosshair (shows where bullet lands if you aim here)
          if (Math.abs(s.wind) > 5) {
            const gx = cx - s.wind;
            const gy = cy;
            ctx.save();
            ctx.globalAlpha = 0.35;
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 5]);
            ctx.beginPath();
            ctx.arc(gx, gy, 10, 0, Math.PI * 2);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(gx, gy);
            ctx.stroke();
            ctx.restore();
          }
        }

        // ---- FLYING ARROW ----
        if (s.arrow && s.phase === 'shot_anim') {
          const prog = s.arrow.progress;
          const ax = s.arrow.sx + (s.arrow.tx - s.arrow.sx) * prog;
          const ay = s.arrow.sy + (s.arrow.ty - s.arrow.sy) * prog
                     - Math.sin(prog * Math.PI) * 90;

          // Direction
          const dp = Math.min(1, prog + 0.04);
          const nx = s.arrow.sx + (s.arrow.tx - s.arrow.sx) * dp;
          const ny = s.arrow.sy + (s.arrow.ty - s.arrow.sy) * dp
                     - Math.sin(dp * Math.PI) * 90;
          const ang = Math.atan2(ny - ay, nx - ax);

          ctx.save();
          ctx.translate(ax, ay);
          ctx.rotate(ang);
          ctx.shadowColor = '#ffdd88';
          ctx.shadowBlur = 10;
          // Shaft
          ctx.strokeStyle = '#ccaa55';
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.moveTo(-22, 0); ctx.lineTo(14, 0);
          ctx.stroke();
          // Head
          ctx.fillStyle = '#aaccee';
          ctx.shadowColor = '#aaccee';
          ctx.beginPath();
          ctx.moveTo(18, 0); ctx.lineTo(9, -4); ctx.lineTo(9, 4);
          ctx.closePath();
          ctx.fill();
          // Fletching
          ctx.fillStyle = '#ff4466';
          ctx.shadowBlur = 0;
          ctx.fillRect(-22, -4, 8, 3);
          ctx.fillRect(-22, 1, 8, 3);
          ctx.restore();
        }

        // Arrow stuck in target after landing
        if (s.arrow && s.phase === 'playing' && s.arrow.progress >= 1) {
          // already fired, in cooldown — show stuck arrow
          const hx = s.arrow.hitX, hy = s.arrow.hitY;
          ctx.save();
          ctx.shadowColor = '#ffdd88';
          ctx.shadowBlur = 6;
          ctx.strokeStyle = '#ccaa55';
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(hx - 28, hy + 5);
          ctx.lineTo(hx + 5, hy);
          ctx.stroke();
          ctx.restore();
        }

        // ---- PARTICLES ----
        for (const p of s.particles) {
          const a = p.life / p.maxLife;
          ctx.save();
          ctx.globalAlpha = a;
          ctx.shadowColor = p.color;
          ctx.shadowBlur = 8;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // ---- FLOATING TEXTS ----
        for (const f of s.floats) {
          const a = f.life / f.maxLife;
          const rise = (1 - a) * 55;
          ctx.save();
          ctx.globalAlpha = a;
          ctx.shadowColor = f.color;
          ctx.shadowBlur = 14;
          ctx.fillStyle = f.color;
          ctx.font = 'bold 22px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(f.text, f.x, f.y - rise);
          ctx.restore();
        }

        // ---- HUD ----
        if (s.phase !== 'title') {
          // Score (top right)
          ctx.save();
          ctx.shadowColor = '#ffffff';
          ctx.shadowBlur = 12;
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 32px monospace';
          ctx.textAlign = 'right';
          ctx.fillText(s.score, W - 20, 44);
          ctx.shadowBlur = 0;
          ctx.font = '12px monospace';
          ctx.fillStyle = '#888888';
          ctx.fillText('SCORE', W - 20, 60);
          ctx.font = '12px monospace';
          ctx.fillStyle = '#ffaa00';
          ctx.fillText(`BEST ${s.highScore}`, W - 20, 78);
          ctx.restore();

          // Combo (top-left under meter)
          if (s.combo >= 2) {
            ctx.save();
            ctx.shadowColor = '#ffff44';
            ctx.shadowBlur = 16;
            ctx.fillStyle = '#ffff44';
            ctx.font = 'bold 18px monospace';
            ctx.textAlign = 'left';
            ctx.fillText(`COMBO ×${s.combo}`, 20, 95);
            ctx.restore();
          }

          // Arrow dots (bottom center)
          const dotStartX = (W - MAX_ARROWS * 20) / 2;
          for (let i = 0; i < MAX_ARROWS; i++) {
            const used = i < s.arrowsFired;
            ctx.save();
            ctx.shadowColor = used ? 'transparent' : '#00aaff';
            ctx.shadowBlur = used ? 0 : 8;
            ctx.fillStyle = used ? '#1a1a2a' : '#00aaff';
            ctx.strokeStyle = used ? '#333' : '#00aaff';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(dotStartX + i * 20 + 8, H - 18, 7, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
          }

          // Arrow count label
          ctx.textAlign = 'center';
          ctx.font = '11px monospace';
          ctx.fillStyle = '#556677';
          ctx.fillText('ARROWS REMAINING', W / 2, H - 4);

          // Instructions (only if playing and not charged)
          if (s.phase === 'playing' && s.arrowsFired === 0 && !s.charging) {
            ctx.textAlign = 'center';
            ctx.font = '13px monospace';
            ctx.fillStyle = 'rgba(150,200,255,0.7)';
            ctx.fillText('Hold & drag to aim · Release to fire · Watch the wind!', W / 2, H - 38);
          }
        }

        // ---- TITLE SCREEN ----
        if (s.phase === 'title') {
          ctx.fillStyle = 'rgba(4,4,18,0.78)';
          ctx.fillRect(0, 0, W, H);

          const p1 = 0.5 + 0.5 * Math.sin(s.bgT * 2.5);
          ctx.save();
          ctx.textAlign = 'center';
          ctx.shadowColor = '#00ffcc';
          ctx.shadowBlur = 30 + 10 * p1;
          ctx.fillStyle = '#00ffcc';
          ctx.font = 'bold 70px monospace';
          ctx.fillText('NEON', W / 2, H / 2 - 70);
          ctx.shadowColor = '#ff44aa';
          ctx.shadowBlur = 30 + 10 * p1;
          ctx.fillStyle = '#ff44aa';
          ctx.fillText('ARCHER', W / 2, H / 2 + 10);
          ctx.restore();

          ctx.textAlign = 'center';
          ctx.font = '16px monospace';
          ctx.fillStyle = '#aaaacc';
          ctx.fillText('Hold to charge · Release to fire · Aim for BULLSEYE!', W / 2, H / 2 + 60);
          ctx.fillText('Compensate for wind — use the yellow guide ring', W / 2, H / 2 + 84);

          const p2 = 0.5 + 0.5 * Math.sin(s.bgT * 3.2);
          ctx.save();
          ctx.shadowColor = '#ffff44';
          ctx.shadowBlur = 12 * p2;
          ctx.fillStyle = `rgba(255,255,80,${0.6 + 0.4 * p2})`;
          ctx.font = 'bold 24px monospace';
          ctx.fillText('CLICK TO PLAY', W / 2, H / 2 + 145);
          ctx.restore();

          if (s.highScore > 0) {
            ctx.font = '16px monospace';
            ctx.fillStyle = '#ffaa00';
            ctx.fillText(`Best Score: ${s.highScore}`, W / 2, H / 2 + 190);
          }
        }

        // ---- GAME OVER ----
        if (s.phase === 'gameover') {
          ctx.fillStyle = 'rgba(4,4,18,0.78)';
          ctx.fillRect(0, 0, W, H);

          ctx.textAlign = 'center';
          ctx.save();
          ctx.shadowColor = '#ff4444';
          ctx.shadowBlur = 22;
          ctx.fillStyle = '#ff4444';
          ctx.font = 'bold 52px monospace';
          ctx.fillText('GAME OVER', W / 2, H / 2 - 80);
          ctx.restore();

          ctx.save();
          ctx.shadowColor = '#ffffff';
          ctx.shadowBlur = 12;
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 38px monospace';
          ctx.fillText(`Score: ${s.score}`, W / 2, H / 2 - 12);
          ctx.restore();

          if (s.score > 0 && s.score >= s.highScore) {
            ctx.save();
            ctx.shadowColor = '#ffff44';
            ctx.shadowBlur = 18;
            ctx.fillStyle = '#ffff44';
            ctx.font = 'bold 26px monospace';
            ctx.fillText('NEW BEST!', W / 2, H / 2 + 36);
            ctx.restore();
          } else {
            ctx.font = '18px monospace';
            ctx.fillStyle = '#888888';
            ctx.fillText(`Best: ${s.highScore}`, W / 2, H / 2 + 36);
          }

          const p3 = 0.5 + 0.5 * Math.sin(s.bgT * 3);
          ctx.save();
          ctx.shadowColor = '#44aaff';
          ctx.shadowBlur = 10 * p3;
          ctx.fillStyle = `rgba(80,180,255,${0.6 + 0.4 * p3})`;
          ctx.font = 'bold 22px monospace';
          ctx.fillText('CLICK TO PLAY AGAIN', W / 2, H / 2 + 105);
          ctx.restore();
        }
      }, []);

      // ============ UPDATE ============
      const update = useCallback((dt) => {
        const s = G();
        s.bgT += dt;

        // Particles
        s.particles = s.particles.filter(p => p.life > 0);
        for (const p of s.particles) {
          p.x += p.vx; p.y += p.vy;
          p.vy += 0.15;
          p.life -= dt;
        }

        // Floats
        s.floats = s.floats.filter(f => f.life > 0);
        for (const f of s.floats) { f.life -= dt; }

        if (s.phase === 'playing') {
          // Charging
          if (s.charging) {
            s.charge = Math.min(1.05, s.charge + dt * 0.65);

            // Wobble (kicks in at 65%+ charge)
            const wobbleAmt = Math.max(0, s.charge - 0.65) * 28;
            const wobbleSpeed = 3 + s.charge * 12;
            s.wobble += wobbleSpeed * dt * s.wobbleVel;
            if (Math.abs(s.wobble) > wobbleAmt) {
              s.wobbleVel *= -1;
            }

            // Charge sound ticks
            s.lastChargeSound += dt;
            if (s.lastChargeSound > 0.12) {
              s.lastChargeSound = 0;
              playSound(audioRef.current, 'charge');
            }
          } else {
            s.wobble *= 0.85;
            s.charge = Math.max(0, s.charge - dt * 0.5);
          }
        }

        if (s.phase === 'shot_anim' && s.arrow) {
          s.arrow.progress = Math.min(1, s.arrow.progress + dt * 1.6);
          if (s.arrow.progress >= 1) {
            // Arrow landed
            scoreHit(s.arrow.hitX, s.arrow.hitY);
            s.phase = 'cooldown'; // brief pause before next round
          }
        }
      }, [scoreHit]);

      // ============ LOOP ============
      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');

        const loop = (ts) => {
          const dt = Math.min(0.05, (ts - lastTRef.current) / 1000);
          lastTRef.current = ts;
          update(dt);
          ctx.clearRect(0, 0, W, H);
          draw(ctx, dt);
          rafRef.current = requestAnimationFrame(loop);
        };
        rafRef.current = requestAnimationFrame(loop);
        return () => cancelAnimationFrame(rafRef.current);
      }, [update, draw]);

      // ============ EVENTS ============
      const getXY = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scX = W / rect.width, scY = H / rect.height;
        const src = e.touches ? e.touches[0] : e;
        return {
          x: (src.clientX - rect.left) * scX,
          y: (src.clientY - rect.top) * scY,
        };
      };

      const onDown = useCallback((e) => {
        e.preventDefault();
        const s = G();
        const pos = getXY(e);
        s.mouseX = pos.x;
        s.mouseY = pos.y;

        if (s.phase === 'title' || s.phase === 'gameover') {
          beginGame();
          return;
        }
        if (s.phase === 'playing') {
          getAudio();
          s.charging = true;
          s.lastChargeSound = 0;
        }
      }, [beginGame, getAudio]);

      const onMove = useCallback((e) => {
        e.preventDefault();
        const pos = getXY(e);
        const s = G();
        s.mouseX = pos.x;
        // On mobile, offset sight above finger
        s.mouseY = pos.y - (e.touches ? 60 : 0);
      }, []);

      const onUp = useCallback((e) => {
        e.preventDefault();
        const s = G();
        if (s.charging && s.phase === 'playing') {
          fireArrow();
        }
      }, [fireArrow]);

      return (
        <canvas
          ref={canvasRef}
          width={W}
          height={H}
          style={{ width: '100%', height: '100%', objectFit: 'contain' }}
          onMouseMove={onMove}
          onMouseDown={onDown}
          onMouseUp={onUp}
          onTouchStart={onDown}
          onTouchMove={onMove}
          onTouchEnd={onUp}
        />
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Game />);
  </script>
</body>
</html>
