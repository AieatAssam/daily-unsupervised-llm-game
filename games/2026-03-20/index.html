<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nova Pulse</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { margin: 0; overflow: hidden; background: #050510; }
    #root { width: 100%; height: 100vh; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    @keyframes comboAnim { 0% { transform: translate(-50%,-50%) scale(1.4); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1); opacity: 0.7; } }
    @keyframes dangerPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.9; } }
      html { overflow: hidden; }
    canvas { display: block; max-width: calc(100% - 2px); height: auto; margin: 0 auto; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Audio helpers ───────────────────────────────────── */
    function makeAudio() {
      try { return new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return null; }
    }
    function playTone(ctx, type, freq, dur, vol = 0.3) {
      if (!ctx) return;
      try {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.4, ctx.currentTime + dur);
        gain.gain.setValueAtTime(vol, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.start(); osc.stop(ctx.currentTime + dur);
      } catch(e) {}
    }

    /* ── Constants ───────────────────────────────────────── */
    const COLORS      = ['#ff2d78','#00f5ff','#ffe000','#00ff88','#ff6b2d','#a855f7','#ff9de2','#4affb4'];
    const MIN_R       = 45;           // min ring radius (px)
    const MAX_R_RATIO = 0.44;         // max ring = 44% of min(W,H)
    const EXPAND_SPD  = 160;          // px/s expanding speed
    const CONTRACT_SPD= 400;          // px/s contracting speed
    const BALL_R      = 13;           // ball radius
    const HIT_TOL     = BALL_R + 6;   // hit tolerance (px)
    const TRAIL_LEN   = 10;

    /* ── Main Component ──────────────────────────────────── */
    const NovaPulse = () => {
      const canvasRef = useRef(null);
      const gsRef     = useRef(null);   // mutable game state
      const rafRef    = useRef(null);
      const lastTRef  = useRef(null);
      const [ui, setUi] = useState({
        phase: 'title',
        score: 0, lives: 3, combo: 0, level: 1,
        highScore: Number(localStorage.getItem('novaPulse_hs') || 0),
        danger: false,
      });

      /* ── Initialise game state ─────────────────────── */
      const makeGameState = useCallback((canvas) => {
        const W = canvas.width, H = canvas.height;
        const cx = W / 2, cy = H / 2;
        const level = 1;
        const ballCount = 7;
        const balls = Array.from({ length: ballCount }, (_, i) => {
          const angle  = (Math.PI * 2 / ballCount) * i + 0.3;
          const dist   = MIN_R * 3 + Math.random() * 80;
          const speed  = 90 + Math.random() * 50;
          return {
            x: cx + Math.cos(angle) * dist,
            y: cy + Math.sin(angle) * dist,
            vx: Math.cos(angle + Math.PI / 2) * speed,
            vy: Math.sin(angle + Math.PI / 2) * speed,
            color: COLORS[i % COLORS.length],
            hitThis: false,   // hit in current expansion?
            dying: false,     // mid-death animation
            dieTimer: 0,
            trail: [],
          };
        });
        return {
          phase: 'playing',
          score: 0, lives: 3, combo: 0, level,
          highScore: Number(localStorage.getItem('novaPulse_hs') || 0),
          ringR: MIN_R,
          holding: false,
          balls,
          particles: [],
          bgHue: 220,
          frameN: 0,
          audioCtx: null,
          danger: false,
          // combo text splash
          comboSplash: null,
        };
      }, []);

      /* ── Particles ─────────────────────────────────── */
      const burst = useCallback((gs, x, y, color, n = 14) => {
        for (let i = 0; i < n; i++) {
          const a = (Math.PI * 2 / n) * i + Math.random() * 0.4;
          const spd = 70 + Math.random() * 130;
          gs.particles.push({
            x, y,
            vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
            color, life: 1, r: 3 + Math.random() * 4,
          });
        }
      }, []);

      /* ── Start / Restart ───────────────────────────── */
      const startGame = useCallback(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const gs = makeGameState(canvas);
        // preserve audioCtx across restarts
        if (gsRef.current && gsRef.current.audioCtx) gs.audioCtx = gsRef.current.audioCtx;
        gsRef.current = gs;
        setUi({
          phase: 'playing', score: 0, lives: 3, combo: 0, level: 1,
          highScore: gs.highScore, danger: false,
        });
      }, [makeGameState]);

      /* ── Input setup ───────────────────────────────── */
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;

        const onDown = (e) => {
          e.preventDefault();
          const gs = gsRef.current;
          if (!gs || gs.phase === 'title' || gs.phase === 'gameover') {
            startGame(); return;
          }
          if (gs.phase === 'playing') {
            if (!gs.audioCtx) gs.audioCtx = makeAudio();
            gs.holding = true;
          }
        };
        const onUp = (e) => {
          e.preventDefault();
          const gs = gsRef.current;
          if (gs && gs.phase === 'playing') {
            gs.holding = false;
            // reset hit flags so next expansion can re-hit
            gs.balls.forEach(b => { b.hitThis = false; });
            gs.combo = 0;
          }
        };
        const onKeyDown = (e) => { if (e.code === 'Space') { e.preventDefault(); onDown(e); } };
        const onKeyUp   = (e) => { if (e.code === 'Space') { e.preventDefault(); onUp(e); } };

        canvas.addEventListener('mousedown',  onDown);
        canvas.addEventListener('mouseup',    onUp);
        canvas.addEventListener('mouseleave', onUp);
        canvas.addEventListener('touchstart', onDown, { passive: false });
        canvas.addEventListener('touchend',   onUp,   { passive: false });
        window.addEventListener('keydown',    onKeyDown);
        window.addEventListener('keyup',      onKeyUp);

        return () => {
          canvas.removeEventListener('mousedown',  onDown);
          canvas.removeEventListener('mouseup',    onUp);
          canvas.removeEventListener('mouseleave', onUp);
          canvas.removeEventListener('touchstart', onDown);
          canvas.removeEventListener('touchend',   onUp);
          window.removeEventListener('keydown',    onKeyDown);
          window.removeEventListener('keyup',      onKeyUp);
        };
      }, [startGame]);

      /* ── Canvas resize ─────────────────────────────── */
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const resize = () => {
          canvas.width  = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        resize();
        window.addEventListener('resize', resize);
        return () => window.removeEventListener('resize', resize);
      }, []);

      /* ── Game loop ─────────────────────────────────── */
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        const loop = (ts) => {
          const dt = lastTRef.current ? Math.min((ts - lastTRef.current) / 1000, 0.05) : 0.016;
          lastTRef.current = ts;

          const gs = gsRef.current;
          const W  = canvas.width, H = canvas.height;
          const cx = W / 2, cy = H / 2;
          const maxR = Math.min(W, H) * MAX_R_RATIO;

          /* ── Update ──────────────────────────────── */
          if (gs && gs.phase === 'playing') {
            gs.frameN++;
            gs.bgHue = (gs.bgHue + 0.15) % 360;

            // Ring expand / contract
            if (gs.holding) {
              gs.ringR = Math.min(gs.ringR + EXPAND_SPD * dt, maxR);
              gs.danger = gs.ringR > maxR * 0.80;

              // Overflow → lose life
              if (gs.ringR >= maxR) {
                gs.ringR = MIN_R;
                gs.holding = false;
                gs.lives--;
                gs.combo = 0;
                gs.danger = false;
                gs.balls.forEach(b => { b.hitThis = false; });
                burst(gs, cx, cy, '#ff2d78', 22);
                playTone(gs.audioCtx, 'sawtooth', 120, 0.5, 0.4);

                const died = gs.lives <= 0;
                if (died) {
                  gs.phase = 'gameover';
                  if (gs.score > gs.highScore) {
                    gs.highScore = gs.score;
                    localStorage.setItem('novaPulse_hs', gs.score);
                  }
                  setUi(u => ({ ...u, phase: 'gameover', highScore: gs.highScore, lives: 0 }));
                } else {
                  setUi(u => ({ ...u, lives: gs.lives, combo: 0, danger: false }));
                }
              }
            } else {
              gs.ringR = Math.max(gs.ringR - CONTRACT_SPD * dt, MIN_R);
              gs.danger = false;
            }

            // Move balls & check ring collision
            let hitsThisFrame = 0;
            gs.balls.forEach(ball => {
              if (ball.dying) {
                ball.dieTimer -= dt;
                if (ball.dieTimer <= 0) {
                  // respawn at random edge of safe zone
                  const a = Math.random() * Math.PI * 2;
                  ball.x = cx + Math.cos(a) * (MIN_R * 2.5 + Math.random() * 60);
                  ball.y = cy + Math.sin(a) * (MIN_R * 2.5 + Math.random() * 60);
                  const spd = 90 + gs.level * 12 + Math.random() * 50;
                  ball.vx = Math.cos(a + Math.PI / 2) * spd;
                  ball.vy = Math.sin(a + Math.PI / 2) * spd;
                  ball.dying = false;
                  ball.hitThis = false;
                  ball.trail = [];
                }
                return;
              }

              // Update trail
              ball.trail.push({ x: ball.x, y: ball.y });
              if (ball.trail.length > TRAIL_LEN) ball.trail.shift();

              // Move
              ball.x += ball.vx * dt;
              ball.y += ball.vy * dt;

              // Wall bounce
              if (ball.x - BALL_R < 0)  { ball.x = BALL_R;     ball.vx =  Math.abs(ball.vx); }
              if (ball.x + BALL_R > W)  { ball.x = W - BALL_R; ball.vx = -Math.abs(ball.vx); }
              if (ball.y - BALL_R < 0)  { ball.y = BALL_R;     ball.vy =  Math.abs(ball.vy); }
              if (ball.y + BALL_R > H)  { ball.y = H - BALL_R; ball.vy = -Math.abs(ball.vy); }

              // Ring hit detection (only while expanding)
              if (gs.holding && !ball.hitThis) {
                const dist = Math.hypot(ball.x - cx, ball.y - cy);
                if (Math.abs(dist - gs.ringR) < HIT_TOL) {
                  ball.hitThis = true;
                  ball.dying   = true;
                  ball.dieTimer = 0.45;
                  gs.combo++;
                  hitsThisFrame++;
                  const pts = 10 * gs.combo;
                  gs.score += pts;
                  burst(gs, ball.x, ball.y, ball.color, 16);
                  const freq = 280 + gs.combo * 60;
                  playTone(gs.audioCtx, 'sine', freq, 0.18, 0.35);
                  // Score flash
                  gs.comboSplash = { text: gs.combo > 1 ? `×${gs.combo} COMBO!` : '+' + pts, timer: 0.8 };
                }
              }
            });

            // Level-up check (outside ball loop)
            const newLevel = Math.floor(gs.score / 120) + 1;
            if (newLevel > gs.level) {
              gs.level = newLevel;
              // Add a ball if below cap
              if (gs.balls.length < 14) {
                const a = Math.random() * Math.PI * 2;
                const spd = 90 + newLevel * 12;
                gs.balls.push({
                  x: cx + Math.cos(a) * (MIN_R * 3),
                  y: cy + Math.sin(a) * (MIN_R * 3),
                  vx: Math.cos(a + Math.PI / 2) * spd,
                  vy: Math.sin(a + Math.PI / 2) * spd,
                  color: COLORS[gs.balls.length % COLORS.length],
                  hitThis: false, dying: false, dieTimer: 0, trail: [],
                });
              }
              playTone(gs.audioCtx, 'triangle', 520, 0.3, 0.2);
            }

            // Combo splash timer
            if (gs.comboSplash) {
              gs.comboSplash.timer -= dt;
              if (gs.comboSplash.timer <= 0) gs.comboSplash = null;
            }

            // Update particles
            gs.particles = gs.particles.filter(p => p.life > 0);
            gs.particles.forEach(p => {
              p.x += p.vx * dt; p.y += p.vy * dt;
              p.vx *= 0.93; p.vy *= 0.93;
              p.life -= dt * 1.8;
            });

            if (hitsThisFrame > 0) {
              setUi(u => ({ ...u, score: gs.score, combo: gs.combo, level: gs.level, danger: gs.danger }));
            } else if (gs.frameN % 6 === 0) {
              setUi(u => ({ ...u, danger: gs.danger, level: gs.level }));
            }
          }

          /* ── Render ──────────────────────────────── */
          const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.9);
          bg.addColorStop(0, `hsla(${gs ? gs.bgHue : 220},65%,12%,1)`);
          bg.addColorStop(1, `hsla(${gs ? (gs.bgHue + 140) % 360 : 0},80%,4%,1)`);
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, W, H);

          if (!gs || gs.phase === 'title') {
            rafRef.current = requestAnimationFrame(loop);
            return;
          }

          // Danger zone ring (dashed)
          if (gs.phase === 'playing') {
            const dangerAlpha = gs.danger ? 0.6 + 0.3 * Math.sin(gs.frameN * 0.25) : 0.15;
            ctx.beginPath();
            ctx.arc(cx, cy, maxR, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(255,50,50,${dangerAlpha})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 8]);
            ctx.stroke();
            ctx.setLineDash([]);
          }

          // Draw ring
          if (gs.phase === 'playing' || gs.phase === 'gameover') {
            const hue = gs.danger ? 0 : (gs.holding ? (gs.frameN * 4) % 360 : 210);
            const ringCol = gs.danger ? '#ff3333' : `hsl(${hue},100%,65%)`;
            const lw = gs.holding ? 5 : 2.5;

            // Soft fill inside ring
            if (gs.holding) {
              ctx.beginPath();
              ctx.arc(cx, cy, gs.ringR, 0, Math.PI * 2);
              ctx.fillStyle = gs.danger ? 'rgba(255,51,51,0.094)' : `hsla(${hue},100%,65%,0.094)`;
              ctx.fill();
            }

            // Ring stroke
            ctx.shadowBlur = gs.holding ? 28 : 12;
            ctx.shadowColor = ringCol;
            ctx.beginPath();
            ctx.arc(cx, cy, gs.ringR, 0, Math.PI * 2);
            ctx.strokeStyle = ringCol;
            ctx.lineWidth = lw;
            ctx.globalAlpha = gs.holding ? 1 : 0.65;
            ctx.stroke();
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;

            // Center core glow
            const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 22);
            cg.addColorStop(0, 'rgba(255,255,255,0.9)');
            cg.addColorStop(0.4, gs.danger ? '#ff333388' : `hsla(${hue},100%,65%,0.533)`);
            cg.addColorStop(1,   'rgba(0,0,0,0)');
            ctx.beginPath();
            ctx.arc(cx, cy, 22, 0, Math.PI * 2);
            ctx.fillStyle = cg;
            ctx.fill();

            // Draw balls
            gs.balls.forEach(ball => {
              if (ball.dying) {
                // Shrink dying ball
                const s = ball.dieTimer / 0.45;
                ctx.save();
                ctx.globalAlpha = s;
                ctx.shadowBlur  = 15;
                ctx.shadowColor = ball.color;
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, BALL_R * s, 0, Math.PI * 2);
                ctx.fillStyle = ball.color;
                ctx.fill();
                ctx.restore();
                return;
              }

              // Trail
              ball.trail.forEach((pt, i) => {
                const a = (i / TRAIL_LEN) * 0.5;
                const r = BALL_R * 0.6 * (i / TRAIL_LEN);
                ctx.globalAlpha = a;
                ctx.beginPath();
                ctx.arc(pt.x, pt.y, r, 0, Math.PI * 2);
                ctx.fillStyle = ball.color;
                ctx.fill();
              });
              ctx.globalAlpha = 1;

              // Ball
              ctx.shadowBlur  = 22;
              ctx.shadowColor = ball.color;
              ctx.beginPath();
              ctx.arc(ball.x, ball.y, BALL_R, 0, Math.PI * 2);
              ctx.fillStyle = ball.color;
              ctx.fill();
              ctx.shadowBlur = 0;

              // Highlight
              ctx.beginPath();
              ctx.arc(ball.x - BALL_R * 0.32, ball.y - BALL_R * 0.32, BALL_R * 0.38, 0, Math.PI * 2);
              ctx.fillStyle = 'rgba(255,255,255,0.55)';
              ctx.fill();
            });

            // Draw particles
            gs.particles.forEach(p => {
              ctx.globalAlpha = Math.max(0, p.life);
              ctx.shadowBlur  = 8;
              ctx.shadowColor = p.color;
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.r * Math.max(0, p.life), 0, Math.PI * 2);
              ctx.fillStyle = p.color;
              ctx.fill();
            });
            ctx.globalAlpha = 1;
            ctx.shadowBlur  = 0;

            // Combo splash on canvas
            if (gs.comboSplash && gs.comboSplash.timer > 0) {
              const a = Math.min(1, gs.comboSplash.timer * 2);
              const scale = 1 + (1 - gs.comboSplash.timer / 0.8) * 0.4;
              ctx.globalAlpha = a;
              ctx.save();
              ctx.translate(cx, cy);
              ctx.scale(scale, scale);
              ctx.fillStyle = '#ffe000';
              ctx.shadowBlur  = 20;
              ctx.shadowColor = '#ffe000';
              ctx.font = 'bold 30px monospace';
              ctx.textAlign = 'center';
              ctx.fillText(gs.comboSplash.text, 0, -90);
              ctx.restore();
              ctx.globalAlpha = 1;
              ctx.shadowBlur  = 0;
            }
          }

          rafRef.current = requestAnimationFrame(loop);
        };

        rafRef.current = requestAnimationFrame(loop);
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
        };
      }, [burst]);

      /* ── Render UI overlays ─────────────────────────── */
      const overlayStyle = {
        position: 'absolute', inset: 0,
        display: 'flex', flexDirection: 'column',
        alignItems: 'center', justifyContent: 'center', gap: 18,
      };
      const monoStyle = (color, size, shadow = true) => ({
        color, fontFamily: 'monospace', fontSize: size, fontWeight: 'bold',
        textShadow: shadow ? `0 0 18px ${color}, 0 0 36px ${color}` : 'none',
        userSelect: 'none',
      });
      const btnStyle = (color) => ({
        ...monoStyle(color, 18, false),
        border: `2px solid ${color}`,
        padding: '12px 44px',
        cursor: 'pointer',
        boxShadow: `0 0 18px ${color}55`,
        borderRadius: 4,
        letterSpacing: 2,
        marginTop: 10,
      });

      return (
        <div style={{ position: 'relative', width: '100vw', height: '100vh' }}>
          <canvas ref={canvasRef} style={{ display: 'block', touchAction: 'none' }} />

          {/* ── HUD ── */}
          {ui.phase === 'playing' && (
            <div style={{
              position: 'absolute', top: 18, left: 0, right: 0,
              display: 'flex', justifyContent: 'space-between',
              padding: '0 28px', pointerEvents: 'none',
            }}>
              <div style={monoStyle('#00f5ff', 26)}>{ui.score}</div>
              <div style={{ ...monoStyle('#a855f7', 16), letterSpacing: 2 }}>LV {ui.level}</div>
              <div style={monoStyle(ui.lives <= 1 ? '#ff2d78' : '#ff6b2d', 24)}>
                {'♥'.repeat(Math.max(0, ui.lives))}{'♡'.repeat(Math.max(0, 3 - ui.lives))}
              </div>
            </div>
          )}

          {/* ── Danger warning ── */}
          {ui.phase === 'playing' && ui.danger && (
            <div style={{
              position: 'absolute', bottom: 28, left: '50%',
              transform: 'translateX(-50%)',
              ...monoStyle('#ff3333', 16, false),
              animation: 'dangerPulse 0.4s ease-in-out infinite',
              pointerEvents: 'none', letterSpacing: 3,
            }}>
              ⚠ RELEASE NOW ⚠
            </div>
          )}

          {/* ── Instructions (playing) ── */}
          {ui.phase === 'playing' && ui.score === 0 && (
            <div style={{
              position: 'absolute', bottom: 60, left: '50%',
              transform: 'translateX(-50%)',
              color: 'rgba(255,255,255,0.5)', fontFamily: 'monospace', fontSize: 13,
              pointerEvents: 'none', textAlign: 'center', letterSpacing: 1,
            }}>
              HOLD to expand the ring — hit neon balls!<br/>
              Release before the ring OVERFLOWS
            </div>
          )}

          {/* ── Title screen ── */}
          {ui.phase === 'title' && (
            <div style={overlayStyle}>
              <div style={{ ...monoStyle('#a855f7', 58), letterSpacing: 8,
                animation: 'fadeIn 0.6s ease-out', fontSize: 'clamp(28px, 12vw, 58px)',
                letterSpacing: 'clamp(2px, 1.5vw, 8px)', textAlign: 'center', maxWidth: '100%' }}>
                NOVA PULSE
              </div>
              <div style={{ ...monoStyle('#00f5ff', 17, false), marginTop: 4 }}>
                Hold to expand the ring. Hit neon balls to score.
              </div>
              <div style={{ color: 'rgba(255,255,255,0.5)', fontFamily: 'monospace', fontSize: 14 }}>
                Don't let the ring overflow — or lose a life!
              </div>
              <div style={{ color: 'rgba(255,255,255,0.4)', fontFamily: 'monospace', fontSize: 13, marginTop: 4 }}>
                Hold / Click / Tap / Space
              </div>
              <div style={btnStyle('#ffe000')} onClick={startGame}>
                PLAY
              </div>
              {ui.highScore > 0 && (
                <div style={monoStyle('#ff2d78', 15)}>BEST: {ui.highScore}</div>
              )}
            </div>
          )}

          {/* ── Game Over ── */}
          {ui.phase === 'gameover' && (
            <div style={{ ...overlayStyle, background: 'rgba(0,0,0,0.75)' }}>
              <div style={{ ...monoStyle('#ff2d78', 46), animation: 'fadeIn 0.4s ease-out' }}>
                GAME OVER
              </div>
              <div style={monoStyle('#00f5ff', 30)}>SCORE: {ui.score}</div>
              <div style={monoStyle('#ffe000', 20)}>BEST: {ui.highScore}</div>
              <div style={btnStyle('#a855f7')} onClick={startGame}>
                PLAY AGAIN
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NovaPulse />);
  </script>
</body>
</html>
